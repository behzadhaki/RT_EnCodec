<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exp 6 — Codebook UMAP</title>
<link rel="stylesheet" href="encodec.css">
<style>
/* Experiment-6-only overrides — kept here to avoid polluting shared encodec.css */
#levelDropdown { position: relative; }
#levelMenu {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: #1c1c1c; border: 1px solid var(--border2); border-radius: 4px;
  padding: 4px 0; z-index: 200; min-width: 90px;
}
#levelMenu.open { display: block; }
#levelMenu label {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; color: var(--text);
}
#levelMenu label:hover { background: #2a2a2a; }
#levelMenu input[type=checkbox] { accent-color: var(--accent); cursor: pointer; margin: 0; }
#frame { grid-template-columns: 210px 1fr; }
:root  { --lbl-w: 5.5em; }
/* Reset shared rules that don't apply in this layout */
#statusBar  { flex: none; white-space: normal; overflow: visible; text-overflow: clip; min-width: auto; }
#progressWrap { width: auto; overflow: visible; }
#seqInfo    { font-family: monospace; font-size: 0.78em; color: #aaa; margin-left: 0.6em;
              flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
/* UMAP slot switcher */
#slotWrap   { display: none; align-items: center; gap: 2px; margin-right: 4px; }
#slotWrap.visible { display: flex; }
#slotPrev, #slotNext { padding: 1px 5px; min-width: 20px; font-size: 12px; line-height: 1; }
#slotDots   { display: flex; gap: 3px; align-items: center; padding: 0 2px; }
.umap-dot   { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #555;
              background: transparent; cursor: pointer; padding: 0; flex-shrink: 0;
              transition: background 0.15s, border-color 0.15s; }
.umap-dot.ready  { background: #666; border-color: #888; }
.umap-dot.active { background: var(--accent) !important; border-color: var(--accent) !important; }
/* ── Bookmark library ── */
#libList { display: flex; flex-direction: column; gap: 3px; margin-top: 5px;
           max-height: 220px; overflow-y: auto; }
.lib-item { display: flex; align-items: center; gap: 3px; }
.lib-name { flex: 1; min-width: 0; background: #1c1c1c; border: 1px solid var(--border2);
            color: var(--text); font-size: 10px; padding: 2px 4px; border-radius: 2px; }
.lib-name:focus { outline: none; border-color: var(--accent); }
.lib-btn  { flex: none; background: none; border: 1px solid var(--border2); color: var(--muted);
            font-size: 11px; padding: 1px 5px; border-radius: 2px; cursor: pointer; line-height: 1.5; }
.lib-btn:hover { color: var(--text); border-color: #555; }
.lib-btn.lib-del:hover { color: #e06060; border-color: #c04040; }
#libEmpty { font-size: 11px; color: var(--muted); padding: 3px 0; }
/* ── Floating trajectory panel ── */
#trajPanel {
  position: absolute; top: 8px; left: 8px; z-index: 20;
  width: 174px;
  background: rgba(18,18,18,0.93);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 7px 9px 8px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.55);
  backdrop-filter: blur(3px);
  --lbl-w: 4.9em;
  font-size: 12px;
}
#trajPanel .section-title {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.45em; cursor: pointer; user-select: none;
}
#trajPanelCollapseBtn {
  background: none; border: none; color: var(--muted); font-size: 11px;
  cursor: pointer; padding: 0; line-height: 1;
}
#trajPanel.collapsed #trajPanelBody { display: none; }
#trajPanel.collapsed { padding-bottom: 7px; }
/* Draw-segment context menu */
#segCtxMenu {
  display: none; position: fixed; z-index: 900;
  background: #1e1e1e; border: 1px solid #444; border-radius: 5px;
  padding: 3px 0; min-width: 110px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  font-size: 12px;
}
#segCtxMenu .seg-ctx-item {
  padding: 6px 14px; cursor: pointer; color: #ddd; white-space: nowrap;
}
#segCtxMenu .seg-ctx-item:hover { background: #2c2c2c; }
#segCtxMenu .seg-ctx-item.danger { color: #e06060; }
#segCtxMenu .seg-ctx-sep { height: 1px; background: #333; margin: 3px 0; }

/* ── Folder overflow modal ── */
#folderModal {
  position: fixed; inset: 0; z-index: 210;
  background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
}
#folderModal.hidden { display: none; }
#folderModalBox {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 16px 18px;
  width: 460px; max-width: 95vw;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#folderModalTitle {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
#folderModalMsg { font-size: 11px; color: var(--text); line-height: 1.5; }
#folderModalMsg b { color: var(--text); }
.folder-opt {
  display: flex; flex-direction: column; gap: 2px; text-align: left;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 8px 10px; cursor: pointer; color: var(--text);
}
.folder-opt:hover { border-color: var(--accent, #30aadc); background: var(--bg); }
.folder-opt .fo-title { font-size: 12px; font-weight: 600; }
.folder-opt .fo-desc  { font-size: 10px; color: var(--muted); }
#folderModalFooter { display: flex; justify-content: flex-end; margin-top: 2px; }

/* ── One-shot notice modal (e.g. sidecar save result) ── */
#noticeModal {
  position: fixed; inset: 0; z-index: 220;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
}
#noticeModal.hidden { display: none; }
#noticeModalBox {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 16px 18px;
  width: 420px; max-width: 92vw;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#noticeModalTitle {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
#noticeModalMsg { font-size: 12px; color: var(--text); line-height: 1.55; }
#noticeModalMsg code { font-size: 11px; background: var(--surface2); padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
<div id="frame">
  <div id="controls"></div>

  <div id="vizArea">
    <div id="modeBar">
      <button class="tog"        id="togPreVQMode">Pre-VQ</button>
      <button class="tog active" id="togVQMode">VQ</button>
      <button class="tog"        id="togPostVQMode">Post-VQ</button>
      <div id="levelWrap">
        <label>Levels</label>
        <div id="levelDropdown">
          <button id="levelMenuBtn" class="tog">All</button>
          <div id="levelMenu"></div>
        </div>
      </div>
      <div id="slotWrap">
        <button id="slotPrev" class="tog">◀</button>
        <div id="slotDots"></div>
        <button id="slotNext" class="tog">▶</button>
      </div>
      <span style="flex:1"></span>
      <button class="tog active" id="togExplore">Explore</button>
      <button class="tog"        id="togDraw">Draw Path</button>
      <button class="tog"        id="togPins">Pins</button>
    </div>

    <div id="umapWrap">
      <div id="pinSeqBar"></div>
      <canvas id="umapCanvas"></canvas>
      <label id="trailToggle" style="display:none">
        <input type="checkbox" id="chkTrail">
        Visualize pre-roll context
      </label>
    </div>

    <div id="statusWrap">
      <span id="statusBar">Encode both sources to compute UMAP.</span>
      <span id="seqInfo"></span>
      <div id="progressWrap"><div id="progressBar"></div></div>
    </div>

    <div id="waveRow">
      <div class="wavePanel">
        <div class="waveHeader">
          <span class="waveLbl">Source A</span>
          <div class="waveCtrl">
            <button id="togSrcA" style="background:none;border:1px solid #e89a2066;border-radius:3px;color:#e89a20;font-weight:700;font-size:11px;padding:1px 6px;cursor:pointer;opacity:1" title="Toggle source A">A</button>
            <button class="waveBtn" id="wbPlayA">▶</button>
            <button class="waveBtn" id="wbStopA">■</button>
            <button class="waveBtn" id="wbLoopA">⟳</button>
          </div>
        </div>
        <canvas class="waveCanvas" id="waveCanvA"></canvas>
      </div>
      <div class="wavePanel">
        <div class="waveHeader">
          <span class="waveLbl">Source B</span>
          <div class="waveCtrl">
            <button id="togSrcB" style="background:none;border:1px solid #30aadc66;border-radius:3px;color:#30aadc;font-weight:700;font-size:11px;padding:1px 6px;cursor:pointer;opacity:1" title="Toggle source B">B</button>
            <button class="waveBtn" id="wbPlayB">▶</button>
            <button class="waveBtn" id="wbStopB">■</button>
            <button class="waveBtn" id="wbLoopB">⟳</button>
          </div>
        </div>
        <canvas class="waveCanvas" id="waveCanvB"></canvas>
      </div>
      <div class="wavePanel">
        <div class="waveHeader">
          <span class="waveLbl">Generated</span>
          <div style="display:flex;align-items:center;gap:3px">
            <span style="font-size:10px;color:var(--muted)">fade</span>
            <input type="number" id="fadeInMs"  value="10" min="0" max="2000" step="5"
                   style="width:34px;font-size:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:2px;padding:1px 3px">
            <span style="font-size:10px;color:var(--muted)">in</span>
            <input type="number" id="fadeOutMs" value="10" min="0" max="2000" step="5"
                   style="width:34px;font-size:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:2px;padding:1px 3px">
            <span style="font-size:10px;color:var(--muted)">out ms</span>
          </div>
          <div style="display:flex;align-items:center;gap:3px">
            <span style="font-size:10px;color:var(--muted)">vol</span>
            <input type="range" id="genVolSlider" min="0" max="2" step="0.01" value="1"
                   style="width:52px;accent-color:var(--accent);cursor:pointer">
          </div>
          <div class="waveCtrl">
            <button class="waveBtn" id="wbPlayG">▶</button>
            <button class="waveBtn" id="wbStopG">■</button>
            <button class="waveBtn" id="wbLoopG">⟳</button>
            <button class="waveBtn" id="wbBookmark" title="Bookmark this sample" style="opacity:0.35;cursor:default">🔖</button>
          </div>
        </div>
        <canvas class="waveCanvas" id="waveCanvG"></canvas>
      </div>
    </div>

    <div id="legendBar">
      <span>
        <svg width="14" height="14" style="vertical-align:middle;margin-right:3px">
          <circle cx="7" cy="7" r="4.5" fill="none" stroke="#c87800" stroke-width="1.5"/>
        </svg>Source A</span>
      <span>
        <svg width="14" height="14" style="vertical-align:middle;margin-right:3px">
          <polygon points="7,1.5 12.5,11.5 1.5,11.5" fill="none" stroke="#2090c0" stroke-width="1.5"/>
        </svg>Source B</span>
    </div>
  </div>
</div>

<!-- Draw-segment right-click context menu -->
<div id="segCtxMenu">
  <div class="seg-ctx-item" id="segCtxSolo">Solo</div>
  <div class="seg-ctx-sep"></div>
  <div class="seg-ctx-item" id="segCtxToggle">Disable</div>
  <div class="seg-ctx-sep"></div>
  <div class="seg-ctx-item danger" id="segCtxDelete">Delete</div>
</div>


<div id="folderModal" class="hidden">
  <div id="folderModalBox">
    <div id="folderModalTitle">📁 Folder too long</div>
    <div id="folderModalMsg"></div>
    <button class="folder-opt" data-strategy="first">
      <span class="fo-title">Keep first clips, in full</span>
      <span class="fo-desc">Add clips in order until 10 min is reached; drop the rest (clips kept whole).</span>
    </button>
    <button class="folder-opt" data-strategy="trim">
      <span class="fo-title">Trim every clip equally</span>
      <span class="fo-desc" data-share>Use the first <b></b> of each clip so all are represented.</span>
    </button>
    <button class="folder-opt" data-strategy="random:2">
      <span class="fo-title">Random 2 s per clip</span>
      <span class="fo-desc">Use a random 2 s window from each clip (whole clip if shorter).</span>
    </button>
    <button class="folder-opt" data-strategy="random:5">
      <span class="fo-title">Random 5 s per clip</span>
      <span class="fo-desc">Use a random 5 s window from each clip (whole clip if shorter).</span>
    </button>
    <button class="folder-opt" data-strategy="random:10">
      <span class="fo-title">Random 10 s per clip</span>
      <span class="fo-desc">Use a random 10 s window from each clip (whole clip if shorter).</span>
    </button>
    <button class="folder-opt" data-strategy="truncate">
      <span class="fo-title">Truncate at 10 min</span>
      <span class="fo-desc">Concatenate in order and hard-cut at exactly 10 min (boundary clip clipped).</span>
    </button>
    <button class="folder-opt" data-strategy="all">
      <span class="fo-title">Load anyway</span>
      <span class="fo-desc">Use the whole folder past 10 min — encoding and the scatter may be slow.</span>
    </button>
    <div id="folderModalFooter">
      <button class="tog" id="folderModalCancel" style="font-size:10px;padding:3px 10px">Cancel</button>
    </div>
  </div>
</div>

<div id="noticeModal" class="hidden">
  <div id="noticeModalBox">
    <div id="noticeModalTitle"></div>
    <div id="noticeModalMsg"></div>
    <div style="display:flex;justify-content:flex-end">
      <button class="tog" id="noticeModalOk" style="font-size:11px;padding:4px 14px">OK</button>
    </div>
  </div>
</div>

<script type="module">
'use strict';

import { createDoubleSourceWidget } from './lib/double-source-widget.js';
import { loadFile }                 from './lib/audio-utils.js';
import { createModelPanel }         from './lib/model-panel.js';
import { makeWavePlayer }           from './lib/wave-player.js';
import { renderScatter as _renderScatter } from './lib/scatter-renderer.js';
import { initHelpTips }             from './lib/help-tip.js';
import {
  findNearestUmapPoint,
  findCodePath,
  computeSnapWaypoints,
  getContextKs,
  buildSnapSequence,
  buildSnapSequenceFixed,
  makeFrameScales,
} from './lib/trajectory-utils.js';
import {
  crc32FromFile,
  windowKey,
  serializeSidecar,
  readSidecar,
  writeSidecar,
  sidecarMatches,
  ensureRWPermission,
} from './lib/encodec-sidecar.js';
import {
  crcOfAudio as snacCrc, snacCacheMatches, readSnacCache, writeSnacCache,
} from './lib/snac-sidecar.js';

const MODELS_BASE = new URL('../serialization/encodec_onnx_exports', location.href).href;
const SNAC_BASE   = new URL('../serialization/snac_onnx_exports', location.href).href;

// 48k OLA segment geometry — must match encodec-worker.js encodeAndCapture48k.
const SEG_48_M    = 48000;
const STRIDE_48_M = 43200;
const HOP_48_M    = 320;
const GUARD_48_M  = 16 * HOP_48_M;

// Triangular OLA window for parallel decode — must match worker's TRI_WIN_48.
const TRI_WIN_48_M = new Float32Array(SEG_48_M);
for (let _i = 0; _i < SEG_48_M; _i++) {
  const _t = (_i + 1) / (SEG_48_M + 1);
  TRI_WIN_48_M[_i] = 0.5 - Math.abs(_t - 0.5);
}

// ── Controls ──────────────────────────────────────────────────────────────────

const controls = document.getElementById('controls');

const srcWidget = createDoubleSourceWidget({
  defaultDur:   4,
  showDuration: false,   // each file loads at its own natural length (≤ 10 s)
  showFolder:   true,    // "Folder (join WAVs)" source type — concatenate a directory of WAVs
  onChange: delay => { saveAllPanelSettings(); maybeWarnFolderSupport(); scheduleEncode(delay); },
  onFolderOverflow: askFolderStrategy,
});
controls.appendChild(srcWidget.element);
const { panelA, panelB } = srcWidget;

// ── Folder overflow dialog ──────────────────────────────────────────────────
// Resolves to a strategy string for planFolderSelections, or null on cancel.
function askFolderStrategy({ count, totalS, budgetS }) {
  const fmtMin = s => {
    if (s < 60) return `${s.toFixed(1)} s`;
    const m = Math.floor(s / 60), sec = Math.round(s % 60);
    return sec ? `${m} min ${sec} s` : `${m} min`;
  };
  const modal  = document.getElementById('folderModal');
  const msg    = document.getElementById('folderModalMsg');
  const shareS = budgetS / Math.max(1, count);
  msg.innerHTML = `This folder is <b>${count}</b> clips totalling <b>${fmtMin(totalS)}</b>, `
    + `over the <b>${fmtMin(budgetS)}</b> limit. Choose how to fit it:`;
  for (const el of modal.querySelectorAll('[data-share] b')) el.textContent = fmtMin(shareS);

  return new Promise(resolve => {
    let done = false;
    const finish = (val) => {
      if (done) return; done = true;
      modal.classList.add('hidden');
      for (const b of optBtns) b.onclick = null;
      cancelBtn.onclick = null; modal.onclick = null;
      resolve(val);
    };
    const optBtns   = [...modal.querySelectorAll('.folder-opt')];
    const cancelBtn = document.getElementById('folderModalCancel');
    for (const b of optBtns) b.onclick = () => finish(b.dataset.strategy);
    cancelBtn.onclick = () => finish(null);
    modal.onclick = e => { if (e.target === modal) finish(null); };
    modal.classList.remove('hidden');
  });
}

// True when the browser can write files into a user-chosen local folder
// (Chrome/Edge/Chromium; Brave needs the File System Access API flag enabled).
const FS_ACCESS_OK = 'showDirectoryPicker' in window;

// Warn once (when a Folder source is in use) if this browser can't save sidecars.
function maybeWarnFolderSupport() {
  if (FS_ACCESS_OK || folderSupportWarned) return;
  if (panelA.getType() !== 'folder' && panelB.getType() !== 'folder') return;
  folderSupportWarned = true;
  showNotice('📁 Saving codes needs Chrome or Edge',
    `Folders still load for analysis, but this browser can’t write the <code>.encodec</code> ` +
    `code files next to your wavs — it lacks the File System Access API. To save/skip-encode ` +
    `codes, open this page in <b>Chrome</b> or <b>Edge</b> (or a Chromium browser with that API ` +
    `enabled — in Brave: <code>brave://flags/#file-system-access-api</code> → Enabled).`, true);
}

// One-shot informational modal (persists until dismissed, unlike the status bar).
function showNotice(title, html, isError = false) {
  const modal = document.getElementById('noticeModal');
  const t = document.getElementById('noticeModalTitle');
  t.textContent = title;
  t.style.color = isError ? 'var(--red)' : 'var(--muted)';
  document.getElementById('noticeModalMsg').innerHTML = html;
  const ok = document.getElementById('noticeModalOk');
  const close = () => { modal.classList.add('hidden'); ok.onclick = null; modal.onclick = null; };
  ok.onclick = close;
  modal.onclick = e => { if (e.target === modal) close(); };
  modal.classList.remove('hidden');
}

// Restore settings + files from the previous session (async; fires after all
// sync setup so workers, mp, etc. are already initialised).
restoreSession();

const mp = createModelPanel({
  defaultModel: '48k',
  defaultBw:    24,
  enableSnac:   true,
  onChange: () => { currentEmbeds = null; updateEncOptVisibility(); scheduleEncode(0); },
});
controls.appendChild(mp.modelSection);
controls.appendChild(mp.modeSection);

// 48k-only encode option: LSTM state continuity across OLA segments.
const encOptSection = document.createElement('div');
encOptSection.className = 'section';
encOptSection.id = 'encOptSection';
encOptSection.innerHTML = `
  <div class="row" id="statefulOlaRow">
    <span class="lbl">48k OLA</span>
    <button class="tog" id="togStatefulOla">Stateless</button>
  </div>
`.trim();
controls.appendChild(encOptSection);

const umapSection = document.createElement('div');
umapSection.className = 'section';
umapSection.innerHTML = `
  <div class="section-title">Projection</div>
  <div class="row" style="gap:3px">
    <button class="tog active" id="togUMAPMode"  style="flex:1">UMAP</button>
    <button class="tog"        id="togPCAMode"   style="flex:1">PCA</button>
    <button class="tog"        id="togMDSMode"   style="flex:1">MDS</button>
    <button class="tog"        id="togWheelMode" style="flex:1">Wheel</button>
    <button class="tog"        id="togSSMMode"   style="flex:1">SSM</button>
  </div>
  <div class="row" id="embedInputRow" style="display:none">
    <span class="lbl">Embed from</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togEmbedFeat">Features</button>
      <button class="tog"        id="togEmbedSSM">SSM</button>
    </div>
  </div>
  <div class="row" id="ssmResRow" style="display:none">
    <span class="lbl">Resolution</span>
    <input type="number" id="ssmBudget" value="1024" min="16" max="4096" step="16" style="width:64px">
    <span style="font-size:11px;color:var(--muted);margin-left:2px">px max</span>
  </div>
  <div class="row" id="ssmMetricRow" style="display:none">
    <span class="lbl">Metric</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togSSMMetricCos">Cosine</button>
      <button class="tog"        id="togSSMMetricEuc">Euclid</button>
    </div>
  </div>
  <div class="row" id="wheelAngleRow" style="display:none">
    <span class="lbl">Angle</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togWheelAngleUMAP">UMAP 1-D</button>
      <button class="tog"        id="togWheelAnglePC1">PC1</button>
      <button class="tog"        id="togWheelAngleMDS">MDS 1-D</button>
    </div>
  </div>
  <div class="row" id="wheelRadiusRow" style="display:none">
    <span class="lbl">Radius</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togWheelLoud">Loud</button>
      <button class="tog"        id="togWheelTime">Time</button>
      <button class="tog"        id="togWheelAtyp">Atyp</button>
      <button class="tog"        id="togWheelTyp">Typ</button>
    </div>
  </div>
  <div class="row" id="wheelScaleRow" style="display:none">
    <span class="lbl">R scale</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togWheelScaleVal">Value</button>
      <button class="tog"        id="togWheelScaleRank">Rank</button>
    </div>

// ── Panel-state persistence helpers ───────────────────────────────────────────

function openPanelStateDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(PS_DB_NAME, PS_DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(PS_STORE);
    req.onsuccess       = e => resolve(e.target.result);
    req.onerror         = e => reject(e.target.error);
  });
}

/** Save non-file settings for one panel to localStorage. */
function savePanelSettings(lsKey, panel) {
  try {
    const s = panel.getState();
    localStorage.setItem(lsKey, JSON.stringify({
      type: s.type, freq: s.freq, loadFull: s.loadFull, trimS: s.trimS,
      volume: s.volume, gateEnabled: s.gateEnabled, gateFreq: s.gateFreq,
      gateDecay: s.gateDecay,
    }));
  } catch { /* storage full / private mode — silently skip */ }
}

/** Restore non-file settings from localStorage. Returns saved type, or null. */
function restorePanelSettings(lsKey, panel) {
  try {
    const raw = localStorage.getItem(lsKey);
    if (!raw) return null;
    const s = JSON.parse(raw);
    panel.setState(s);   // sets type, freq, vol, gate, loadFull, trimS
    return s.type ?? null;
  } catch { return null; }
}

/** Persist a FileSystemFileHandle (or null to clear). */
function saveFileHandle(storeKey, handle) {
  if (!panelStateDB) return;
  const tx  = panelStateDB.transaction(PS_STORE, 'readwrite');
  const store = tx.objectStore(PS_STORE);
  if (handle) {
    store.put(handle, storeKey);
  } else {
    store.delete(storeKey);
  }
}

/** Retrieve a stored FileSystemFileHandle, or null. */
function loadFileHandle(storeKey) {
  return new Promise((resolve, reject) => {
    const tx  = panelStateDB.transaction(PS_STORE, 'readonly');
    const req = tx.objectStore(PS_STORE).get(storeKey);
    req.onsuccess = e => resolve(e.target.result ?? null);
    req.onerror   = e => reject(e.target.error);
  });
}

/** Save settings + handles for both panels (called from onChange). */
function saveAllPanelSettings() {
  savePanelSettings(PS_LS_A, panelA);
  savePanelSettings(PS_LS_B, panelB);
  if (panelStateDB) {
    // Save handles when file is selected; clear when type switches away from file.
    saveFileHandle(PS_LS_A, panelA.getType() === 'file' ? panelA.getFileHandle() : null);
    saveFileHandle(PS_LS_B, panelB.getType() === 'file' ? panelB.getFileHandle() : null);
  }
}

  // ── 2. Open the handle DB ─────────────────────────────────────────────────
  try {
    panelStateDB = await openPanelStateDB();
  } catch (e) {
    console.warn('Panel state DB unavailable:', e);
    return;
  }

  // File handle restoration only if File System Access API is available
  if (!('showOpenFilePicker' in window)) return;

  const needA = typeA === 'file';
  const needB = typeB === 'file';
  if (!needA && !needB) return;

  // ── 3. Load stored handles ────────────────────────────────────────────────
  const [handleA, handleB] = await Promise.all([
    needA ? loadFileHandle(PS_LS_A) : null,
    needB ? loadFileHandle(PS_LS_B) : null,
  ]);

  if (!handleA && !handleB) return;

  // ── 4. Check permissions (no user gesture required for queryPermission) ───
  const permA = handleA ? await handleA.queryPermission({ mode: 'read' }) : null;
  const permB = handleB ? await handleB.queryPermission({ mode: 'read' }) : null;

  const needsGesture = (permA === 'prompt') || (permB === 'prompt');

  async function applyHandles() {
    let anyRestored = false;
    for (const [handle, perm, panel] of [[handleA, permA, panelA], [handleB, permB, panelB]]) {
      if (!handle) continue;
      let granted = perm === 'granted';
      if (perm === 'prompt') {
        try {
          granted = (await handle.requestPermission({ mode: 'read' })) === 'granted';
        } catch { granted = false; }
      }
      if (!granted) continue;
      try {
        const file = await handle.getFile();
        panel.setFile(file, handle);
        anyRestored = true;
      } catch (e) {
        console.warn('Could not restore file from handle:', e);
      }
    }
    if (anyRestored) { scheduleEncode(0); }
  }

  if (!needsGesture) {
    await applyHandles();  // already granted — restore silently
  } else {
    showRestoreNotice(applyHandles);
  }
}

function pinCoords() {
  if (!coordsA || !coordsB) return [];
  return pinPoints.map(p => (p.src === 'A' ? coordsA : coordsB)[p.idx]);
}

function setStatus(msg, isError = false) {
  statusBar.textContent = msg;
  statusBar.style.color = isError ? '#f66' : '';
}

// Snap mode: fit as many waypoints as possible into the available width,
// shrinking toward start → … → end as needed.
function setSeqInfo(seq) {
  const wps = (seq || []).filter((f, i) => i === 0 || f.src !== seq[i-1].src || f.idx !== seq[i-1].idx);
  if (!wps.length) { seqInfo.textContent = ''; return; }
  const fmt  = f  => `${f.src}${f.idx}`;
  const build = arr => '[ ' + arr.map(f => f === null ? '…' : fmt(f)).join(' → ') + ' ]';
  if (wps.length === 1) { seqInfo.textContent = build(wps); return; }

  for (let vis = wps.length; vis >= 2; vis--) {
    if (vis === wps.length) {
      seqInfo.textContent = build(wps);
    } else {
      const front = Math.ceil(vis / 2);
      const back  = vis - front;
      seqInfo.textContent = build([...wps.slice(0, front), null, ...wps.slice(wps.length - back)]);
    }
    if (seqInfo.scrollWidth <= seqInfo.clientWidth + 1) return;
  }
  seqInfo.textContent = build([wps[0], null, wps[wps.length - 1]]);
}

// n evenly-spaced indices from lo..hi inclusive
function spanIdx(lo, hi, n) {
  if (n <= 1) return [lo];
  return Array.from({ length: n }, (_, i) => lo + Math.round(i * (hi - lo) / (n - 1)));
}

// Detect pingpong turnaround index (first consecutive identical pair) in a waypoint array.
// Returns -1 if not a pingpong sequence.
function findTurnaround(wps) {
  for (let i = 1; i < wps.length; i++) {
    if (wps[i].src === wps[i-1].src && wps[i].idx === wps[i-1].idx) return i - 1;
  }
  return -1;
}

// Pick indices for display: 3-per-half mirrored for pingpong, or n evenly spaced for linear.
function pickDisplayIndices(len, taIdx, n) {
  if (taIdx >= 0) {
    const L = spanIdx(0, taIdx, 3);
    const R = [...L].reverse().map(i => taIdx + 1 + (taIdx - i));
    return [...L, ...R];
  }
  return spanIdx(0, len - 1, n);
}

// Code mode: at most 5 waypoints (6 for pingpong), with xK multiplier suffix.
function setCodeSeqInfo(seq, kRepeat) {
  const wps = seq || [];
  if (!wps.length) { seqInfo.textContent = ''; return; }
  const k   = kRepeat > 1 ? 'x' + kRepeat : '';
  const fmt = f => `${f.src}${f.idx}${k}`;

  if (wps.length <= 6) {
    seqInfo.textContent = '[ ' + wps.map(fmt).join(' → ') + ' ]';
    return;
  }

  const taIdx  = findTurnaround(wps);
  const picked = pickDisplayIndices(wps.length, taIdx, 5);

  let text = fmt(wps[picked[0]]);
  for (let i = 1; i < picked.length; i++) {
    const gap = picked[i] - picked[i - 1];
    text += gap === 1 ? ' → ' + fmt(wps[picked[i]]) : ' → … → ' + fmt(wps[picked[i]]);
  }
  seqInfo.textContent = '[ ' + text + ' ]';
}

// Snap mode: show each waypoint as its actual frame range (preroll_start:waypoint_end).
// Groups snapPlayFrames by _wp transitions to find the real context span per waypoint.
function setSnapSeqInfo(snapFrames, snapPlayFrames) {
  if (!snapFrames?.length || !snapPlayFrames?.length) { seqInfo.textContent = ''; return; }

  // Group snapPlayFrames into per-waypoint segments by _wp change.
  // Track the true min index within the waypoint's source (pingPongExtend bounces, so the
  // first frame in the sequence is NOT necessarily the lowest index actually reached).
  const segs = [];
  let s = 0;
  for (let i = 1; i <= snapPlayFrames.length; i++) {
    if (i === snapPlayFrames.length || snapPlayFrames[i]._wp !== snapPlayFrames[i - 1]._wp) {
      // Use the actual snap waypoint (from snapFrames) as the segment endpoint,
      // not the last frame in the group — which may be a post-roll frame
      // (idx > waypoint idx): every segment on 48k (symmetric context).
      const end    = snapFrames[segs.length] ?? snapPlayFrames[i - 1];
      let   minIdx = end.idx;
      for (let j = s; j < i; j++) {
        if (snapPlayFrames[j].src === end.src && snapPlayFrames[j].idx < minIdx)
          minIdx = snapPlayFrames[j].idx;
      }
      segs.push({ minIdx, end });
      s = i;
    }
  }

  // Format one segment: "B0:B6" (true min → waypoint), or just "B6" if no pre-roll
  const fmtSeg = ({ minIdx, end }) =>
    minIdx === end.idx
      ? `${end.src}${end.idx}`
      : `${end.src}${minIdx}:${end.src}${end.idx}`;

  const MAX = 7;

  if (segs.length <= MAX) {
    seqInfo.textContent = '[' + segs.map(fmtSeg).join(', ') + ']';
    return;
  }

  const taIdx  = findTurnaround(snapFrames);
  const picked = pickDisplayIndices(segs.length, taIdx, MAX);

  const parts = [fmtSeg(segs[picked[0]])];
  for (let i = 1; i < picked.length; i++) {
    if (picked[i] !== picked[i - 1] + 1) parts.push('…');
    parts.push(fmtSeg(segs[picked[i]]));
  }
  seqInfo.textContent = '[' + parts.join(', ') + ']';
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

// Build userTrajectory for draw mode: resample each segment independently
// then concatenate.  Segments are never joined — there is no connecting path
// between the end of one stroke and the start of the next, so audio jumps
// directly from one segment's endpoint to the next segment's start point
// (a hard cut at the boundary, not a smooth traversal of the gap).
// Each segment gets frames proportional to its own arc length.
function buildDrawUserTrajectory() {
  // Only enabled completed segments + in-progress stroke
  const activePts = rawDrawSegments
    .filter(s => s.enabled && s.pts.length >= 2)
    .map(s => s.pts);
  const segs = rawDrawPoints.length >= 2
    ? [...activePts, rawDrawPoints]
    : activePts;
  if (segs.length === 0) return [];

  // Compute arc length of each segment.
  const segLens = segs.map(seg => {
    let len = 0;
    for (let i = 1; i < seg.length; i++) {
      const dx = seg[i][0] - seg[i-1][0], dy = seg[i][1] - seg[i-1][1];
      len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
  });
  const totalLen = segLens.reduce((a, b) => a + b, 0);
  if (totalLen < 1e-12) return [];

  // Resample each segment to a frame count proportional to its length,
  // then concatenate — no connector between segments.
  // Record the starting index of each non-first segment so playTrajectory
  // can skip the cross-boundary lerp.
  const N_TOTAL = 300;
  const out = [];
  drawSegmentBoundaries = [];
  for (let i = 0; i < segs.length; i++) {
    if (i > 0) drawSegmentBoundaries.push(out.length);
    const n = Math.max(2, Math.round(segLens[i] / totalLen * N_TOTAL));
    out.push(...resamplePath(segs[i], n));
  }
  return out;
}

function renderScatter() {
  if (projectionMode === 'ssm') { renderSSM(); return; }
  refreshPointColors();
  const fps = coordsA ? coordsA.length / srcDuration('A') : 1;
  // Build the visual segments array: completed segments + live stroke if any.
  const drawSegments = canvasMode === 'draw'
    ? (rawDrawPoints.length >= 1
        ? [...rawDrawSegments, { pts: rawDrawPoints, enabled: true }]
        : rawDrawSegments)
    : [];
  const result = _renderScatter(umapCanvas, dpr, {
    coordsA, coordsB,
    viewZoom, viewPanX, viewPanY,
    pinPoints: pinCoords(),
    highlightedPinIdx: waveHighlight
      ? pinPoints.findIndex(p => p.src === waveHighlight.src && p.idx === waveHighlight.idx)
      : -1,
    selectedPoint, waveHighlight, userTrajectory, drawSegments,
    pathMode, snapFrames, snapSegBoundaries, codePathFrames, trajAnchorPos,
    snapPlayFrames, trajDir, showTrail: chkTrail.checked, canvasMode,
    ctxSwap: { prob: ctxSwapProb, range: ctxSwapDist },
    ctxMode: mp.getModelHz() === '48k' ? 'sym' : 'pre',
    snapMode, snapKVal, snapDurVal, framesPerSec: fps,
    srcAEnabled, srcBEnabled,
    pointColorsA, pointColorsB,
  });
  if (result !== null) lastTransform = result;
}

// Typicality = mean cosine similarity of each frame to all frames (the SSM
// row-marginal, computed directly from features). Used by the wheel Typ radius.
function computeTypicality(flat, N, D) {
  // mean cosine similarity to all frames = alignment with the centroid of the
  // L2-normalised frames (the SSM row-marginal, computed directly from features).
  const c = new Float64Array(D);
  const inv = new Float64Array(N);
  for (let i = 0; i < N; i++) {
    let s = 0; const off = i * D;
    for (let d = 0; d < D; d++) s += flat[off + d] * flat[off + d];
    inv[i] = s > 1e-12 ? 1 / Math.sqrt(s) : 0;
    for (let d = 0; d < D; d++) c[d] += flat[off + d] * inv[i];
  }
  for (let d = 0; d < D; d++) c[d] /= N;
  const out = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    let s = 0; const off = i * D;
    for (let d = 0; d < D; d++) s += flat[off + d] * inv[i] * c[d];
    out[i] = s;
  }
  return out;
}

// ── SSM heatmap render ───────────────────────────────────────────────────────
// Draws ssmImage (a w×h colour-mapped matrix) into umapCanvas, fit to the
// available area preserving aspect, with axis labels, seam guides (joint scope),
// and a title. Geometry of the drawn image is cached on ssmRect for hover hits.
let ssmOffscreen = null;
let ssmRect = null; // { x, y, w, h } in physical (dpr) pixels — placement of the image

function renderSSM() {
  const ctx = umapCanvas.getContext('2d');
  const PW = umapCanvas.width, PH = umapCanvas.height; // physical px
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, PW, PH);
  ctx.fillStyle = '#0c0c10';
  ctx.fillRect(0, 0, PW, PH);

  if (!ssmImage) {
    ctx.fillStyle = '#888';
    ctx.font = `${13 * dpr}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Encode source(s) to compute the similarity matrix.', PW / 2, PH / 2);
    ssmRect = null;
    return;
  }

  const { rgba, w, h, seam, pA, pB } = ssmImage;

  // Stage the matrix into an offscreen canvas at native resolution.
  if (!ssmOffscreen) ssmOffscreen = document.createElement('canvas');
  if (ssmOffscreen.width !== w || ssmOffscreen.height !== h) {
    ssmOffscreen.width = w; ssmOffscreen.height = h;
  }
  ssmOffscreen.getContext('2d').putImageData(rgba, 0, 0);

  // Fit into the canvas, reserving a left strip (→A marginal), a right strip
  // (→B marginal), a top strip (overall marginal), the title, and left A/B axis
  // labels. (SSM is joint-only: A·A | A·B | B·B.)
  const titleH = 16 * dpr, topStripH = 52 * dpr, sideStripW = 58 * dpr;
  const labelL = 18 * dpr, gap = 6 * dpr, mR = 10 * dpr, mB = 18 * dpr;
  const leftReserve  = labelL + sideStripW + gap;
  const rightReserve = sideStripW + gap + mR;
  const topReserve   = titleH + topStripH + gap;
  const availW = Math.max(1, PW - leftReserve - rightReserve);
  const availH = Math.max(1, PH - topReserve - mB);
  const scale = Math.min(availW / w, availH / h);
  const dw = w * scale, dh = h * scale;
  const dx = leftReserve + (availW - dw) / 2;
  const dy = topReserve + (availH - dh) / 2;
  ssmRect = { x: dx, y: dy, w: dw, h: dh };

  ctx.imageSmoothingEnabled = scale < 1; // smooth on downscale, crisp on upscale
  ctx.drawImage(ssmOffscreen, dx, dy, dw, dh);

  // Frame.
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1 * dpr;
  ctx.strokeRect(dx + 0.5, dy + 0.5, dw, dh);

  const seamX = dx + (pA / w) * dw, seamY = dy + (pA / h) * dh;

  // Seam guides (A|B boundary on both axes).
  if (seam > 0 && seam < w) {
    ctx.strokeStyle = 'rgba(120,200,255,0.55)'; ctx.lineWidth = 1 * dpr;
    ctx.beginPath();
    ctx.moveTo(seamX, dy); ctx.lineTo(seamX, dy + dh);
    ctx.moveTo(dx, seamY); ctx.lineTo(dx + dw, seamY);
    ctx.stroke();
  }

  // Live playback cursor — the playing source maps to a joint-matrix index
  // (A block [0,pA), B block [pA,…)); drawn on both axes as a crosshair. Bright
  // core over a dark casing so it stays visible over magma's own warm tones.
  if (ssmPlayhead) {
    const { src, pos } = ssmPlayhead;
    const idx = src === 'A' ? pos * pA : pA + pos * pB;
    const core = src === 'A' ? '#ffd24a' : '#7fe0ff';
    const x = dx + Math.min(idx, w) / w * dw;
    const y = dy + Math.min(idx, h) / h * dh;
    const lines = () => {
      ctx.beginPath();
      ctx.moveTo(x, dy); ctx.lineTo(x, dy + dh);
      ctx.moveTo(dx, y); ctx.lineTo(dx + dw, y);
      ctx.stroke();
    };
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.75)'; ctx.lineWidth = 4 * dpr; lines(); // casing
    ctx.strokeStyle = core;               ctx.lineWidth = 1.6 * dpr; lines(); // core
    ctx.restore();
  }

  // Marginal profiles (mean similarity along a row/column). Bars are normalised
  // per strip and grow away from the matrix. LEFT = →A (each frame's similarity
  // to source A: AA for A rows, BA for B rows), RIGHT = →B (AB / BB); within-
  // source blocks (AA, BB) bright, cross blocks (AB, BA) faded. TOP = overall
  // (the full row/column marginal over the entire matrix), coloured by source.
  if (ssmImage.profA && ssmImage.profB) {
    const nRows = Math.max(1, Math.round(dh));
    const nCols = Math.max(1, Math.round(dw));
    const bright = (rgb, on) => `rgba(${rgb},${on ? 0.9 : 0.32})`;
    const ORANGE = '255,176,72', BLUE = '84,200,255';
    const cap = (text, cx, cy, align) => {
      ctx.fillStyle = '#9a9a9a'; ctx.font = `${9 * dpr}px sans-serif`;
      ctx.textAlign = align; ctx.textBaseline = 'bottom';
      ctx.fillText(text, cx, cy);
    };
    const backdrop = (x, y, ww, hh) => { ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fillRect(x, y, ww, hh); };

    // Vertical strip (per-row). baseX = matrix-adjacent edge; bars grow outward.
    const rowStrip = (x0, x1, baseRight, prof, pmin, pmax, colorAt) => {
      const span = pmax - pmin > 1e-9 ? pmax - pmin : 1;
      const laneW = x1 - x0, baseX = baseRight ? x1 : x0;
      backdrop(x0, dy, laneW, dh);
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1 * dpr;
      ctx.beginPath(); ctx.moveTo(baseX + 0.5, dy); ctx.lineTo(baseX + 0.5, dy + dh); ctx.stroke();
      for (let yy = 0; yy < nRows; yy++) {
        const r = Math.min(h - 1, Math.floor((yy / nRows) * h));
        const len = ((prof[r] - pmin) / span) * laneW;
        ctx.strokeStyle = colorAt(r);
        ctx.beginPath(); ctx.moveTo(baseX, dy + yy + 0.5); ctx.lineTo(baseRight ? baseX - len : baseX + len, dy + yy + 0.5); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(120,200,255,0.55)'; ctx.lineWidth = 1 * dpr;
      ctx.beginPath(); ctx.moveTo(x0, seamY); ctx.lineTo(x1, seamY); ctx.stroke();
    };

    // Top strip (per-column). Bars grow up from the matrix-adjacent bottom edge.
    const colStrip = (y0, y1, prof, pmin, pmax, colorAt) => {
      const span = pmax - pmin > 1e-9 ? pmax - pmin : 1;
      const laneH = y1 - y0;
      backdrop(dx, y0, dw, laneH);
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1 * dpr;
      ctx.beginPath(); ctx.moveTo(dx, y1 + 0.5); ctx.lineTo(dx + dw, y1 + 0.5); ctx.stroke();
      for (let xx = 0; xx < nCols; xx++) {
        const c = Math.min(w - 1, Math.floor((xx / nCols) * w));
        const len = ((prof[c] - pmin) / span) * laneH;
        ctx.strokeStyle = colorAt(c);
        ctx.beginPath(); ctx.moveTo(dx + xx + 0.5, y1); ctx.lineTo(dx + xx + 0.5, y1 - len); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(120,200,255,0.55)'; ctx.lineWidth = 1 * dpr;
      ctx.beginPath(); ctx.moveTo(seamX, y0); ctx.lineTo(seamX, y1); ctx.stroke();
    };

    // LEFT — →A
    const lx1 = dx - gap, lx0 = lx1 - sideStripW;
    rowStrip(lx0, lx1, true, ssmImage.profA, ssmImage.profAMin, ssmImage.profAMax,
      r => bright(ORANGE, r < pA));
    cap('A←', (lx0 + lx1) / 2, dy - 2 * dpr, 'center');
    // RIGHT — →B
    const rx0 = dx + dw + gap, rx1 = rx0 + sideStripW;
    rowStrip(rx0, rx1, false, ssmImage.profB, ssmImage.profBMin, ssmImage.profBMax,
      r => bright(BLUE, r >= pA));
    cap('→B', (rx0 + rx1) / 2, dy - 2 * dpr, 'center');
    // TOP — overall (entire matrix)
    const ty1 = dy - gap, ty0 = ty1 - topStripH;
    colStrip(ty0, ty1, ssmImage.rowProfile, ssmImage.profMin, ssmImage.profMax,
      c => bright(c < pA ? ORANGE : BLUE, true));
    cap('overall ↑', dx, ty0 - 2 * dpr, 'left');
  }

  // Title.
  ctx.fillStyle = '#bbb';
  ctx.font = `${11 * dpr}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('Joint SSM  (A·A | A·B | B·B)', dx + dw / 2, 2 * dpr);

  // Left axis source labels (A block / B block).
  ctx.fillStyle = '#9ad0ff';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  const aMid = dy + (pA / 2 / h) * dh, bMid = dy + ((pA + (h - pA) / 2) / h) * dh;
  ctx.save(); ctx.translate(labelL * 0.5, aMid); ctx.rotate(-Math.PI / 2); ctx.fillText('A', 0, 0); ctx.restore();
  ctx.save(); ctx.translate(labelL * 0.5, bMid); ctx.rotate(-Math.PI / 2); ctx.fillText('B', 0, 0); ctx.restore();
}

// Hover readout for the SSM: map cursor → matrix cell → (source, time) on each
// axis + the similarity value. Pooling means a cell spans a time *range*; we
// report its centre. Shown in the status bar (no overlay churn).
function onSSMHover(e) {
  if (!ssmImage || !ssmRect) return;
  const rect = umapCanvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * dpr - ssmRect.x;
  const py = (e.clientY - rect.top)  * dpr - ssmRect.y;
  if (px < 0 || py < 0 || px >= ssmRect.w || py >= ssmRect.h) return;

  const { w, h, sim, pA, pB } = ssmImage;
  const col = Math.min(w - 1, Math.floor((px / ssmRect.w) * w));
  const row = Math.min(h - 1, Math.floor((py / ssmRect.h) * h));
  const v = sim[row * w + col];

  // Map a joint-matrix index (A block [0,pA), B block [pA,…)) to a time label.
  const label = (idx) => {
    const src = idx < pA ? 'A' : 'B';
    const sf  = idx < pA ? idx : idx - pA;
    const p   = src === 'A' ? pA : pB;
    const t = p > 0 ? ((sf + 0.5) / p) * srcDuration(src) : 0;
    return `${src} ${t.toFixed(2)}s`;
  };

  const unit = ssmImage.metric === 'cosine' ? 'cos' : 'd';
  const val  = ssmImage.metric === 'cosine' ? v.toFixed(3) : (-v).toFixed(3);
  setStatus(`${label(row)} ↔ ${label(col)} · ${unit} ${val}`);
}

// ── Dirty flags & effect scheduler ───────────────────────────────────────────

const dirty = { COORDS: false, WAYPOINTS: false, AUDIO: false, RENDER: false };
let renderPending = false;

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => { renderPending = false; renderScatter(); });
}

function markDirty(...flags) {
  for (const f of flags) dirty[f] = true;
  runEffects();
}

// True when there is enough source material to compute waypoints for the current mode.
// Draw mode needs a drawn path; snap/code mode can use pins (≥1) or a drawn path (≥2 pts).
function hasWaypointSource() {
  if (pathMode === 'draw') return userTrajectory.length >= 2;
  return (canvasMode === 'pins' && pinPoints.length >= 1) || userTrajectory.length >= 2;
}

let audioDebounceTimer = null;

function runEffects() {
  if (dirty.COORDS && currentEmbeds) {
    dirty.COORDS = false;
    triggerProjection();
  }
  if (dirty.WAYPOINTS && coordsA && coordsB && hasWaypointSource()) {
    dirty.WAYPOINTS = false;
    computeWaypoints();
    dirty.AUDIO  = true;
    dirty.RENDER = true;
  }
  if (dirty.AUDIO && currentEmbeds && coordsA && coordsB
      && hasWaypointSource()
      && (genPlaySeq !== null || pathMode === 'draw')) {
    dirty.AUDIO = false;
    // Immediately stale any in-flight decode so its response is discarded.
    playJobId = ++jobSeq;
    // Debounce the actual dispatch — only fires after 200 ms of quiet.
    clearTimeout(audioDebounceTimer);
    audioDebounceTimer = setTimeout(playTrajectory, 200);
  }
  if (dirty.RENDER) {
    dirty.RENDER = false;
    scheduleRender();
  }
}

// ── Toggle group helper ───────────────────────────────────────────────────────

function createToggleGroup(pairs, onChange) {
  pairs.forEach(({ el, value }) => {
    el.addEventListener('click', () => {
      pairs.forEach(p => p.el.classList.toggle('active', p.value === value));
      onChange(value);
    });
  });
}

// ── Canvas resize ─────────────────────────────────────────────────────────────

function resizeCanvas() {
  const wrap = umapCanvas.parentElement;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  umapCanvas.width  = W * dpr;
  umapCanvas.height = H * dpr;
  scheduleRender();
}
new ResizeObserver(resizeCanvas).observe(umapCanvas.parentElement);

// ── Workers ───────────────────────────────────────────────────────────────────

let workerCodec = null;   // 'encodec' | 'snac' — which worker script is live

function initWorker(codec = 'encodec') {
  if (worker) worker.terminate();
  const script = codec === 'snac' ? 'snac-worker.js' : 'encodec-worker.js';
  const base   = codec === 'snac' ? SNAC_BASE : MODELS_BASE;
  worker = new Worker(script + '?v=' + Date.now());
  worker.postMessage({ type: 'init', modelsBaseUrl: base });
  worker.onmessage = onWorkerMsg;
  worker.onerror = e => { progWrap.style.display = 'none'; setStatus('Worker error: ' + (e.message || 'crashed'), true); };
  workerCodec = codec;
}

// Recreate the primary worker if the selected codec changed (encodec ⇄ snac).
function ensureWorkerForCodec() {
  const codec = mp.getCodec();
  if (codec !== workerCodec) initWorker(codec);
}

function initUMAPWorker() {
  if (umapWorker) umapWorker.terminate();
  umapWorker = new Worker(new URL('./umap-worker.js?v=7', import.meta.url), { type: 'module' });
  umapWorker.onmessage = onUMAPWorkerMsg;
}

// ── Slot switcher helpers ──────────────────────────────────────────────────────

function initSlotDots() {
  slotDots.innerHTML = '';
  for (let i = 0; i < UMAP_N_SLOTS; i++) {
    const btn = document.createElement('button');
    btn.className = 'umap-dot';
    btn.title = `Layout ${i + 1}`;
    btn.addEventListener('click', () => setUMAPSlotIdx(i));
    slotDots.appendChild(btn);
  }
}

function updateSlotDots() {
  [...slotDots.children].forEach((btn, i) => {
    btn.className = 'umap-dot'
      + (umapSlots[i] ? ' ready' : '')
      + (i === umapSlotIdx ? ' active' : '');
  });
  slotPrevBtn.disabled = umapSlotIdx <= 0;
  slotNextBtn.disabled = umapSlotIdx >= UMAP_N_SLOTS - 1;
}

// Switch to a pre-computed slot (or mark as pending if not yet ready).
function setUMAPSlotIdx(idx) {
  if (idx < 0 || idx >= UMAP_N_SLOTS) return;
  umapSlotIdx = idx;
  const slot = umapSlots[idx];
  if (slot) {
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    setStatus(`Layout ${idx + 1} / ${UMAP_N_SLOTS}`);
    updateSlotDots();
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
  } else {
    // Not yet computed — update desired slot; onUMAPWorkerMsg will display it when ready.
    updateSlotDots();
    setStatus(`Waiting for layout ${idx + 1}…`);
  }
}

// ── Projection worker message handler ─────────────────────────────────────────

function onUMAPWorkerMsg({ data: msg }) {
  if (msg.jobId !== activeUMAPJobId) return;

  // ── Pre-PCA reduction result ───────────────────────────────────────────────
  if (msg.type === 'reduce_result') {
    const info = document.getElementById('preReduceInfo');
    const fd = umapFeatureData;
    fd.reduced = true;
    if (msg.reduced) {
      fd.umapFlat = msg.reduced;
      fd.umapD    = msg.m;
      // Columns are PCA scores ordered by variance — the first two double as
      // a 2-D PCA layout used to seed every slot's UMAP init.
      const N  = fd.umapTA + fd.umapTB;
      const ic = new Float32Array(N * 2);
      for (let i = 0; i < N; i++) {
        ic[i * 2]     = fd.umapFlat[i * fd.umapD];
        ic[i * 2 + 1] = fd.umapFlat[i * fd.umapD + 1];
      }
      fd.initCoords = ic;
      info.textContent = `${fd.D}→${fd.umapD} dims · ${(msg.explained * 100).toFixed(0)}% var`;
    } else {
      info.textContent = ''; // worker skipped (D already small / degenerate)
    }
    launchUMAPSlot(0);
    return;

  } else if (msg.type === 'reduce_error') {
    document.getElementById('preReduceInfo').textContent = '';
    setStatus(msg.message + ' — using full features', true);
    launchUMAPSlot(0);
    return;
  }

  // ── PCA result ─────────────────────────────────────────────────────────────
  if (msg.type === 'pca_result') {
    const { result, T_A, T_B } = msg;
    const superA = [], superB = [];
    for (let i = 0; i < T_A; i++) superA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < T_B; i++) superB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    const slot = expandSlot(superA, superB);   // no-op unless PCA-from-SSM
    pcaCoords = slot;

    // Stash PC1 for the wheel angle — only when PCA ran on the per-frame
    // features (SSM-PCA is super-frame indexed and would mismatch the wheel).
    if (umapFeatureData && !umapFeatureData.projExpand) {
      const pc1 = new Float32Array(T_A + T_B);
      for (let i = 0; i < T_A + T_B; i++) pc1[i] = result[i * 2];
      umapFeatureData.pc1 = pc1;
    }

    if (projectionMode === 'wheel' && wheelAngle === 'pc1') {
      applyWheelCoords();
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
      return;
    }

    viewZoom = 1; viewPanX = 0; viewPanY = 0;
    const hadDrawTraj = rawDrawSegments.some(s => s.pts.length >= 2) || rawDrawPoints.length >= 2;
    rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = []; clearSoloState();
    userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    progWrap.style.display = 'none';
    if (hadDrawTraj && pinPoints.length < 2) {
      setStatus('PCA updated — draw trajectory cleared. Redraw to regenerate.');
    } else {
      setStatus(`PCA — ${T_A} frames (A) · ${T_B} frames (B)`);
    }
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    return;

  } else if (msg.type === 'pca_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
    return;
  }

  // ── MDS result (classical MDS on the SSM) ──────────────────────────────────
  if (msg.type === 'mds_result') {
    const si = umapFeatureData?.projExpand;
    if (!si) { progWrap.style.display = 'none'; return; }
    const { result } = msg;
    const superA = [], superB = [];
    for (let i = 0; i < si.pA; i++)      superA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < si.pB; i++)      superB.push([result[(si.pA + i) * 2], result[(si.pA + i) * 2 + 1]]);
    const slot = expandSlot(superA, superB);
    mdsCoords = slot;

    // Stash the 1-D MDS (first component, per frame) for the wheel angle.
    if (umapFeatureData) {
      const mds1d = new Float32Array(si.T_A + si.T_B);
      for (let t = 0; t < si.T_A; t++) mds1d[t]            = slot.coordsA[t][0];
      for (let t = 0; t < si.T_B; t++) mds1d[si.T_A + t]   = slot.coordsB[t][0];
      umapFeatureData.mds1d = mds1d;
    }

    if (projectionMode === 'wheel' && wheelAngle === 'mds1d') {
      progWrap.style.display = 'none';
      applyWheelCoords();
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
      return;
    }

    viewZoom = 1; viewPanX = 0; viewPanY = 0;
    rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = []; clearSoloState();
    userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    progWrap.style.display = 'none';
    setStatus(`MDS — ${si.pA + si.pB} super-frames · ${si.T_A + si.T_B} frames`);
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    return;

  } else if (msg.type === 'mds_error') {
    progWrap.style.display = 'none';
    setStatus('MDS: ' + msg.message, true);
    return;
  }

  // ── 1-D UMAP (wheel angle) ─────────────────────────────────────────────────
  if (msg.type === 'umap1d_progress') {
    const pct = Math.round(msg.epoch / msg.nEpochs * 100);
    progBar.style.width = pct + '%';
    setStatus(`Wheel — 1-D UMAP epoch ${msg.epoch} / ${msg.nEpochs}`);
    return;

  } else if (msg.type === 'umap1d_result') {
    if (umapFeatureData) umapFeatureData.umap1d = msg.result;
    if (projectionMode === 'wheel' && wheelAngle === 'umap1d') {
      applyWheelCoords();
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    }
    progWrap.style.display = 'none';
    return;

  } else if (msg.type === 'umap1d_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
    return;
  }

  // ── UMAP progress / result / error ─────────────────────────────────────────
  if (msg.type === 'umap_progress') {
    // Only update the progress bar for slot 0; background slots are silent.
    if ((msg.slotIdx ?? 0) === 0) {
      const pct = Math.round(msg.epoch / msg.nEpochs * 100);
      progBar.style.width = pct + '%';
      setStatus(`UMAP — epoch ${msg.epoch} / ${msg.nEpochs}`);
    }

  } else if (msg.type === 'umap_result') {
    const { slotIdx, result, T_A, T_B } = msg;

    // Decode and store this slot. With dedup, the worker fitted only the
    // representative frames — expand back to full length via repMapA/B so
    // every frame gets its representative's coords (skipped frames overlap).
    const slot = { coordsA: [], coordsB: [] };
    const { repMapA, repMapB } = umapFeatureData ?? {};
    if (repMapA && repMapB) {
      for (let i = 0; i < repMapA.length; i++) {
        const r = repMapA[i];
        slot.coordsA.push([result[r * 2], result[r * 2 + 1]]);
      }
      for (let i = 0; i < repMapB.length; i++) {
        const r = repMapB[i];
        slot.coordsB.push([result[r * 2], result[r * 2 + 1]]);
      }
    } else {
      for (let i = 0; i < T_A; i++) slot.coordsA.push([result[i * 2], result[i * 2 + 1]]);
      for (let i = 0; i < T_B; i++) slot.coordsB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    }
    // UMAP-from-SSM fits the ≤P super-frames; expand each to its frames.
    if (umapFeatureData?.projExpand) {
      const fin = expandSlot(slot.coordsA, slot.coordsB);
      slot.coordsA = fin.coordsA; slot.coordsB = fin.coordsB;
    }
    umapSlots[slotIdx] = slot;
    updateSlotDots();

    // Slot 0 (the very first result for this session):
    //   - reset viewport and clear draw trajectory (now defined in stale UMAP coords)
    //   - pin trajectories are {src,idx} based and auto-remap — no reset needed
    if (slotIdx === 0) {
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      const hadDrawTraj = rawDrawSegments.some(s => s.pts.length >= 2) || rawDrawPoints.length >= 2;
      rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = []; clearSoloState();
      userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
      if (hadDrawTraj && pinPoints.length < 2) {
        setStatus('UMAP updated — draw trajectory cleared. Redraw to regenerate.');
      } else {
        // slot.coords lengths are the full frame counts (T_A/T_B from the
        // worker are rep counts when dedup is on).
        setStatus(`Done — ${slot.coordsA.length} frames (A) · ${slot.coordsB.length} frames (B). Computing more layouts…`);
      }
    }

    // If this is the currently-desired slot, display it now.
    if (slotIdx === umapSlotIdx && projectionMode === 'umap') {
      coordsA = slot.coordsA;
      coordsB = slot.coordsB;
      if (slotIdx !== 0) setStatus(`Layout ${slotIdx + 1} / ${UMAP_N_SLOTS}`);
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    }

    // Chain the next slot — but only when UMAP is the active mode.
    const next = slotIdx + 1;
    if (next < UMAP_N_SLOTS && umapFeatureData && projectionMode === 'umap') {
      launchUMAPSlot(next);
      // Slot 0 just finished and the remaining slots run silently — hide the bar now.
      if (slotIdx === 0) progWrap.style.display = 'none';
    } else {
      progWrap.style.display = 'none';
      if (projectionMode === 'umap' && slotIdx === UMAP_N_SLOTS - 1)
        setStatus(`All ${UMAP_N_SLOTS} layouts ready.`);
    }

  } else if (msg.type === 'umap_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── SSM as a projection input ───────────────────────────────────────────────
// The pooled joint cosine SSM (the same matrix the heatmap uses) doubles as the
// input for MDS / UMAP-on-SSM / PCA-on-SSM. It embeds the ≤P super-frames; each
// real frame then inherits its super-frame's 2-D coordinate (expandSlot).

// frame → super-frame index map, matching ssm-worker's poolRows boundaries.
function sfMap(T, p) {
  const map = new Int32Array(T);
  for (let i = 0; i < p; i++) {
    const lo = Math.floor((i * T) / p), hi = Math.floor(((i + 1) * T) / p);
    for (let t = lo; t < hi; t++) map[t] = i;
  }
  return map;
}

// Compute (or return cached) the pooled SSM for the current features. Runs in a
// short-lived worker so it never collides with the heatmap's ssmWorker state.
function ensureSSMInput() {
  const fd = umapFeatureData;
  if (fd.ssmInput) return Promise.resolve(fd.ssmInput);
  const P = Math.max(16, Math.min(4096, parseInt(ssmBudgetEl.value) || 1024));
  return new Promise((resolve, reject) => {
    const w = new Worker(new URL('./ssm-worker.js?v=2', import.meta.url), { type: 'module' });
    w.onmessage = ({ data }) => {
      if (data.type !== 'ssm_input_result') return;
      const si = {
        sim: new Float32Array(data.sim), pA: data.pA, pB: data.pB,
        T_A: data.T_A, T_B: data.T_B,
        sfA: sfMap(data.T_A, data.pA), sfB: sfMap(data.T_B, data.pB),
      };
      fd.ssmInput = si;
      w.terminate();
      resolve(si);
    };
    w.onerror = e => { w.terminate(); reject(new Error(e.message || 'SSM input failed')); };
    w.postMessage({ type: 'compute_ssm_input', flat: fd.flat, T_A: fd.T_A, T_B: fd.T_B, D: fd.D, P });
  });
}

// Expand super-frame coords (pA A-coords then pB B-coords) to one coord per
// real frame, using the active projExpand map. No-op when not SSM-based.
function expandSlot(superA, superB) {
  const si = umapFeatureData?.projExpand;
  if (!si) return { coordsA: superA, coordsB: superB };
  const coordsA = new Array(si.T_A), coordsB = new Array(si.T_B);
  for (let t = 0; t < si.T_A; t++) coordsA[t] = superA[si.sfA[t]];
  for (let t = 0; t < si.T_B; t++) coordsB[t] = superB[si.sfB[t]];
  return { coordsA, coordsB };
}

// ── MDS launch (classical MDS on the SSM) ───────────────────────────────────────

function launchMDS() {
  if (!umapFeatureData) return;
  const sid = umapSessionId;
  progWrap.style.display = 'block';
  progBar.style.width = '15%';
  setStatus('MDS — pooling SSM…');
  ensureSSMInput().then(si => {
    // Allowed for MDS scatter mode and the wheel's 1-D-MDS angle source.
    const wheelMDS = projectionMode === 'wheel' && wheelAngle === 'mds1d';
    if (umapSessionId !== sid || (projectionMode !== 'mds' && !wheelMDS)) return;
    umapFeatureData.projExpand = si;
    initUMAPWorker();
    activeUMAPJobId = ++jobSeq;
    progBar.style.width = '45%';
    setStatus(`MDS — embedding SSM (${si.pA + si.pB} pts)…`);
    umapWorker.postMessage({ type: 'compute_mds', jobId: activeUMAPJobId, sim: si.sim, N: si.pA + si.pB });
  }).catch(err => { progWrap.style.display = 'none'; setStatus('MDS: ' + err.message, true); });
}

// ── PCA launch ─────────────────────────────────────────────────────────────────

function launchPCA() {
  if (!umapFeatureData) return;
  const fd = umapFeatureData;
  // PCA from SSM rows when selected (else the z-scored features). The wheel's
  // PC1 angle always uses features (it indexes per-frame, not super-frame).
  let flat, T_A, T_B, D;
  if (embedInput === 'ssm' && fd.ssmInput && projectionMode === 'pca') {
    flat = fd.ssmInput.sim; T_A = fd.ssmInput.pA; T_B = fd.ssmInput.pB; D = T_A + T_B;
    fd.projExpand = fd.ssmInput;
  } else {
    ({ flat, T_A, T_B, D } = fd);
    fd.projExpand = null;
  }

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '30%';
  setStatus(`PCA — computing… (${T_A + T_B} frames, ${D} dims)`);

  umapWorker.postMessage({ type: 'compute_pca', jobId: activeUMAPJobId, flat, T_A, T_B, D });
}

// ── SSM launch ─────────────────────────────────────────────────────────────────
// Reuses umapFeatureData.flat (z-scored, all feature knobs baked in). The worker
// pools each source to ≤ssmBudget super-frames, computes the similarity matrix,
// and returns a colour-mapped RGBA image. Heavy work is one matmul on pooled data.

function initSSMWorker() {
  if (ssmWorker) ssmWorker.terminate();
  ssmWorker = new Worker(new URL('./ssm-worker.js?v=1', import.meta.url), { type: 'module' });
  ssmWorker.onmessage = onSSMWorkerMsg;
}

function launchSSM() {
  if (!umapFeatureData) return;
  const { flat, T_A, T_B, D } = umapFeatureData;

  initSSMWorker();
  activeSSMJobId = ++jobSeq;

  const P = Math.max(16, Math.min(4096, parseInt(ssmBudgetEl.value) || 1024));
  ssmBudget = P;

  progWrap.style.display = 'block';
  progBar.style.width = '40%';
  setStatus(`SSM — joint, ${ssmMetric}, ≤${P}px…`);

  // flat sent as a copy (not transferred) so it survives for re-runs / other modes.
  ssmWorker.postMessage({
    type: 'compute_ssm', jobId: activeSSMJobId,
    flat, T_A, T_B, D,
    scope: 'joint', which: 'A', P, metric: ssmMetric,
  });
}

function onSSMWorkerMsg({ data: msg }) {
  if (msg.type !== 'ssm_result' || msg.jobId !== activeSSMJobId) return;
  progBar.style.width = '100%';
  setTimeout(() => { progWrap.style.display = 'none'; progBar.style.width = '0%'; }, 200);

  if (msg.empty) { ssmImage = null; setStatus('SSM — no frames.', true); return; }

  const imgData = new ImageData(new Uint8ClampedArray(msg.rgba), msg.w, msg.h);
  const sim = new Float32Array(msg.sim);
  ssmImage = {
    rgba: imgData, sim, w: msg.w, h: msg.h,
    scope: msg.scope, seam: msg.seam, pA: msg.pA, pB: msg.pB,
    T_A: msg.T_A, T_B: msg.T_B, vmin: msg.vmin, vmax: msg.vmax, metric: msg.metric,
  };
  // Per-frame marginals. Total = mean similarity of each row to all frames
  // (typicality). For the joint matrix we also split each row by column-block,
  // so a frame shows its similarity to source A (AA / BA) vs source B (AB / BB)
  // — i.e. the row sum decomposed at the column seam.
  {
    const { w, h } = msg;
    const splitJoint = msg.scope === 'joint' && msg.seam > 0 && msg.seam < w;
    const cutA = splitJoint ? msg.seam : w;             // A-columns = [0, cutA)
    const total = new Float32Array(h);
    const profA = splitJoint ? new Float32Array(h) : null; // mean sim to A cols
    const profB = splitJoint ? new Float32Array(h) : null; // mean sim to B cols
    let tmin = Infinity, tmax = -Infinity;
    let amin = Infinity, amax = -Infinity, bmin = Infinity, bmax = -Infinity;
    for (let r = 0; r < h; r++) {
      const off = r * w;
      let sa = 0, sb = 0;
      for (let c = 0; c < cutA; c++) sa += sim[off + c];
      for (let c = cutA; c < w; c++) sb += sim[off + c];
      const mt = (sa + sb) / w;
      total[r] = mt; if (mt < tmin) tmin = mt; if (mt > tmax) tmax = mt;
      if (splitJoint) {
        const ma = sa / cutA, mb = sb / (w - cutA);
        profA[r] = ma; profB[r] = mb;
        if (ma < amin) amin = ma; if (ma > amax) amax = ma;
        if (mb < bmin) bmin = mb; if (mb > bmax) bmax = mb;
      }
    }
    ssmImage.rowProfile = total; ssmImage.profMin = tmin; ssmImage.profMax = tmax;
    if (splitJoint) {
      ssmImage.profA = profA; ssmImage.profAMin = amin; ssmImage.profAMax = amax;
      ssmImage.profB = profB; ssmImage.profBMin = bmin; ssmImage.profBMax = bmax;
    }
  }
  const pooled = (msg.pA && msg.pA < msg.T_A) || (msg.pB && msg.pB < msg.T_B);
  setStatus(`SSM — joint · ${msg.w}×${msg.h}`
    + (pooled ? ' (pooled)' : '') + ` · ${msg.metric}`);
  scheduleRender();
}

// ── Wheel projection ───────────────────────────────────────────────────────────
// θ = PC1 rank wrapped to [0, 2π) — similarity as a circular dimension, so
// drawn orbits make seamless loops. Rank (not raw value) spreads frames evenly
// around the circle. r = a chosen scalar, percentile-normalised to [0.18, 1]
// so the centre never piles up. NOTE: screen proximity across the centre does
// NOT mean latent similarity in this mode — it's a controller, not a map.

// Per-frame RMS of the raw source audio — Loud radius fallback when the model
// has no per-frame scales (24 kHz).
function frameRms(raw, ch, T_frames) {
  const total = raw.length / ch;
  const hop   = total / T_frames;
  const out   = new Float32Array(T_frames);
  for (let t = 0; t < T_frames; t++) {
    const s0 = Math.floor(t * hop), s1 = Math.max(s0 + 1, Math.min(total, Math.floor((t + 1) * hop)));
    let s = 0, n = 0;
    for (let c = 0; c < ch; c++)
      for (let i = s0; i < s1; i++) { const v = raw[c * total + i]; s += v * v; n++; }
    out[t] = n ? Math.sqrt(s / n) : 0;
  }
  return out;
}

// Per-frame normalized time. For a folder source each clip's time restarts at
// its own beginning (0 at the clip start, 1 at its end) using the clip-start
// fractions; otherwise it's the global 0→1 ramp over the whole source.
function clipRelTime(T, fracs) {
  const out = new Float32Array(T);
  if (T <= 0) return out;
  if (!fracs || fracs.length <= 1) {
    for (let i = 0; i < T; i++) out[i] = T > 1 ? i / (T - 1) : 0.5;
    return out;
  }
  const fb = fracs.map(f => Math.min(T, Math.max(0, Math.round(f * T))));
  fb.push(T);
  for (let k = 0; k < fb.length - 1; k++) {
    const lo = fb[k], hi = fb[k + 1], len = hi - lo;
    for (let i = lo; i < hi; i++) out[i] = len > 1 ? (i - lo) / (len - 1) : 0.5;
  }
  return out;
}

function wheelRadiusValues(fd) {
  const { T_A, T_B } = fd;
  if (wheelRadius === 'time') {
    return { rA: clipRelTime(T_A, folderClipFracsA), rB: clipRelTime(T_B, folderClipFracsB) };
  }
  if (wheelRadius === 'atyp') {
    return { rA: fd.featNorm.slice(0, T_A), rB: fd.featNorm.slice(T_A) };
  }
  if (wheelRadius === 'atyp') {
    return { rA: fd.featNorm.slice(0, T_A), rB: fd.featNorm.slice(T_A) };
  }
  if (wheelRadius === 'typ') {
    // Typicality = centroid alignment (SSM marginal), computed from features.
    if (!fd.typicality) fd.typicality = computeTypicality(fd.flat, T_A + T_B, fd.D);
    return { rA: fd.typicality.slice(0, T_A), rB: fd.typicality.slice(T_A) };
  }
  // 'loud': per-frame log(scale) on 48k; raw-audio frame RMS otherwise.
  const logScales = s => Float32Array.from(s, v => Math.log(Math.max(v || 0, 1e-6)));
  const rA = currentEmbeds?.scalesA ? logScales(currentEmbeds.scalesA)
           : rawAudioA              ? frameRms(rawAudioA, rawAudioCh, T_A)
           : new Float32Array(T_A);
  const rB = currentEmbeds?.scalesB ? logScales(currentEmbeds.scalesB)
           : rawAudioB              ? frameRms(rawAudioB, rawAudioCh, T_B)
           : new Float32Array(T_B);
  return { rA, rB };
}

// Angle source helpers. Both sources are cached on umapFeatureData (pc1 /
// umap1d) so switching angle or radius never re-runs the worker once computed.
function wheelAngleReady() {
  return wheelAngle === 'pc1'   ? !!umapFeatureData?.pc1
       : wheelAngle === 'mds1d' ? !!umapFeatureData?.mds1d
       :                          !!umapFeatureData?.umap1d;
}

function launchWheelAngle() {
  if (wheelAngle === 'pc1')        launchPCA();
  else if (wheelAngle === 'mds1d') launchMDS();   // mds_result routes to wheel coords
  else                             launchUMAP1D();
}

function launchUMAP1D() {
  if (!umapFeatureData) return;
  const { flat, T_A, T_B, D, nNeighbors, minDist } = umapFeatureData;

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  setStatus(`Wheel — fitting 1-D UMAP… (${T_A + T_B} frames)`);

  umapWorker.postMessage({
    type: 'compute_umap_1d', jobId: activeUMAPJobId,
    flat, T_A, T_B, D, nNeighbors, minDist,
    metric: umapMetric,
  });
}

function applyWheelCoords() {
  const fd = umapFeatureData;
  const angleVals = wheelAngle === 'pc1'   ? fd?.pc1
                  : wheelAngle === 'mds1d' ? fd?.mds1d
                  :                          fd?.umap1d;
  if (!angleVals) return;
  const N = fd.T_A + fd.T_B;

  // Angle: joint rank over both sources → even angular spread, order preserved.
  const order = Array.from({ length: N }, (_, i) => i).sort((a, b) => angleVals[a] - angleVals[b]);
  const theta = new Float32Array(N);
  order.forEach((idx, rank) => { theta[idx] = rank / N * 2 * Math.PI; });

  // Radius, mapped to [0.18, 1] (the floor keeps the centre from piling up).
  const { rA, rB } = wheelRadiusValues(fd);
  const rawR = new Float32Array(N);
  rawR.set(rA, 0);
  rawR.set(rB, fd.T_A);

  const R_MIN = 0.18, R_SPAN = 0.82;
  const radius = new Float32Array(N);
  if (wheelScale === 'rank') {
    // Rank: outlier-immune and uses the whole band with no saturation —
    // but radial distance is no longer proportional to the underlying value.
    const ord = Array.from({ length: N }, (_, i) => i).sort((a, b) => rawR[a] - rawR[b]);
    ord.forEach((idx, rank) => { radius[idx] = R_MIN + R_SPAN * (N > 1 ? rank / (N - 1) : 0.5); });
  } else {
    // Value: percentile-clip (5–95%) so one silent/extreme frame can't rescale
    // the whole axis — except Time, whose values are uniform by construction
    // and need no robustification (clipping would only saturate the ends).
    let lo, hi;
    if (wheelRadius === 'time') {
      lo = 0; hi = 1;
    } else {
      const sorted = rawR.slice().sort();
      lo = sorted[Math.floor(0.05 * (N - 1))];
      hi = sorted[Math.floor(0.95 * (N - 1))];
    }
    for (let i = 0; i < N; i++) {
      const t = hi > lo ? (rawR[i] - lo) / (hi - lo) : 0.5;
      radius[i] = R_MIN + R_SPAN * Math.min(1, Math.max(0, t));
    }
  }

  coordsA = []; coordsB = [];
  for (let i = 0; i < fd.T_A; i++) {
    coordsA.push([radius[i] * Math.cos(theta[i]), radius[i] * Math.sin(theta[i])]);
  }
  for (let i = 0; i < fd.T_B; i++) {
    const j = fd.T_A + i;
    coordsB.push([radius[j] * Math.cos(theta[j]), radius[j] * Math.sin(theta[j])]);
  }

  viewZoom = 1; viewPanX = 0; viewPanY = 0;
  const hadDrawTraj = rawDrawSegments.some(s => s.pts.length >= 2) || rawDrawPoints.length >= 2;
  rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = []; clearSoloState();
  userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
  progWrap.style.display = 'none';
  const radLbl = { loud: 'loudness', time: 'time', atyp: 'atypicality', typ: 'typicality' }[wheelRadius]
               + (wheelScale === 'rank' ? ' (rank)' : '');
  const angLbl = wheelAngle === 'pc1' ? 'PC1 rank' : wheelAngle === 'mds1d' ? 'MDS 1-D' : '1-D UMAP';
  setStatus(hadDrawTraj && pinPoints.length < 2
    ? 'Wheel updated — draw trajectory cleared. Redraw to regenerate.'
    : `Wheel — angle: ${angLbl} · radius: ${radLbl}`);
}

function setProjectionMode(mode) {
  projectionMode = mode;
  document.getElementById('togUMAPMode') .classList.toggle('active', mode === 'umap');
  document.getElementById('togPCAMode')  .classList.toggle('active', mode === 'pca');
  document.getElementById('togMDSMode')  .classList.toggle('active', mode === 'mds');
  document.getElementById('togWheelMode').classList.toggle('active', mode === 'wheel');
  document.getElementById('togSSMMode')  .classList.toggle('active', mode === 'ssm');
  const ssmInputActive = embedInput === 'ssm' && (mode === 'umap' || mode === 'pca');
  document.getElementById('neighborRow') .style.display = mode === 'umap' ? '' : 'none';
  document.getElementById('minDistRow')  .style.display = mode === 'umap' ? '' : 'none';
  document.getElementById('preReduceRow').style.display = mode === 'umap' ? '' : 'none';
  document.getElementById('metricRow')   .style.display = mode === 'umap' ? '' : 'none';
  document.getElementById('dedupRow')    .style.display = (mode === 'umap' && !ssmInputActive) ? '' : 'none';
  document.getElementById('wheelAngleRow') .style.display = mode === 'wheel' ? '' : 'none';
  document.getElementById('wheelRadiusRow').style.display = mode === 'wheel' ? '' : 'none';
  document.getElementById('wheelScaleRow') .style.display = mode === 'wheel' ? '' : 'none';
  document.getElementById('embedInputRow').style.display = (mode === 'umap' || mode === 'pca') ? '' : 'none';
  document.getElementById('ssmResRow')    .style.display = (mode === 'ssm' || mode === 'mds' || ssmInputActive) ? '' : 'none';
  document.getElementById('ssmMetricRow') .style.display = mode === 'ssm' ? '' : 'none';
  document.getElementById('trajPanel')     .style.display = mode === 'ssm' ? 'none' : '';
  slotWrap.classList.toggle('visible', mode === 'umap' && umapSlots.some(s => s));

  if (mode === 'ssm') scheduleRender(); // paint the heatmap (placeholder or cached) on entry

  if (!umapFeatureData) return; // nothing computed yet — triggerProjection() will dispatch when ready

  if (mode === 'mds') {
    if (mdsCoords) {
      coordsA = mdsCoords.coordsA; coordsB = mdsCoords.coordsB;
      umapFeatureData.projExpand = umapFeatureData.ssmInput; // keep expand consistent
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus('MDS');
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      launchMDS();
    }
  } else if (mode === 'pca') {
    if (pcaCoords) {
      // Already have a cached PCA result for current features — switch instantly.
      coordsA = pcaCoords.coordsA;
      coordsB = pcaCoords.coordsB;
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus('PCA');
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      launchPCA(); // cancels any in-progress UMAP slot
    }
  } else if (mode === 'wheel') {
    if (wheelAngleReady()) {
      applyWheelCoords();
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      launchWheelAngle(); // result handler routes to wheel coords by mode
    }
  } else if (mode === 'ssm') {
    if (ssmImage) scheduleRender();  // cached image for current features — show instantly
    else          launchSSM();
  } else { // umap
    slotWrap.classList.add('visible');
    updateSlotDots();
    if (umapSlots[umapSlotIdx]) {
      // Desired slot already computed — display immediately.
      coordsA = umapSlots[umapSlotIdx].coordsA;
      coordsB = umapSlots[umapSlotIdx].coordsB;
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus(`Layout ${umapSlotIdx + 1} / ${UMAP_N_SLOTS}`);
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      // Find first computed slot and display it; resume background computation.
      const firstReady = umapSlots.findIndex(s => s);
      if (firstReady >= 0) {
        setUMAPSlotIdx(firstReady);
      } else {
        umapSlots = Array(UMAP_N_SLOTS).fill(null);
        umapSlotIdx = 0;
        updateSlotDots();
      }
    }
    // Resume slot computation from the first uncomputed slot. A fresh session
    // (no slots yet) goes through pre-PCA reduction first if enabled.
    const nextMissing = umapSlots.findIndex(s => !s);
    if (nextMissing === 0)     startUMAPReduction();
    else if (nextMissing > 0)  launchUMAPSlot(nextMissing);
  }
}

// channels = 2: pcm is planar stereo — fades apply per plane.
function applyFade(pcm, sr, fadeInMs, fadeOutMs, channels = 1) {
  const out     = pcm.slice();
  const T       = out.length / channels;
  const fadeIn  = Math.round(fadeInMs  / 1000 * sr);
  const fadeOut = Math.round(fadeOutMs / 1000 * sr);
  for (let c = 0; c < channels; c++) {
    const off = c * T;
    for (let i = 0; i < Math.min(fadeIn,  T); i++) out[off + i]         *= i / fadeIn;
    for (let i = 0; i < Math.min(fadeOut, T); i++) out[off + T - 1 - i] *= i / fadeOut;
  }
  return out;
}

function applyGenFade(pcm, sr, channels = lastRawPcmCh) {
  const fadeIn  = parseFloat(document.getElementById('fadeInMs').value)  || 0;
  const fadeOut = parseFloat(document.getElementById('fadeOutMs').value) || 0;
  return (fadeIn > 0 || fadeOut > 0) ? applyFade(pcm, sr, fadeIn, fadeOut, channels) : pcm;
}
