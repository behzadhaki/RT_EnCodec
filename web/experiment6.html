// ── Codebook loading ──────────────────────────────────────────────────────────

async function ensureCodebooks() {
  const modelHz = mp.getModelHz();
  if (codebooks && codebooksFor === modelHz) return codebooks;
  setStatus('Loading codebooks…');
  const base = `${MODELS_BASE}/${modelHz}`;
  const [binRes, jsonRes] = await Promise.all([
    fetch(`${base}/codebooks.bin`),
    fetch(`${base}/codebooks.json`),
  ]);
  if (!binRes.ok || !jsonRes.ok) throw new Error('Could not load codebooks for ' + modelHz);
  const meta = await jsonRes.json();
  const buf  = await binRes.arrayBuffer();
  codebooks    = { data: new Float32Array(buf), n_q: meta.n_q, vocab_size: meta.vocab_size, dim: meta.dim };
  codebooksFor = modelHz;
  return codebooks;
}

/**
 * Reconstruct embQuant from VQ codes + loaded codebooks.
 *
 * The quantised embedding for frame t is the sum of the codebook vectors
 * selected by each quantiser level: embQuant[d, t] = Σ_q cb[q, codes[q,t], d].
 * This is the exact inverse of the quantisation step (same arithmetic the
 * ONNX model uses), so the result is bit-for-bit identical to what the worker
 * would produce.
 *
 * @param  {object}     cb        — codebooks object: { data, n_q, vocab_size, dim }
 * @param  {Int32Array} codes     — flat layout [n_q × T]: codes[q * T + t]
 * @param  {number[]}   codesDims — [1, n_q, T]
 * @returns {Float32Array}         flat layout [dim × T]: result[d * T + t]
 */
function reconstructEmbQuant(cb, codes, codesDims) {
  const T   = codesDims[codesDims.length - 1];
  const n_q = codesDims[codesDims.length - 2];
  const { data, vocab_size, dim } = cb;
  const result = new Float32Array(dim * T);
  for (let q = 0; q < n_q; q++) {
    for (let t = 0; t < T; t++) {
      const codeIdx = codes[q * T + t];
      const cbOff   = q * vocab_size * dim + codeIdx * dim;
      for (let d = 0; d < dim; d++) result[d * T + t] += data[cbOff + d];
    }
  }
  return result;
}

// ── Frame extraction ──────────────────────────────────────────────────────────

// Per-slot weights for a K-frame context window with the anchor at anchorPos.
// 'flat' weights every slot equally; 'triangular' and 'gaussian' decay with
// distance from the anchor so context disambiguates without swamping the
// anchor frame's own content in pairwise distances.
function windowWeights(K, anchorPos, shape) {
  const w = new Float32Array(K).fill(1);
  if (shape === 'flat') return w;
  const span  = Math.max(1, Math.max(anchorPos, K - 1 - anchorPos));
  const sigma = K / 3;
  for (let k = 0; k < K; k++) {
    const d = Math.abs(k - anchorPos);
    w[k] = shape === 'triangular'
      ? 1 - d / (span + 1)
      : Math.exp(-(d * d) / (2 * sigma * sigma));
  }
  return w;
}

// Build K-slot windowed feature vectors around each frame's anchor.
//   direction 'past'     → slots [t-K+1 … t]          (anchor last)
//   direction 'centered' → slots [t-⌊K/2⌋ … t+⌈K/2⌉-1] (anchor middle)
//   direction 'future'   → slots [t … t+K-1]          (anchor first)
// The anchor frame appears exactly once. Edges clamp (repeat first/last frame).
// IMPORTANT: frames must already be normalised — weights are baked in here
// because z-scoring after windowing would cancel any constant per-slot weight.
function applyContextWindow(frames, K, direction, shape) {
  if (K <= 1) return frames;
  const D = frames[0].length;
  const T = frames.length;
  const anchorPos = direction === 'past'   ? K - 1
                  : direction === 'future' ? 0
                  : Math.floor(K / 2);
  const w = windowWeights(K, anchorPos, shape);
  return frames.map((_, t) => {
    const vec = new Float32Array(K * D);
    for (let k = 0; k < K; k++) {
      const srcT = Math.min(T - 1, Math.max(0, t + k - anchorPos));
      const f = frames[srcT], wk = w[k], off = k * D;
      for (let d = 0; d < D; d++) vec[off + d] = wk * f[d];
    }
    return vec;
  });
}

// direction 'past' → backward difference, 'centered' → centered difference
// (less noisy, matches non-causal embeddings), 'future' → forward difference.
function computeDeltas(frames, direction) {
  const D = frames[0].length;
  const T = frames.length;
  return frames.map((f, t) => {
    const delta = new Float32Array(D);
    if (direction === 'centered') {
      const prev = frames[Math.max(0, t - 1)];
      const next = frames[Math.min(T - 1, t + 1)];
      for (let d = 0; d < D; d++) delta[d] = (next[d] - prev[d]) / 2;
    } else if (direction === 'future') {
      if (t < T - 1) { const next = frames[t + 1]; for (let d = 0; d < D; d++) delta[d] = next[d] - f[d]; }
    } else {
      if (t > 0)     { const prev = frames[t - 1]; for (let d = 0; d < D; d++) delta[d] = f[d] - prev[d]; }
    }
    return delta;
  });
}

function appendDeltas(frames, direction) {
  const D      = frames[0].length;
  const deltas = computeDeltas(frames, direction);
  return frames.map((f, t) => {
    const vec = new Float32Array(2 * D);
    vec.set(f, 0);
    vec.set(deltas[t], D);
    return vec;
  });
}

// Per-dimension z-score normalisation across all frames from both sources.
// Computed jointly so A and B frames are in the same coordinate space.
// Why: in Emb+Δ mode the embedding dims (e.g. ±2–5) dwarf the delta dims
// (e.g. ±0.02–0.1) so UMAP distances are dominated by the emb half.
// Same issue with multi-level VQ concatenation.
// Normalising each dimension to zero mean / unit variance gives every
// feature equal influence on pairwise distances.
// Runs BEFORE applyContextWindow so the per-slot window weights survive.
// Dimensions with zero variance (constant across all frames, e.g. a dead
// codebook entry) get std=1 so they contribute nothing — correct behaviour.
function zscoreFrames(framesA, framesB) {
  const D = framesA[0].length;
  const N = framesA.length + framesB.length;
  const mean = new Float64Array(D);
  const std  = new Float64Array(D);

  for (const frames of [framesA, framesB])
    for (const f of frames)
      for (let d = 0; d < D; d++) mean[d] += f[d];
  for (let d = 0; d < D; d++) mean[d] /= N;

  for (const frames of [framesA, framesB])
    for (const f of frames)
      for (let d = 0; d < D; d++) { const e = f[d] - mean[d]; std[d] += e * e; }
  for (let d = 0; d < D; d++) std[d] = Math.sqrt(std[d] / N) || 1;  // std=0 → no-op

  const apply = frames => frames.map(f => {
    const out = new Float32Array(D);
    for (let d = 0; d < D; d++) out[d] = (f[d] - mean[d]) / std[d];
    return out;
  });
  return [apply(framesA), apply(framesB)];
}

// Append one log(scale) dim per frame (48k per-frame loudness scalars).
function appendScaleDim(frames, scales) {
  const D = frames[0].length;
  return frames.map((f, t) => {
    const vec = new Float32Array(D + 1);
    vec.set(f, 0);
    vec[D] = Math.log(Math.max(scales[t] || 0, 1e-6));
    return vec;
  });
}

function embQuantToFrames(embQuant, dims) {
  const [, D, T] = dims;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const f = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = embQuant[d * T + t];
    frames.push(f);
  }
  return frames;
}

// Concatenates codebook vectors for all selected levels per frame.
// With a single level selected this is identical to the old single-level lookup.
function codebookLookupFrames(cb, codes, dims, levels) {
  const [, , T] = dims;
  const { data, vocab_size, dim } = cb;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const vec = new Float32Array(dim * levels.length);
    for (let li = 0; li < levels.length; li++) {
      const level = levels[li];
      const idx   = codes[level * T + t];
      const off   = level * vocab_size * dim + idx * dim;
      vec.set(data.subarray(off, off + dim), li * dim);
    }
    frames.push(vec);
  }
  return frames;
}

// ── UMAP ──────────────────────────────────────────────────────────────────────

// Kick off a full projection session (PCA or UMAP depending on projectionMode).
// Builds the shared feature matrix once, then dispatches to the appropriate method.
function triggerProjection() {
  if (!currentEmbeds) return;
  const sid = ++umapSessionId;
  umapSlots       = Array(UMAP_N_SLOTS).fill(null);
  umapSlotIdx     = 0;
  umapFeatureData = null;
  pcaCoords       = null;
  mdsCoords       = null;
  ssmImage        = null;  // features changed — invalidate cached matrix
  updateSlotDots();
  slotWrap.classList.toggle('visible', projectionMode === 'umap');

  document.getElementById('preReduceInfo').textContent = '';
  document.getElementById('dedupInfo').textContent = '';
  buildUMAPFeatureData()
    .then(async fd => {
      if (umapSessionId !== sid) return; // superseded by a newer call
      umapFeatureData = fd;
      // UMAP/PCA from SSM need the pooled SSM ready before launching.
      if (embedInput === 'ssm' && (projectionMode === 'umap' || projectionMode === 'pca')) {
        try { await ensureSSMInput(); } catch (e) { setStatus('SSM input: ' + e.message, true); return; }
        if (umapSessionId !== sid) return;
      }
      if (projectionMode === 'mds') {
        launchMDS();
      } else if (projectionMode === 'pca') {
        launchPCA();
      } else if (projectionMode === 'wheel') {
        launchWheelAngle(); // result handler routes to wheel coords
      } else if (projectionMode === 'ssm') {
        launchSSM();
      } else {
        slotWrap.classList.add('visible');
        startUMAPReduction();
      }
    })
    .catch(err => setStatus(err.message, true));
}

// Collapse runs of consecutive near-duplicate frames (cosine distance to the
// previous KEPT frame below thresh), per source — a B frame never collapses
// into an A run. Returns the representative matrix plus full→rep index maps
// (global rep row indices, A reps first). Why: adjacent frames of one source
// are nearly identical, so UMAP's KNN graph fills up with trivial temporal
// neighbours and clusters form by source-and-time rather than by content.
function dedupFeatures(fd, thresh) {
  const { flat, T_A, T_B, D } = fd;
  const cosDist = (a, b) => {
    let dot = 0, na = 0, nb = 0;
    for (let d = 0; d < D; d++) {
      const x = flat[a * D + d], y = flat[b * D + d];
      dot += x * y; na += x * x; nb += y * y;
    }
    const denom = Math.sqrt(na * nb);
    return denom > 1e-12 ? 1 - dot / denom : 0;
  };

  const repRows = [];
  const runSource = (start, T, map) => {
    let last = -1;
    for (let t = 0; t < T; t++) {
      const row = start + t;
      if (last < 0 || cosDist(row, last) >= thresh) { last = row; repRows.push(row); }
      map[t] = repRows.length - 1;
    }
  };
  const repMapA = new Int32Array(T_A);
  const repMapB = new Int32Array(T_B);
  runSource(0,   T_A, repMapA);
  runSource(T_A, T_B, repMapB);

  const M = repRows.length;
  const repFlat = new Float32Array(M * D);
  repRows.forEach((row, m) => repFlat.set(flat.subarray(row * D, (row + 1) * D), m * D));
  const repTA = repMapA[T_A - 1] + 1;
  return { repFlat, repTA, repTB: M - repTA, repMapA, repMapB };
}

// Prepare the UMAP-side matrix (optional dedup, then optional PCA reduction)
// and launch slot 0. fd.flat stays untouched — PCA mode always projects the
// full matrix, so dedup/reduction never leak into it.
function startUMAPReduction() {
  const fd = umapFeatureData;
  const dedupInfo = document.getElementById('dedupInfo');

  // UMAP-from-SSM: fit the pooled SSM rows (no dedup); each super-frame is
  // expanded back to its frames in the result handler.
  if (embedInput === 'ssm' && fd.ssmInput) {
    const si = fd.ssmInput;
    fd.umapFlat = si.sim; fd.umapTA = si.pA; fd.umapTB = si.pB; fd.umapD = si.pA + si.pB;
    fd.repMapA = null; fd.repMapB = null; fd.projExpand = si;
    dedupInfo.textContent = '';
  } else if (!fd.umapFlat) {
    fd.projExpand = null;
    if (dedupEnabled) {
      const thresh = Math.max(0, parseFloat(document.getElementById('dedupThresh').value) || 0.05);
      const { repFlat, repTA, repTB, repMapA, repMapB } = dedupFeatures(fd, thresh);
      fd.umapFlat = repFlat; fd.umapTA = repTA; fd.umapTB = repTB;
      fd.repMapA  = repMapA; fd.repMapB = repMapB;
      dedupInfo.textContent = `${fd.T_A + fd.T_B}→${repTA + repTB} pts`;
    } else {
      fd.umapFlat = fd.flat; fd.umapTA = fd.T_A; fd.umapTB = fd.T_B;
      fd.repMapA  = null;    fd.repMapB = null;
      dedupInfo.textContent = '';
    }
    fd.umapD = fd.D;
  }

  if (!(preReduceEnabled && !fd.reduced && fd.umapD > PRE_REDUCE_KMAX)) {
    launchUMAPSlot(0);
    return;
  }

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '10%';
  setStatus(`Pre-PCA — reducing ${fd.umapD} dims… (${fd.umapTA + fd.umapTB} frames)`);

  // Sent as a copy (no transfer) — still needed if reduction fails/skips.
  umapWorker.postMessage({
    type: 'reduce_features', jobId: activeUMAPJobId,
    flat: fd.umapFlat, N: fd.umapTA + fd.umapTB, D: fd.umapD,
    kMax: PRE_REDUCE_KMAX, varTarget: PRE_REDUCE_VAR,
  });
}

// Build the shared feature matrix (expensive; run once per session).
// Returns {flat, T_A, T_B, D, nNeighbors, minDist} — flat is NOT transferred
// so it can be reused across all slot sends.
async function buildUMAPFeatureData() {
  let framesA, framesB;

  // SNAC's per-level codes are multi-scale/ragged and don't use EnCodec codebooks,
  // so the codebook-lookup feature is unavailable — fall back to the continuous space.
  if (umapMode === 'combined' || mp.getCodec() === 'snac') {
    if (embSpace === 'pre_vq') {
      framesA = embQuantToFrames(currentEmbeds.embEncA,   currentEmbeds.embEncDimsA);
      framesB = embQuantToFrames(currentEmbeds.embEncB,   currentEmbeds.embEncDimsB);
    } else {
      framesA = embQuantToFrames(currentEmbeds.embQuantA, currentEmbeds.embQuantDimsA);
      framesB = embQuantToFrames(currentEmbeds.embQuantB, currentEmbeds.embQuantDimsB);
    }
  } else {
    const cb = await ensureCodebooks();
    const levels = umapLevels.length ? umapLevels : [0];
    framesA = codebookLookupFrames(cb, currentEmbeds.codesA, currentEmbeds.codesDimsA, levels);
    framesB = codebookLookupFrames(cb, currentEmbeds.codesB, currentEmbeds.codesDimsB, levels);
  }

  if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA, ctxDirection);  framesB = appendDeltas(framesB, ctxDirection); }
  else if (embMode === 'delta')     { framesA = computeDeltas(framesA, ctxDirection); framesB = computeDeltas(framesB, ctxDirection); }

  // Optional loudness dim: 48k embeddings are per-segment loudness-normalised,
  // so the map is loudness-blind by default. Appending log(scale) makes
  // loudness an organising axis. No-op on 24k (no scales).
  let scaleDimIdx = -1;
  if (scaleFeatEnabled && currentEmbeds.scalesA && currentEmbeds.scalesB) {
    framesA = appendScaleDim(framesA, currentEmbeds.scalesA);
    framesB = appendScaleDim(framesB, currentEmbeds.scalesB);
    scaleDimIdx = framesA[0].length - 1;
  }

  // Normalise BEFORE windowing: every base dimension contributes equally
  // regardless of raw magnitude, and the per-slot window weights survive
  // (z-scoring after windowing would cancel them).
  [framesA, framesB] = zscoreFrames(framesA, framesB);

  // Weight the loudness dim AFTER z-scoring (same trap as the window weights —
  // z-scoring first would cancel it). One unit-variance dim among D would be
  // negligible in distances; weight it to carry ~10% of total feature variance
  // so loudness reads as an axis without dominating timbre.
  if (scaleDimIdx >= 0) {
    const w = Math.sqrt(0.1 * scaleDimIdx); // scaleDimIdx === D_base
    for (const fr of [framesA, framesB])
      for (const f of fr) f[scaleDimIdx] *= w;
  }

  const K = Math.max(1, parseInt(umapWindowEl.value) || 1);
  if (K > 1) {
    framesA = applyContextWindow(framesA, K, ctxDirection, ctxShape);
    framesB = applyContextWindow(framesB, K, ctxDirection, ctxShape);
  }

  const T_A = framesA.length;
  const T_B = framesB.length;
  const D   = framesA[0].length;

  // Allocate flat array — NOT transferred, shared across all slot sends via copy.
  const flat = new Float32Array((T_A + T_B) * D);
  framesA.forEach((f, i) => flat.set(f, i * D));
  framesB.forEach((f, i) => flat.set(f, (T_A + i) * D));

  // Per-frame feature norm — frames are z-scored (zero mean per dim), so the
  // L2 norm is the distance from the dataset centroid = "atypicality".
  // Used as the wheel-mode Atyp radius.
  const featNorm = new Float32Array(T_A + T_B);
  for (let i = 0; i < T_A + T_B; i++) {
    let s = 0;
    for (let d = 0; d < D; d++) s += flat[i * D + d] ** 2;
    featNorm[i] = Math.sqrt(s);
  }

  const nNeighbors = Math.min(
    Math.max(2, parseInt(nNeighborsEl.value) || 15),
    Math.max(2, Math.floor((T_A + T_B) / 3))
  );
  const minDist = parseFloat(minDistEl.value) || 0.1;

  return { flat, T_A, T_B, D, nNeighbors, minDist, featNorm };
}

// Send one slot job to the worker. Each slot gets a unique seed (slotIdx + 1)
// so layouts are reproducible across sessions but visually distinct.
// flat is sent as a copy (no transfer) so buildUMAPFeatureData only runs once.
function launchUMAPSlot(slotIdx) {
  if (slotIdx >= UMAP_N_SLOTS || !umapFeatureData) return;
  const fd = umapFeatureData;
  // UMAP-side matrix (post dedup/reduction); falls back to the full matrix.
  const flat = fd.umapFlat ?? fd.flat;
  const T_A  = fd.umapTA   ?? fd.T_A;
  const T_B  = fd.umapTB   ?? fd.T_B;
  const D    = fd.umapD    ?? fd.D;
  const minDist = fd.minDist;
  // Re-clamp for the (possibly deduped) point count.
  const nNeighbors = Math.min(fd.nNeighbors, Math.max(2, Math.floor((T_A + T_B) / 3)));

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  // Only show the progress bar for slot 0; slots 1–N compute silently.
  if (slotIdx === 0) {
    progWrap.style.display = 'block';
    progBar.style.width = '0%';
    setStatus(`UMAP — starting… (${T_A + T_B} frames, ${UMAP_N_SLOTS} layouts)`);
  }

  // No transferable — flat stays alive for subsequent slot sends.
  umapWorker.postMessage({
    type: 'compute_umap',
    jobId: activeUMAPJobId,
    slotIdx,
    seed: slotIdx + 1,
    flat, T_A, T_B, D, nNeighbors, minDist,
    metric: umapMetric,
    initCoords: fd.initCoords || null,
  });
}

// ── Post-processing chain ─────────────────────────────────────────────────────

function buildPostProc() {
  if (!audioCtx) return;
  const maxFreq = audioCtx.sampleRate / 2 - 1;
  const mg = audioCtx.createGain();
  mg.gain.value = 1;
  notchFilters = [];
  let prev = mg;
  for (let h = 1; h * notchFundamental <= maxFreq; h++) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'notch';
    f.frequency.value = notchFundamental * h;
    f.Q.value = (postProcEnabled && h * notchFundamental <= maxFreq) ? notchQ : 10000;
    notchFilters.push(f);
    prev.connect(f);
    prev = f;
  }
  prev.connect(audioCtx.destination);
  masterDest = mg;
}

function getMasterDest() {
  if (!audioCtx) return null;
  if (!masterDest) buildPostProc();
  return masterDest;
}

function updateNotchFilters() {
  if (!audioCtx || !masterDest) return;
  const maxFreq = audioCtx.sampleRate / 2 - 1;
  notchFilters.forEach((f, i) => {
    const freq = notchFundamental * (i + 1);
    f.frequency.value = freq;
    f.Q.value = (postProcEnabled && freq <= maxFreq) ? notchQ : 10000;
  });
}

// ── Waveform players ──────────────────────────────────────────────────────────

const playerA = makeWavePlayer('waveCanvA', '#c87800', { getAudioCtx, getMasterDest }, pos => {
  if (projectionMode === 'ssm') {
    ssmPlayhead = pos < 0 ? (ssmPlayhead?.src === 'A' ? null : ssmPlayhead) : { src: 'A', pos };
    if (pos >= 0) playerB.setCursor(-1);
    scheduleRender(); return;
  }
  if (pos < 0 || !coordsA) { waveHighlight = null; scheduleRender(); return; }
  const i = Math.min(Math.floor(pos * coordsA.length), coordsA.length - 1);
  waveHighlight = { src: 'A', idx: i };
  playerB.setCursor(-1);
  scheduleRender();
});

const playerB = makeWavePlayer('waveCanvB', '#2090c0', { getAudioCtx, getMasterDest }, pos => {
  if (projectionMode === 'ssm') {
    ssmPlayhead = pos < 0 ? (ssmPlayhead?.src === 'B' ? null : ssmPlayhead) : { src: 'B', pos };
    if (pos >= 0) playerA.setCursor(-1);
    scheduleRender(); return;
  }
  if (pos < 0 || !coordsB) { waveHighlight = null; scheduleRender(); return; }
  const i = Math.min(Math.floor(pos * coordsB.length), coordsB.length - 1);
  waveHighlight = { src: 'B', idx: i };
  playerA.setCursor(-1);
  scheduleRender();
});

const playerG = makeWavePlayer('waveCanvG', '#44bb88', { getAudioCtx, getMasterDest }, pos => {
  trajAnchorPos = pos >= 0 ? pos : -1;

  if (pos < 0 || !genPlaySeq) {
    waveHighlight = null;
    playerA.setCursor(-1); playerB.setCursor(-1);
    scheduleRender(); return;
  }
  const i = Math.min(Math.floor(pos * (genPlaySeq.length - 1)), genPlaySeq.length - 1);
  const frame = genPlaySeq[i];
  if (!frame) return;
  waveHighlight = { src: frame.src, idx: frame.idx };
  const srcLen = frame.src === 'A' ? (coordsA?.length ?? 1) : (coordsB?.length ?? 1);
  const srcPos = frame.idx / srcLen;
  if (frame.src === 'A') { playerA.setCursor(srcPos); playerB.setCursor(-1); }
  else                   { playerB.setCursor(srcPos); playerA.setCursor(-1); }
  scheduleRender();
});

// ── Mode toggles (canvas) ─────────────────────────────────────────────────────

function updatePinSeqBar() {
  if (canvasMode !== 'pins' || pinPoints.length === 0) {
    pinSeqBar.style.display = 'none';
    return;
  }
  pinSeqBar.style.display = 'flex';
  pinSeqBar.innerHTML = '';

  pinPoints.forEach((_, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'pinArrow';
      arrow.textContent = '→';
      pinSeqBar.appendChild(arrow);
    }
    const chip = document.createElement('span');
    chip.className = 'pinChip';
    chip.textContent = `[${i + 1}]`;
    chip.draggable = true;
    chip.dataset.idx = i;

    chip.addEventListener('dragstart', e => {
      pinSeqDragSrc = parseInt(e.currentTarget.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    });
    chip.addEventListener('dragleave', e => {
      e.currentTarget.classList.remove('drag-over');
    });
    chip.addEventListener('drop', e => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const dstIdx = parseInt(e.currentTarget.dataset.idx);
      if (pinSeqDragSrc < 0 || dstIdx === pinSeqDragSrc) return;
      const [moved] = pinPoints.splice(pinSeqDragSrc, 1);
      pinPoints.splice(dstIdx, 0, moved);
      pinSeqDragSrc = -1;
      userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
      updatePinSeqBar();
      autoRegenerate();
    });
    pinSeqBar.appendChild(chip);
  });
}

function setCanvasMode(mode) {
  canvasMode = mode;
  togExplore.classList.toggle('active', mode === 'explore');
  togDraw   .classList.toggle('active', mode === 'draw');
  togPins   .classList.toggle('active', mode === 'pins');
  umapCanvas.style.cursor = mode === 'pins' ? 'cell' : 'crosshair';
  if (mode === 'draw')    setStatus('Click and drag to draw. Each stroke adds a new segment.');
  if (mode === 'pins')    setStatus('Double-click near a UMAP point to add/remove pins.');
  if (mode === 'explore') setStatus('');
  updatePinSeqBar();
  // Sync trajectory source to new mode and regenerate
  if (mode === 'draw')      userTrajectory = buildDrawUserTrajectory();
  else if (mode === 'pins') userTrajectory = pinPoints.length    >= 2 ? resamplePath(pinCoords(), 300)    : [];
  if (userTrajectory.length < 2) { snapFrames = null; snapSegBoundaries = []; codePathFrames = null; snapPlayFrames = null; }
  autoRegenerate();
}

togExplore.addEventListener('click', () => setCanvasMode('explore'));
togDraw   .addEventListener('click', () => setCanvasMode('draw'));
togPins   .addEventListener('click', () => setCanvasMode('pins'));

// ── Canvas helpers ────────────────────────────────────────────────────────────

function applyZoom(cx, cy, dz) {
  viewZoom  *= dz;
  viewPanX   = cx + (viewPanX - cx) * dz;
  viewPanY   = cy + (viewPanY - cy) * dz;
}

function umapToCanvas(ux, uy) {
  if (!lastTransform) return [0, 0];
  const { xMin, yMin, scale, offX, offY, H } = lastTransform;
  return [
    viewPanX + (offX + (ux - xMin) * scale) * viewZoom,
    viewPanY + (H - offY - (uy - yMin) * scale) * viewZoom,
  ];
}

function canvasToUmap(e) {
  const { xMin, yMin, scale, offX, offY, H } = lastTransform;
  const rect  = umapCanvas.getBoundingClientRect();
  const physX = (e.clientX - rect.left) * dpr;
  const physY = (e.clientY - rect.top)  * dpr;
  const umapX = ((physX - viewPanX) / viewZoom - offX) / scale + xMin;
  const umapY = (H - offY - (physY - viewPanY) / viewZoom) / scale + yMin;
  return [umapX, umapY];
}

function resamplePath(pts, maxN) {
  if (pts.length < 2) return pts.slice();
  const arcLen = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
    arcLen.push(arcLen[i-1] + Math.sqrt(dx*dx + dy*dy));
  }
  const total = arcLen[arcLen.length - 1];
  if (total < 1e-12) return [pts[0].slice()];
  const N = Math.min(maxN, pts.length);
  const out = [];
  for (let i = 0; i < N; i++) {
    const tgt = total * i / (N - 1);
    let lo = 0, hi = pts.length - 1;
    while (lo < hi - 1) { const mid = (lo + hi) >> 1; if (arcLen[mid] <= tgt) lo = mid; else hi = mid; }
    if (arcLen[hi] === arcLen[lo]) { out.push(pts[lo].slice()); continue; }
    const t = (tgt - arcLen[lo]) / (arcLen[hi] - arcLen[lo]);
    out.push([pts[lo][0] + t * (pts[hi][0] - pts[lo][0]), pts[lo][1] + t * (pts[hi][1] - pts[lo][1])]);
  }
  return out;
}

// ── Zoom / pan ────────────────────────────────────────────────────────────────

umapCanvas.style.cursor = 'crosshair';

umapCanvas.addEventListener('wheel', e => {
  if (projectionMode === 'ssm') return;
  e.preventDefault();
  if (!lastTransform) return;
  const rect = umapCanvas.getBoundingClientRect();
  const cx   = (e.clientX - rect.left) * dpr;
  const cy   = (e.clientY - rect.top)  * dpr;
  if (e.ctrlKey || e.metaKey) {
    // Pinch-to-zoom (macOS trackpad reports pinch as ctrlKey wheel)
    applyZoom(cx, cy, Math.exp(-e.deltaY * 0.01));
  } else if (e.shiftKey) {
    // Shift + swipe → zoom in/out centered on cursor
    applyZoom(cx, cy, Math.exp(-e.deltaY * 0.005));
  } else {
    // Plain two-finger swipe → pan in any direction
    viewPanX -= e.deltaX;
    viewPanY -= e.deltaY;
  }
  scheduleRender();
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.target !== document.body && e.target !== umapCanvas) return;
  if (e.key === '+' || e.key === '=') { applyZoom(umapCanvas.width/2, umapCanvas.height/2, 1.2); scheduleRender(); }
  if (e.key === '-')                  { applyZoom(umapCanvas.width/2, umapCanvas.height/2, 1/1.2); scheduleRender(); }
  if (e.key === '0')                  { viewZoom = 1; viewPanX = 0; viewPanY = 0; scheduleRender(); }
  if (e.shiftKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    e.preventDefault();
    const step = 40;
    if (e.key === 'ArrowLeft')  viewPanX += step;
    if (e.key === 'ArrowRight') viewPanX -= step;
    if (e.key === 'ArrowUp')    viewPanY += step;
    if (e.key === 'ArrowDown')  viewPanY -= step;
    scheduleRender();
  }
});

// ── Drag + draw event handlers ────────────────────────────────────────────────

umapCanvas.addEventListener('mousedown', e => {
  if (projectionMode === 'ssm') return;
  if (!lastTransform) return;
  if (e.shiftKey && userTrajectory.length >= 2) {
    isShiftDragging   = true;
    shiftDragStart    = canvasToUmap(e);
    shiftDragBaseTraj = userTrajectory.map(p => [p[0], p[1]]);
    umapCanvas.style.cursor = 'move';
    return;
  }
  if (canvasMode === 'draw' && e.button === 0) {
    isDrawing = true;
    rawDrawPoints = [canvasToUmap(e)];  // start fresh stroke; rawDrawSegments kept
    trajAnchorPos = -1;
    scheduleRender();
    return;
  }
  if (canvasMode === 'pins' && coordsA && coordsB) {
    const rect  = umapCanvas.getBoundingClientRect();
    const physX = (e.clientX - rect.left) * dpr;
    const physY = (e.clientY - rect.top)  * dpr;
    const hitIdx = pinPoints.findIndex(p => {
      const [ux, uy] = (p.src === 'A' ? coordsA : coordsB)[p.idx];
      const [cx, cy] = umapToCanvas(ux, uy);
      return (cx - physX) ** 2 + (cy - physY) ** 2 < (14 * dpr) ** 2;
    });
    if (hitIdx >= 0) {
      isPinDragging = true;
      pinDragIdx    = hitIdx;
      umapCanvas.style.cursor = 'grabbing';
      return;
    }
  }
  if (canvasMode === 'explore' || canvasMode === 'pins') {
    isPanDragging = true;
    panDragLast   = { x: e.clientX, y: e.clientY };
    panDragMoved  = false;
  }
});

umapCanvas.addEventListener('mousemove', e => {
  if (projectionMode === 'ssm') { onSSMHover(e); return; }
  if (isPinDragging) {
    if (!coordsA || !coordsB) return;
    const [umapX, umapY] = canvasToUmap(e);
    const { src, idx } = findNearestUmapPoint(umapX, umapY, coordsA, coordsB, getEnabledSrcs());
    pinPoints[pinDragIdx] = { src, idx };
    userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
    updatePinSeqBar();
    scheduleRender();
    return;
  }
  if (isShiftDragging) {
    const [cx, cy] = canvasToUmap(e);
    const dx = cx - shiftDragStart[0], dy = cy - shiftDragStart[1];
    userTrajectory = shiftDragBaseTraj.map(([x, y]) => [x + dx, y + dy]);
    scheduleRender();
    return;
  }
  if (isDrawing) {
    const pt = canvasToUmap(e);
    const last = rawDrawPoints[rawDrawPoints.length - 1];
    const dx = (pt[0] - last[0]) * lastTransform.scale;
    const dy = (pt[1] - last[1]) * lastTransform.scale;
    if (dx*dx + dy*dy < (2 * dpr) ** 2) return;
    rawDrawPoints.push(pt);
    userTrajectory = buildDrawUserTrajectory();
    scheduleRender();
    return;
  }
  if (isPanDragging && panDragLast) {
    const dx = (e.clientX - panDragLast.x) * dpr;
    const dy = (e.clientY - panDragLast.y) * dpr;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      panDragMoved = true;
      umapCanvas.style.cursor = 'grab';
    }
    if (panDragMoved) { viewPanX += dx; viewPanY += dy; scheduleRender(); }
    panDragLast = { x: e.clientX, y: e.clientY };
  }
});

const finishPanDrag = () => {
  if (!isPanDragging) return;
  isPanDragging = false; panDragLast = null;
  umapCanvas.style.cursor = canvasMode === 'pins' ? 'cell' : 'crosshair';
};

const finishShiftDrag = () => {
  if (!isShiftDragging) return;
  isShiftDragging = false; shiftDragStart = null; shiftDragBaseTraj = null;
  umapCanvas.style.cursor = 'crosshair';
  autoRegenerate();
};

const finishPinDrag = () => {
  if (!isPinDragging) return;
  isPinDragging = false; pinDragIdx = -1;
  umapCanvas.style.cursor = 'cell';
  autoRegenerate();
};

const finishDraw = () => {
  if (!isDrawing) return;
  isDrawing = false;
  if (rawDrawPoints.length >= 2) rawDrawSegments.push({ pts: rawDrawPoints, enabled: true });
  rawDrawPoints = [];
  userTrajectory = buildDrawUserTrajectory();
  autoRegenerate();
};

umapCanvas.addEventListener('mouseup', e => { finishPanDrag(); finishShiftDrag(); if (e.button === 0) finishDraw(); finishPinDrag(); });
umapCanvas.addEventListener('mouseleave', () => { finishPanDrag(); finishShiftDrag(); finishDraw(); finishPinDrag(); });

// ── Draw-segment context menu ─────────────────────────────────────────────────

const segCtxMenu   = document.getElementById('segCtxMenu');
const segCtxToggle = document.getElementById('segCtxToggle');
const segCtxDelete = document.getElementById('segCtxDelete');
const segCtxSolo   = document.getElementById('segCtxSolo');
let   ctxMenuSegIdx = -1;

function closeSegCtxMenu() { segCtxMenu.style.display = 'none'; ctxMenuSegIdx = -1; }

function soloSegment(idx) {
  presoloEnabled = rawDrawSegments.map(s => s.enabled);
  soloedSegIdx   = idx;
  rawDrawSegments.forEach((s, i) => { s.enabled = (i === idx); });
  userTrajectory = buildDrawUserTrajectory();
  autoRegenerate();
}

function unsoloSegment() {
  if (presoloEnabled) {
    rawDrawSegments.forEach((s, i) => { s.enabled = presoloEnabled[i] ?? true; });
    presoloEnabled = null;
  }
  soloedSegIdx = -1;
  userTrajectory = buildDrawUserTrajectory();
  autoRegenerate();
}

function clearSoloState() { soloedSegIdx = -1; presoloEnabled = null; }

// Point-to-segment minimum squared distance (canvas pixel space).
function ptSegDist2(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 < 1e-9) return (px - ax) ** 2 + (py - ay) ** 2;
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / len2));
  return (px - ax - t * dx) ** 2 + (py - ay - t * dy) ** 2;
}

// Returns index of rawDrawSegments closest to (physX, physY) within threshold, or -1.
function hitTestSegments(physX, physY, threshPx = 12) {
  if (!lastTransform) return -1;
  const thresh2 = (threshPx * dpr) ** 2;
  let bestDist2 = Infinity, bestIdx = -1;
  for (let si = 0; si < rawDrawSegments.length; si++) {
    const pts = rawDrawSegments[si].pts;
    for (let i = 1; i < pts.length; i++) {
      const [ax, ay] = umapToCanvas(pts[i - 1][0], pts[i - 1][1]);
      const [bx, by] = umapToCanvas(pts[i][0],     pts[i][1]);
      const d2 = ptSegDist2(physX, physY, ax, ay, bx, by);
      if (d2 < bestDist2) { bestDist2 = d2; bestIdx = si; }
    }
  }
  return bestDist2 <= thresh2 ? bestIdx : -1;
}

umapCanvas.addEventListener('contextmenu', e => {
  if (projectionMode === 'ssm') { e.preventDefault(); return; }
  e.preventDefault();
  closeSegCtxMenu();
  if (canvasMode !== 'draw' || !rawDrawSegments.length || !lastTransform) return;
  const rect = umapCanvas.getBoundingClientRect();
  const physX = (e.clientX - rect.left) * dpr;
  const physY = (e.clientY - rect.top)  * dpr;
  const idx = hitTestSegments(physX, physY);
  if (idx < 0) return;
  ctxMenuSegIdx = idx;
  segCtxSolo.textContent   = soloedSegIdx === idx ? 'Unsolo' : 'Solo';
  segCtxToggle.textContent = rawDrawSegments[idx].enabled ? 'Disable' : 'Enable';
  segCtxMenu.style.left    = e.clientX + 'px';
  segCtxMenu.style.top     = e.clientY + 'px';
  segCtxMenu.style.display = 'block';
});

segCtxSolo.addEventListener('click', () => {
  if (ctxMenuSegIdx < 0) return;
  const idx = ctxMenuSegIdx;
  closeSegCtxMenu();
  if (soloedSegIdx === idx) {
    unsoloSegment();           // clicking "Unsolo" on the soloed segment
  } else {
    if (soloedSegIdx >= 0) {   // steal solo: restore first, then re-solo
      unsoloSegment();
    }
    soloSegment(idx);
  }
});

segCtxDelete.addEventListener('click', () => {
  if (ctxMenuSegIdx < 0) return;
  const idx = ctxMenuSegIdx;
  // Adjust or clear solo state around the deletion
  if (soloedSegIdx === idx) {
    clearSoloState();                      // soloed segment deleted — just drop solo
  } else if (soloedSegIdx > idx) {
    soloedSegIdx--;                        // index shifts down after splice
    if (presoloEnabled) presoloEnabled.splice(idx, 1);
  } else if (presoloEnabled) {
    presoloEnabled.splice(idx, 1);
  }
  rawDrawSegments.splice(idx, 1);
  closeSegCtxMenu();
  userTrajectory = buildDrawUserTrajectory();
  autoRegenerate();
});

segCtxToggle.addEventListener('click', () => {
  if (ctxMenuSegIdx < 0) return;
  rawDrawSegments[ctxMenuSegIdx].enabled = !rawDrawSegments[ctxMenuSegIdx].enabled;
  closeSegCtxMenu();
  userTrajectory = buildDrawUserTrajectory();
  autoRegenerate();
});

// Close menu on any outside click
document.addEventListener('click', e => {
  if (!segCtxMenu.contains(e.target)) closeSegCtxMenu();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSegCtxMenu(); });

// ── Double-click: add/remove pins ────────────────────────────────────────────

umapCanvas.addEventListener('dblclick', e => {
  if (projectionMode === 'ssm') return;
  if (canvasMode !== 'pins' || !lastTransform || !coordsA || !coordsB) return;
  const rect   = umapCanvas.getBoundingClientRect();
  const physX  = (e.clientX - rect.left) * dpr;
  const physY  = (e.clientY - rect.top)  * dpr;
  const hitR2  = (14 * dpr) ** 2;

  const hitIdx = pinPoints.findIndex(p => {
    const [ux, uy] = (p.src === 'A' ? coordsA : coordsB)[p.idx];
    const [cx, cy] = umapToCanvas(ux, uy);
    return (cx - physX) ** 2 + (cy - physY) ** 2 < hitR2;
  });

  if (hitIdx >= 0) {
    pinPoints.splice(hitIdx, 1);
  } else {
    const SNAP_R2 = (18 * dpr) ** 2;
    let bestDist2 = Infinity, bestSrc = null, bestIdx = -1;
    const _srcs = getEnabledSrcs();
    if (_srcs.includes('A')) {
      for (let i = 0; i < coordsA.length; i++) {
        const [cx, cy] = umapToCanvas(coordsA[i][0], coordsA[i][1]);
        const d2 = (cx - physX) ** 2 + (cy - physY) ** 2;
        if (d2 < bestDist2) { bestDist2 = d2; bestSrc = 'A'; bestIdx = i; }
      }
    }
    if (_srcs.includes('B')) {
      for (let i = 0; i < coordsB.length; i++) {
        const [cx, cy] = umapToCanvas(coordsB[i][0], coordsB[i][1]);
        const d2 = (cx - physX) ** 2 + (cy - physY) ** 2;
        if (d2 < bestDist2) { bestDist2 = d2; bestSrc = 'B'; bestIdx = i; }
      }
    }
    if (bestIdx < 0 || bestDist2 > SNAP_R2) {
      setStatus('Double-click closer to a UMAP point to add a pin.');
      return;
    }
    pinPoints.push({ src: bestSrc, idx: bestIdx });
  }

  userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
  updatePinSeqBar();
  autoRegenerate();
  if (userTrajectory.length < 2) setStatus(pinPoints.length === 1 ? 'Pin added. Double-click near another point to add more.' : '');
});

// ── Click to play (explore mode) ──────────────────────────────────────────────

umapCanvas.addEventListener('click', async e => {
  if (projectionMode === 'ssm') return;
  if (canvasMode !== 'explore') return;
  if (panDragMoved) { panDragMoved = false; return; }
  if (!coordsA || !coordsB || !lastTransform || !currentEmbeds) return;
  if (encodePhase !== null) return;

  const [umapX, umapY] = canvasToUmap(e);
  const { src: bestSrc, idx: bestIdx } = findNearestUmapPoint(umapX, umapY, coordsA, coordsB, getEnabledSrcs());
  if (bestIdx < 0) return;

  selectedPoint = { src: bestSrc, idx: bestIdx };
  const srcLen = bestSrc === 'A' ? coordsA.length : coordsB.length;
  const srcPos = bestIdx / srcLen;
  if (bestSrc === 'A') { playerA.setCursor(srcPos); playerB.setCursor(-1); }
  else                 { playerB.setCursor(srcPos); playerA.setCursor(-1); }
  scheduleRender();

  const T = bestSrc === 'A' ? currentEmbeds.codesDimsA[2] : currentEmbeds.codesDimsB[2];
  // Grain of frames around the click. 24 kHz is causal → context is in the PAST,
  // so take frames before the clicked one; 48 kHz is non-causal → take an equal
  // span on each side, centring the clicked frame.
  const is48      = mp.getModelHz() === '48k';
  const GRAIN_MUL = 8; // frames per side = base × this
  const before    = (is48 ? 2 : 4) * GRAIN_MUL;
  const after     = (is48 ? 2 : 0) * GRAIN_MUL;
  const startFrame = Math.max(0, bestIdx - before);
  const endFrame   = Math.min(T, bestIdx + after + 1);

  getAudioCtx();
  playJobId = ++jobSeq;
  setStatus(`Decoding frame ${bestIdx} (${bestSrc})…`);
  // Send the codes window straight from currentEmbeds (always present), so this
  // works for sources resolved from cache/sidecars too — which have no captures
  // in the worker. 48k carries the clicked frame's scale.
  const codesSrc  = bestSrc === 'A' ? currentEmbeds.codesA     : currentEmbeds.codesB;
  const codesDimsSrc = bestSrc === 'A' ? currentEmbeds.codesDimsA : currentEmbeds.codesDimsB;
  const scalesSrc = bestSrc === 'A' ? currentEmbeds.scalesA    : currentEmbeds.scalesB;
  const K  = codesDimsSrc[1];
  const nF = endFrame - startFrame;

  // SNAC: decode the embQuant (z_q) window directly via decode_audio — no codebooks.
  if (mp.getCodec() === 'snac') {
    const embSrc = bestSrc === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
    const D = (bestSrc === 'A' ? currentEmbeds.embQuantDimsA : currentEmbeds.embQuantDimsB)[1];
    const win = new Float32Array(D * nF);
    for (let d = 0; d < D; d++)
      for (let t = 0; t < nF; t++) win[d * nF + t] = embSrc[d * T + startFrame + t];
    worker.postMessage({ type: 'decode_frame_snac', jobId: playJobId, model: mp.getSnacModel(), embQuant: win, dims: [1, D, nF] }, [win.buffer]);
    return;
  }

  const codesWin = new Int32Array(K * nF);
  for (let k = 0; k < K; k++)
    for (let t = 0; t < nF; t++) codesWin[k * nF + t] = codesSrc[k * T + startFrame + t];
  const scaleValue = scalesSrc ? scalesSrc[Math.min(scalesSrc.length - 1, bestIdx)] : null;
  worker.postMessage({
    type: 'play_frame_exp6', jobId: playJobId,
    source: bestSrc, bestIdx,
    modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
    codes: codesWin, codesDims: [1, K, nF], scaleValue,
  }, [codesWin.buffer]);
});

// ── Trajectory playback ───────────────────────────────────────────────────────

function startTrajPlayback(buf, sr) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  const newGain = ctx.createGain();
  const newSrc  = ctx.createBufferSource();
  newSrc.buffer = buf;
  newSrc.connect(newGain);
  newGain.connect(getMasterDest());

  if (activeSrc) {
    activeGain.gain.cancelScheduledValues(now);
    activeGain.gain.setValueAtTime(activeGain.gain.value, now);
    activeGain.gain.linearRampToValueAtTime(0, now + XFADE_S);
    newGain.gain.setValueAtTime(0, now);
    newGain.gain.linearRampToValueAtTime(1, now + XFADE_S);
    const oldSrc = activeSrc, oldGain = activeGain;
    oldSrc.stop(now + XFADE_S + 0.01);
    oldSrc.onended = () => { try { oldGain.disconnect(); } catch (_) {} };
  } else {
    newGain.gain.setValueAtTime(1, now);
  }

  newSrc.start(now);
  activeSrc           = newSrc;
  activeGain          = newGain;
  trajPlayStartTime   = now;
  trajCurrentDuration = buf.length / sr;

  requestAnimationFrame(animateTrajAnchor);
  setStatus(`Playing trajectory (${trajCurrentDuration.toFixed(1)} s)${trajLooping ? ' — looping' : ''}…`);
}

function stopTrajPlayback() {
  if (activeSrc) { try { activeSrc.stop(); } catch (_) {} activeSrc = null; }
  if (activeGain) { try { activeGain.disconnect(); } catch (_) {} activeGain = null; }
  trajPlayStartTime = null;
  trajAnchorPos     = -1;
}

function animateTrajAnchor() {
  if (!trajPlayStartTime || !audioCtx) return;
  const elapsed  = audioCtx.currentTime - trajPlayStartTime;
  const duration = trajCurrentDuration || parseFloat(trajDurationEl.value) || 4;
  trajAnchorPos  = Math.min(elapsed / duration, 1);
  scheduleRender();
  if (trajAnchorPos < 1) {
    requestAnimationFrame(animateTrajAnchor);
  } else if (trajLooping && trajAudioBuf) {
    startTrajPlayback(trajAudioBuf, mp.getSampleRate());
  } else {
    stopTrajPlayback();
    scheduleRender();
    setStatus('Trajectory playback done.');
  }
}

// ── Trajectory generation ─────────────────────────────────────────────────────

function snapCtxArg() {
  return {
    snapMode, snapKVal, snapDurVal,
    framesPerSec: coordsA ? coordsA.length / srcDuration('A') : 1,
    coordsA, coordsB,
  };
}

function snapWaypointArgs() {
  return {
    canvasMode, pinPoints: pinCoords(), coordsA, coordsB,
    userTrajectory, pathMode, snapMode, snapDurVal, codeSecVal,
    trajDuration: parseFloat(trajDurationEl.value) || 4,
    framesPerSec: coordsA ? coordsA.length / srcDuration('A') : 1,
    drawSegmentBoundaries,
    enabledSrcs: getEnabledSrcs(),
  };
}

function computeWaypoints() {
  if (!coordsA || !coordsB) return;
  const fps = coordsA.length / srcDuration('A');

  if (pathMode === 'code') {
    const N_total = codeDurMode === 'frames'
      ? Math.max(2, codeKVal)
      : Math.max(2, Math.round(codeSecVal * fps));

    const { wps: fwdWPs } = computeSnapWaypoints(snapWaypointArgs());
    if (!fwdWPs.length) return;
    const bwdWPs = [...fwdWPs].reverse();

    // Build ordered waypoint list; pingpong = fwd + bwd (turnaround repeated at junction)
    const orderedWPs = trajDir === 'forward'  ? fwdWPs
                     : trajDir === 'backward' ? bwdWPs
                     : [...fwdWPs, ...bwdWPs];   // pingpong: 2× length → K halves automatically

    // K frames per waypoint; dividing N_total by list length keeps total duration constant
    const K = Math.max(1, Math.round(N_total / orderedWPs.length));
    const sampledWPs = orderedWPs.flatMap(wp => Array.from({ length: K }, () => wp));

    codePathFrames = sampledWPs;
    genPlaySeq     = sampledWPs;
    setCodeSeqInfo(orderedWPs, K);

  } else if (pathMode === 'snap') {
    const { wps: fwdWPs, segBoundaries: fwdSegBounds } = computeSnapWaypoints(snapWaypointArgs());
    if (!fwdWPs.length) return;
    const bwdWPs = [...fwdWPs].reverse();
    const M = fwdWPs.length;
    // Mirror fwd boundaries into the reversed sequence: boundary at b → M-b in bwd
    const bwdSegBounds = fwdSegBounds.map(b => M - b).reverse();

    if (trajDir === 'backward') {
      snapFrames        = bwdWPs;
      snapSegBoundaries = bwdSegBounds;
    } else if (trajDir === 'pingpong') {
      snapFrames        = [...fwdWPs, ...bwdWPs];
      // fwd boundaries + bwd boundaries shifted by M (junction itself is connected — turnaround)
      snapSegBoundaries = [...fwdSegBounds, ...bwdSegBounds.map(b => M + b)];
    } else {
      snapFrames        = fwdWPs;
      snapSegBoundaries = fwdSegBounds;
    }

    // 48k decodes non-causally within each chunk — grains get symmetric context
    // (⌈K/2⌉ pre + ⌊K/2⌋ post per waypoint; the tail-only K_post folds into the
    // last waypoint's post-roll). 24k stays pure pre-roll (causal decoder warm-up).
    const is48k   = mp.getModelHz() === '48k';
    const ctxMode = is48k ? 'sym' : 'pre';
    const K_post  = is48k ? Math.max(2, Math.round(fps * 0.03)) : 0;
    const N_total = Math.max(2, Math.round(snapDurVal * fps));

    // Builds one direction's frame sequence.
    // ctxArg defaults to snapCtxArg() — pingpong halves pass a half-duration arg so all waypoints fit.
    const ctxSwap = { prob: ctxSwapProb, range: ctxSwapDist };
    const buildSeq = (wps, N_target = N_total, kOverride = snapKVal, ctxArg = null) => snapMode === 'k_frames'
      ? buildSnapSequence(wps, kOverride, K_post, ctxSwap, coordsA, coordsB, currentEmbeds, ctxMode)
      : buildSnapSequenceFixed(wps, Math.max(wps.length, N_target), K_post, ctxSwap, coordsA, coordsB, currentEmbeds, ctxArg ?? snapCtxArg(), ctxMode);

    let seq;
    if (trajDir === 'forward')       seq = buildSeq(fwdWPs);
    else if (trajDir === 'backward') seq = buildSeq(bwdWPs);
    else {
      // Pingpong: split total duration evenly across fwd and bwd halves.
      //
      // k_frames: use ceil/floor so every K value maps to a unique (kFwd, kBwd) pair.
      //   floor alone collapses K=8 and K=9 both to kHalf=4 → identical audio.
      // equal/prop: pass half the snapDurVal so getContextKs budgets context correctly
      //   for the half-length sequence; otherwise K_each is over-sized and the truncation
      //   cuts the final waypoints entirely (they'd be past the N_target cutoff).
      const half        = Math.floor(N_total / 2);
      const kFwd        = Math.max(1, Math.ceil(snapKVal / 2));
      const kBwd        = Math.max(1, Math.floor(snapKVal / 2));
      const halfCtxArg  = { ...snapCtxArg(), snapDurVal: snapDurVal / 2 };
      const fwdSeq      = buildSeq(fwdWPs, half, kFwd, halfCtxArg);
      const bwdSeq      = buildSeq(bwdWPs, half, kBwd, halfCtxArg);
      // Offset bwd _wp tags by M so the renderer indexes snapFrames[M..2M-1] (bwd waypoints)
      // rather than [0..M-1] (fwd waypoints) during the backward half.
      seq = [...fwdSeq, ...bwdSeq.map(f => ({ ...f, _wp: f._wp + M }))];
    }
    snapPlayFrames = seq;
    genPlaySeq     = seq;
    setSnapSeqInfo(snapFrames, seq);
  }
  // draw mode: no discrete waypoints — embeddings are interpolated at playback time
  if (pathMode === 'draw') seqInfo.textContent = 'interpolated points along path';
}

function autoRegenerate() {
  if (userTrajectory.length >= 2 && (!currentEmbeds || !coordsA || !coordsB)) {
    setStatus('Path drawn. Encode sources and run UMAP to play.');
  }
  markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
}

// Build a per-position color function for the generated waveform based on the
// source frame each output frame came from. Reuses the scatter's per-frame
// colours (pointColorsA/B) so a folder clip's colour carries through to the
// generated signal; non-folder frames use the plain source colour.
// Returns null for draw mode (interpolated — no discrete source attribution).
function makeGenColorFn() {
  if (!genPlaySeq || genPlaySeq.length === 0 || pathMode === 'draw') return null;
  refreshPointColors();            // ensure per-frame clip colours are current
  const seq = genPlaySeq;          // capture snapshot
  const N   = seq.length;
  const pcA = pointColorsA, pcB = pointColorsB;
  return pos => {
    const f = seq[Math.min(N - 1, Math.floor(pos * N))];
    return f.src === 'A' ? ((pcA && pcA[f.idx]) || '#c87800')
                         : ((pcB && pcB[f.idx]) || '#2090c0');
  };
}

async function playTrajectory() {
  if (!hasWaypointSource()) { setStatus('Add pins or draw a path first.', true); return; }
  if (!currentEmbeds)                                { setStatus('Encode both sources first.', true); return; }
  if (!coordsA || !coordsB)                          { setStatus('Run UMAP first.', true); return; }

  const [, D, T_A] = currentEmbeds.embQuantDimsA;
  const [, , T_B]  = currentEmbeds.embQuantDimsB;
  const fps = coordsA.length / srcDuration('A');

  // ── Code-path mode ────────────────────────────────────────────────────────
  if (pathMode === 'code') {
    if (!genPlaySeq || !genPlaySeq.length) { setStatus('Draw a path first.', true); return; }
    const N       = genPlaySeq.length;
    const blended = new Float32Array(D * N);
    for (let i = 0; i < N; i++) {
      const { src, idx } = genPlaySeq[i];
      const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
      const T   = src === 'A' ? T_A : T_B;
      for (let d = 0; d < D; d++) blended[d * N + i] = emb[d * T + idx];
    }
    getAudioCtx();
    playJobId = ++jobSeq;
    const dirLabel = { forward: 'fwd', backward: 'bwd', pingpong: 'ping' }[trajDir];
    setStatus(`Decoding code/${dirLabel} (${N} frames, ${(N / fps).toFixed(1)} s)…`);
    const codeScales = makeFrameScales(genPlaySeq, currentEmbeds);
    decodeTrajectory(blended, D, N, codeScales || null);
    return;
  }

  // ── Snap mode ─────────────────────────────────────────────────────────────
  if (pathMode === 'snap') {
    if (!genPlaySeq || !genPlaySeq.length) { setStatus('Draw a path first.', true); return; }
    const seq     = genPlaySeq;
    const N       = seq.length;
    const blended = new Float32Array(D * N);
    for (let i = 0; i < N; i++) {
      const { src, idx } = seq[i];
      const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
      const T   = src === 'A' ? T_A : T_B;
      for (let d = 0; d < D; d++) blended[d * N + i] = emb[d * T + idx];
    }
    getAudioCtx();
    playJobId = ++jobSeq;
    const snapLabel = { k_frames: 'K frames', equal: 'equal', proportional: 'proportional' }[snapMode];
    setStatus(`Decoding snap/${snapLabel} (${N} frames, ${(N / fps).toFixed(1)} s)…`);
    const snapScales = makeFrameScales(seq, currentEmbeds);
    decodeTrajectory(blended, D, N, snapScales || null);
    return;
  }

  // ── Draw-path mode ────────────────────────────────────────────────────────
  genPlaySeq = null;
  const duration = parseFloat(trajDurationEl.value) || 4;
  const N_pass   = Math.max(2, Math.round(duration * fps));
  const N        = N_pass;

  const drawFrac = i => {
    if (trajDir === 'backward') return 1 - i / (N - 1);
    if (trajDir === 'pingpong') { const t = 2 * i / (N - 1); return t <= 1 ? t : 2 - t; }
    return i / (N - 1);
  };

  const getFrame = (src, idx) => {
    const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
    const T   = src === 'A' ? T_A : T_B;
    const f   = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = emb[d * T + idx];
    return f;
  };

  const blended    = new Float32Array(D * N);
  const hasScales  = !!(currentEmbeds.scalesA || currentEmbeds.scalesB);
  const drawScales = hasScales ? new Float32Array(N) : null;

  for (let i = 0; i < N; i++) {
    const frac = drawFrac(i);
    const ti   = frac * (userTrajectory.length - 1);
    const lo   = Math.floor(ti), hi = Math.min(lo + 1, userTrajectory.length - 1);
    // Never interpolate across a segment boundary — that would traverse the gap
    // between two unconnected strokes and generate frames the user never drew.
    const t    = drawSegmentBoundaries.some(b => lo < b && hi >= b) ? 0 : (ti - lo);
    const px   = userTrajectory[lo][0] + t * (userTrajectory[hi][0] - userTrajectory[lo][0]);
    const py   = userTrajectory[lo][1] + t * (userTrajectory[hi][1] - userTrajectory[lo][1]);

    // Find two nearest points for interpolation
    let d1 = Infinity, d2 = Infinity;
    let src1 = null, idx1 = -1, src2 = null, idx2 = -1;
    if (srcAEnabled) {
      for (let j = 0; j < coordsA.length; j++) {
        const d = (coordsA[j][0] - px) ** 2 + (coordsA[j][1] - py) ** 2;
        if (d < d1) { d2=d1; src2=src1; idx2=idx1; d1=d; src1='A'; idx1=j; }
        else if (d < d2) { d2=d; src2='A'; idx2=j; }
      }
    }
    if (srcBEnabled) {
      for (let j = 0; j < coordsB.length; j++) {
        const d = (coordsB[j][0] - px) ** 2 + (coordsB[j][1] - py) ** 2;
        if (d < d1) { d2=d1; src2=src1; idx2=idx1; d1=d; src1='B'; idx1=j; }
        else if (d < d2) { d2=d; src2='B'; idx2=j; }
      }
    }

    const f1  = getFrame(src1, idx1);
    const f2  = idx2 >= 0 ? getFrame(src2, idx2) : f1;
    const sd1 = Math.sqrt(d1), sd2 = idx2 >= 0 ? Math.sqrt(d2) : 0;
    const sum = sd1 + sd2;
    const w1  = sum > 1e-12 ? sd2 / sum : 1;
    const w2  = 1 - w1;
    for (let d = 0; d < D; d++) blended[d * N + i] = w1 * f1[d] + w2 * f2[d];

    if (drawScales) {
      const getScale = (src, idx) => {
        const arr = src === 'A' ? currentEmbeds.scalesA : currentEmbeds.scalesB;
        return arr ? (arr[idx] || 1.0) : 1.0;
      };
      drawScales[i] = w1 * getScale(src1, idx1)
                    + w2 * (idx2 >= 0 ? getScale(src2, idx2) : getScale(src1, idx1));
    }
  }

  getAudioCtx();
  playJobId = ++jobSeq;
  setStatus(`Decoding ${N} frames (${duration} s)…`);

  decodeTrajectory(blended, D, N, drawScales || null);
}
