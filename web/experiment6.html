// Minimal ZIP builder — STORE method (no compression), no external dependencies.
function buildZip(files) {
  // files: [{ name: string, data: Uint8Array }]
  const enc = new TextEncoder();

  // CRC-32 lookup table
  const crcTab = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    crcTab[i] = c;
  }
  const crc32 = data => {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < data.length; i++) c = crcTab[(c ^ data[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  };

  const localParts = [];  // [{bytes, size}]  — local headers + data
  const cdParts    = [];  // central directory records
  let localOffset  = 0;

  for (const { name, data } of files) {
    const nb   = enc.encode(name);
    const crc  = crc32(data);
    const size = data.length;

    // Local file header (30 + nb.length bytes)
    const lh = new DataView(new ArrayBuffer(30 + nb.length));
    lh.setUint32( 0, 0x04034b50, true);   // local file sig
    lh.setUint16( 4, 20, true);            // version needed
    lh.setUint16( 6, 0,  true);            // flags
    lh.setUint16( 8, 0,  true);            // STORE
    lh.setUint16(10, 0,  true);            // mod time
    lh.setUint16(12, 0,  true);            // mod date
    lh.setUint32(14, crc,  true);          // CRC-32
    lh.setUint32(18, size, true);          // compressed size
    lh.setUint32(22, size, true);          // uncompressed size
    lh.setUint16(26, nb.length, true);     // filename len
    lh.setUint16(28, 0, true);             // extra len
    new Uint8Array(lh.buffer, 30).set(nb);

    // Central directory header (46 + nb.length bytes)
    const cd = new DataView(new ArrayBuffer(46 + nb.length));
    cd.setUint32( 0, 0x02014b50, true);   // central dir sig
    cd.setUint16( 4, 20, true);            // version made by
    cd.setUint16( 6, 20, true);            // version needed
    cd.setUint16( 8, 0,  true);            // flags
    cd.setUint16(10, 0,  true);            // STORE
    cd.setUint16(12, 0,  true);            // mod time
    cd.setUint16(14, 0,  true);            // mod date
    cd.setUint32(16, crc,  true);          // CRC-32
    cd.setUint32(20, size, true);          // compressed size
    cd.setUint32(24, size, true);          // uncompressed size
    cd.setUint16(28, nb.length, true);     // filename len
    cd.setUint16(30, 0, true);             // extra len
    cd.setUint16(32, 0, true);             // comment len
    cd.setUint16(34, 0, true);             // disk number start
    cd.setUint16(36, 0, true);             // internal attr
    cd.setUint32(38, 0, true);             // external attr
    cd.setUint32(42, localOffset, true);   // local header offset
    new Uint8Array(cd.buffer, 46).set(nb);

    const lhBytes = new Uint8Array(lh.buffer);
    localParts.push(lhBytes, data);
    cdParts.push(new Uint8Array(cd.buffer));
    localOffset += lhBytes.length + size;
  }

  const cdSize   = cdParts.reduce((s, p) => s + p.length, 0);
  const cdOffset = localOffset;

  // End of central directory (22 bytes)
  const eocd = new DataView(new ArrayBuffer(22));
  eocd.setUint32( 0, 0x06054b50, true);      // EOCD sig
  eocd.setUint16( 4, 0, true);               // disk number
  eocd.setUint16( 6, 0, true);               // disk with CD
  eocd.setUint16( 8, files.length, true);    // entries on this disk
  eocd.setUint16(10, files.length, true);    // total entries
  eocd.setUint32(12, cdSize,   true);        // central dir size
  eocd.setUint32(16, cdOffset, true);        // central dir offset
  eocd.setUint16(20, 0, true);               // comment len

  const all   = [...localParts, ...cdParts, new Uint8Array(eocd.buffer)];
  const total = all.reduce((s, p) => s + p.length, 0);
  const out   = new Uint8Array(total);
  let pos = 0;
  for (const p of all) { out.set(p, pos); pos += p.length; }
  return out;
}

// Encode Float32Array PCM → 16-bit WAV ArrayBuffer.
// channels = 2: f32 is planar stereo (L plane, R plane) — interleaved on write.
function encodeWav(f32, sr, channels = 1) {
  const T       = f32.length / channels;
  const dataLen = T * channels * 2;
  const buf = new ArrayBuffer(44 + dataLen);
  const v   = new DataView(buf);
  const u32 = (o, n) => v.setUint32(o, n, true);
  const u16 = (o, n) => v.setUint16(o, n, true);
  const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); u32(4, 36 + dataLen); str(8, 'WAVE');
  str(12, 'fmt '); u32(16, 16); u16(20, 1); u16(22, channels);
  u32(24, sr); u32(28, sr * channels * 2); u16(32, channels * 2); u16(34, 16);
  str(36, 'data'); u32(40, dataLen);
  let o = 44;
  for (let i = 0; i < T; i++)
    for (let c = 0; c < channels; c++) {
      const s = Math.max(-1, Math.min(1, f32[c * T + i]));
      v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      o += 2;
    }
  return buf;
}

function downloadWav(pcm, sr, filename, channels = 1) {
  const blob = new Blob([encodeWav(pcm, sr, channels)], { type: 'audio/wav' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename + '.wav'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// Build a descriptive base filename for the current generation state.
function makeBookmarkName() {
  const mode = pathMode === 'snap' ? 'snap' : pathMode === 'code' ? 'code' : 'draw';
  const dir  = trajDir === 'forward' ? 'fwd' : trajDir === 'backward' ? 'bwd' : 'ping';

  let wpTag = '';
  if (genPlaySeq && genPlaySeq.length > 0) {
    // Collect the first frame of each waypoint group (_wp transitions).
    const wps = [];
    let last = undefined;
    for (const f of genPlaySeq) {
      if (f._wp !== undefined && f._wp !== last) { last = f._wp; wps.push(f); }
    }
    if (wps.length > 0) {
      const parts = wps.slice(0, 4).map(f => `${f.src}${f.idx}`);
      if (wps.length > 4) parts.push('…');
      wpTag = '_' + parts.join('-');
    }
  }

  const now = new Date();
  const hh  = String(now.getHours()).padStart(2, '0');
  const mm  = String(now.getMinutes()).padStart(2, '0');
  const ss  = String(now.getSeconds()).padStart(2, '0');
  bookmarkSeq++;
  return `${mode}_${dir}${wpTag}_${String(bookmarkSeq).padStart(3, '0')}_${hh}${mm}${ss}`;
}

function renderBookmarkList() {
  const list    = document.getElementById('libList');
  const empty   = document.getElementById('libEmpty');
  const count   = document.getElementById('libCount');
  const dlAll   = document.getElementById('libDownloadAll');
  count.textContent = `(${bookmarks.length})`;
  dlAll.disabled    = bookmarks.length === 0;
  empty.style.display = bookmarks.length === 0 ? '' : 'none';
  list.innerHTML = '';
  for (const bm of bookmarks) {
    const row = document.createElement('div');
    row.className = 'lib-item';
    row.dataset.id = bm.id;

    const nameEl = document.createElement('input');
    nameEl.className = 'lib-name';
    nameEl.type  = 'text';
    nameEl.value = bm.name;
    nameEl.title = bm.name;
    nameEl.addEventListener('change', () => { bm.name = nameEl.value.trim() || bm.name; });

    const dlBtn = document.createElement('button');
    dlBtn.className = 'lib-btn';
    dlBtn.title = 'Download';
    dlBtn.textContent = '↓';
    dlBtn.addEventListener('click', () => downloadWav(bm.pcm, bm.sr, bm.name, bm.ch ?? 1));

    const delBtn = document.createElement('button');
    delBtn.className = 'lib-btn lib-del';
    delBtn.title = 'Delete';
    delBtn.textContent = '✕';

    row.appendChild(dlBtn);
    row.appendChild(delBtn);
    list.appendChild(row);
  }
}

// Render PCM through the notch filter chain offline (mirrors the live audio graph).
// Returns a new Float32Array with the filter applied, or the original if disabled.
// channels = 2: pcm is planar stereo — filtered as a real stereo buffer.
async function applyNotchOffline(pcm, sr, channels = 1) {
  if (!postProcEnabled) return pcm;
  const maxFreq = sr / 2 - 1;
  const freqs = [];
  for (let h = 1; h * notchFundamental <= maxFreq; h++) freqs.push(h * notchFundamental);
  if (freqs.length === 0) return pcm;

  const T      = pcm.length / channels;
  const offCtx = new OfflineAudioContext(channels, T, sr);
  const buf    = offCtx.createBuffer(channels, T, sr);
  for (let c = 0; c < channels; c++) buf.copyToChannel(pcm.subarray(c * T, (c + 1) * T), c);
  const src = offCtx.createBufferSource();
  src.buffer = buf;

  let prev = src;
  for (const freq of freqs) {
    const f = offCtx.createBiquadFilter();
    f.type = 'notch';
    f.frequency.value = freq;
    f.Q.value = notchQ;
    prev.connect(f);
    prev = f;
  }
  prev.connect(offCtx.destination);
  src.start(0);

  const rendered = await offCtx.startRendering();
  if (channels === 1) return rendered.getChannelData(0);
  const out = new Float32Array(channels * T);
  for (let c = 0; c < channels; c++) out.set(rendered.getChannelData(c), c * T);
  return out;
}

async function addBookmark() {
  if (!lastRawPcm) return;
  // Disable button while rendering to prevent double-clicks
  const btn = document.getElementById('wbBookmark');
  btn.style.opacity = '0.5';
  btn.style.cursor  = 'default';

  let pcm = applyGenFade(lastRawPcm, lastRawPcmSr, lastRawPcmCh);
  pcm = await applyNotchOffline(pcm, lastRawPcmSr, lastRawPcmCh);

  const name = makeBookmarkName();
  bookmarks.push({ id: bookmarkSeq, name, pcm, sr: lastRawPcmSr, ch: lastRawPcmCh });
  renderBookmarkList();
  // Brief visual flash on the button to confirm
  btn.style.color = 'var(--accent)';
  setTimeout(() => { btn.style.color = ''; updateBookmarkBtn(); }, 600);
}

function updateBookmarkBtn() {
  const btn = document.getElementById('wbBookmark');
  if (!btn) return;
  const has = !!lastRawPcm;
  btn.style.opacity = has ? '1' : '0.35';
  btn.style.cursor  = has ? 'pointer' : 'default';
}

async function onWorkerMsg(e) {
  const msg = e.data;

  if (msg.type === 'frame_audio_exp6') {
    if (msg.jobId === playJobId && audioCtx) {
      const ch  = msg.channels ?? 1;
      const T   = msg.decoded.length / ch;
      const buf = audioCtx.createBuffer(ch, T, mp.getSampleRate());
      for (let c = 0; c < ch; c++) buf.copyToChannel(msg.decoded.subarray(c * T, (c + 1) * T), c);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(getMasterDest());
      src.start();
      setStatus(`Playing frame ${selectedPoint?.idx} (${selectedPoint?.src})…`);
    }
    return;
  }

  if (msg.type === 'trajectory_audio_exp6') {
    onTrajectoryDecoded(msg.decoded, msg.channels ?? 1, msg.jobId);
    return;
  }

  if (msg.jobId !== undefined && msg.jobId !== activeJobId) return;

  if (msg.type === 'progress') {
    progBar.style.width = Math.round((msg.value ?? 0) * 100) + '%';
    if (msg.status) setStatus(msg.status);

  } else if (msg.type === 'result') {
    if (encodePhase === 'A') {
      startEncodeB();
    } else if (encodePhase === 'B') {
      encodePhase = null;
      progBar.style.width = '100%';
      setStatus('Fetching embeddings…');
      worker.postMessage({ type: 'get_embeddings_exp6', jobId: activeJobId });
    }

  } else if (msg.type === 'embeddings_exp6') {
    if (preVQPending) {
      // ── Pre-VQ re-encode complete — patch embEnc into existing currentEmbeds ──
      // Codes, embQuant, scales stay as-is (from cache); only embEnc was missing.
      preVQPending = false;
      currentEmbeds.embEncA    = msg.embEncA;
      currentEmbeds.embEncDimsA = msg.embEncDimsA;
      currentEmbeds.embEncB    = msg.embEncB;
      currentEmbeds.embEncDimsB = msg.embEncDimsB;
      progWrap.style.display = 'none';
      setStatus('Pre-VQ embeddings ready');
      // Now complete the tab switch — embEncA is populated so setUmapSpace won't
      // loop back into the confirmation dialog.
      setUmapSpace('pre_vq');
      return;
    }

    // Merge cache-resolved source(s) (whose real encode was skipped) with the
    // freshly-encoded one(s). reconstructEmbQuant rebuilds embQuant from codes.
    const jobAtMsg = activeJobId;
    const rA = pendingResolvedA, rB = pendingResolvedB;
    pendingResolvedA = pendingResolvedB = null;

    let embeds = msg;
    if (rA || rB) {
      const cb = await ensureCodebooks();
      if (activeJobId !== jobAtMsg) return;   // superseded during the await
      const pick = (res, codes, codesDims, embQuant, embQuantDims, scales) => res
        ? { codes: res.codes, codesDims: res.codesDims,
            embQuant: reconstructEmbQuant(cb, res.codes, res.codesDims),
            embQuantDims: [1, cb.dim, res.codesDims[res.codesDims.length - 1]],
            scales: res.scales }
        : { codes, codesDims, embQuant, embQuantDims, scales };
      const A = pick(rA, msg.codesA, msg.codesDimsA, msg.embQuantA, msg.embQuantDimsA, msg.scalesA);
      const B = pick(rB, msg.codesB, msg.codesDimsB, msg.embQuantB, msg.embQuantDimsB, msg.scalesB);
      embeds = {
        type: 'embeddings_exp6',
        embEncA: rA ? null : msg.embEncA, embEncDimsA: rA ? null : msg.embEncDimsA,
        embEncB: rB ? null : msg.embEncB, embEncDimsB: rB ? null : msg.embEncDimsB,
        embQuantA: A.embQuant, embQuantDimsA: A.embQuantDims, codesA: A.codes, codesDimsA: A.codesDims, scalesA: A.scales,
        embQuantB: B.embQuant, embQuantDimsB: B.embQuantDims, codesB: B.codes, codesDimsB: B.codesDims, scalesB: B.scales,
      };
    }

    currentEmbeds = embeds;
    populateLevelSelect(embeds.codesDimsA[1]);
    progWrap.style.display = 'none';
    markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');

    // ── Save SNAC code cache for folder sources (best-effort) ──────────────────
    if (msg.rawLevelsA && (pendingSnacCacheA || pendingSnacCacheB)) {
      const pA = pendingSnacCacheA, pB = pendingSnacCacheB;
      const rawA = msg.rawLevelsA, rawB = msg.rawLevelsB;
      const fr = msg.frameRate, vqs = msg.vqStrides;
      pendingSnacCacheA = pendingSnacCacheB = null;
      (async () => {
        const { serializeSnacCache } = await import('./lib/snac-sidecar.js');
        let wrote = 0;
        for (const [p, raw] of [[pA, rawA], [pB, rawB]]) {
          if (!p) continue;
          try {
            const buf = serializeSnacCache(
              { model: p.model, crc32: p.crc, sampleRate: p.sampleRate, frameRate: fr, vqStrides: vqs }, raw);
            await writeSnacCache(p.dir, p.model, p.crc, buf);
            wrote++;
          } catch (e) { console.warn('SNAC cache not written:', e.message); }
        }
        if (wrote) setStatus(`SNAC codes cached ✓ (${wrote} folder${wrote > 1 ? 's' : ''})`);
      })();
    }

    // ── Save folder code sidecars next to each wav (best-effort) ───────────────
    if (pendingSidecarA || pendingSidecarB) {
      const sA = pendingSidecarA, sB = pendingSidecarB;
      pendingSidecarA = pendingSidecarB = null;
      // Serialise A then B: when both sources are the SAME folder they target the
      // same sidecar files, so a concurrent read-merge-write would lose one window.
      (async () => {
        const rA = sA ? await writeFolderSidecars(sA.panel, sA.audio, sA.modelOpts, msg.codesA, msg.codesDimsA, msg.scalesA ?? null) : null;
        const rB = sB ? await writeFolderSidecars(sB.panel, sB.audio, sB.modelOpts, msg.codesB, msg.codesDimsB, msg.scalesB ?? null) : null;
        return [rA, rB];
      })().then(results => {
        const ok     = results.filter(r => r && r.ok);
        const failed = results.filter(r => r && !r.ok);
        const wrote  = ok.reduce((a, r) => a + r.count, 0);
        if (wrote) setStatus(`Codes saved next to wavs ✓ (${wrote} .encodec files)`);
        else if (failed.length) setStatus('Codes not saved: ' + failed[0].reason, true);
        if (failed.length) console.warn('Sidecar not written:', failed.map(r => r.reason));
        // Persistent popup, shown once per distinct outcome (the status bar flashes by).
        const key = wrote ? `ok:${wrote}` : (failed.length ? `err:${failed[0].reason}` : null);
        if (key && key !== lastSidecarNoticeKey) {
          lastSidecarNoticeKey = key;
          if (wrote)
            showNotice('📁 Codes saved',
              `Wrote <b>${wrote}</b> <code>.encodec</code> file(s) next to your wavs. ` +
              `Re-loading the same folder with the same model will skip encoding.`);
          // On browsers that can't save at all, the upfront "needs Chrome/Edge"
          // notice already explained it — don't pop a second time after every encode.
          else if (FS_ACCESS_OK)
            showNotice('📁 Codes not saved', failed[0].reason, true);
        }
      }).catch(e => console.warn('Sidecar save failed:', e));
    }

  } else if (msg.type === 'error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── Encode ────────────────────────────────────────────────────────────────────

/** Returns the actual loaded duration (s) for the given source, or falls back to
 *  the duration-input value if that source hasn't been loaded yet. */
function srcDuration(src) {
  if (src === 'A') return durA ?? srcWidget.getDuration();
  return durB ?? srcWidget.getDuration();
}

function scheduleEncode(delay = 0) {
  clearTimeout(encodeTimer);
  encodeTimer = setTimeout(startEncode, delay);
}

/** Cancel any in-flight UMAP / PCA work.
 *  - Bumps umapSessionId so stale buildUMAPFeatureData() completions are ignored.
 *  - Clears umapFeatureData so the slot-chain can't re-launch on old data.
 *  - Terminates + recreates the projection worker so its CPU work stops immediately. */
function cancelProjection() {
  umapSessionId++;
  umapFeatureData = null;
  initUMAPWorker();
}

// ── Parallel 48k encode (stateless) ─────────────────────────────────────────────
// In stateless mode the 1 s OLA segments are independent, so they encode
// concurrently across a pool of workers. Output is bit-identical to the
// sequential stateless path (same chunks, zero state each).

let encPool          = null;            // { slots: [{ w, onResult }] }
let encodeBatchPromise = Promise.resolve();  // serialises pool batches (no overlap → no stale-slot reuse)

function ensureEncPool() {
  if (encPool) return encPool;
  const K = Math.max(2, Math.min(navigator.hardwareConcurrency || 4, 6));
  const slots = [];
  for (let i = 0; i < K; i++) {
    const w = new Worker('encodec-worker.js?pool=' + i + '_' + Date.now());
    w.postMessage({ type: 'init', modelsBaseUrl: MODELS_BASE });
    const slot = { w, onResult: null };
    w.onmessage = (e) => {
      const m = e.data;
      if (m.type === 'segment_cap'     || m.type === 'segment_error' ||
          m.type === 'decoded_segment' || m.type === 'decode_error') {
        const cb = slot.onResult; slot.onResult = null; if (cb) cb(m);
      }
    };
    slots.push(slot);
  }
  encPool = { slots };
  return encPool;
}

function destroyEncPool() {
  if (!encPool) return;
  for (const s of encPool.slots) s.w.terminate();
  encPool = null;
}

// Slice planar audio into the exact same 1 s chunks as encodeAndCapture48k.
function sliceSegments48k(audio, channels) {
  const totalLen = audio.length / channels;
  const numSegs  = Math.ceil(totalLen / STRIDE_48_M);
  const segs = [];
  for (let s = 0; s < numSegs; s++) {
    const offset          = s * STRIDE_48_M;
    const leftGuard       = Math.min(offset, GUARD_48_M);
    const leftGuardFrames = leftGuard / HOP_48_M;
    const extLen = leftGuard + SEG_48_M;
    const chunk  = new Float32Array(channels * extLen);
    for (let ch = 0; ch < channels; ch++) {
      const srcOff = ch * totalLen + offset - leftGuard;
      const n      = Math.min(extLen, totalLen - (offset - leftGuard));
      chunk.set(audio.subarray(srcOff, srcOff + n), ch * extLen);
    }
    const validEnd = Math.min(offset + SEG_48_M, totalLen);
    segs.push({ segIdx: s, chunk, leftGuardFrames, channels, offset, validEnd });
  }
  return { segs, totalLen };
}

// Run all jobs across the pool; resolves with caps in job order, rejects on error.
function doParallelBatch(jobs, onProgress) {
  const { slots } = ensureEncPool();
  const results = new Array(jobs.length);
  let next = 0, done = 0, settled = false;
  return new Promise((resolve, reject) => {
    const pump = (slot) => {
      if (settled || next >= jobs.length) return;
      const idx = next++;
      const job = jobs[idx];
      slot.onResult = (m) => {
        if (settled) return;
        if (m.type === 'segment_error') { settled = true; reject(new Error(m.message)); return; }
        results[idx] = { source: m.source, segIdx: m.segIdx, cap: m.cap, offset: m.offset, validEnd: m.validEnd };
        done++;
        onProgress && onProgress(done, jobs.length);
        if (done === jobs.length) { settled = true; resolve(results); }
        else pump(slot);
      };
      slot.w.postMessage({ type: 'encode_segment', ...job }, [job.chunk.buffer]);
    };
    slots.forEach(pump);
  });
}

// Inject reassembled captures into the primary worker; resolves on ack.
function setCapturesOnPrimary(source, captures) {
  return new Promise((resolve) => {
    const jid = ++jobSeq;
    const h = (e) => { if (e.data.type === 'captures_set' && e.data.jobId === jid) { worker.removeEventListener('message', h); resolve(); } };
    worker.addEventListener('message', h);
    worker.postMessage({ type: 'set_captures', jobId: jid, source, captures });
  });
}

async function runParallelEncode48k(audioA, audioB, channels, myRun) {
  const stale   = () => myRun !== encodeRunSeq;
  const modelHz = '48k', bwKbps = mp.getBwKbps();

  const A = sliceSegments48k(audioA, channels);
  const B = sliceSegments48k(audioB, channels);
  const jobs = [
    ...A.segs.map(s => ({ ...s, source: 'A', modelHz, bwKbps })),
    ...B.segs.map(s => ({ ...s, source: 'B', modelHz, bwKbps })),
  ];

  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  setStatus(`Encoding ${jobs.length} segments in parallel…`);

  // Serialise: never overlap two batches on the pool.
  const prev = encodeBatchPromise;
  let release;
  encodeBatchPromise = new Promise(r => { release = r; });
  try {
    try { await prev; } catch (_) {}
    if (stale()) return;

    let caps;
    try {
      caps = await doParallelBatch(jobs, (d, t) => {
        if (!stale()) { progBar.style.width = Math.round(d / t * 100) + '%'; setStatus(`Encoding ${d}/${t} segments…`); }
      });
    } catch (err) {
      destroyEncPool();   // a failed segment may leave workers busy — rebuild clean
      if (!stale()) setStatus('Parallel encode failed: ' + err.message, true);
      return;
    }
    if (stale()) return;

    const build = (src, totalLen) => ({
      mode: 'ola48', totalLen,
      segments: caps.filter(c => c.source === src).sort((a, b) => a.segIdx - b.segIdx)
                    .map(c => ({ cap: c.cap, offset: c.offset, validEnd: c.validEnd })),
    });
    const capturesA = build('A', A.totalLen);
    const capturesB = build('B', B.totalLen);

    if (!worker) initWorker();
    await setCapturesOnPrimary('A', capturesA);
    await setCapturesOnPrimary('B', capturesB);
    if (stale()) return;

    activeJobId = ++jobSeq;
    encodePhase = null;
    progBar.style.width = '100%';
    setStatus('Fetching embeddings…');
    worker.postMessage({ type: 'get_embeddings_exp6', jobId: activeJobId });
  } finally {
    release();
  }
}

// ── Parallel 48k decode (stateless) ─────────────────────────────────────────────
// Generation/trajectory decode mirrors the parallel encode: in stateless 48k the
// 1 s OLA chunks are independent, so they decode concurrently across the pool and
// the main thread OLA-blends the results (same triangular window + scale envelope
// as the sequential worker decode). Stateful 48k / 24k still use the primary worker.

// Query the 48k decoder scale tensor shape from the primary worker (cached caps).
function getDecodeScale() {
  return new Promise((resolve) => {
    const jid = ++jobSeq;
    const h = (e) => {
      if (e.data.type === 'decode_scale' && e.data.jobId === jid) {
        worker.removeEventListener('message', h);
        resolve({ scale: e.data.scale, scaleDims: e.data.scaleDims });
      }
    };
    worker.addEventListener('message', h);
    worker.postMessage({ type: 'get_decode_scale', jobId: jid });
  });
}

// Stream decode chunks across the pool in the given job order, calling
// onChunk(result) as each lands. Resolves when all complete (always drains every
// dispatched job so the shared pool lock never releases with workers still busy).
function doPoolDecodeStreaming(jobs, onChunk) {
  const { slots } = ensureEncPool();
  let next = 0, done = 0, settled = false;
  return new Promise((resolve, reject) => {
    const pump = (slot) => {
      if (settled || next >= jobs.length) return;
      const job = jobs[next++];
      slot.onResult = (m) => {
        if (settled) return;
        if (m.type === 'decode_error') { settled = true; reject(new Error(m.message)); return; }
        try { onChunk(m); } catch (_) {}
        done++;
        if (done === jobs.length) { settled = true; resolve(); }
        else pump(slot);
      };
      slot.w.postMessage({ type: 'decode_segment', ...job }, [job.embChunk.buffer]);
    };
    slots.forEach(pump);
  });
}

// Decode a whole trajectory (embQuant [1,D,N]) by fanning its 1 s chunks across
// the pool, then OLA-blend to planar stereo once all are in. Parallel decode is
// fast enough that the full generation is ready almost immediately — no need to
// stream/schedule chunks. Returns the decoded Float32Array, or null if superseded.
async function runParallelDecode48k(embQuant, D, N, frameScales, isCurrent) {
  const modelHz = '48k', bwKbps = mp.getBwKbps();
  const CHUNK_F  = SEG_48_M / HOP_48_M;     // 150 frames per chunk
  const STRIDE_F = STRIDE_48_M / HOP_48_M;  // 135 frames per stride (10% overlap)

  const { scale: refScale, scaleDims } = await getDecodeScale();
  if (!isCurrent()) return null;
  // With frameScales, decode at unit scale and apply the gain envelope after OLA
  // (matches the sequential decoder); otherwise use the real per-segment scale.
  const decodeScale = frameScales ? new Float32Array(refScale.length).fill(1.0) : refScale;

  const numChunks    = Math.ceil(N / STRIDE_F);
  const totalSamples = N * HOP_48_M;
  const outBuf = new Float32Array(2 * totalSamples);  // OLA accumulator
  const wgtBuf = new Float32Array(totalSamples);

  const jobs = [];
  for (let seg = 0; seg < numChunks; seg++) {
    const tStart  = seg * STRIDE_F;
    const tEnd    = Math.min(tStart + CHUNK_F, N);
    const chunk_T = tEnd - tStart;
    const embChunk = new Float32Array(D * chunk_T);
    for (let d = 0; d < D; d++)
      for (let i = 0; i < chunk_T; i++)
        embChunk[d * chunk_T + i] = embQuant[d * N + tStart + i];
    jobs.push({ idx: seg, embChunk, embDims: [1, D, chunk_T],
                scale: decodeScale, scaleDims, modelHz, bwKbps, tStart, chunk_T });
  }

  // OLA-accumulate each chunk as it lands (planar L|R, channel-independent window).
  const onChunk = (m) => {
    const numSamples = m.chunk_T * HOP_48_M, off = m.tStart * HOP_48_M, a = m.audio;
    for (let i = 0; i < numSamples; i++) {
      const w = TRI_WIN_48_M[i];
      outBuf[off + i]                += w * a[i];
      outBuf[totalSamples + off + i] += w * a[numSamples + i];
      wgtBuf[off + i]                += w;
    }
  };

  // Serialise on the shared pool lock (never overlap encode/decode batches).
  const prev = encodeBatchPromise;
  let release;
  encodeBatchPromise = new Promise(r => { release = r; });
  try {
    try { await prev; } catch (_) {}
    if (!isCurrent()) return null;
    setStatus(`Decoding ${numChunks} chunks in parallel…`);
    await doPoolDecodeStreaming(jobs, onChunk);
  } catch (err) {
    destroyEncPool();   // a failed chunk may leave workers busy — rebuild clean
    if (isCurrent()) setStatus('Parallel decode failed: ' + err.message, true);
    return null;
  } finally { release(); }
  if (!isCurrent()) return null;

  for (let i = 0; i < totalSamples; i++) {
    if (wgtBuf[i] > 0) { outBuf[i] /= wgtBuf[i]; outBuf[totalSamples + i] /= wgtBuf[i]; }
  }
  // Per-sample gain envelope from the per-frame scales (linear interp).
  if (frameScales) {
    for (let s = 0; s < totalSamples; s++) {
      const t  = s / HOP_48_M;
      const t0 = Math.min(N - 1, Math.floor(t));
      const t1 = Math.min(N - 1, t0 + 1);
      const g  = frameScales[t0] * (1 - (t - t0)) + frameScales[t1] * (t - t0);
      outBuf[s]                *= g;
      outBuf[totalSamples + s] *= g;
    }
  }
  return outBuf;
}

// Hand a decoded trajectory to the Generated player. Shared by the parallel path
// and the primary-worker `trajectory_audio_exp6` message.
function onTrajectoryDecoded(decoded, channels, jobId) {
  if (jobId !== playJobId) return;
  const sr = mp.getSampleRate();
  lastRawPcm = decoded; lastRawPcmSr = sr; lastRawPcmCh = channels;
  stopTrajPlayback();
  playerG.setAudio(applyGenFade(decoded, sr, channels), sr, makeGenColorFn(), channels);
  updateBookmarkBtn();
  setStatus('');
}

// Decode dispatcher: stateless 48k fans out across the pool; everything else
// (stateful 48k, 24k) goes to the primary worker. playJobId is set by the caller.
function decodeTrajectory(embQuant, D, N, frameScales) {
  const modelHz = mp.getModelHz();
  const myJobId = playJobId;

  // SNAC: decode the trajectory in parallel across the pool (much faster for the
  // heavy 32k/44k decoder). Falls back to the primary worker if no pool exists.
  if (mp.getCodec() === 'snac' && snacPool && snacPool.length) {
    decodeTrajectorySnacParallel(embQuant, D, N, mp.getSnacModel(), snacPool)
      .then(audio => { if (playJobId === myJobId) onTrajectoryDecoded(audio, 1, myJobId); })
      .catch(e => { if (playJobId === myJobId) setStatus('Decode failed: ' + e.message, true); });
    return;
  }
  if (modelHz === '48k' && !statefulOla) {
    runParallelDecode48k(embQuant, D, N, frameScales, () => playJobId === myJobId)
      .then(decoded => { if (decoded) onTrajectoryDecoded(decoded, 2, myJobId); })
      .catch(e => { if (playJobId === myJobId) setStatus('Decode failed: ' + e.message, true); });
  } else {
    const xfers = [embQuant.buffer];
    if (frameScales) xfers.push(frameScales.buffer);
    worker.postMessage({
      type: 'decode_trajectory_exp6', jobId: myJobId,
      embQuant, dims: [1, D, N], frameScales: frameScales || undefined,
      modelHz, bwKbps: mp.getBwKbps(), model: mp.getSnacModel(),
    }, xfers);
  }
}

// ── Folder code sidecars ────────────────────────────────────────────────────
// A folder source's codes are the concatenation of its clips. We store one
// sidecar per clip (next to its wav: <clip>.encodec.<hz>.<bw>) holding codes for
// the deterministic window selected. On reload, if every clip's current window is
// present we assemble the joined codes and skip encoding. Windows are sliced from
// the concat encode; near clip seams codes reflect neighbour context, which is
// reproduced exactly as long as the folder/strategy/model are unchanged.

// Frame boundaries [0, …, T] for a folder's clips, mapped from per-channel clip
// start samples (proportional — robust to the exact hop/OLA geometry).
function clipFrameBounds(clipStarts, totalSamplesPerCh, T) {
  const fb = clipStarts.map(s => Math.min(T, Math.max(0, Math.round(s / totalSamplesPerCh * T))));
  fb.push(T);
  return fb;
}

// Slice [f0,f1) frames out of a [1,K,T] codes array (+ optional [T] scales).
function sliceClipCodes(codes, codesDims, scales, f0, f1) {
  const K = codesDims[1], T = codesDims[2], t = f1 - f0;
  const out = new Int32Array(K * t);
  for (let k = 0; k < K; k++) out.set(codes.subarray(k * T + f0, k * T + f1), k * t);
  return { codes: out, codesDims: [1, K, t], scales: scales ? scales.subarray(f0, f1).slice() : null };
}

// Join per-clip codes (each [1,K,t_i], same K) into one [1,K,ΣT] array.
function joinClipCodes(clips) {
  const K = clips[0].codesDims[1];
  const T = clips.reduce((a, c) => a + c.codesDims[2], 0);
  const codes = new Int32Array(K * T);
  const scales = clips.every(c => c.scales) ? new Float32Array(T) : null;
  let off = 0;
  for (const c of clips) {
    const t = c.codesDims[2];
    for (let k = 0; k < K; k++) codes.set(c.codes.subarray(k * t, (k + 1) * t), k * T + off);
    if (scales) scales.set(c.scales, off);
    off += t;
  }
  return { codes, codesDims: [1, K, T], scales };
}

// Assemble a folder source's codes from disk if every clip window is cached in a
// valid sidecar; else null. Read-only.
async function readFolderSidecars(panel, audio, modelOpts) {
  const dir  = panel.getDirHandle?.();
  const sels = audio.folderSelections;
  if (!dir || !sels || !sels.length) return null;
  if (!(await ensureRWPermission(dir))) return null;
  const { modelHz, bwKbps, sampleRate, channels, ola } = modelOpts;
  const byFile = new Map();   // File → parsed sidecar | null (read once)
  const clips  = [];
  for (const sel of sels) {
    if (!byFile.has(sel.file)) {
      let parsed = await readSidecar(dir, sel.file.name, modelHz, bwKbps);
      const crc  = await crc32FromFile(sel.file);
      if (parsed && !sidecarMatches(parsed.header,
            { fileSize: sel.file.size, crc32: crc, modelHz, bwKbps, sampleRate, channels, ola })) parsed = null;
      byFile.set(sel.file, parsed);
    }
    const parsed = byFile.get(sel.file);
    const entry  = parsed && parsed.entries.get(windowKey(sel.startS, sel.lenS));
    if (!entry) return null;
    clips.push(entry);
  }
  return joinClipCodes(clips);
}

// Slice the just-encoded concat codes per clip and merge into each clip's sidecar
// (preserving previously cached windows). Best-effort; failures are non-fatal.
// Returns { ok, reason?, count? }. Best-effort: per-file write errors are logged
// but don't abort the rest.
async function writeFolderSidecars(panel, audio, modelOpts, codes, codesDims, scales) {
  const dir  = panel.getDirHandle?.();
  const sels = audio.folderSelections;
  if (!sels || !sels.length || !audio.clipStarts) return { ok: false, reason: 'not a folder source' };
  if (!dir) return { ok: false, reason: 'no writable folder — pick the folder with “choose folder…” in Chrome/Edge (Firefox/Safari can’t write)' };
  if (!(await ensureRWPermission(dir))) return { ok: false, reason: 'write permission for the folder was not granted' };
  const { modelHz, bwKbps, sampleRate, channels, ola } = modelOpts;
  const fb = clipFrameBounds(audio.clipStarts, audio.length / channels, codesDims[2]);
  const perFile = new Map();  // File → { crc, slices: Map<key, slice> }
  for (let i = 0; i < sels.length; i++) {
    const sel = sels[i];
    if (!perFile.has(sel.file)) perFile.set(sel.file, { crc: await crc32FromFile(sel.file), slices: new Map() });
    perFile.get(sel.file).slices.set(windowKey(sel.startS, sel.lenS),
      sliceClipCodes(codes, codesDims, scales, fb[i], fb[i + 1]));
  }
  let count = 0;
  for (const [file, g] of perFile) {
    try {
      const meta = { filename: file.name, fileSize: file.size, crc32: g.crc,
                     modelHz, bwKbps, sampleRate, channels, ola };
      const existing = await readSidecar(dir, file.name, modelHz, bwKbps);
      const merged = new Map();
      if (existing && sidecarMatches(existing.header, meta))
        for (const [k, v] of existing.entries) merged.set(k, v);
      for (const [k, v] of g.slices) merged.set(k, v);
      await writeSidecar(dir, file.name, modelHz, bwKbps, serializeSidecar(meta, merged));
      count++;
    } catch (e) { console.warn('sidecar write failed for', file.name, e); }
  }
  return count ? { ok: true, count } : { ok: false, reason: 'all file writes failed (see console)' };
}

// ── Whole-file folder encoding (48k) ──────────────────────────────────────────
// "Encode each clip in full, then sample windows by slicing codes." A clip's full
// codes are encoded once (cached on disk as the `0-full` sidecar entry and in
// memory), so re-sampling a window, the same folder in A vs B, or a reload all
// become free code-slices instead of re-encodes.

const _fullCodesCache = new Map();  // `${name}:${size}:${hz}:${bw}:${ola}` → {codes,codesDims,scales}

// Serialise a pool batch on the shared lock (never overlap encode/decode batches).
async function withPoolLock(fn) {
  const prev = encodeBatchPromise;
  let release;
  encodeBatchPromise = new Promise(r => { release = r; });
  try { try { await prev; } catch (_) {} return await fn(); }
  finally { release(); }
}

// Reassemble a clip's full codes + scales from its per-segment encode captures
// (main-thread mirror of the worker's flattenCaps/flattenScales — codes only;
// embQuant is reconstructed from codes downstream).
function reassembleClipCodes(segResults) {
  const segs = segResults.slice().sort((a, b) => a.segIdx - b.segIdx);
  const keep = segs.map(s => {
    const T = Number(s.cap.codesDims[2]);
    return Math.min(T, Math.max(0, Math.round((s.validEnd - s.offset) / HOP_48_M)));
  });
  const K = Number(segs[0].cap.codesDims[1]);
  const totalT = keep.reduce((a, b) => a + b, 0);
  const codes  = new Int32Array(K * totalT);
  const scales = segs[0].cap.scale ? new Float32Array(totalT) : null;
  let tOff = 0;
  for (let ci = 0; ci < segs.length; ci++) {
    const cap = segs[ci].cap, T_i = Number(cap.codesDims[2]), n = keep[ci];
    const big = cap.codesType === 'int64', cc = cap.codes;
    for (let k = 0; k < K; k++)
      for (let t = 0; t < n; t++)
        codes[k * totalT + tOff + t] = big ? Number(cc[k * T_i + t]) : cc[k * T_i + t];
    if (scales) scales.fill(cap.scale[0], tOff, tOff + n);
    tOff += n;
  }
  return { codes, codesDims: [1, K, totalT], scales };
}

// Encode ONE clip's full audio → its full code sequence (48k OLA via the pool).
async function encodeClipFullCodes(file, sr, channels, modelHz, bwKbps) {
  const audio = await loadFile(file, sr, Infinity, channels);   // whole clip
  const { segs } = sliceSegments48k(audio, channels);
  const jobs = segs.map(s => ({ ...s, source: 'C', modelHz, bwKbps }));
  const caps = await withPoolLock(() => doParallelBatch(jobs));
  return reassembleClipCodes(caps);
}

// Get a clip's full codes: in-memory cache → `0-full` sidecar → encode (+ cache both).
async function getClipFullCodes(file, modelOpts, dir) {
  const { modelHz, bwKbps, sampleRate, channels, ola } = modelOpts;
  const key = `${file.name}:${file.size}:${modelHz}:${bwKbps}:${ola}`;
  if (_fullCodesCache.has(key)) return _fullCodesCache.get(key);

  const FULL     = windowKey(0, Infinity);          // "0-full"
  const canWrite = dir && await ensureRWPermission(dir);
  const meta = { filename: file.name, fileSize: file.size, crc32: 0,
                 modelHz, bwKbps, sampleRate, channels, ola };

  let full = null;
  if (canWrite) {
    const parsed = await readSidecar(dir, file.name, modelHz, bwKbps);
    if (parsed) {
      meta.crc32 = await crc32FromFile(file);
      if (sidecarMatches(parsed.header, meta)) full = parsed.entries.get(FULL) || null;
    }
  }
  if (!full) {
    full = await encodeClipFullCodes(file, sampleRate, channels, modelHz, bwKbps);
    if (canWrite) {
      try {
        if (!meta.crc32) meta.crc32 = await crc32FromFile(file);
        const existing = await readSidecar(dir, file.name, modelHz, bwKbps);
        const merged = new Map();
        if (existing && sidecarMatches(existing.header, meta))
          for (const [k, v] of existing.entries) merged.set(k, v);
        merged.set(FULL, full);
        await writeSidecar(dir, file.name, modelHz, bwKbps, serializeSidecar(meta, merged));
      } catch (e) { console.warn('full-codes sidecar write failed for', file.name, e); }
    }
  }
  _fullCodesCache.set(key, full);
  return full;
}

// 48k folder source: encode each clip in full (cached), then sample each clip's
// selected window by slicing its full codes. Returns {codes,codesDims,scales}|null.
async function encodeFolderSampledCodes(panel, audio, modelOpts, isCurrent) {
  const sels = audio.folderSelections;
  if (!sels || !sels.length) return null;
  const fps = modelOpts.sampleRate / HOP_48_M;   // 150 at 48k
  const dir = panel.getDirHandle?.();

  // 1. Full codes per distinct clip (cached or encoded), with progress.
  const distinct = [...new Set(sels.map(s => s.file))];
  const fullByFile = new Map();
  for (let i = 0; i < distinct.length; i++) {
    if (isCurrent && !isCurrent()) return null;
    setStatus(`Encoding clip ${i + 1}/${distinct.length}…`);
    fullByFile.set(distinct[i], await getClipFullCodes(distinct[i], modelOpts, dir));
  }
  if (isCurrent && !isCurrent()) return null;

  // 2. Slice each clip's window from its full codes, then concatenate.
  const clips = sels.map(sel => {
    const full = fullByFile.get(sel.file);
    const T   = full.codesDims[2];
    const f0  = Math.min(T, Math.max(0, Math.round(sel.startS * fps)));
    const len = isFinite(sel.lenS) ? Math.round(sel.lenS * fps) : (T - f0);
    const f1  = Math.min(T, f0 + len);
    return sliceClipCodes(full.codes, full.codesDims, full.scales, f0, f1);
  });
  return joinClipCodes(clips);
}

// Resolve a source's codes, for the current model. Returns {codes,codesDims,scales}
// or null (→ the source is encoded via the worker path).
//   48k folder → encode each clip in full (cached) and sample windows by slicing
//                codes — so this always resolves (it does the encoding itself).
//   24k / 48k-stateful folder → read the per-window sidecars (null → worker encode).
//   non-folder → null (encoded via the worker).
async function resolveSourceCodes(panel, audio, modelOpts, isCurrent) {
  try {
    if (panel.getType() !== 'folder') return null;
    if (modelOpts.modelHz === '48k' && !statefulOla)
      return await encodeFolderSampledCodes(panel, audio, modelOpts, isCurrent);
    return await readFolderSidecars(panel, audio, modelOpts);
  } catch (e) { console.warn('Folder code resolve failed:', e); }
  return null;
}

// Smallest valid encode input — a silent placeholder fed to the encoder for a
// cache-resolved source so the joint A+B pipeline stays intact; its real codes
// are merged back from cache in the embeddings handler.
function dummyEncodeAudio(channels) {
  return new Float32Array(2048 * channels);
}

// Inject a fully-resolved A/B codes pair (from cache) as currentEmbeds, skipping
// the worker entirely. A/B = { codes, codesDims, scales }.
async function injectCodesPair(A, B) {
  const cb  = await ensureCodebooks();
  const T_A = A.codesDims[A.codesDims.length - 1];
  const T_B = B.codesDims[B.codesDims.length - 1];
  currentEmbeds = {
    type: 'embeddings_exp6',
    embEncA: null, embEncDimsA: null, embEncB: null, embEncDimsB: null,
    embQuantA: reconstructEmbQuant(cb, A.codes, A.codesDims), embQuantDimsA: [1, cb.dim, T_A],
    codesA: A.codes, codesDimsA: A.codesDims, scalesA: A.scales,
    embQuantB: reconstructEmbQuant(cb, B.codes, B.codesDims), embQuantDimsB: [1, cb.dim, T_B],
    codesB: B.codes, codesDimsB: B.codesDims, scalesB: B.scales,
  };
  populateLevelSelect(currentEmbeds.codesDimsA[1]);
  progWrap.style.display = 'none';
  markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');
}

// ── SNAC parallel chunked encode (worker pool) ──────────────────────────────
// Whole-file encode of a long folder OOMs one worker, so chunked is the default
// for SNAC: split each source into chunks, encode them across a pool, and
// concatenate the central region of each (dropping OLA context frames).
let snacMetaCache = {};
async function getSnacMeta(model) {
  if (snacMetaCache[model]) return snacMetaCache[model];
  return (snacMetaCache[model] = await (await fetch(`${SNAC_BASE}/${model}/model.json`)).json());
}

let snacPool = null;
function ensureSnacPool() {
  if (snacPool) return snacPool;
  const M = Math.max(2, Math.min(3, (navigator.hardwareConcurrency || 4) - 1));
  snacPool = [];
  for (let i = 0; i < M; i++) {
    const w = new Worker('snac-worker.js?pool=' + i + '_' + Date.now());
    w.postMessage({ type: 'init', modelsBaseUrl: SNAC_BASE });
    snacPool.push(w);
  }
  return snacPool;
}

function runSnacWindow(w, audio, model, idx) {
  return new Promise((resolve, reject) => {
    const onMsg = e => {
      const m = e.data;
      if (m.type === 'window_snac' && m.idx === idx) { w.removeEventListener('message', onMsg); resolve(m); }
      else if (m.type === 'error') { w.removeEventListener('message', onMsg); reject(new Error(m.message)); }
    };
    w.addEventListener('message', onMsg);
    w.postMessage({ type: 'encode_window_snac', model, idx, audio }, [audio.buffer]);
  });
}

// Encode one source in parallel chunks → concatenated central embeddings + codes.
async function encodeSnacSourceChunked(audio, model, chunkCfg, sr, pool, onProg) {
  const meta = await getSnacMeta(model);
  const padTo = meta.preprocess_pad, hop = meta.hop_length, N = meta.n_codebooks;
  const strides = meta.vq_strides, D = meta.latent_dim;
  const snap = x => Math.max(padTo, Math.round(x / padTo) * padTo);
  const paddedLen = Math.ceil(audio.length / padTo) * padTo;
  const chunkSamples = (chunkCfg && chunkCfg.lenSec > 0) ? Math.min(paddedLen, snap(chunkCfg.lenSec * sr)) : paddedLen;
  const ola = (chunkCfg && chunkCfg.olaSec > 0) ? Math.min(chunkSamples - padTo, Math.round(chunkCfg.olaSec * sr / padTo) * padTo) : 0;

  const plan = [];
  for (let s = 0; s < paddedLen; s += chunkSamples) {
    const centralEnd = Math.min(s + chunkSamples, paddedLen);
    plan.push({ s, centralEnd, ctxStart: Math.max(0, s - ola), ctxEnd: Math.min(paddedLen, centralEnd + ola) });
  }
  const items = plan.map(p => {
    const win = new Float32Array(p.ctxEnd - p.ctxStart);
    const srcEnd = Math.min(p.ctxEnd, audio.length);
    if (p.ctxStart < audio.length) win.set(audio.subarray(p.ctxStart, srcEnd));
    return win;
  });

  const results = new Array(plan.length);
  let next = 0, done = 0;
  await Promise.all(pool.map(async w => {
    while (next < plan.length) {
      const i = next++;
      results[i] = await runSnacWindow(w, items[i], model, i);
      if (onProg) onProg(++done, plan.length);
    }
  }));

  const totalFrames = paddedLen / hop;
  const zFull = new Float32Array(D * totalFrames);
  const zqFull = new Float32Array(D * totalFrames);
  const rawFull = strides.map(st => new Int32Array(totalFrames / st));
  let foff = 0;
  plan.forEach((p, ci) => {
    const r = results[ci], Wf = r.zDims[2];
    const trimL = (p.s - p.ctxStart) / hop;
    const centralFrames = (p.centralEnd - p.s) / hop;
    for (let d = 0; d < D; d++)
      for (let t = 0; t < centralFrames; t++) {
        zFull[d * totalFrames + foff + t]  = r.z[d * Wf + trimL + t];
        zqFull[d * totalFrames + foff + t] = r.zq[d * Wf + trimL + t];
      }
    for (let i = 0; i < N; i++) {
      const st = strides[i], lv = r.rawLevels[i], dstBase = foff / st;
      const trimLl = trimL / st, cfl = centralFrames / st;
      for (let t = 0; t < cfl; t++) rawFull[i][dstBase + t] = lv[trimLl + t];
    }
    foff += centralFrames;
  });

  const codes = new Int32Array(N * totalFrames);
  for (let i = 0; i < N; i++) { const st = strides[i]; for (let t = 0; t < totalFrames; t++) codes[i * totalFrames + t] = rawFull[i][Math.floor(t / st)]; }

  return { z: zFull, zDims: [1, D, totalFrames], zq: zqFull, zqDims: [1, D, totalFrames],
           rawLevels: rawFull, codes, codesDims: [1, N, totalFrames], frameRate: meta.frame_rate, vqStrides: strides };
}

function decodeSnacWindow(w, embFlat, dims, model, idx) {
  return new Promise((resolve, reject) => {
    const onMsg = e => {
      const m = e.data;
      if (m.type === 'decode_window_done' && m.idx === idx) { w.removeEventListener('message', onMsg); resolve(m.audio); }
      else if (m.type === 'error') { w.removeEventListener('message', onMsg); reject(new Error(m.message)); }
    };
    w.addEventListener('message', onMsg);
    w.postMessage({ type: 'decode_window_snac', model, idx, embQuant: embFlat, dims }, [embFlat.buffer]);
  });
}

// Decode a trajectory embedding [1,D,N] across the pool: split into aw-aligned
// chunks with ±aw context, decode in parallel, trim each to its central audio.
async function decodeTrajectorySnacParallel(embQuant, D, N, model, pool) {
  const meta = await getSnacMeta(model);
  const aw = meta.attn_window_size || 1, hop = meta.hop_length;
  const target = Math.max(aw * 2, Math.ceil(N / pool.length / aw) * aw);
  const ctx = aw;
  const chunks = [];
  for (let s = 0; s < N; s += target) {
    const e = Math.min(s + target, N);
    chunks.push({ s, e, cs: Math.max(0, s - ctx), ce: Math.min(N, e + ctx) });
  }
  const results = new Array(chunks.length);
  let next = 0;
  await Promise.all(pool.map(async w => {
    while (next < chunks.length) {
      const i = next++, c = chunks[i], Wf = c.ce - c.cs;
      const win = new Float32Array(D * Wf);
      for (let d = 0; d < D; d++)
        for (let t = 0; t < Wf; t++) win[d * Wf + t] = embQuant[d * N + c.cs + t];
      results[i] = await decodeSnacWindow(w, win, [1, D, Wf], model, i);
    }
  }));
  const out = new Float32Array(N * hop);
  chunks.forEach((c, i) => {
    const a = results[i], trimL = (c.s - c.cs) * hop, len = (c.e - c.s) * hop;
    out.set(a.subarray(trimL, trimL + len), c.s * hop);
  });
  return out;
}

// SNAC embeddings path for exp6: mono; chunked-parallel by default (whole if chosen).
// The snac-worker returns an embeddings_exp6 message (z=embEnc, z_q=embQuant) that
// the existing handler turns into currentEmbeds and projects.
async function startEncodeSnac(myRun, stale) {
  const sr = mp.getSampleRate();
  let audioA, audioB;
  try {
    setStatus('Loading A…');
    audioA = await srcWidget.buildAudioAuto(panelA, sr, 1);
    if (stale()) return;
    setStatus('Loading B…');
    audioB = await srcWidget.buildAudioAuto(panelB, sr, 1);
    if (stale()) return;
  } catch (err) { setStatus(err.message, true); return; }

  coordsA = coordsB = null;
  scheduleRender();
  rawAudioA = audioA; rawAudioB = audioB; rawAudioCh = 1;
  durA = audioA.length / sr; durB = audioB.length / sr;
  folderClipFracsA = audioA.clipStarts ? audioA.clipStarts.map(s => s / audioA.length) : null;
  folderClipFracsB = audioB.clipStarts ? audioB.clipStarts.map(s => s / audioB.length) : null;
  playerA.setAudio(rawAudioA, sr, folderClipFracsA ? folderColorFn(folderClipFracsA, 'A') : null, 1);
  playerB.setAudio(rawAudioB, sr, folderClipFracsB ? folderColorFn(folderClipFracsB, 'B') : null, 1);

  // The shared embeddings_exp6 handler takes its simple branch for SNAC.
  pendingResolvedA = pendingResolvedB = null;
  pendingSidecarA = pendingSidecarB = null;
  pendingSnacCacheA = pendingSnacCacheB = null;

  const model = mp.getSnacModel();
  // Pre-warm the primary worker's sessions (chunked encode runs on the pool, so
  // the primary is otherwise cold until the first trajectory/frame decode).
  worker.postMessage({ type: 'warm', model });
  // Per-source SNAC code cache (folder sources only — they expose a writable dir).
  const dirA = panelA.getType() === 'folder' ? panelA.getDirHandle?.() : null;
  const dirB = panelB.getType() === 'folder' ? panelB.getDirHandle?.() : null;
  const crcA = snacCrc(audioA), crcB = snacCrc(audioB);
  const cA = dirA ? await readSnacCache(dirA, model, crcA) : null;
  if (stale()) return;
  const cB = dirB ? await readSnacCache(dirB, model, crcB) : null;
  if (stale()) return;
  const hitA = cA && snacCacheMatches(cA.header, { model, crc32: crcA, sampleRate: sr });
  const hitB = cB && snacCacheMatches(cB.header, { model, crc32: crcB, sampleRate: sr });

  activeJobId = ++jobSeq;
  progWrap.style.display = 'block'; progBar.style.width = '0%';

  if (hitA && hitB) {
    // Both cached → rebuild embeddings from codes, skip the encoder entirely.
    setStatus('Loading SNAC codes from cache…');
    worker.postMessage({ type: 'recon_exp6', jobId: activeJobId, model,
      levelsA: cA.levels, levelsB: cB.levels });
    return;
  }

  // Miss → encode; remember which folder sources to write a cache for afterwards.
  pendingSnacCacheA = (dirA && !hitA) ? { dir: dirA, crc: crcA, model, sampleRate: sr } : null;
  pendingSnacCacheB = (dirB && !hitB) ? { dir: dirB, crc: crcB, model, sampleRate: sr } : null;

  const chunkCfg = mp.getChunkConfig();
  if (chunkCfg) {
    // Chunked parallel encode (default for SNAC) — scales to long folders.
    const pool = ensureSnacPool();
    try {
      const A = await encodeSnacSourceChunked(audioA, model, chunkCfg, sr, pool, (d, t) => setStatus(`Encoding A… ${d}/${t} chunks`));
      if (stale()) return;
      const B = await encodeSnacSourceChunked(audioB, model, chunkCfg, sr, pool, (d, t) => setStatus(`Encoding B… ${d}/${t} chunks`));
      if (stale()) return;
      // Feed the assembled result through the shared embeddings handler.
      onWorkerMsg({ data: {
        type: 'embeddings_exp6', jobId: activeJobId,
        embEncA: A.z, embEncDimsA: A.zDims, embEncB: B.z, embEncDimsB: B.zDims,
        embQuantA: A.zq, embQuantDimsA: A.zqDims, embQuantB: B.zq, embQuantDimsB: B.zqDims,
        codesA: A.codes, codesDimsA: A.codesDims, codesB: B.codes, codesDimsB: B.codesDims,
        scalesA: null, scalesB: null,
        rawLevelsA: A.rawLevels, rawLevelsB: B.rawLevels, frameRate: A.frameRate, vqStrides: A.vqStrides,
      } });
    } catch (err) { setStatus('SNAC encode failed: ' + err.message, true); }
    return;
  }

  // Whole-file single-worker encode (only if the user picked "Whole file").
  setStatus('Encoding (SNAC)…');
  worker.postMessage({ type: 'encode_exp6', jobId: activeJobId,
    audioA: audioA.slice(), audioB: audioB.slice(), model, chunk: null });
}

async function startEncode() {
  ensureWorkerForCodec();

  // Claim this run. Any concurrent startEncode that started earlier will see
  // myRun !== encodeRunSeq after their awaits and silently abort.
  const myRun = ++encodeRunSeq;
  const stale = () => myRun !== encodeRunSeq;

  // Kill any in-flight UMAP/PCA — the new encode will trigger a fresh projection.
  cancelProjection();

  // SNAC: dedicated whole-file embeddings path (no sidecars / pools / OLA).
  if (mp.getCodec() === 'snac') { await startEncodeSnac(myRun, stale); return; }

  const sr       = mp.getSampleRate();
  const modelHz  = mp.getModelHz();
  const bwKbps   = mp.getBwKbps();

  // ── Load audio ────────────────────────────────────────────────────────────────
  // 48k model is natively stereo — load files as planar stereo (L plane, R plane)
  // so the encoder sees real L/R. 24k stays mono.
  const srcCh = modelHz === '48k' ? 2 : 1;
  let audioA, audioB;
  try {
    setStatus('Loading A…');
    audioA = await srcWidget.buildAudioAuto(panelA, sr, srcCh);
    if (stale()) return;
    setStatus('Loading B…');
    audioB = await srcWidget.buildAudioAuto(panelB, sr, srcCh);
    if (stale()) return;
  } catch (err) { setStatus(err.message, true); return; }

  // Waveform display — always set regardless of cache path
  coordsA = coordsB = null;
  scheduleRender();
  rawAudioA = audioA; rawAudioB = audioB; rawAudioCh = srcCh;
  durA = audioA.length / srcCh / sr; durB = audioB.length / srcCh / sr;
  // Folder sources carry per-clip boundaries — store as fractions of the source
  // (resolution-independent) for per-clip wheel time, and tint the waveform.
  const totA = audioA.length / srcCh, totB = audioB.length / srcCh;
  folderClipFracsA = audioA.clipStarts ? audioA.clipStarts.map(s => s / totA) : null;
  folderClipFracsB = audioB.clipStarts ? audioB.clipStarts.map(s => s / totB) : null;
  // Folder sources colour their waveform per clip; the scatter matches via pointColors.
  playerA.setAudio(rawAudioA, sr, folderClipFracsA ? folderColorFn(folderClipFracsA, 'A') : null, srcCh);
  playerB.setAudio(rawAudioB, sr, folderClipFracsB ? folderColorFn(folderClipFracsB, 'B') : null, srcCh);

  const modelOpts = {
    modelHz, bwKbps, sampleRate: sr, channels: srcCh,
    // 48k codes differ between OLA modes — record it so sidecars don't mix them.
    ola: modelHz === '48k' ? (statefulOla ? 'stateful' : 'stateless') : null,
  };

  // ── Per-source code resolution ──────────────────────────────────────────────
  // Each source independently loads cached codes (folder → its per-clip sidecars)
  // or, on a miss, is encoded. The win: a cached source skips its encode even when
  // the other source must be encoded (e.g. cached 295-clip folder + a Sine).
  pendingSidecarA = pendingSidecarB = null;
  pendingResolvedA = pendingResolvedB = null;
  const isFolderA = panelA.getType() === 'folder';
  const isFolderB = panelB.getType() === 'folder';

  setStatus('Checking caches…');
  // Sequential (not Promise.all): a 48k folder source encodes its clips on the
  // shared pool, and the in-memory full-codes cache lets B reuse A's clips when
  // both are the same folder — so A must finish before B resolves.
  const isCurrent = () => !stale();
  const resA = await resolveSourceCodes(panelA, audioA, modelOpts, isCurrent);
  if (stale()) return;
  const resB = await resolveSourceCodes(panelB, audioB, modelOpts, isCurrent);
  if (stale()) return;

  if (resA && resB) {
    // Both cached — assemble and skip the worker entirely.
    setStatus('Loading codebooks…');
    await injectCodesPair(resA, resB);
    if (stale()) return;
    setStatus('Loaded from cache ✓');
    return;
  }

  // Write sidecars after encoding for any folder source that wasn't resolved.
  if (isFolderA && !resA) pendingSidecarA = { panel: panelA, audio: audioA, modelOpts };
  if (isFolderB && !resB) pendingSidecarB = { panel: panelB, audio: audioB, modelOpts };

  // A resolved source skips its real encode (a placeholder keeps the joint A+B
  // pipeline intact); its codes are merged back in the embeddings handler.
  pendingResolvedA = resA;
  pendingResolvedB = resB;
  const encAudioA = resA ? dummyEncodeAudio(srcCh) : audioA;
  const encAudioB = resB ? dummyEncodeAudio(srcCh) : audioB;

  // ── Parallel path: 48k stateless segments are independent → encode in a pool ──
  if (modelHz === '48k' && !statefulOla) {
    runParallelEncode48k(encAudioA, encAudioB, srcCh, myRun);
    return;
  }

  // ── Sequential encode via the primary worker (24k, or 48k stateful) ───────────
  pendingAudioB = encAudioB;
  encodePhase   = 'A';
  activeJobId   = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  setStatus('Encoding A…');

  worker.postMessage({
    type: 'encode', source: 'A', jobId: activeJobId,
    audio:     encAudioA.slice(),
    channels:  srcCh,
    modelHz,
    bwKbps,
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
    skipPreview: true,   // exp6 uses only the captures; the decoded preview is discarded
    statefulOLA: statefulOla,
  });
}

function startEncodeB() {
  encodePhase = 'B';
  setStatus('Encoding B…');
  worker.postMessage({
    type: 'encode', source: 'B', jobId: activeJobId,
    audio:     pendingAudioB.slice(),
    channels:  rawAudioCh,
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
    skipPreview: true,
    statefulOLA: statefulOla,
  });
  pendingAudioB = null;
}

/** Re-encode both sources to obtain embEnc for the Pre-VQ tab.
 *  Uses rawAudioA/B already in memory — no file reload needed.
 *  Sets preVQPending=true so the embeddings_exp6 handler only patches embEnc. */
function startPreVQEncode() {
  if (!rawAudioA || !rawAudioB) {
    setStatus('Encode both sources first.', true);
    return;
  }
  if (!worker) initWorker();
  preVQPending  = true;
  pendingAudioB = rawAudioB;
  encodePhase   = 'A';
  activeJobId   = ++jobSeq;

  const modelHz = mp.getModelHz();
  const bwKbps  = mp.getBwKbps();

  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  setStatus('Encoding for pre-VQ…');

  worker.postMessage({
    type: 'encode', source: 'A', jobId: activeJobId,
    audio:     rawAudioA.slice(),
    channels:  rawAudioCh,
    modelHz, bwKbps,
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
    skipPreview: true,
    statefulOLA: statefulOla,
  });
}

    try { await ensureSSMInput(); } catch (e) { setStatus('SSM input: ' + e.message, true); return; }
  }
  if (projectionMode === 'pca') { pcaCoords = null; launchPCA(); }
  else if (projectionMode === 'mds') { mdsCoords = null; launchMDS(); }

    fd.umapFlat = null; fd.reduced = false; fd.initCoords = null;

}
