<!DOCTYPE html>
<html lang="en">

<style>
/* Experiment-6-only overrides — kept here to avoid polluting shared encodec.css */
#levelDropdown { position: relative; }
#levelMenu {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: #1c1c1c; border: 1px solid var(--border2); border-radius: 4px;
  padding: 4px 0; z-index: 200; min-width: 90px;
}
#levelMenu.open { display: block; }
#levelMenu label {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; color: var(--text);
}
#levelMenu label:hover { background: #2a2a2a; }
#levelMenu input[type=checkbox] { accent-color: var(--accent); cursor: pointer; margin: 0; }
#frame { grid-template-columns: 210px 1fr; }
:root  { --lbl-w: 5.5em; }
/* Reset shared rules that don't apply in this layout */
#statusBar  { flex: none; white-space: normal; overflow: visible; text-overflow: clip; min-width: auto; }
#progressWrap { width: auto; overflow: visible; }
#seqInfo    { font-family: monospace; font-size: 0.78em; color: #aaa; margin-left: 0.6em;
              flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
/* UMAP slot switcher */
#slotWrap   { display: none; align-items: center; gap: 2px; margin-right: 4px; }
#slotWrap.visible { display: flex; }
#slotPrev, #slotNext { padding: 1px 5px; min-width: 20px; font-size: 12px; line-height: 1; }
#slotDots   { display: flex; gap: 3px; align-items: center; padding: 0 2px; }
.umap-dot   { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #555;
              background: transparent; cursor: pointer; padding: 0; flex-shrink: 0;
              transition: background 0.15s, border-color 0.15s; }
.umap-dot.ready  { background: #666; border-color: #888; }
.umap-dot.active { background: var(--accent) !important; border-color: var(--accent) !important; }
</style>

// ── DOM refs ──────────────────────────────────────────────────────────────────

const umapCanvas    = document.getElementById('umapCanvas');
const statusBar     = document.getElementById('statusBar');
const progWrap      = document.getElementById('progressWrap');
const progBar       = document.getElementById('progressBar');
const togPreVQMode  = document.getElementById('togPreVQMode');
const togVQMode     = document.getElementById('togVQMode');
const togPostVQMode = document.getElementById('togPostVQMode');
const levelWrap     = document.getElementById('levelWrap');
const levelMenuBtn  = document.getElementById('levelMenuBtn');
const levelMenu     = document.getElementById('levelMenu');
const nNeighborsEl  = document.getElementById('nNeighbors');
const minDistEl     = document.getElementById('minDist');
const umapWindowEl  = document.getElementById('umapWindow');
const togExplore    = document.getElementById('togExplore');
const togDraw       = document.getElementById('togDraw');
const togPins       = document.getElementById('togPins');
const slotWrap      = document.getElementById('slotWrap');
const slotDots      = document.getElementById('slotDots');
const slotPrevBtn   = document.getElementById('slotPrev');
const slotNextBtn   = document.getElementById('slotNext');
const pinSeqBar     = document.getElementById('pinSeqBar');
const trajDurationEl = document.getElementById('trajDuration');
const durRow         = document.getElementById('durRow');
const codeBlock      = document.getElementById('codeBlock');
const codeParamInput = document.getElementById('codeParamInput');
const codeParamLbl   = document.getElementById('codeParamLbl');
const codeParamUnit  = document.getElementById('codeParamUnit');
const snapBlock      = document.getElementById('snapBlock');
const snapParamInput = document.getElementById('snapParamInput');
const snapParamLbl   = document.getElementById('snapParamLbl');
const snapParamUnit  = document.getElementById('snapParamUnit');
const ctxSwapValEl   = document.getElementById('ctxSwapVal');
const dpr = devicePixelRatio || 1;

// ── State ─────────────────────────────────────────────────────────────────────

// Worker / encode
let worker        = null;
let jobSeq        = 0;
let activeJobId   = -1;
let encodePhase   = null;
let pendingAudioB = null;
let currentEmbeds = null;
let codebooks     = null;
let codebooksFor  = null;
let encodeTimer   = null;

// UMAP
let umapWorker      = null;
let activeUMAPJobId = -1;
let umapMode        = 'combined';
let umapLevels      = [];   // selected codebook levels (all by default)
let embSpace        = 'pre_vq'; // 'pre_vq' | 'post_vq'
let embMode         = 'emb';    // 'emb' | 'emb+delta' | 'delta'
let coordsA         = null;
let coordsB         = null;

// Projection mode — 'umap' | 'pca'
let projectionMode  = 'umap';
let pcaCoords       = null;  // {coordsA, coordsB} — cached PCA result for current features

// UMAP multi-slot (reproducible layout browser)
const UMAP_N_SLOTS  = 6;
let umapSlots       = Array(UMAP_N_SLOTS).fill(null); // [{coordsA,coordsB}|null]
let umapSlotIdx     = 0;    // currently displayed slot
let umapSessionId   = 0;    // incremented every full re-compute; guards stale completions
let umapFeatureData = null; // {flat,T_A,T_B,D,nNeighbors,minDist} — shared across slots

// Viewport (zoom / pan)
let viewZoom = 1;
let viewPanX = 0;
let viewPanY = 0;

// Canvas interaction / drag
let canvasMode      = 'explore';  // 'explore' | 'draw' | 'pins'
let lastTransform   = null;
let selectedPoint   = null;       // {src, idx}
let isPanDragging   = false;
let panDragLast     = null;
let panDragMoved    = false;
let isDrawing       = false;
let isShiftDragging = false;
let shiftDragStart  = null;
let shiftDragBaseTraj = null;
let isPinDragging   = false;
let pinDragIdx      = -1;
let pinSeqDragSrc   = -1;

// Trajectory
let userTrajectory       = [];
let rawDrawSegments      = [];  // completed draw strokes: [[x,y][]]
let rawDrawPoints        = [];  // currently in-progress stroke: [x,y][]
let drawSegmentBoundaries = []; // indices in userTrajectory where each non-first segment begins
let pinPoints       = [];
let pathMode        = 'draw';      // 'draw' | 'code' | 'snap'
let trajDir         = 'forward';   // 'forward' | 'backward' | 'pingpong'
let codePathFrames  = null;
let snapFrames      = null;
let snapSegBoundaries = [];   // indices in snapFrames where each non-first segment begins
let snapPlayFrames  = null;
let genPlaySeq      = null;
let codeDurMode     = 'frames';    // 'frames' | 'seconds'
let codeKVal        = 100;
let codeSecVal      = 4;
let snapMode        = 'k_frames';  // 'k_frames' | 'equal' | 'proportional'
let snapKVal        = 8;
let snapDurVal      = 2;
let ctxSwapRange    = 0;

// Playback
let audioCtx            = null;
let playJobId           = -1;
let activeSrc           = null;
let activeGain          = null;
const XFADE_S           = 0.04;
let trajPlayStartTime   = null;
let trajAudioBuf        = null;
let trajLooping         = false;
let trajAnchorPos       = -1;
let trajCurrentDuration = 0;

// Post-processing
let postProcEnabled  = true;
let notchFundamental = 1200;
let notchQ           = 30;
let masterDest       = null;
let notchFilters     = [];

// Waveform display
let rawAudioA    = null;
let rawAudioB    = null;
let waveHighlight = null;

// ── Helpers ───────────────────────────────────────────────────────────────────

function pinCoords() {
  if (!coordsA || !coordsB) return [];
  return pinPoints.map(p => (p.src === 'A' ? coordsA : coordsB)[p.idx]);
}

function setStatus(msg, isError = false) {
  statusBar.textContent = msg;
  statusBar.style.color = isError ? '#f66' : '';
}

// Snap mode: fit as many waypoints as possible into the available width,
// shrinking toward start → … → end as needed.
function setSeqInfo(seq) {
  const wps = (seq || []).filter((f, i) => i === 0 || f.src !== seq[i-1].src || f.idx !== seq[i-1].idx);
  if (!wps.length) { seqInfo.textContent = ''; return; }
  const fmt  = f  => `${f.src}${f.idx}`;
  const build = arr => '[ ' + arr.map(f => f === null ? '…' : fmt(f)).join(' → ') + ' ]';
  if (wps.length === 1) { seqInfo.textContent = build(wps); return; }

  for (let vis = wps.length; vis >= 2; vis--) {
    if (vis === wps.length) {
      seqInfo.textContent = build(wps);
    } else {
      const front = Math.ceil(vis / 2);
      const back  = vis - front;
      seqInfo.textContent = build([...wps.slice(0, front), null, ...wps.slice(wps.length - back)]);
    }
    if (seqInfo.scrollWidth <= seqInfo.clientWidth + 1) return;
  }
  seqInfo.textContent = build([wps[0], null, wps[wps.length - 1]]);
}

// n evenly-spaced indices from lo..hi inclusive
function spanIdx(lo, hi, n) {
  if (n <= 1) return [lo];
  return Array.from({ length: n }, (_, i) => lo + Math.round(i * (hi - lo) / (n - 1)));
}

// Detect pingpong turnaround index (first consecutive identical pair) in a waypoint array.
// Returns -1 if not a pingpong sequence.
function findTurnaround(wps) {
  for (let i = 1; i < wps.length; i++) {
    if (wps[i].src === wps[i-1].src && wps[i].idx === wps[i-1].idx) return i - 1;
  }
  return -1;
}

// Pick indices for display: 3-per-half mirrored for pingpong, or n evenly spaced for linear.
function pickDisplayIndices(len, taIdx, n) {
  if (taIdx >= 0) {
    const L = spanIdx(0, taIdx, 3);
    const R = [...L].reverse().map(i => taIdx + 1 + (taIdx - i));
    return [...L, ...R];
  }
  return spanIdx(0, len - 1, n);
}

// Code mode: at most 5 waypoints (6 for pingpong), with xK multiplier suffix.
function setCodeSeqInfo(seq, kRepeat) {
  const wps = seq || [];
  if (!wps.length) { seqInfo.textContent = ''; return; }
  const k   = kRepeat > 1 ? 'x' + kRepeat : '';
  const fmt = f => `${f.src}${f.idx}${k}`;

  if (wps.length <= 6) {
    seqInfo.textContent = '[ ' + wps.map(fmt).join(' → ') + ' ]';
    return;
  }

  const taIdx  = findTurnaround(wps);
  const picked = pickDisplayIndices(wps.length, taIdx, 5);

  let text = fmt(wps[picked[0]]);
  for (let i = 1; i < picked.length; i++) {
    const gap = picked[i] - picked[i - 1];
    text += gap === 1 ? ' → ' + fmt(wps[picked[i]]) : ' → … → ' + fmt(wps[picked[i]]);
  }
  seqInfo.textContent = '[ ' + text + ' ]';
}

// Snap mode: show each waypoint as its actual frame range (preroll_start:waypoint_end).
// Groups snapPlayFrames by _wp transitions to find the real context span per waypoint.
function setSnapSeqInfo(snapFrames, snapPlayFrames) {
  if (!snapFrames?.length || !snapPlayFrames?.length) { seqInfo.textContent = ''; return; }

  // Group snapPlayFrames into per-waypoint segments by _wp change.
  // Track the true min index within the waypoint's source (pingPongExtend bounces, so the
  // first frame in the sequence is NOT necessarily the lowest index actually reached).
  const segs = [];
  let s = 0;
  for (let i = 1; i <= snapPlayFrames.length; i++) {
    if (i === snapPlayFrames.length || snapPlayFrames[i]._wp !== snapPlayFrames[i - 1]._wp) {
      // Use the actual snap waypoint (from snapFrames) as the segment endpoint,
      // not the last frame in the group — which may be a K_post frame (idx > waypoint idx)
      // for the last segment on 48k models.
      const end    = snapFrames[segs.length] ?? snapPlayFrames[i - 1];
      let   minIdx = end.idx;
      for (let j = s; j < i; j++) {
        if (snapPlayFrames[j].src === end.src && snapPlayFrames[j].idx < minIdx)
          minIdx = snapPlayFrames[j].idx;
      }
      segs.push({ minIdx, end });
      s = i;
    }
  }

  // Format one segment: "B0:B6" (true min → waypoint), or just "B6" if no pre-roll
  const fmtSeg = ({ minIdx, end }) =>
    minIdx === end.idx
      ? `${end.src}${end.idx}`
      : `${end.src}${minIdx}:${end.src}${end.idx}`;

  const MAX = 7;

  if (segs.length <= MAX) {
    seqInfo.textContent = '[' + segs.map(fmtSeg).join(', ') + ']';
    return;
  }

  const taIdx  = findTurnaround(snapFrames);
  const picked = pickDisplayIndices(segs.length, taIdx, MAX);

  const parts = [fmtSeg(segs[picked[0]])];
  for (let i = 1; i < picked.length; i++) {
    if (picked[i] !== picked[i - 1] + 1) parts.push('…');
    parts.push(fmtSeg(segs[picked[i]]));
  }
  seqInfo.textContent = '[' + parts.join(', ') + ']';
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

// Build userTrajectory for draw mode: resample each segment independently
// then concatenate.  Segments are never joined — there is no connecting path
// between the end of one stroke and the start of the next, so audio jumps
// directly from one segment's endpoint to the next segment's start point
// (a hard cut at the boundary, not a smooth traversal of the gap).
// Each segment gets frames proportional to its own arc length.
function buildDrawUserTrajectory() {
  const segs = (rawDrawPoints.length >= 2
    ? [...rawDrawSegments, rawDrawPoints]
    : rawDrawSegments
  ).filter(s => s.length >= 2);
  if (segs.length === 0) return [];

  // Compute arc length of each segment.
  const segLens = segs.map(seg => {
    let len = 0;
    for (let i = 1; i < seg.length; i++) {
      const dx = seg[i][0] - seg[i-1][0], dy = seg[i][1] - seg[i-1][1];
      len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
  });
  const totalLen = segLens.reduce((a, b) => a + b, 0);
  if (totalLen < 1e-12) return [];

  // Resample each segment to a frame count proportional to its length,
  // then concatenate — no connector between segments.
  // Record the starting index of each non-first segment so playTrajectory
  // can skip the cross-boundary lerp.
  const N_TOTAL = 300;
  const out = [];
  drawSegmentBoundaries = [];
  for (let i = 0; i < segs.length; i++) {
    if (i > 0) drawSegmentBoundaries.push(out.length);
    const n = Math.max(2, Math.round(segLens[i] / totalLen * N_TOTAL));
    out.push(...resamplePath(segs[i], n));
  }
  return out;
}

function renderScatter() {
  const fps = coordsA ? coordsA.length / srcWidget.getDuration() : 1;
  // Build the visual segments array: completed segments + live stroke if any.
  const drawSegments = pathMode === 'draw'
    ? (rawDrawPoints.length >= 1
        ? [...rawDrawSegments, rawDrawPoints]
        : rawDrawSegments)
    : [];
  const result = _renderScatter(umapCanvas, dpr, {
    coordsA, coordsB,
    viewZoom, viewPanX, viewPanY,
    pinPoints: pinCoords(),
    highlightedPinIdx: waveHighlight
      ? pinPoints.findIndex(p => p.src === waveHighlight.src && p.idx === waveHighlight.idx)
      : -1,
    selectedPoint, waveHighlight, userTrajectory, drawSegments,
    pathMode, snapFrames, snapSegBoundaries, codePathFrames, trajAnchorPos,
    snapPlayFrames, trajDir, showTrail: chkTrail.checked, canvasMode, ctxSwapRange,
    snapMode, snapKVal, snapDurVal, framesPerSec: fps,
  });
  if (result !== null) lastTransform = result;
}

// ── Dirty flags & effect scheduler ───────────────────────────────────────────

const dirty = { COORDS: false, WAYPOINTS: false, AUDIO: false, RENDER: false };
let renderPending = false;

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => { renderPending = false; renderScatter(); });
}

function markDirty(...flags) {
  for (const f of flags) dirty[f] = true;
  runEffects();
}

// True when there is enough source material to compute waypoints for the current mode.
// Draw mode needs a drawn path; snap/code mode can use pins (≥1) or a drawn path (≥2 pts).
function hasWaypointSource() {
  if (pathMode === 'draw') return userTrajectory.length >= 2;
  return (canvasMode === 'pins' && pinPoints.length >= 1) || userTrajectory.length >= 2;
}

function runEffects() {
  if (dirty.COORDS && currentEmbeds) {
    dirty.COORDS = false;
    triggerProjection();
  }
  if (dirty.WAYPOINTS && coordsA && coordsB && hasWaypointSource()) {
    dirty.WAYPOINTS = false;
    computeWaypoints();
    dirty.AUDIO  = true;
    dirty.RENDER = true;
  }
  if (dirty.AUDIO && currentEmbeds && coordsA && coordsB
      && hasWaypointSource()
      && (genPlaySeq !== null || pathMode === 'draw')) {
    dirty.AUDIO = false;
    playTrajectory();
  }
  if (dirty.RENDER) {
    dirty.RENDER = false;
    scheduleRender();
  }
}

// ── Slot switcher helpers ──────────────────────────────────────────────────────

function initSlotDots() {
  slotDots.innerHTML = '';
  for (let i = 0; i < UMAP_N_SLOTS; i++) {
    const btn = document.createElement('button');
    btn.className = 'umap-dot';
    btn.title = `Layout ${i + 1}`;
    btn.addEventListener('click', () => setUMAPSlotIdx(i));
    slotDots.appendChild(btn);
  }
}

function updateSlotDots() {
  [...slotDots.children].forEach((btn, i) => {
    btn.className = 'umap-dot'
      + (umapSlots[i] ? ' ready' : '')
      + (i === umapSlotIdx ? ' active' : '');
  });
  slotPrevBtn.disabled = umapSlotIdx <= 0;
  slotNextBtn.disabled = umapSlotIdx >= UMAP_N_SLOTS - 1;
}

// Switch to a pre-computed slot (or mark as pending if not yet ready).
function setUMAPSlotIdx(idx) {
  if (idx < 0 || idx >= UMAP_N_SLOTS) return;
  umapSlotIdx = idx;
  const slot = umapSlots[idx];
  if (slot) {
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    setStatus(`Layout ${idx + 1} / ${UMAP_N_SLOTS}`);
    updateSlotDots();
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
  } else {
    // Not yet computed — update desired slot; onUMAPWorkerMsg will display it when ready.
    updateSlotDots();
    setStatus(`Waiting for layout ${idx + 1}…`);
  }
}

// ── Projection worker message handler ─────────────────────────────────────────

function onUMAPWorkerMsg({ data: msg }) {
  if (msg.jobId !== activeUMAPJobId) return;

  // ── PCA result ─────────────────────────────────────────────────────────────
  if (msg.type === 'pca_result') {
    const { result, T_A, T_B } = msg;
    const slot = { coordsA: [], coordsB: [] };
    for (let i = 0; i < T_A; i++) slot.coordsA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < T_B; i++) slot.coordsB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    pcaCoords = slot;

    viewZoom = 1; viewPanX = 0; viewPanY = 0;
    const hadDrawTraj = rawDrawSegments.some(s => s.length >= 2) || rawDrawPoints.length >= 2;
    rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = [];
    userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    progWrap.style.display = 'none';
    if (hadDrawTraj && pinPoints.length < 2) {
      setStatus('PCA updated — draw trajectory cleared. Redraw to regenerate.');
    } else {
      setStatus(`PCA — ${T_A} frames (A) · ${T_B} frames (B)`);
    }
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    return;

  } else if (msg.type === 'pca_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
    return;
  }

  // ── UMAP progress / result / error ─────────────────────────────────────────
  if (msg.type === 'umap_progress') {
    const pct   = Math.round(msg.epoch / msg.nEpochs * 100);
    const label = `Layout ${(msg.slotIdx ?? 0) + 1}/${UMAP_N_SLOTS}`;
    progBar.style.width = pct + '%';
    setStatus(`UMAP ${label} — epoch ${msg.epoch} / ${msg.nEpochs}`);

  } else if (msg.type === 'umap_result') {
    const { slotIdx, result, T_A, T_B } = msg;

    // Decode and store this slot.
    const slot = { coordsA: [], coordsB: [] };
    for (let i = 0; i < T_A; i++) slot.coordsA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < T_B; i++) slot.coordsB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    umapSlots[slotIdx] = slot;
    updateSlotDots();

    // Slot 0 (the very first result for this session):
    //   - reset viewport and clear draw trajectory (now defined in stale UMAP coords)
    //   - pin trajectories are {src,idx} based and auto-remap — no reset needed
    if (slotIdx === 0) {
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      const hadDrawTraj = rawDrawSegments.some(s => s.length >= 2) || rawDrawPoints.length >= 2;
      rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = [];
      userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
      if (hadDrawTraj && pinPoints.length < 2) {
        setStatus('UMAP updated — draw trajectory cleared. Redraw to regenerate.');
      } else {
        setStatus(`Done — ${T_A} frames (A) · ${T_B} frames (B). Computing more layouts…`);
      }
    }

    // If this is the currently-desired slot, display it now.
    if (slotIdx === umapSlotIdx && projectionMode === 'umap') {
      coordsA = slot.coordsA;
      coordsB = slot.coordsB;
      if (slotIdx !== 0) setStatus(`Layout ${slotIdx + 1} / ${UMAP_N_SLOTS}`);
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    }

    // Chain the next slot — but only when UMAP is the active mode.
    const next = slotIdx + 1;
    if (next < UMAP_N_SLOTS && umapFeatureData && projectionMode === 'umap') {
      launchUMAPSlot(next);
    } else {
      progWrap.style.display = 'none';
      if (projectionMode === 'umap' && slotIdx === UMAP_N_SLOTS - 1)
        setStatus(`All ${UMAP_N_SLOTS} layouts ready.`);
    }

  } else if (msg.type === 'umap_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── PCA launch ─────────────────────────────────────────────────────────────────

function launchPCA() {
  if (!umapFeatureData) return;
  const { flat, T_A, T_B, D } = umapFeatureData;

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '30%';
  setStatus(`PCA — computing… (${T_A + T_B} frames, ${D} dims)`);

  umapWorker.postMessage({ type: 'compute_pca', jobId: activeUMAPJobId, flat, T_A, T_B, D });
}

// ── Projection mode toggle ─────────────────────────────────────────────────────

function setProjectionMode(mode) {
  projectionMode = mode;
  document.getElementById('togUMAPMode').classList.toggle('active', mode === 'umap');
  document.getElementById('togPCAMode') .classList.toggle('active', mode === 'pca');
  document.getElementById('neighborRow').style.display = mode === 'umap' ? '' : 'none';
  document.getElementById('minDistRow') .style.display = mode === 'umap' ? '' : 'none';
  slotWrap.classList.toggle('visible', mode === 'umap' && umapSlots.some(s => s));

  if (!umapFeatureData) return; // nothing computed yet — triggerProjection() will dispatch when ready

  if (mode === 'pca') {
    if (pcaCoords) {
      // Already have a cached PCA result for current features — switch instantly.
      coordsA = pcaCoords.coordsA;
      coordsB = pcaCoords.coordsB;
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus('PCA');
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      launchPCA(); // cancels any in-progress UMAP slot
    }
  } else { // umap
    slotWrap.classList.add('visible');
    updateSlotDots();
    if (umapSlots[umapSlotIdx]) {
      // Desired slot already computed — display immediately.
      coordsA = umapSlots[umapSlotIdx].coordsA;
      coordsB = umapSlots[umapSlotIdx].coordsB;
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus(`Layout ${umapSlotIdx + 1} / ${UMAP_N_SLOTS}`);
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      // Find first computed slot and display it; resume background computation.
      const firstReady = umapSlots.findIndex(s => s);
      if (firstReady >= 0) {
        setUMAPSlotIdx(firstReady);
      } else {
        umapSlots = Array(UMAP_N_SLOTS).fill(null);
        umapSlotIdx = 0;
        updateSlotDots();
      }
    }
    // Resume slot computation from the first uncomputed slot.
    const nextMissing = umapSlots.findIndex(s => !s);
    if (nextMissing >= 0) launchUMAPSlot(nextMissing);
  }
}

function onWorkerMsg(e) {
  const msg = e.data;

  if (msg.type === 'frame_audio_exp6') {
    if (msg.jobId === playJobId && audioCtx) {
      const buf = audioCtx.createBuffer(1, msg.decoded.length, mp.getSampleRate());
      buf.copyToChannel(msg.decoded, 0);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(getMasterDest());
      src.start();
      setStatus(`Playing frame ${selectedPoint?.idx} (${selectedPoint?.src})…`);
    }
    return;
  }

  if (msg.type === 'trajectory_audio_exp6') {
    if (msg.jobId === playJobId) {
      const sr = mp.getSampleRate();
      stopTrajPlayback();
      playerG.setAudio(msg.decoded, sr, makeGenColorFn());
      setStatus('');
    }
    return;
  }

  if (msg.jobId !== undefined && msg.jobId !== activeJobId) return;

  if (msg.type === 'progress') {
    progBar.style.width = Math.round((msg.value ?? 0) * 100) + '%';
    if (msg.status) setStatus(msg.status);

  } else if (msg.type === 'result') {
    if (encodePhase === 'A') {
      startEncodeB();
    } else if (encodePhase === 'B') {
      encodePhase = null;
      progBar.style.width = '100%';
      setStatus('Fetching embeddings…');
      worker.postMessage({ type: 'get_embeddings_exp6', jobId: activeJobId });
    }

  } else if (msg.type === 'embeddings_exp6') {
    currentEmbeds = msg;
    populateLevelSelect(msg.codesDimsA[1]);
    markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');

  } else if (msg.type === 'error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── Encode ────────────────────────────────────────────────────────────────────

function scheduleEncode(delay = 0) {
  clearTimeout(encodeTimer);
  encodeTimer = setTimeout(startEncode, delay);
}

async function startEncode() {
  if (!worker) initWorker();

  const sr       = mp.getSampleRate();
  const finalLen = Math.round(srcWidget.getDuration() * sr);

  let audioA, audioB;
  try {
    setStatus('Loading A…');
    audioA = await srcWidget.buildAudio(panelA, finalLen, sr);
    setStatus('Loading B…');
    audioB = await srcWidget.buildAudio(panelB, finalLen, sr);
  } catch (err) { setStatus(err.message, true); return; }

  coordsA = coordsB = null;
  scheduleRender();

  rawAudioA = audioA;
  rawAudioB = audioB;
  playerA.setAudio(rawAudioA, sr);
  playerB.setAudio(rawAudioB, sr);

  pendingAudioB = audioB;
  encodePhase   = 'A';
  activeJobId   = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  setStatus('Encoding A…');

  worker.postMessage({
    type: 'encode', source: 'A', jobId: activeJobId,
    audio:     audioA.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
}

function startEncodeB() {
  encodePhase = 'B';
  setStatus('Encoding B…');
  worker.postMessage({
    type: 'encode', source: 'B', jobId: activeJobId,
    audio:     pendingAudioB.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
  pendingAudioB = null;
}

function updateLevelMenuBtn() {

function populateLevelSelect(K) {
  levelMenu.innerHTML = '';
  umapLevels = Array.from({ length: K }, (_, k) => k);  // all selected
  for (let k = 0; k < K; k++) {
    const lbl = document.createElement('label');
    const cb  = document.createElement('input');
    cb.type    = 'checkbox';
    cb.checked = true;
    cb.dataset.level = k;
    cb.addEventListener('change', () => {
      umapLevels = [...levelMenu.querySelectorAll('input[type=checkbox]')]
        .filter(c => c.checked)
        .map(c => parseInt(c.dataset.level));
      if (umapLevels.length === 0) {
        // re-check this box — don't allow empty selection
        cb.checked = true;
        umapLevels = [k];
      }
      updateLevelMenuBtn();
      markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(`Level ${k + 1}`));
    levelMenu.appendChild(lbl);
  }
  updateLevelMenuBtn();
}

// ── Codebook loading ──────────────────────────────────────────────────────────

async function ensureCodebooks() {
  const modelHz = mp.getModelHz();
  if (codebooks && codebooksFor === modelHz) return codebooks;
  setStatus('Loading codebooks…');
  const base = `${MODELS_BASE}/${modelHz}`;
  const [binRes, jsonRes] = await Promise.all([
    fetch(`${base}/codebooks.bin`),
    fetch(`${base}/codebooks.json`),
  ]);
  if (!binRes.ok || !jsonRes.ok) throw new Error('Could not load codebooks for ' + modelHz);
  const meta = await jsonRes.json();
  const buf  = await binRes.arrayBuffer();
  codebooks    = { data: new Float32Array(buf), n_q: meta.n_q, vocab_size: meta.vocab_size, dim: meta.dim };
  codebooksFor = modelHz;
  return codebooks;
}

// ── Frame extraction ──────────────────────────────────────────────────────────

function applyWindowWithAnchor(rawFrames, featFrames, K) {
  if (K <= 1) return featFrames;
  const D_raw  = rawFrames[0].length;
  const D_feat = featFrames[0].length;
  return rawFrames.map((raw, t) => {
    const vec = new Float32Array(D_raw + K * D_feat);
    vec.set(raw, 0);
    for (let k = 0; k < K; k++) {
      const srcT = Math.max(0, t - (K - 1 - k));
      vec.set(featFrames[srcT], D_raw + k * D_feat);
    }
    return vec;
  });
}

function computeDeltas(frames) {
  const D = frames[0].length;
  return frames.map((f, t) => {
    if (t === 0) return new Float32Array(D);
    const delta = new Float32Array(D);
    const prev  = frames[t - 1];
    for (let d = 0; d < D; d++) delta[d] = f[d] - prev[d];
    return delta;
  });
}

function appendDeltas(frames) {
  const D   = frames[0].length;
  const out = [];
  for (let t = 0; t < frames.length; t++) {
    const f   = frames[t];
    const vec = new Float32Array(2 * D);
    vec.set(f, 0);
    if (t > 0) { const p = frames[t - 1]; for (let d = 0; d < D; d++) vec[D + d] = f[d] - p[d]; }
    out.push(vec);
  }
  return out;
}

// Per-dimension z-score normalisation across all frames from both sources.
// Computed jointly so A and B frames are in the same coordinate space.
// Why: in Emb+Δ mode the embedding dims (e.g. ±2–5) dwarf the delta dims
// (e.g. ±0.02–0.1) so UMAP distances are dominated by the emb half.
// Same issue with multi-level VQ concatenation or history window mixing.
// Normalising each dimension to zero mean / unit variance gives every
// feature equal influence on pairwise distances.
// Dimensions with zero variance (constant across all frames, e.g. a dead
// codebook entry) get std=1 so they contribute nothing — correct behaviour.
function zscoreFrames(framesA, framesB) {
  const D = framesA[0].length;
  const N = framesA.length + framesB.length;
  const mean = new Float64Array(D);
  const std  = new Float64Array(D);

  for (const frames of [framesA, framesB])
    for (const f of frames)
      for (let d = 0; d < D; d++) mean[d] += f[d];
  for (let d = 0; d < D; d++) mean[d] /= N;

  for (const frames of [framesA, framesB])
    for (const f of frames)
      for (let d = 0; d < D; d++) { const e = f[d] - mean[d]; std[d] += e * e; }
  for (let d = 0; d < D; d++) std[d] = Math.sqrt(std[d] / N) || 1;  // std=0 → no-op

  const apply = frames => frames.map(f => {
    const out = new Float32Array(D);
    for (let d = 0; d < D; d++) out[d] = (f[d] - mean[d]) / std[d];
    return out;
  });
  return [apply(framesA), apply(framesB)];
}

function embQuantToFrames(embQuant, dims) {
  const [, D, T] = dims;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const f = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = embQuant[d * T + t];
    frames.push(f);
  }
  return frames;
}

// Concatenates codebook vectors for all selected levels per frame.
// With a single level selected this is identical to the old single-level lookup.
function codebookLookupFrames(cb, codes, dims, levels) {
  const [, , T] = dims;
  const { data, vocab_size, dim } = cb;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const vec = new Float32Array(dim * levels.length);
    for (let li = 0; li < levels.length; li++) {
      const level = levels[li];
      const idx   = codes[level * T + t];
      const off   = level * vocab_size * dim + idx * dim;
      vec.set(data.subarray(off, off + dim), li * dim);
    }
    frames.push(vec);
  }
  return frames;
}

// ── UMAP ──────────────────────────────────────────────────────────────────────

// Kick off a full projection session (PCA or UMAP depending on projectionMode).
// Builds the shared feature matrix once, then dispatches to the appropriate method.
function triggerProjection() {
  if (!currentEmbeds) return;
  const sid = ++umapSessionId;
  umapSlots       = Array(UMAP_N_SLOTS).fill(null);
  umapSlotIdx     = 0;
  umapFeatureData = null;
  pcaCoords       = null;
  updateSlotDots();
  slotWrap.classList.toggle('visible', projectionMode === 'umap');

  buildUMAPFeatureData()
    .then(fd => {
      if (umapSessionId !== sid) return; // superseded by a newer call
      umapFeatureData = fd;
      if (projectionMode === 'pca') {
        launchPCA();
      } else {
        slotWrap.classList.add('visible');
        launchUMAPSlot(0);
      }
    })
    .catch(err => setStatus(err.message, true));
}

// Build the shared feature matrix (expensive; run once per session).
// Returns {flat, T_A, T_B, D, nNeighbors, minDist} — flat is NOT transferred
// so it can be reused across all slot sends.
async function buildUMAPFeatureData() {
  let framesA, framesB, rawA, rawB;

  if (umapMode === 'combined') {
    if (embSpace === 'pre_vq') {
      rawA = embQuantToFrames(currentEmbeds.embEncA,   currentEmbeds.embEncDimsA);
      rawB = embQuantToFrames(currentEmbeds.embEncB,   currentEmbeds.embEncDimsB);
    } else {
      rawA = embQuantToFrames(currentEmbeds.embQuantA, currentEmbeds.embQuantDimsA);
      rawB = embQuantToFrames(currentEmbeds.embQuantB, currentEmbeds.embQuantDimsB);
    }
    framesA = rawA; framesB = rawB;
    if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA);  framesB = appendDeltas(framesB); }
    else if (embMode === 'delta')     { framesA = computeDeltas(framesA); framesB = computeDeltas(framesB); }
  } else {
    const cb = await ensureCodebooks();
    const levels = umapLevels.length ? umapLevels : [0];
    rawA = codebookLookupFrames(cb, currentEmbeds.codesA, currentEmbeds.codesDimsA, levels);
    rawB = codebookLookupFrames(cb, currentEmbeds.codesB, currentEmbeds.codesDimsB, levels);
    framesA = rawA; framesB = rawB;
    if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA);  framesB = appendDeltas(framesB); }
    else if (embMode === 'delta')     { framesA = computeDeltas(framesA); framesB = computeDeltas(framesB); }
  }

  const K = Math.max(1, parseInt(umapWindowEl.value) || 1);
  if (K > 1) {
    framesA = applyWindowWithAnchor(rawA, framesA, K);
    framesB = applyWindowWithAnchor(rawB, framesB, K);
  }

  // Normalise: every dimension contributes equally regardless of raw magnitude.
  [framesA, framesB] = zscoreFrames(framesA, framesB);

  const T_A = framesA.length;
  const T_B = framesB.length;
  const D   = framesA[0].length;

  // Allocate flat array — NOT transferred, shared across all slot sends via copy.
  const flat = new Float32Array((T_A + T_B) * D);
  framesA.forEach((f, i) => flat.set(f, i * D));
  framesB.forEach((f, i) => flat.set(f, (T_A + i) * D));

  const nNeighbors = Math.min(
    Math.max(2, parseInt(nNeighborsEl.value) || 15),
    Math.max(2, Math.floor((T_A + T_B) / 3))
  );
  const minDist = parseFloat(minDistEl.value) || 0.1;

  return { flat, T_A, T_B, D, nNeighbors, minDist };
}

// Send one slot job to the worker. Each slot gets a unique seed (slotIdx + 1)
// so layouts are reproducible across sessions but visually distinct.
// flat is sent as a copy (no transfer) so buildUMAPFeatureData only runs once.
function launchUMAPSlot(slotIdx) {
  if (slotIdx >= UMAP_N_SLOTS || !umapFeatureData) return;
  const { flat, T_A, T_B, D, nNeighbors, minDist } = umapFeatureData;

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  if (slotIdx === 0) setStatus(`UMAP — starting… (${T_A + T_B} frames, ${UMAP_N_SLOTS} layouts)`);

  // No transferable — flat stays alive for subsequent slot sends.
  umapWorker.postMessage({
    type: 'compute_umap',
    jobId: activeUMAPJobId,
    slotIdx,
    seed: slotIdx + 1,
    flat, T_A, T_B, D, nNeighbors, minDist,
  });
}

// ── Post-processing chain ─────────────────────────────────────────────────────

function buildPostProc() {
  if (!audioCtx) return;
  const maxFreq = audioCtx.sampleRate / 2 - 1;
  const mg = audioCtx.createGain();
  mg.gain.value = 1;
  notchFilters = [];
  let prev = mg;
  for (let h = 1; h * notchFundamental <= maxFreq; h++) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'notch';
    f.frequency.value = notchFundamental * h;
    f.Q.value = (postProcEnabled && h * notchFundamental <= maxFreq) ? notchQ : 10000;
    notchFilters.push(f);
    prev.connect(f);
    prev = f;
  }
  prev.connect(audioCtx.destination);
  masterDest = mg;
}

function getMasterDest() {
  if (!audioCtx) return null;
  if (!masterDest) buildPostProc();
  return masterDest;
}

function updateNotchFilters() {
  if (!audioCtx || !masterDest) return;
  const maxFreq = audioCtx.sampleRate / 2 - 1;
  notchFilters.forEach((f, i) => {
    const freq = notchFundamental * (i + 1);
    f.frequency.value = freq;
    f.Q.value = (postProcEnabled && freq <= maxFreq) ? notchQ : 10000;
  });
}

function updatePinSeqBar() {
  if (canvasMode !== 'pins' || pinPoints.length === 0) {
    pinSeqBar.style.display = 'none';
    return;
  }
  pinSeqBar.style.display = 'flex';
  pinSeqBar.innerHTML = '';

  pinPoints.forEach((_, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'pinArrow';
      arrow.textContent = '→';
      pinSeqBar.appendChild(arrow);
    }
    const chip = document.createElement('span');
    chip.className = 'pinChip';
    chip.textContent = `[${i + 1}]`;
    chip.draggable = true;
    chip.dataset.idx = i;

    chip.addEventListener('dragstart', e => {
      pinSeqDragSrc = parseInt(e.currentTarget.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    });
    chip.addEventListener('dragleave', e => {
      e.currentTarget.classList.remove('drag-over');
    });
    chip.addEventListener('drop', e => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const dstIdx = parseInt(e.currentTarget.dataset.idx);
      if (pinSeqDragSrc < 0 || dstIdx === pinSeqDragSrc) return;
      const [moved] = pinPoints.splice(pinSeqDragSrc, 1);
      pinPoints.splice(dstIdx, 0, moved);
      pinSeqDragSrc = -1;
      userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
      updatePinSeqBar();
      autoRegenerate();
    });
    pinSeqBar.appendChild(chip);
  });
}

function setCanvasMode(mode) {
  canvasMode = mode;
  togExplore.classList.toggle('active', mode === 'explore');
  togDraw   .classList.toggle('active', mode === 'draw');
  togPins   .classList.toggle('active', mode === 'pins');
  umapCanvas.style.cursor = mode === 'pins' ? 'cell' : 'crosshair';
  if (mode === 'draw')    setStatus('Click and drag to draw. Each stroke adds a new segment.');
  if (mode === 'pins')    setStatus('Double-click near a UMAP point to add/remove pins.');
  if (mode === 'explore') setStatus('');
  updatePinSeqBar();
  // Sync trajectory source to new mode and regenerate
  if (mode === 'draw')      userTrajectory = buildDrawUserTrajectory();
  else if (mode === 'pins') userTrajectory = pinPoints.length    >= 2 ? resamplePath(pinCoords(), 300)    : [];
  if (userTrajectory.length < 2) { snapFrames = null; snapSegBoundaries = []; codePathFrames = null; snapPlayFrames = null; }
  autoRegenerate();
}

// ── Canvas helpers ────────────────────────────────────────────────────────────

function applyZoom(cx, cy, dz) {
  viewZoom  *= dz;
  viewPanX   = cx + (viewPanX - cx) * dz;
  viewPanY   = cy + (viewPanY - cy) * dz;
}

function umapToCanvas(ux, uy) {
  if (!lastTransform) return [0, 0];
  const { xMin, yMin, scale, offX, offY, H } = lastTransform;
  return [
    viewPanX + (offX + (ux - xMin) * scale) * viewZoom,
    viewPanY + (H - offY - (uy - yMin) * scale) * viewZoom,
  ];
}

function canvasToUmap(e) {
  const { xMin, yMin, scale, offX, offY, H } = lastTransform;
  const rect  = umapCanvas.getBoundingClientRect();
  const physX = (e.clientX - rect.left) * dpr;
  const physY = (e.clientY - rect.top)  * dpr;
  const umapX = ((physX - viewPanX) / viewZoom - offX) / scale + xMin;
  const umapY = (H - offY - (physY - viewPanY) / viewZoom) / scale + yMin;
  return [umapX, umapY];
}

function resamplePath(pts, maxN) {
  if (pts.length < 2) return pts.slice();
  const arcLen = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
    arcLen.push(arcLen[i-1] + Math.sqrt(dx*dx + dy*dy));
  }
  const total = arcLen[arcLen.length - 1];
  if (total < 1e-12) return [pts[0].slice()];
  const N = Math.min(maxN, pts.length);
  const out = [];
  for (let i = 0; i < N; i++) {
    const tgt = total * i / (N - 1);
    let lo = 0, hi = pts.length - 1;
    while (lo < hi - 1) { const mid = (lo + hi) >> 1; if (arcLen[mid] <= tgt) lo = mid; else hi = mid; }
    if (arcLen[hi] === arcLen[lo]) { out.push(pts[lo].slice()); continue; }
    const t = (tgt - arcLen[lo]) / (arcLen[hi] - arcLen[lo]);
    out.push([pts[lo][0] + t * (pts[hi][0] - pts[lo][0]), pts[lo][1] + t * (pts[hi][1] - pts[lo][1])]);
  }
  return out;
}

// ── Zoom / pan ────────────────────────────────────────────────────────────────

umapCanvas.style.cursor = 'crosshair';

umapCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (!lastTransform) return;
  const rect = umapCanvas.getBoundingClientRect();
  const cx   = (e.clientX - rect.left) * dpr;
  const cy   = (e.clientY - rect.top)  * dpr;
  if (e.ctrlKey || e.metaKey) {
    applyZoom(cx, cy, Math.exp(-e.deltaY * 0.01));
  } else if (e.shiftKey) {
    // Shift + two-finger scroll → pan
    viewPanX -= e.deltaX; viewPanY -= e.deltaY;
  } else if (Math.abs(e.deltaX) > Math.abs(e.deltaY) * 0.5 && Math.abs(e.deltaX) > 2) {
    viewPanX -= e.deltaX; viewPanY -= e.deltaY;
  } else {
    applyZoom(cx, cy, Math.exp(-e.deltaY * 0.003));
  }
  scheduleRender();
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.target !== document.body && e.target !== umapCanvas) return;
  if (e.key === '+' || e.key === '=') { applyZoom(umapCanvas.width/2, umapCanvas.height/2, 1.2); scheduleRender(); }
  if (e.key === '-')                  { applyZoom(umapCanvas.width/2, umapCanvas.height/2, 1/1.2); scheduleRender(); }
  if (e.key === '0')                  { viewZoom = 1; viewPanX = 0; viewPanY = 0; scheduleRender(); }
  if (e.shiftKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    e.preventDefault();
    const step = 40;
    if (e.key === 'ArrowLeft')  viewPanX += step;
    if (e.key === 'ArrowRight') viewPanX -= step;
    if (e.key === 'ArrowUp')    viewPanY += step;
    if (e.key === 'ArrowDown')  viewPanY -= step;
    scheduleRender();
  }
});

// ── Drag + draw event handlers ────────────────────────────────────────────────

umapCanvas.addEventListener('mousedown', e => {
  if (!lastTransform) return;
  if (e.shiftKey && userTrajectory.length >= 2) {
    isShiftDragging   = true;
    shiftDragStart    = canvasToUmap(e);
    shiftDragBaseTraj = userTrajectory.map(p => [p[0], p[1]]);
    umapCanvas.style.cursor = 'move';
    return;
  }
  if (canvasMode === 'draw') {
    isDrawing = true;
    rawDrawPoints = [canvasToUmap(e)];  // start fresh stroke; rawDrawSegments kept
    trajAnchorPos = -1;
    scheduleRender();
    return;
  }
  if (canvasMode === 'pins' && coordsA && coordsB) {
    const rect  = umapCanvas.getBoundingClientRect();
    const physX = (e.clientX - rect.left) * dpr;
    const physY = (e.clientY - rect.top)  * dpr;
    const hitIdx = pinPoints.findIndex(p => {
      const [ux, uy] = (p.src === 'A' ? coordsA : coordsB)[p.idx];
      const [cx, cy] = umapToCanvas(ux, uy);
      return (cx - physX) ** 2 + (cy - physY) ** 2 < (14 * dpr) ** 2;
    });
    if (hitIdx >= 0) {
      isPinDragging = true;
      pinDragIdx    = hitIdx;
      umapCanvas.style.cursor = 'grabbing';
      return;
    }
  }
  if (canvasMode === 'explore' || canvasMode === 'pins') {
    isPanDragging = true;
    panDragLast   = { x: e.clientX, y: e.clientY };
    panDragMoved  = false;
  }
});

umapCanvas.addEventListener('mousemove', e => {
  if (isPinDragging) {
    if (!coordsA || !coordsB) return;
    const [umapX, umapY] = canvasToUmap(e);
    const { src, idx } = findNearestUmapPoint(umapX, umapY, coordsA, coordsB);
    pinPoints[pinDragIdx] = { src, idx };
    userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
    updatePinSeqBar();
    scheduleRender();
    return;
  }
  if (isShiftDragging) {
    const [cx, cy] = canvasToUmap(e);
    const dx = cx - shiftDragStart[0], dy = cy - shiftDragStart[1];
    userTrajectory = shiftDragBaseTraj.map(([x, y]) => [x + dx, y + dy]);
    scheduleRender();
    return;
  }
  if (isDrawing) {
    const pt = canvasToUmap(e);
    const last = rawDrawPoints[rawDrawPoints.length - 1];
    const dx = (pt[0] - last[0]) * lastTransform.scale;
    const dy = (pt[1] - last[1]) * lastTransform.scale;
    if (dx*dx + dy*dy < (2 * dpr) ** 2) return;
    rawDrawPoints.push(pt);
    userTrajectory = buildDrawUserTrajectory();
    scheduleRender();
    return;
  }
  if (isPanDragging && panDragLast) {
    const dx = (e.clientX - panDragLast.x) * dpr;
    const dy = (e.clientY - panDragLast.y) * dpr;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      panDragMoved = true;
      umapCanvas.style.cursor = 'grab';
    }
    if (panDragMoved) { viewPanX += dx; viewPanY += dy; scheduleRender(); }
    panDragLast = { x: e.clientX, y: e.clientY };
  }
});

const finishPanDrag = () => {
  if (!isPanDragging) return;
  isPanDragging = false; panDragLast = null;
  umapCanvas.style.cursor = canvasMode === 'pins' ? 'cell' : 'crosshair';
};

const finishShiftDrag = () => {
  if (!isShiftDragging) return;
  isShiftDragging = false; shiftDragStart = null; shiftDragBaseTraj = null;
  umapCanvas.style.cursor = 'crosshair';
  autoRegenerate();
};

const finishPinDrag = () => {
  if (!isPinDragging) return;
  isPinDragging = false; pinDragIdx = -1;
  umapCanvas.style.cursor = 'cell';
  autoRegenerate();
};

const finishDraw = () => {
  if (!isDrawing) return;
  isDrawing = false;
  if (rawDrawPoints.length >= 2) rawDrawSegments.push(rawDrawPoints);
  rawDrawPoints = [];
  userTrajectory = buildDrawUserTrajectory();
  autoRegenerate();
};

umapCanvas.addEventListener('mouseup',    () => { finishPanDrag(); finishShiftDrag(); finishDraw(); finishPinDrag(); });
umapCanvas.addEventListener('mouseleave', () => { finishPanDrag(); finishShiftDrag(); finishDraw(); finishPinDrag(); });

// ── Double-click: add/remove pins ────────────────────────────────────────────

umapCanvas.addEventListener('dblclick', e => {
  if (canvasMode !== 'pins' || !lastTransform || !coordsA || !coordsB) return;
  const rect   = umapCanvas.getBoundingClientRect();
  const physX  = (e.clientX - rect.left) * dpr;
  const physY  = (e.clientY - rect.top)  * dpr;
  const hitR2  = (14 * dpr) ** 2;

  const hitIdx = pinPoints.findIndex(p => {
    const [ux, uy] = (p.src === 'A' ? coordsA : coordsB)[p.idx];
    const [cx, cy] = umapToCanvas(ux, uy);
    return (cx - physX) ** 2 + (cy - physY) ** 2 < hitR2;
  });

  if (hitIdx >= 0) {
    pinPoints.splice(hitIdx, 1);
  } else {
    const SNAP_R2 = (18 * dpr) ** 2;
    let bestDist2 = Infinity, bestSrc = null, bestIdx = -1;
    for (let i = 0; i < coordsA.length; i++) {
      const [cx, cy] = umapToCanvas(coordsA[i][0], coordsA[i][1]);
      const d2 = (cx - physX) ** 2 + (cy - physY) ** 2;
      if (d2 < bestDist2) { bestDist2 = d2; bestSrc = 'A'; bestIdx = i; }
    }
    for (let i = 0; i < coordsB.length; i++) {
      const [cx, cy] = umapToCanvas(coordsB[i][0], coordsB[i][1]);
      const d2 = (cx - physX) ** 2 + (cy - physY) ** 2;
      if (d2 < bestDist2) { bestDist2 = d2; bestSrc = 'B'; bestIdx = i; }
    }
    if (bestIdx < 0 || bestDist2 > SNAP_R2) {
      setStatus('Double-click closer to a UMAP point to add a pin.');
      return;
    }
    pinPoints.push({ src: bestSrc, idx: bestIdx });
  }

  userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
  updatePinSeqBar();
  autoRegenerate();
  if (userTrajectory.length < 2) setStatus(pinPoints.length === 1 ? 'Pin added. Double-click near another point to add more.' : '');
});

// ── Click to play (explore mode) ──────────────────────────────────────────────

umapCanvas.addEventListener('click', async e => {
  if (canvasMode !== 'explore') return;
  if (panDragMoved) { panDragMoved = false; return; }
  if (!coordsA || !coordsB || !lastTransform || !currentEmbeds) return;
  if (encodePhase !== null) return;

  const [umapX, umapY] = canvasToUmap(e);
  const { src: bestSrc, idx: bestIdx } = findNearestUmapPoint(umapX, umapY, coordsA, coordsB);
  if (bestIdx < 0) return;

  selectedPoint = { src: bestSrc, idx: bestIdx };
  const srcLen = bestSrc === 'A' ? coordsA.length : coordsB.length;
  const srcPos = bestIdx / srcLen;
  if (bestSrc === 'A') { playerA.setCursor(srcPos); playerB.setCursor(-1); }
  else                 { playerB.setCursor(srcPos); playerA.setCursor(-1); }
  scheduleRender();

  const T = bestSrc === 'A' ? currentEmbeds.codesDimsA[2] : currentEmbeds.codesDimsB[2];
  const framesPerSec = (bestSrc === 'A' ? coordsA.length : coordsB.length) / srcWidget.getDuration();
  const half       = Math.max(1, Math.round(framesPerSec * 0.5));
  const startFrame = Math.max(0, bestIdx - half);
  const endFrame   = Math.min(T, bestIdx + half);

  getAudioCtx();
  playJobId = ++jobSeq;
  setStatus(`Decoding frame ${bestIdx} (${bestSrc})…`);
  worker.postMessage({
    type: 'play_frame_exp6', jobId: playJobId,
    source: bestSrc, bestIdx, startFrame, endFrame,
    modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
  });
});

// ── Trajectory playback ───────────────────────────────────────────────────────

function startTrajPlayback(buf, sr) {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  const newGain = ctx.createGain();
  const newSrc  = ctx.createBufferSource();
  newSrc.buffer = buf;
  newSrc.connect(newGain);
  newGain.connect(getMasterDest());

  if (activeSrc) {
    activeGain.gain.cancelScheduledValues(now);
    activeGain.gain.setValueAtTime(activeGain.gain.value, now);
    activeGain.gain.linearRampToValueAtTime(0, now + XFADE_S);
    newGain.gain.setValueAtTime(0, now);
    newGain.gain.linearRampToValueAtTime(1, now + XFADE_S);
    const oldSrc = activeSrc, oldGain = activeGain;
    oldSrc.stop(now + XFADE_S + 0.01);
    oldSrc.onended = () => { try { oldGain.disconnect(); } catch (_) {} };
  } else {
    newGain.gain.setValueAtTime(1, now);
  }

  newSrc.start(now);
  activeSrc           = newSrc;
  activeGain          = newGain;
  trajPlayStartTime   = now;
  trajCurrentDuration = buf.length / sr;

  requestAnimationFrame(animateTrajAnchor);
  setStatus(`Playing trajectory (${trajCurrentDuration.toFixed(1)} s)${trajLooping ? ' — looping' : ''}…`);
}

function stopTrajPlayback() {
  if (activeSrc) { try { activeSrc.stop(); } catch (_) {} activeSrc = null; }
  if (activeGain) { try { activeGain.disconnect(); } catch (_) {} activeGain = null; }
  trajPlayStartTime = null;
  trajAnchorPos     = -1;
}

function animateTrajAnchor() {
  if (!trajPlayStartTime || !audioCtx) return;
  const elapsed  = audioCtx.currentTime - trajPlayStartTime;
  const duration = trajCurrentDuration || parseFloat(trajDurationEl.value) || 4;
  trajAnchorPos  = Math.min(elapsed / duration, 1);
  scheduleRender();
  if (trajAnchorPos < 1) {
    requestAnimationFrame(animateTrajAnchor);
  } else if (trajLooping && trajAudioBuf) {
    startTrajPlayback(trajAudioBuf, mp.getSampleRate());
  } else {
    stopTrajPlayback();
    scheduleRender();
    setStatus('Trajectory playback done.');
  }
}

// ── Trajectory generation ─────────────────────────────────────────────────────

function snapCtxArg() {
  return {
    snapMode, snapKVal, snapDurVal,
    framesPerSec: coordsA ? coordsA.length / srcWidget.getDuration() : 1,
    coordsA, coordsB,
  };
}

function snapWaypointArgs() {
  return {
    canvasMode, pinPoints: pinCoords(), coordsA, coordsB,
    userTrajectory, pathMode, snapMode, snapDurVal, codeSecVal,
    trajDuration: parseFloat(trajDurationEl.value) || 4,
    framesPerSec: coordsA ? coordsA.length / srcWidget.getDuration() : 1,
    drawSegmentBoundaries,
  };
}

function computeWaypoints() {
  if (!coordsA || !coordsB) return;
  const fps = coordsA.length / srcWidget.getDuration();

  if (pathMode === 'code') {
    const N_total = codeDurMode === 'frames'
      ? Math.max(2, codeKVal)
      : Math.max(2, Math.round(codeSecVal * fps));

    const { wps: fwdWPs } = computeSnapWaypoints(snapWaypointArgs());
    if (!fwdWPs.length) return;
    const bwdWPs = [...fwdWPs].reverse();

    // Build ordered waypoint list; pingpong = fwd + bwd (turnaround repeated at junction)
    const orderedWPs = trajDir === 'forward'  ? fwdWPs
                     : trajDir === 'backward' ? bwdWPs
                     : [...fwdWPs, ...bwdWPs];   // pingpong: 2× length → K halves automatically

    // K frames per waypoint; dividing N_total by list length keeps total duration constant
    const K = Math.max(1, Math.round(N_total / orderedWPs.length));
    const sampledWPs = orderedWPs.flatMap(wp => Array.from({ length: K }, () => wp));

    codePathFrames = sampledWPs;
    genPlaySeq     = sampledWPs;
    setCodeSeqInfo(orderedWPs, K);

  } else if (pathMode === 'snap') {
    const { wps: fwdWPs, segBoundaries: fwdSegBounds } = computeSnapWaypoints(snapWaypointArgs());
    if (!fwdWPs.length) return;
    const bwdWPs = [...fwdWPs].reverse();
    const M = fwdWPs.length;
    // Mirror fwd boundaries into the reversed sequence: boundary at b → M-b in bwd
    const bwdSegBounds = fwdSegBounds.map(b => M - b).reverse();

    if (trajDir === 'backward') {
      snapFrames        = bwdWPs;
      snapSegBoundaries = bwdSegBounds;
    } else if (trajDir === 'pingpong') {
      snapFrames        = [...fwdWPs, ...bwdWPs];
      // fwd boundaries + bwd boundaries shifted by M (junction itself is connected — turnaround)
      snapSegBoundaries = [...fwdSegBounds, ...bwdSegBounds.map(b => M + b)];
    } else {
      snapFrames        = fwdWPs;
      snapSegBoundaries = fwdSegBounds;
    }

    const is48k   = mp.getModelHz() === '48k';
    const K_post  = is48k ? Math.max(2, Math.round(fps * 0.03)) : 0;
    const N_total = Math.max(2, Math.round(snapDurVal * fps));

    // Builds one direction's frame sequence.
    // ctxArg defaults to snapCtxArg() — pingpong halves pass a half-duration arg so all waypoints fit.
    const buildSeq = (wps, N_target = N_total, kOverride = snapKVal, ctxArg = null) => snapMode === 'k_frames'
      ? buildSnapSequence(wps, kOverride, K_post, ctxSwapRange, coordsA, coordsB, currentEmbeds)
      : buildSnapSequenceFixed(wps, Math.max(wps.length, N_target), K_post, ctxSwapRange, coordsA, coordsB, currentEmbeds, ctxArg ?? snapCtxArg());

    let seq;
    if (trajDir === 'forward')       seq = buildSeq(fwdWPs);
    else if (trajDir === 'backward') seq = buildSeq(bwdWPs);
    else {
      // Pingpong: split total duration evenly across fwd and bwd halves.
      //
      // k_frames: use ceil/floor so every K value maps to a unique (kFwd, kBwd) pair.
      //   floor alone collapses K=8 and K=9 both to kHalf=4 → identical audio.
      // equal/prop: pass half the snapDurVal so getContextKs budgets context correctly
      //   for the half-length sequence; otherwise K_each is over-sized and the truncation
      //   cuts the final waypoints entirely (they'd be past the N_target cutoff).
      const half        = Math.floor(N_total / 2);
      const kFwd        = Math.max(1, Math.ceil(snapKVal / 2));
      const kBwd        = Math.max(1, Math.floor(snapKVal / 2));
      const halfCtxArg  = { ...snapCtxArg(), snapDurVal: snapDurVal / 2 };
      seq = [...buildSeq(fwdWPs, half, kFwd, halfCtxArg), ...buildSeq(bwdWPs, half, kBwd, halfCtxArg)];
    }
    snapPlayFrames = seq;
    genPlaySeq     = seq;
    setSnapSeqInfo(snapFrames, seq);
  }
  // draw mode: no discrete waypoints — embeddings are interpolated at playback time
  if (pathMode === 'draw') seqInfo.textContent = 'interpolated points along path';
}

function autoRegenerate() {
  if (userTrajectory.length >= 2 && (!currentEmbeds || !coordsA || !coordsB)) {
    setStatus('Path drawn. Encode sources and run UMAP to play.');
  }
  markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
}

// Build a per-position color function for the generated waveform based on
// the source (A or B) of each frame in genPlaySeq.
// Returns null for draw mode (interpolated — no discrete source attribution).
function makeGenColorFn() {
  if (!genPlaySeq || genPlaySeq.length === 0 || pathMode === 'draw') return null;
  const seq = genPlaySeq; // capture snapshot
  const N   = seq.length;
  const colA = '#c87800'; // matches playerA waveColor
  const colB = '#2090c0'; // matches playerB waveColor
  return pos => {
    const fi = Math.min(N - 1, Math.floor(pos * N));
    return seq[fi].src === 'A' ? colA : colB;
  };
}

async function playTrajectory() {
  if (!hasWaypointSource()) { setStatus('Add pins or draw a path first.', true); return; }
  if (!currentEmbeds)                                { setStatus('Encode both sources first.', true); return; }
  if (!coordsA || !coordsB)                          { setStatus('Run UMAP first.', true); return; }

  const [, D, T_A] = currentEmbeds.embQuantDimsA;
  const [, , T_B]  = currentEmbeds.embQuantDimsB;
  const fps = coordsA.length / srcWidget.getDuration();

  // ── Code-path mode ────────────────────────────────────────────────────────
  if (pathMode === 'code') {
    if (!genPlaySeq || !genPlaySeq.length) { setStatus('Draw a path first.', true); return; }
    const N       = genPlaySeq.length;
    const blended = new Float32Array(D * N);
    for (let i = 0; i < N; i++) {
      const { src, idx } = genPlaySeq[i];
      const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
      const T   = src === 'A' ? T_A : T_B;
      for (let d = 0; d < D; d++) blended[d * N + i] = emb[d * T + idx];
    }
    getAudioCtx();
    playJobId = ++jobSeq;
    const dirLabel = { forward: 'fwd', backward: 'bwd', pingpong: 'ping' }[trajDir];
    setStatus(`Decoding code/${dirLabel} (${N} frames, ${(N / fps).toFixed(1)} s)…`);
    const codeScales = makeFrameScales(genPlaySeq, currentEmbeds);
    const codeXfers  = [blended.buffer];
    if (codeScales) codeXfers.push(codeScales.buffer);
    worker.postMessage({
      type: 'decode_trajectory_exp6', jobId: playJobId,
      embQuant: blended, dims: [1, D, N],
      frameScales: codeScales || undefined,
      modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
    }, codeXfers);
    return;
  }

  // ── Snap mode ─────────────────────────────────────────────────────────────
  if (pathMode === 'snap') {
    if (!genPlaySeq || !genPlaySeq.length) { setStatus('Draw a path first.', true); return; }
    const seq     = genPlaySeq;
    const N       = seq.length;
    const blended = new Float32Array(D * N);
    for (let i = 0; i < N; i++) {
      const { src, idx } = seq[i];
      const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
      const T   = src === 'A' ? T_A : T_B;
      for (let d = 0; d < D; d++) blended[d * N + i] = emb[d * T + idx];
    }
    getAudioCtx();
    playJobId = ++jobSeq;
    const snapLabel = { k_frames: 'K frames', equal: 'equal', proportional: 'proportional' }[snapMode];
    setStatus(`Decoding snap/${snapLabel} (${N} frames, ${(N / fps).toFixed(1)} s)…`);
    const snapScales = makeFrameScales(seq, currentEmbeds);
    const snapXfers  = [blended.buffer];
    if (snapScales) snapXfers.push(snapScales.buffer);
    worker.postMessage({
      type: 'decode_trajectory_exp6', jobId: playJobId,
      embQuant: blended, dims: [1, D, N],
      frameScales: snapScales || undefined,
      modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
    }, snapXfers);
    return;
  }

  // ── Draw-path mode ────────────────────────────────────────────────────────
  genPlaySeq = null;
  const duration = parseFloat(trajDurationEl.value) || 4;
  const N_pass   = Math.max(2, Math.round(duration * fps));
  const N        = N_pass;

  const drawFrac = i => {
    if (trajDir === 'backward') return 1 - i / (N - 1);
    if (trajDir === 'pingpong') { const t = 2 * i / (N - 1); return t <= 1 ? t : 2 - t; }
    return i / (N - 1);
  };

  const getFrame = (src, idx) => {
    const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
    const T   = src === 'A' ? T_A : T_B;
    const f   = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = emb[d * T + idx];
    return f;
  };

  const blended    = new Float32Array(D * N);
  const hasScales  = !!(currentEmbeds.scalesA || currentEmbeds.scalesB);
  const drawScales = hasScales ? new Float32Array(N) : null;

  for (let i = 0; i < N; i++) {
    const frac = drawFrac(i);
    const ti   = frac * (userTrajectory.length - 1);
    const lo   = Math.floor(ti), hi = Math.min(lo + 1, userTrajectory.length - 1);
    // Never interpolate across a segment boundary — that would traverse the gap
    // between two unconnected strokes and generate frames the user never drew.
    const t    = drawSegmentBoundaries.some(b => lo < b && hi >= b) ? 0 : (ti - lo);
    const px   = userTrajectory[lo][0] + t * (userTrajectory[hi][0] - userTrajectory[lo][0]);
    const py   = userTrajectory[lo][1] + t * (userTrajectory[hi][1] - userTrajectory[lo][1]);

    // Find two nearest points for interpolation
    let d1 = Infinity, d2 = Infinity;
    let src1 = null, idx1 = -1, src2 = null, idx2 = -1;
    for (let j = 0; j < coordsA.length; j++) {
      const d = (coordsA[j][0] - px) ** 2 + (coordsA[j][1] - py) ** 2;
      if (d < d1) { d2=d1; src2=src1; idx2=idx1; d1=d; src1='A'; idx1=j; }
      else if (d < d2) { d2=d; src2='A'; idx2=j; }
    }
    for (let j = 0; j < coordsB.length; j++) {
      const d = (coordsB[j][0] - px) ** 2 + (coordsB[j][1] - py) ** 2;
      if (d < d1) { d2=d1; src2=src1; idx2=idx1; d1=d; src1='B'; idx1=j; }
      else if (d < d2) { d2=d; src2='B'; idx2=j; }
    }

    const f1  = getFrame(src1, idx1);
    const f2  = idx2 >= 0 ? getFrame(src2, idx2) : f1;
    const sd1 = Math.sqrt(d1), sd2 = idx2 >= 0 ? Math.sqrt(d2) : 0;
    const sum = sd1 + sd2;
    const w1  = sum > 1e-12 ? sd2 / sum : 1;
    const w2  = 1 - w1;
    for (let d = 0; d < D; d++) blended[d * N + i] = w1 * f1[d] + w2 * f2[d];

    if (drawScales) {
      const getScale = (src, idx) => {
        const arr = src === 'A' ? currentEmbeds.scalesA : currentEmbeds.scalesB;
        return arr ? (arr[idx] || 1.0) : 1.0;
      };
      drawScales[i] = w1 * getScale(src1, idx1)
                    + w2 * (idx2 >= 0 ? getScale(src2, idx2) : getScale(src1, idx1));
    }
  }

  getAudioCtx();
  playJobId = ++jobSeq;
  setStatus(`Decoding ${N} frames (${duration} s)…`);

  const drawXfers = [blended.buffer];
  if (drawScales) drawXfers.push(drawScales.buffer);
  worker.postMessage({
    type: 'decode_trajectory_exp6', jobId: playJobId,
    embQuant: blended, dims: [1, D, N],
    frameScales: drawScales || undefined,
    modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
  }, drawXfers);
}
</script>
