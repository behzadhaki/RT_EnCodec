<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exp 6 — Codebook UMAP</title>
<link rel="stylesheet" href="encodec.css">
<style>
:root { --lbl-w: 5.5em; }
#frame { grid-template-columns: 210px 1fr; }

#vizArea {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

#modeBar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#levelWrap {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-left: 6px;
}

#levelWrap label { font-size: 11px; color: var(--muted); }

#levelSelect {
  font-size: 11px;
  background: #1c1c1c;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 2px 4px;
  border-radius: 3px;
}

#umapWrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#umapCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#legendBar {
  display: flex;
  gap: 14px;
  align-items: center;
  padding: 4px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#legendBar span { font-size: 11px; color: var(--muted); }
.ldot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }

#statusWrap {
  padding: 4px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#statusBar { font-size: 11px; color: var(--muted); }

#progressWrap {
  height: 3px;
  background: var(--surface);
  border-radius: 2px;
  margin-top: 3px;
  display: none;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.08s;
}
</style>
</head>
<body>
<div id="frame">
  <div id="controls"></div>

  <div id="vizArea">
    <div id="modeBar">
      <button class="tog active" id="togCombined">Combined</button>
      <button class="tog"        id="togPerLevel">Per level</button>
      <div id="levelWrap" style="display:none">
        <label>Level</label>
        <select id="levelSelect"></select>
      </div>
      <span style="flex:1"></span>
      <button class="tog active" id="togExplore">Explore</button>
      <button class="tog"        id="togDraw">Draw Path</button>
    </div>

    <div id="umapWrap">
      <canvas id="umapCanvas"></canvas>
    </div>

    <div id="legendBar">
      <span><span class="ldot" style="background:#c87800"></span>Source A</span>
      <span><span class="ldot" style="background:#2090c0"></span>Source B</span>
    </div>

    <div id="statusWrap">
      <span id="statusBar">Encode both sources to compute UMAP.</span>
      <div id="progressWrap"><div id="progressBar"></div></div>
    </div>
  </div>
</div>

<script type="module">
'use strict';

import { createDoubleSourceWidget } from './lib/double-source-widget.js';
import { createModelPanel }         from './lib/model-panel.js';

const MODELS_BASE = new URL('../serialization/encodec_onnx_exports', location.href).href;

// ── Controls ──────────────────────────────────────────────────────────────────

const controls = document.getElementById('controls');

const srcWidget = createDoubleSourceWidget({
  defaultDur: 4,
  onChange: delay => scheduleEncode(delay),
});
controls.appendChild(srcWidget.element);
const { panelA, panelB } = srcWidget;

const mp = createModelPanel({
  defaultModel: '24k',
  onChange: () => { currentEmbeds = null; scheduleEncode(0); },
});
controls.appendChild(mp.modelSection);
controls.appendChild(mp.modeSection);

const umapSection = document.createElement('div');
umapSection.className = 'section';
umapSection.innerHTML = `
  <div class="section-title">UMAP</div>
  <div class="row">
    <span class="lbl">Space</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togPreVQ">Pre-VQ</button>
      <button class="tog"        id="togPostVQ">Post-VQ</button>
    </div>
  </div>
  <div class="row">
    <span class="lbl">Features</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togEmbOnly">Emb</button>
      <button class="tog"        id="togEmbDelta">Emb+Δ</button>
      <button class="tog"        id="togDeltaOnly">Δ</button>
    </div>
  </div>
  <div class="row">
    <span class="lbl">History</span>
    <input type="number" id="umapWindow" value="1" min="1" max="16" step="1">
    <span style="font-size:11px;color:var(--muted);margin-left:2px">frames</span>
  </div>
  <div class="row">
    <span class="lbl">Neighbors</span>
    <input type="number" id="nNeighbors" value="15" min="3" max="100" step="1">
  </div>
  <div class="row">
    <span class="lbl">Min dist</span>
    <input type="number" id="minDist" value="0.1" min="0.0" max="0.99" step="0.05">
  </div>
`.trim();
controls.appendChild(umapSection);

// ── DOM refs ──────────────────────────────────────────────────────────────────

const umapCanvas   = document.getElementById('umapCanvas');
const statusBar    = document.getElementById('statusBar');
const progWrap     = document.getElementById('progressWrap');
const progBar      = document.getElementById('progressBar');
const togCombined  = document.getElementById('togCombined');
const togPerLevel  = document.getElementById('togPerLevel');
const levelWrap    = document.getElementById('levelWrap');
const levelSelect  = document.getElementById('levelSelect');
const nNeighborsEl  = document.getElementById('nNeighbors');
const minDistEl     = document.getElementById('minDist');
const umapWindowEl  = document.getElementById('umapWindow');
umapWindowEl.addEventListener('change', triggerUMAP);
const togPreVQ     = document.getElementById('togPreVQ');
const togPostVQ    = document.getElementById('togPostVQ');

togPreVQ.addEventListener('click', () => {
  embSpace = 'pre_vq';
  togPreVQ.classList.add('active'); togPostVQ.classList.remove('active');
  triggerUMAP();
});
togPostVQ.addEventListener('click', () => {
  embSpace = 'post_vq';
  togPostVQ.classList.add('active'); togPreVQ.classList.remove('active');
  triggerUMAP();
});

const togEmbOnly  = document.getElementById('togEmbOnly');
const togEmbDelta = document.getElementById('togEmbDelta');
togEmbOnly.addEventListener('click', () => {
  embMode = 'emb';
  togEmbOnly.classList.add('active'); togEmbDelta.classList.remove('active');
  triggerUMAP();
});
togEmbDelta.addEventListener('click', () => {
  embMode = 'emb+delta';
  togEmbDelta.classList.add('active');
  togEmbOnly.classList.remove('active'); togDeltaOnly.classList.remove('active');
  triggerUMAP();
});

const togDeltaOnly = document.getElementById('togDeltaOnly');
togDeltaOnly.addEventListener('click', () => {
  embMode = 'delta';
  togDeltaOnly.classList.add('active');
  togEmbOnly.classList.remove('active'); togEmbDelta.classList.remove('active');
  triggerUMAP();
});
const togExplore   = document.getElementById('togExplore');
const togDraw      = document.getElementById('togDraw');

const trajSection = document.createElement('div');
trajSection.className = 'section';
trajSection.innerHTML = `
  <div class="section-title">Trajectory</div>
  <div class="row" style="gap:3px">
    <button class="tog active" id="togDrawMode" style="flex:1">Draw</button>
    <button class="tog"        id="togCodeMode" style="flex:1">Code</button>
    <button class="tog"        id="togSnapMode" style="flex:1">Snap</button>
  </div>
  <div class="row" id="durRow">
    <span class="lbl">Duration</span>
    <input type="number" id="trajDuration" value="4" min="0.5" max="30" step="0.5">
    <span style="font-size:11px;color:var(--muted);margin-left:2px">s</span>
  </div>
  <div class="row" id="snapDurRow" style="display:none;gap:3px">
    <button class="tog active" id="togSnapAuto"  style="flex:1">Auto</button>
    <button class="tog"        id="togSnapFixed" style="flex:1">Fixed</button>
  </div>
  <div class="row" id="ctxSwapRow" style="display:none">
    <span class="lbl">Ctx swap</span>
    <input type="range" id="ctxSwapSlider" min="0" max="2" step="0.02" value="0" style="flex:1">
    <span id="ctxSwapVal" style="font-size:11px;color:var(--muted);min-width:2.5em;text-align:right">0.00</span>
  </div>
  <div class="row" style="gap:5px;margin-top:2px">
    <button class="tog" id="clearTraj" style="flex:1">Clear</button>
    <button class="tog" id="playTraj"  style="flex:1">Play</button>
    <button class="tog" id="loopTraj"  style="flex:1">Loop</button>
  </div>
`.trim();
controls.appendChild(trajSection);

const trajDurationEl = document.getElementById('trajDuration');
const durRow         = document.getElementById('durRow');

document.getElementById('togDrawMode').addEventListener('click', () => {
  pathMode = 'draw';
  document.getElementById('togDrawMode').classList.add('active');
  document.getElementById('togCodeMode').classList.remove('active');
  durRow.style.display = '';
  codePathFrames = null; renderScatter();
});
const setPathMode = (mode) => {
  pathMode = mode;
  document.getElementById('togDrawMode').classList.toggle('active', mode === 'draw');
  document.getElementById('togCodeMode').classList.toggle('active', mode === 'code');
  document.getElementById('togSnapMode').classList.toggle('active', mode === 'snap');
  durRow.style.display = mode === 'code' ? 'none' : '';
  document.getElementById('snapDurRow').style.display = mode === 'snap' ? '' : 'none';
  document.getElementById('ctxSwapRow').style.display = mode === 'snap' ? '' : 'none';
  codePathFrames = null; snapFrames = null; snapPlayFrames = null;
  renderScatter(); autoRegenerate();
};

document.getElementById('togSnapAuto').addEventListener('click', () => {
  snapDurMode = 'auto';
  document.getElementById('togSnapAuto').classList.add('active');
  document.getElementById('togSnapFixed').classList.remove('active');
  autoRegenerate();
});
document.getElementById('togSnapFixed').addEventListener('click', () => {
  snapDurMode = 'fixed';
  document.getElementById('togSnapFixed').classList.add('active');
  document.getElementById('togSnapAuto').classList.remove('active');
  autoRegenerate();
});

const ctxSwapValEl = document.getElementById('ctxSwapVal');
document.getElementById('ctxSwapSlider').addEventListener('input', e => {
  ctxSwapRange = parseFloat(e.target.value);
  ctxSwapValEl.textContent = ctxSwapRange.toFixed(2);
  autoRegenerate();
});
document.getElementById('togCodeMode').addEventListener('click', () => setPathMode('code'));
document.getElementById('togSnapMode').addEventListener('click', () => setPathMode('snap'));

document.getElementById('clearTraj').addEventListener('click', () => {
  userTrajectory = []; rawDrawPoints = []; trajAnchorPos = -1;
  trajAudioBuf = null; codePathFrames = null;
  snapFrames = null; snapPlayFrames = null;
  renderScatter(); setStatus('Trajectory cleared.');
});
document.getElementById('playTraj').addEventListener('click', playTrajectory);
document.getElementById('loopTraj').addEventListener('click', () => {
  trajLooping = !trajLooping;
  document.getElementById('loopTraj').classList.toggle('active', trajLooping);
});

// ── State ─────────────────────────────────────────────────────────────────────

let worker        = null;
let jobSeq        = 0;
let activeJobId   = -1;
let encodePhase   = null;
let pendingAudioB = null;
let currentEmbeds = null;
let codebooks     = null;
let codebooksFor  = null;
let umapMode      = 'combined';
let umapLevel     = 0;
let embSpace      = 'pre_vq'; // 'pre_vq' | 'post_vq'
let embMode       = 'emb';    // 'emb' | 'emb+delta'
let coordsA       = null;
let coordsB       = null;
let encodeTimer      = null;
let umapWorker       = null;
let activeUMAPJobId  = -1;
let audioCtx         = null;
let playJobId        = -1;
let lastTransform    = null;
let selectedPoint    = null; // { src, idx }
let canvasMode       = 'explore'; // 'explore' | 'draw'
let userTrajectory   = [];        // [[umapX, umapY], …] resampled path
let rawDrawPoints    = [];
let isDrawing        = false;
let trajAnchorPos    = -1;        // 0..1 during playback, -1 = off
let trajPlayStartTime = null;
let trajAudioBuf      = null;      // cached AudioBuffer for loop
let trajLooping       = false;
let pathMode          = 'draw';   // 'draw' | 'code' | 'snap'
let codePathFrames    = null;     // [{src,idx}] from graph search
let snapFrames        = null;     // snap waypoints for viz
let snapPlayFrames    = null;     // full snap sequence (with pre-roll) for playback
let trajCurrentDuration = 0;     // actual playback duration (set at play time)
let snapDurMode       = 'auto';  // 'auto' | 'fixed'
let ctxSwapRange      = 0;       // UMAP-unit radius for context swap (0 = off)
let isShiftDragging   = false;
let shiftDragStart    = null;     // [umapX, umapY] at drag start
let shiftDragBaseTraj = null;     // trajectory snapshot at drag start
const dpr = devicePixelRatio || 1;

// ── Helpers ───────────────────────────────────────────────────────────────────

function setStatus(msg, isError = false) {
  statusBar.textContent = msg;
  statusBar.style.color = isError ? '#f66' : '';
}

// ── Canvas resize ─────────────────────────────────────────────────────────────

function resizeCanvas() {
  const wrap = umapCanvas.parentElement;
  const W = wrap.clientWidth, H = wrap.clientHeight;
  umapCanvas.width  = W * dpr;
  umapCanvas.height = H * dpr;
  renderScatter();
}
new ResizeObserver(resizeCanvas).observe(umapCanvas.parentElement);

// ── Workers ───────────────────────────────────────────────────────────────────

function initWorker() {
  if (worker) worker.terminate();
  worker = new Worker('encodec-worker.js?v=' + Date.now());
  worker.postMessage({ type: 'init', modelsBaseUrl: MODELS_BASE });
  worker.onmessage = onWorkerMsg;
}

function initUMAPWorker() {
  if (umapWorker) umapWorker.terminate();
  umapWorker = new Worker(new URL('./umap-worker.js', import.meta.url), { type: 'module' });
  umapWorker.onmessage = onUMAPWorkerMsg;
}

function onUMAPWorkerMsg({ data: msg }) {
  if (msg.jobId !== activeUMAPJobId) return;

  if (msg.type === 'umap_progress') {
    const pct = Math.round(msg.epoch / msg.nEpochs * 100);
    progBar.style.width = pct + '%';
    setStatus(`UMAP — epoch ${msg.epoch} / ${msg.nEpochs}`);

  } else if (msg.type === 'umap_result') {
    const { result, T_A, T_B } = msg;
    coordsA = [];
    coordsB = [];
    for (let i = 0; i < T_A; i++) coordsA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < T_B; i++) coordsB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    progWrap.style.display = 'none';
    setStatus(`Done — ${T_A} frames (A) · ${T_B} frames (B)`);
    renderScatter();

  } else if (msg.type === 'umap_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

function onWorkerMsg(e) {
  const msg = e.data;

  if (msg.type === 'frame_audio_exp6') {
    if (msg.jobId === playJobId && audioCtx) {
      const buf = audioCtx.createBuffer(1, msg.decoded.length, mp.getSampleRate());
      buf.copyToChannel(msg.decoded, 0);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start();
      setStatus(`Playing frame ${selectedPoint?.idx} (${selectedPoint?.src})…`);
    }
    return;
  }

  if (msg.type === 'trajectory_audio_exp6') {
    if (msg.jobId === playJobId && audioCtx) {
      const sr  = mp.getSampleRate();
      const buf = audioCtx.createBuffer(1, msg.decoded.length, sr);
      buf.copyToChannel(msg.decoded, 0);
      trajAudioBuf = buf;
      startTrajPlayback(buf, sr);
    }
    return;
  }

  if (msg.jobId !== undefined && msg.jobId !== activeJobId) return;

  if (msg.type === 'progress') {
    progBar.style.width = Math.round((msg.value ?? 0) * 100) + '%';
    if (msg.status) setStatus(msg.status);

  } else if (msg.type === 'result') {
    if (encodePhase === 'A') {
      startEncodeB();
    } else if (encodePhase === 'B') {
      encodePhase = null;
      progBar.style.width = '100%';
      setStatus('Fetching embeddings…');
      worker.postMessage({ type: 'get_embeddings_exp6', jobId: activeJobId });
    }

  } else if (msg.type === 'embeddings_exp6') {
    currentEmbeds = msg; // includes scalesA / scalesB (Float32Array or null)
    populateLevelSelect(msg.codesDimsA[1]);
    triggerUMAP();

  } else if (msg.type === 'error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── Encode ────────────────────────────────────────────────────────────────────

function scheduleEncode(delay = 0) {
  clearTimeout(encodeTimer);
  encodeTimer = setTimeout(startEncode, delay);
}

async function startEncode() {
  if (!worker) initWorker();

  const sr       = mp.getSampleRate();
  const finalLen = Math.round(srcWidget.getDuration() * sr);

  let audioA, audioB;
  try {
    setStatus('Loading A…');
    audioA = await srcWidget.buildAudio(panelA, finalLen, sr);
    setStatus('Loading B…');
    audioB = await srcWidget.buildAudio(panelB, finalLen, sr);
  } catch (err) { setStatus(err.message, true); return; }

  coordsA = coordsB = null;
  renderScatter();

  pendingAudioB = audioB;
  encodePhase   = 'A';
  activeJobId   = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  setStatus('Encoding A…');

  worker.postMessage({
    type:      'encode', source: 'A', jobId: activeJobId,
    audio:     audioA.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
}

function startEncodeB() {
  encodePhase = 'B';
  setStatus('Encoding B…');
  worker.postMessage({
    type:      'encode', source: 'B', jobId: activeJobId,
    audio:     pendingAudioB.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
  pendingAudioB = null;
}

// ── Level selector ────────────────────────────────────────────────────────────

function populateLevelSelect(K) {
  levelSelect.innerHTML = '';
  for (let k = 0; k < K; k++) {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = `Level ${k + 1}`;
    levelSelect.appendChild(opt);
  }
  umapLevel = 0;
}

levelSelect.addEventListener('change', () => {
  umapLevel = parseInt(levelSelect.value);
  triggerUMAP();
});

// ── Mode toggle ───────────────────────────────────────────────────────────────

togCombined.addEventListener('click', () => {
  if (umapMode === 'combined') return;
  umapMode = 'combined';
  togCombined.classList.add('active');
  togPerLevel.classList.remove('active');
  levelWrap.style.display = 'none';
  triggerUMAP();
});

togPerLevel.addEventListener('click', () => {
  if (umapMode === 'per_level') return;
  umapMode = 'per_level';
  togPerLevel.classList.add('active');
  togCombined.classList.remove('active');
  levelWrap.style.display = '';
  triggerUMAP();
});

[nNeighborsEl, minDistEl].forEach(el => el.addEventListener('change', triggerUMAP));

// ── Codebook loading ──────────────────────────────────────────────────────────

async function ensureCodebooks() {
  const modelHz = mp.getModelHz();
  if (codebooks && codebooksFor === modelHz) return codebooks;
  setStatus('Loading codebooks…');
  const base = `${MODELS_BASE}/${modelHz}`;
  const [binRes, jsonRes] = await Promise.all([
    fetch(`${base}/codebooks.bin`),
    fetch(`${base}/codebooks.json`),
  ]);
  if (!binRes.ok || !jsonRes.ok) throw new Error('Could not load codebooks for ' + modelHz);
  const meta = await jsonRes.json();
  const buf  = await binRes.arrayBuffer();
  codebooks    = { data: new Float32Array(buf), n_q: meta.n_q, vocab_size: meta.vocab_size, dim: meta.dim };
  codebooksFor = modelHz;
  return codebooks;
}

// ── Frame extraction ──────────────────────────────────────────────────────────

// Build the UMAP feature vector when History K > 1:
//   [raw_emb[t]  ‖  feat[t-K+1]  ‖  …  ‖  feat[t-1]  ‖  feat[t]]
//    ^ D_raw anchor                  K × D_feat history (oldest → newest)
// rawFrames = original embeddings (the anchor, always present for K > 1)
// featFrames = embMode-transformed frames (what goes in the history window)
// K=1: no anchor needed — returns featFrames unchanged.
function applyWindowWithAnchor(rawFrames, featFrames, K) {
  if (K <= 1) return featFrames;
  const D_raw  = rawFrames[0].length;
  const D_feat = featFrames[0].length;
  return rawFrames.map((raw, t) => {
    const vec = new Float32Array(D_raw + K * D_feat);
    vec.set(raw, 0);                                        // anchor: emb[t]
    for (let k = 0; k < K; k++) {
      const srcT = Math.max(0, t - (K - 1 - k));
      vec.set(featFrames[srcT], D_raw + k * D_feat);        // history window
    }
    return vec;
  });
}

// Return only the frame-to-frame delta vectors (same dimensionality as input).
// First frame gets a zero delta.  Used for UMAP projection only — decoding always
// uses the original emb_quant regardless of this choice.
function computeDeltas(frames) {
  const D = frames[0].length;
  return frames.map((f, t) => {
    if (t === 0) return new Float32Array(D);
    const delta = new Float32Array(D);
    const prev  = frames[t - 1];
    for (let d = 0; d < D; d++) delta[d] = f[d] - prev[d];
    return delta;
  });
}

// Concatenate each frame with its delta: [emb ‖ emb−prev_emb] → Float32Array[2D].
// First frame gets a zero delta.
function appendDeltas(frames) {
  const D   = frames[0].length;
  const out = [];
  for (let t = 0; t < frames.length; t++) {
    const f   = frames[t];
    const vec = new Float32Array(2 * D);
    vec.set(f, 0);
    if (t > 0) { const p = frames[t-1]; for (let d = 0; d < D; d++) vec[D+d] = f[d] - p[d]; }
    out.push(vec);
  }
  return out;
}

// emb_quant layout: [1, D, T] flattened → index [d, t] = embQuant[d*T + t]
function embQuantToFrames(embQuant, dims) {
  const [, D, T] = dims;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const f = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = embQuant[d * T + t];
    frames.push(f);
  }
  return frames;
}

// codes layout: [1, K, T] flattened → index [k, t] = codes[k*T + t]
function codebookLookupFrames(cb, codes, dims, level) {
  const [, , T] = dims;
  const { data, vocab_size, dim } = cb;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const idx = codes[level * T + t];
    const off = level * vocab_size * dim + idx * dim;
    frames.push(data.slice(off, off + dim));
  }
  return frames;
}

// ── UMAP ──────────────────────────────────────────────────────────────────────

function triggerUMAP() {
  if (!currentEmbeds) return;
  runUMAP().catch(err => setStatus(err.message, true));
}

async function runUMAP() {
  if (!currentEmbeds) return;

  let framesA, framesB, rawA, rawB;
  if (umapMode === 'combined') {
    if (embSpace === 'pre_vq') {
      rawA = embQuantToFrames(currentEmbeds.embEncA, currentEmbeds.embEncDimsA);
      rawB = embQuantToFrames(currentEmbeds.embEncB, currentEmbeds.embEncDimsB);
    } else {
      rawA = embQuantToFrames(currentEmbeds.embQuantA, currentEmbeds.embQuantDimsA);
      rawB = embQuantToFrames(currentEmbeds.embQuantB, currentEmbeds.embQuantDimsB);
    }
    framesA = rawA; framesB = rawB;
    if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA);  framesB = appendDeltas(framesB); }
    else if (embMode === 'delta')     { framesA = computeDeltas(framesA); framesB = computeDeltas(framesB); }
  } else {
    const cb = await ensureCodebooks();
    rawA = codebookLookupFrames(cb, currentEmbeds.codesA, currentEmbeds.codesDimsA, umapLevel);
    rawB = codebookLookupFrames(cb, currentEmbeds.codesB, currentEmbeds.codesDimsB, umapLevel);
    framesA = rawA; framesB = rawB;
    if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA);  framesB = appendDeltas(framesB); }
    else if (embMode === 'delta')     { framesA = computeDeltas(framesA); framesB = computeDeltas(framesB); }
  }

  // History window: anchor = emb[t], then K steps of embMode feature (oldest → newest)
  const K = Math.max(1, parseInt(umapWindowEl.value) || 1);
  if (K > 1) {
    framesA = applyWindowWithAnchor(rawA, framesA, K);
    framesB = applyWindowWithAnchor(rawB, framesB, K);
  }

  const T_A = framesA.length;
  const T_B = framesB.length;
  const D   = framesA[0].length;

  // Pack into a single transferable flat Float32Array
  const flat = new Float32Array((T_A + T_B) * D);
  framesA.forEach((f, i) => flat.set(f, i * D));
  framesB.forEach((f, i) => flat.set(f, (T_A + i) * D));

  const nNeighbors = Math.min(
    Math.max(2, parseInt(nNeighborsEl.value) || 15),
    Math.max(2, Math.floor((T_A + T_B) / 3))
  );
  const minDist = parseFloat(minDistEl.value) || 0.1;

  if (!umapWorker) initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  setStatus(`UMAP — starting… (${T_A + T_B} frames)`);

  umapWorker.postMessage(
    { type: 'compute_umap', jobId: activeUMAPJobId, flat, T_A, T_B, D, nNeighbors, minDist },
    [flat.buffer]
  );
}

// ── Scatter plot ──────────────────────────────────────────────────────────────

function renderScatter() {
  const ctx = umapCanvas.getContext('2d');
  const W = umapCanvas.width, H = umapCanvas.height;
  ctx.clearRect(0, 0, W, H);
  if (!coordsA || !coordsB || !W || !H) return;

  // Compute bounds across all points
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for (const [x, y] of [...coordsA, ...coordsB]) {
    if (x < xMin) xMin = x; if (x > xMax) xMax = x;
    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
  }

  const pad   = 28 * dpr;
  const rangeX = xMax - xMin || 1;
  const rangeY = yMax - yMin || 1;
  const scale  = Math.min((W - 2 * pad) / rangeX, (H - 2 * pad) / rangeY);
  const offX   = (W - rangeX * scale) / 2;
  const offY   = (H - rangeY * scale) / 2;
  const toX    = x => offX + (x - xMin) * scale;
  const toY    = y => H - offY - (y - yMin) * scale;

  lastTransform = { xMin, yMin, scale, offX, offY, H };

  function drawTrail(coords, color) {
    if (coords.length < 2) return;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = 0.8 * dpr;
    ctx.globalAlpha = 0.18;
    ctx.beginPath();
    ctx.moveTo(toX(coords[0][0]), toY(coords[0][1]));
    for (let i = 1; i < coords.length; i++) {
      ctx.lineTo(toX(coords[i][0]), toY(coords[i][1]));
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawDots(coords, color) {
    const r = 2.5 * dpr;
    ctx.fillStyle = color;
    for (const [x, y] of coords) {
      ctx.beginPath();
      ctx.arc(toX(x), toY(y), r, 0, 2 * Math.PI);
      ctx.fill();
    }
  }

  drawTrail(coordsA, '#c87800');
  drawTrail(coordsB, '#2090c0');
  drawDots(coordsA, '#c87800');
  drawDots(coordsB, '#2090c0');

  if (selectedPoint) {
    const coords = selectedPoint.src === 'A' ? coordsA : coordsB;
    const pt = coords[selectedPoint.idx];
    if (pt) {
      ctx.save();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = 1.5 * dpr;
      ctx.beginPath();
      ctx.arc(toX(pt[0]), toY(pt[1]), 6 * dpr, 0, 2 * Math.PI);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── Trajectory overlay ────────────────────────────────────────────────────
  if (userTrajectory.length >= 2) {
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 2 * dpr;
    ctx.globalAlpha = 0.75;
    ctx.setLineDash([4 * dpr, 3 * dpr]);
    ctx.beginPath();
    ctx.moveTo(toX(userTrajectory[0][0]), toY(userTrajectory[0][1]));
    for (let i = 1; i < userTrajectory.length; i++)
      ctx.lineTo(toX(userTrajectory[i][0]), toY(userTrajectory[i][1]));
    ctx.stroke();

    // start/end markers
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.fillStyle   = '#44ff88';
    ctx.beginPath();
    ctx.arc(toX(userTrajectory[0][0]), toY(userTrajectory[0][1]), 4 * dpr, 0, 2 * Math.PI);
    ctx.fill();
    ctx.fillStyle = '#ff4466';
    ctx.beginPath();
    ctx.arc(toX(userTrajectory[userTrajectory.length-1][0]), toY(userTrajectory[userTrajectory.length-1][1]), 4 * dpr, 0, 2 * Math.PI);
    ctx.fill();
    ctx.restore();
  }

  // ── Snap overlay ──────────────────────────────────────────────────────────
  if (pathMode === 'snap' && snapFrames && snapFrames.length >= 2) {
    const ptOf = ({src, idx}) => src === 'A' ? coordsA[idx] : coordsB[idx];
    ctx.save();
    ctx.strokeStyle = '#ff9944';
    ctx.lineWidth   = 1.5 * dpr;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    for (let i = 0; i < snapFrames.length; i++) {
      const [x, y] = ptOf(snapFrames[i]);
      i === 0 ? ctx.moveTo(toX(x), toY(y)) : ctx.lineTo(toX(x), toY(y));
    }
    ctx.stroke();
    ctx.fillStyle   = '#ff9944';
    ctx.globalAlpha = 0.65;
    for (const f of snapFrames) {
      const [x, y] = ptOf(f);
      ctx.beginPath(); ctx.arc(toX(x), toY(y), 3 * dpr, 0, 2 * Math.PI); ctx.fill();
    }
    ctx.globalAlpha = 1;
    const [sx, sy] = ptOf(snapFrames[0]);
    const [ex, ey] = ptOf(snapFrames[snapFrames.length - 1]);
    ctx.fillStyle = '#44ff88';
    ctx.beginPath(); ctx.arc(toX(sx), toY(sy), 4 * dpr, 0, 2 * Math.PI); ctx.fill();
    ctx.fillStyle = '#ff4466';
    ctx.beginPath(); ctx.arc(toX(ex), toY(ey), 4 * dpr, 0, 2 * Math.PI); ctx.fill();
    ctx.restore();
  }

  // ── Code path overlay ─────────────────────────────────────────────────────
  if (pathMode === 'code' && codePathFrames && codePathFrames.length >= 2) {
    const ptOf = ({src, idx}) => src === 'A' ? coordsA[idx] : coordsB[idx];
    ctx.save();
    // Line through actual frame positions
    ctx.strokeStyle = '#44ddaa';
    ctx.lineWidth   = 1.5 * dpr;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    for (let i = 0; i < codePathFrames.length; i++) {
      const [x, y] = ptOf(codePathFrames[i]);
      i === 0 ? ctx.moveTo(toX(x), toY(y)) : ctx.lineTo(toX(x), toY(y));
    }
    ctx.stroke();
    // Dots at each frame
    ctx.fillStyle   = '#44ddaa';
    ctx.globalAlpha = 0.55;
    for (const f of codePathFrames) {
      const [x, y] = ptOf(f);
      ctx.beginPath(); ctx.arc(toX(x), toY(y), 2.5 * dpr, 0, 2 * Math.PI); ctx.fill();
    }
    // Start (green) / end (red) caps
    ctx.globalAlpha = 1;
    const [sx, sy] = ptOf(codePathFrames[0]);
    const [ex, ey] = ptOf(codePathFrames[codePathFrames.length - 1]);
    ctx.fillStyle = '#44ff88';
    ctx.beginPath(); ctx.arc(toX(sx), toY(sy), 4 * dpr, 0, 2 * Math.PI); ctx.fill();
    ctx.fillStyle = '#ff4466';
    ctx.beginPath(); ctx.arc(toX(ex), toY(ey), 4 * dpr, 0, 2 * Math.PI); ctx.fill();
    ctx.restore();
  }

  // ── Moving anchor ─────────────────────────────────────────────────────────
  if (trajAnchorPos >= 0) {
    let ax, ay;
    if (pathMode === 'snap' && snapPlayFrames && snapPlayFrames.length >= 2) {
      const fi = Math.min(Math.floor(trajAnchorPos * (snapPlayFrames.length - 1)), snapPlayFrames.length - 1);
      const f  = snapPlayFrames[fi];
      [ax, ay] = f.src === 'A' ? coordsA[f.idx] : coordsB[f.idx];
    } else if (pathMode === 'code' && codePathFrames && codePathFrames.length >= 2) {
      const fi = Math.min(Math.floor(trajAnchorPos * (codePathFrames.length - 1)), codePathFrames.length - 1);
      const f  = codePathFrames[fi];
      [ax, ay] = f.src === 'A' ? coordsA[f.idx] : coordsB[f.idx];
    } else if (userTrajectory.length >= 2) {
      const ti = trajAnchorPos * (userTrajectory.length - 1);
      const lo = Math.floor(ti), hi = Math.min(lo + 1, userTrajectory.length - 1);
      const t  = ti - lo;
      ax = userTrajectory[lo][0] + t * (userTrajectory[hi][0] - userTrajectory[lo][0]);
      ay = userTrajectory[lo][1] + t * (userTrajectory[hi][1] - userTrajectory[lo][1]);
    }
    if (ax !== undefined) {
      ctx.save();
      ctx.fillStyle   = '#ffd700';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = 1.5 * dpr;
      ctx.beginPath();
      ctx.arc(toX(ax), toY(ay), 6 * dpr, 0, 2 * Math.PI);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  }
}

// ── Mode toggles ──────────────────────────────────────────────────────────────

togExplore.addEventListener('click', () => {
  canvasMode = 'explore';
  togExplore.classList.add('active'); togDraw.classList.remove('active');
  umapCanvas.style.cursor = 'crosshair';
});

togDraw.addEventListener('click', () => {
  canvasMode = 'draw';
  togDraw.classList.add('active'); togExplore.classList.remove('active');
  umapCanvas.style.cursor = 'crosshair';
  setStatus('Click and drag on the UMAP to draw a trajectory.');
});

// ── Canvas helpers ────────────────────────────────────────────────────────────

function canvasToUmap(e) {
  const { xMin, yMin, scale, offX, offY, H } = lastTransform;
  const rect  = umapCanvas.getBoundingClientRect();
  const physX = (e.clientX - rect.left) * dpr;
  const physY = (e.clientY - rect.top)  * dpr;
  return [(physX - offX) / scale + xMin, (H - physY - offY) / scale + yMin];
}

function resamplePath(pts, maxN) {
  if (pts.length < 2) return pts.slice();
  const arcLen = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
    arcLen.push(arcLen[i-1] + Math.sqrt(dx*dx + dy*dy));
  }
  const total = arcLen[arcLen.length - 1];
  if (total < 1e-12) return [pts[0].slice()];
  const N = Math.min(maxN, pts.length);
  const out = [];
  for (let i = 0; i < N; i++) {
    const tgt = total * i / (N - 1);
    let lo = 0, hi = pts.length - 1;
    while (lo < hi - 1) { const mid = (lo + hi) >> 1; if (arcLen[mid] <= tgt) lo = mid; else hi = mid; }
    if (arcLen[hi] === arcLen[lo]) { out.push(pts[lo].slice()); continue; }
    const t = (tgt - arcLen[lo]) / (arcLen[hi] - arcLen[lo]);
    out.push([pts[lo][0] + t * (pts[hi][0] - pts[lo][0]), pts[lo][1] + t * (pts[hi][1] - pts[lo][1])]);
  }
  return out;
}

// ── Freehand drawing ──────────────────────────────────────────────────────────

umapCanvas.style.cursor = 'crosshair';

umapCanvas.addEventListener('mousedown', e => {
  if (!lastTransform) return;
  if (e.shiftKey && userTrajectory.length >= 2) {
    isShiftDragging   = true;
    shiftDragStart    = canvasToUmap(e);
    shiftDragBaseTraj = userTrajectory.map(p => [p[0], p[1]]);
    umapCanvas.style.cursor = 'move';
    return;
  }
  if (canvasMode !== 'draw') return;
  isDrawing = true;
  rawDrawPoints = [canvasToUmap(e)];
  userTrajectory = rawDrawPoints.slice();
  trajAnchorPos = -1;
  renderScatter();
});

umapCanvas.addEventListener('mousemove', e => {
  if (isShiftDragging) {
    const [cx, cy] = canvasToUmap(e);
    const dx = cx - shiftDragStart[0], dy = cy - shiftDragStart[1];
    userTrajectory = shiftDragBaseTraj.map(([x, y]) => [x + dx, y + dy]);
    renderScatter();
    return;
  }
  if (!isDrawing) return;
  const pt = canvasToUmap(e);
  const last = rawDrawPoints[rawDrawPoints.length - 1];
  const dx = (pt[0] - last[0]) * lastTransform.scale;
  const dy = (pt[1] - last[1]) * lastTransform.scale;
  if (dx*dx + dy*dy < (2 * dpr) ** 2) return;
  rawDrawPoints.push(pt);
  userTrajectory = rawDrawPoints;
  renderScatter();
});

const finishShiftDrag = () => {
  if (!isShiftDragging) return;
  isShiftDragging = false; shiftDragStart = null; shiftDragBaseTraj = null;
  umapCanvas.style.cursor = 'crosshair';
  autoRegenerate();
};

const finishDraw = () => {
  if (!isDrawing) return;
  isDrawing = false;
  userTrajectory = rawDrawPoints.length >= 2 ? resamplePath(rawDrawPoints, 300) : [];
  renderScatter();
  if (userTrajectory.length >= 2) autoRegenerate();
};

umapCanvas.addEventListener('mouseup', e    => { finishShiftDrag(); finishDraw(); });
umapCanvas.addEventListener('mouseleave', e => { finishShiftDrag(); finishDraw(); });

// ── Click to play (explore mode) ──────────────────────────────────────────────

umapCanvas.addEventListener('click', async e => {
  if (canvasMode !== 'explore') return;
  if (!coordsA || !coordsB || !lastTransform || !currentEmbeds) return;
  if (encodePhase !== null) return;

  const [umapX, umapY] = canvasToUmap(e);

  let bestDist = Infinity, bestSrc = null, bestIdx = -1;
  for (let i = 0; i < coordsA.length; i++) {
    const d = (coordsA[i][0] - umapX) ** 2 + (coordsA[i][1] - umapY) ** 2;
    if (d < bestDist) { bestDist = d; bestSrc = 'A'; bestIdx = i; }
  }
  for (let i = 0; i < coordsB.length; i++) {
    const d = (coordsB[i][0] - umapX) ** 2 + (coordsB[i][1] - umapY) ** 2;
    if (d < bestDist) { bestDist = d; bestSrc = 'B'; bestIdx = i; }
  }
  if (bestIdx < 0) return;

  selectedPoint = { src: bestSrc, idx: bestIdx };
  renderScatter();

  const T = bestSrc === 'A' ? currentEmbeds.codesDimsA[2] : currentEmbeds.codesDimsB[2];
  const framesPerSec = (bestSrc === 'A' ? coordsA.length : coordsB.length) / srcWidget.getDuration();
  const half       = Math.max(1, Math.round(framesPerSec * 0.5));
  const startFrame = Math.max(0, bestIdx - half);
  const endFrame   = Math.min(T, bestIdx + half);

  if (!audioCtx) audioCtx = new AudioContext();

  playJobId = ++jobSeq;
  setStatus(`Decoding frame ${bestIdx} (${bestSrc})…`);
  worker.postMessage({
    type: 'play_frame_exp6', jobId: playJobId,
    source: bestSrc, bestIdx, startFrame, endFrame,
    modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
  });
});

// ── Trajectory playback ───────────────────────────────────────────────────────

function startTrajPlayback(buf, sr) {
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  trajPlayStartTime   = audioCtx.currentTime;
  trajCurrentDuration = buf.length / sr;
  src.start();
  requestAnimationFrame(animateTrajAnchor);
  setStatus(`Playing trajectory (${trajCurrentDuration.toFixed(1)} s)${trajLooping ? ' — looping' : ''}…`);
}

function animateTrajAnchor() {
  if (!trajPlayStartTime || !audioCtx) return;
  const elapsed  = audioCtx.currentTime - trajPlayStartTime;
  const duration = trajCurrentDuration || parseFloat(trajDurationEl.value) || 4;
  trajAnchorPos  = Math.min(elapsed / duration, 1);
  renderScatter();
  if (trajAnchorPos < 1) {
    requestAnimationFrame(animateTrajAnchor);
  } else if (trajLooping && trajAudioBuf) {
    startTrajPlayback(trajAudioBuf, mp.getSampleRate());
  } else {
    trajAnchorPos     = -1;
    trajPlayStartTime = null;
    renderScatter();
    setStatus('Trajectory playback done.');
  }
}

// ── Code-path graph search ────────────────────────────────────────────────────

function buildCodePathGraph() {
  const nA = coordsA.length, nB = coordsB.length;
  const N  = nA + nB;
  const K  = Math.min(Math.max(2, parseInt(nNeighborsEl.value) || 15), 20);
  const adj = Array.from({length: N}, () => []);

  const cx = i => (i < nA ? coordsA[i] : coordsB[i - nA])[0];
  const cy = i => (i < nA ? coordsA[i] : coordsB[i - nA])[1];
  const w  = (i, j) => Math.sqrt((cx(i)-cx(j))**2 + (cy(i)-cy(j))**2);

  // kNN edges (covers temporal + cross-source neighbourhood)
  for (let i = 0; i < N; i++) {
    const dists = [];
    for (let j = 0; j < N; j++) {
      if (j === i) continue;
      dists.push([j, (cx(i)-cx(j))**2 + (cy(i)-cy(j))**2]);
    }
    dists.sort((a, b) => a[1] - b[1]);
    for (let k = 0; k < Math.min(K, dists.length); k++) {
      const [j, d2] = dists[k];
      adj[i].push({j, w: Math.sqrt(d2)});
    }
  }
  // Guarantee temporal edges are always present
  for (let i = 1; i < nA; i++) {
    const d = w(i-1, i);
    adj[i-1].push({j: i, w: d}); adj[i].push({j: i-1, w: d});
  }
  for (let i = 1; i < nB; i++) {
    const ni = nA+i, np = nA+i-1;
    const d = w(ni, np);
    adj[np].push({j: ni, w: d}); adj[ni].push({j: np, w: d});
  }
  return adj;
}

function dijkstra(adj, start, end) {
  const N    = adj.length;
  const dist = new Float64Array(N).fill(Infinity);
  const prev = new Int32Array(N).fill(-1);
  const done = new Uint8Array(N);
  dist[start] = 0;
  for (let iter = 0; iter < N; iter++) {
    let u = -1;
    for (let i = 0; i < N; i++) if (!done[i] && (u < 0 || dist[i] < dist[u])) u = i;
    if (u < 0 || dist[u] === Infinity || u === end) break;
    done[u] = 1;
    for (const {j, w} of adj[u]) {
      const nd = dist[u] + w;
      if (nd < dist[j]) { dist[j] = nd; prev[j] = u; }
    }
  }
  if (dist[end] === Infinity) return null;
  const path = [];
  for (let cur = end; cur >= 0; cur = prev[cur]) path.unshift(cur);
  return path;
}

function findCodePath() {
  if (!userTrajectory || userTrajectory.length < 2 || !coordsA || !coordsB) return null;
  const nA = coordsA.length;

  const nearestNode = ([px, py]) => {
    let best = 0, bestD = Infinity;
    for (let i = 0; i < coordsA.length; i++) {
      const d = (coordsA[i][0]-px)**2 + (coordsA[i][1]-py)**2;
      if (d < bestD) { bestD = d; best = i; }
    }
    for (let i = 0; i < coordsB.length; i++) {
      const d = (coordsB[i][0]-px)**2 + (coordsB[i][1]-py)**2;
      if (d < bestD) { bestD = d; best = nA+i; }
    }
    return best;
  };

  const startNode = nearestNode(userTrajectory[0]);
  const endNode   = nearestNode(userTrajectory[userTrajectory.length - 1]);
  if (startNode === endNode) {
    const s = startNode < nA ? {src:'A', idx:startNode} : {src:'B', idx:startNode-nA};
    return [s];
  }

  const nodePath = dijkstra(buildCodePathGraph(), startNode, endNode);
  if (!nodePath) return null;
  return nodePath.map(n => n < nA ? {src:'A', idx:n} : {src:'B', idx:n-nA});
}

// Walk backward K steps through the directed latent graph.
// At each step: prefer the cross-source frame nearest to the current position if it
// is within `range` UMAP units AND closer than the temporal predecessor; otherwise
// step back one frame in the same source.  Multi-hop: each step re-evaluates the swap.
// Returns [{src,idx}] in forward (oldest-first) order, length ≤ K.
function walkBackward(src, idx, K, range) {
  const frames = [];
  let cSrc = src, cIdx = idx;

  for (let step = 0; step < K; step++) {
    const cCoords = cSrc === 'A' ? coordsA : coordsB;
    const [cx, cy] = cCoords[cIdx];

    // Temporal predecessor in same source
    let bSrc = null, bIdx = -1, bDist = Infinity;
    if (cIdx > 0) {
      const [px, py] = cCoords[cIdx - 1];
      bDist = Math.sqrt((cx - px) ** 2 + (cy - py) ** 2);
      bSrc = cSrc; bIdx = cIdx - 1;
    }

    // Cross-source candidates within range (multi-hop: check the other source)
    if (range > 0) {
      const oSrc    = cSrc === 'A' ? 'B' : 'A';
      const oCoords = oSrc  === 'A' ? coordsA : coordsB;
      for (let j = 0; j < oCoords.length; j++) {
        const d = Math.sqrt((oCoords[j][0] - cx) ** 2 + (oCoords[j][1] - cy) ** 2);
        if (d < range && d < bDist) { bDist = d; bSrc = oSrc; bIdx = j; }
      }
    }

    if (bIdx < 0) break; // reached start of all sources
    cSrc = bSrc; cIdx = bIdx;
    frames.unshift({src: cSrc, idx: cIdx}); // prepend → oldest first
  }
  return frames;
}

// Build a Float32Array(N) of per-frame scale values for 48k trajectory decoding.
// seq is an array of {src, idx}; returns null for 24k (scales not needed).
function makeFrameScales(seq) {
  if (!currentEmbeds.scalesA && !currentEmbeds.scalesB) return null; // 24k
  const out = new Float32Array(seq.length);
  for (let i = 0; i < seq.length; i++) {
    const {src, idx} = seq[i];
    const arr = src === 'A' ? currentEmbeds.scalesA : currentEmbeds.scalesB;
    out[i] = arr ? (arr[idx] || 1.0) : 1.0;
  }
  return out;
}

// ── Snap helpers ──────────────────────────────────────────────────────────────

// Sample the drawn path and snap each sample to the nearest UMAP frame.
// Returns deduplicated [{src,idx}] waypoints.
function computeSnapWaypoints() {
  if (!userTrajectory || userTrajectory.length < 2 || !coordsA || !coordsB) return [];
  const fps = coordsA.length / srcWidget.getDuration();
  const N   = Math.max(2, Math.round((parseFloat(trajDurationEl.value) || 4) * fps));

  const raw = [];
  for (let i = 0; i < N; i++) {
    const frac = i / (N - 1);
    const ti   = frac * (userTrajectory.length - 1);
    const lo   = Math.floor(ti), hi = Math.min(lo + 1, userTrajectory.length - 1);
    const tt   = ti - lo;
    const px   = userTrajectory[lo][0] + tt * (userTrajectory[hi][0] - userTrajectory[lo][0]);
    const py   = userTrajectory[lo][1] + tt * (userTrajectory[hi][1] - userTrajectory[lo][1]);

    let bestD = Infinity, bestSrc = 'A', bestIdx = 0;
    for (let j = 0; j < coordsA.length; j++) {
      const d = (coordsA[j][0]-px)**2 + (coordsA[j][1]-py)**2;
      if (d < bestD) { bestD = d; bestSrc = 'A'; bestIdx = j; }
    }
    for (let j = 0; j < coordsB.length; j++) {
      const d = (coordsB[j][0]-px)**2 + (coordsB[j][1]-py)**2;
      if (d < bestD) { bestD = d; bestSrc = 'B'; bestIdx = j; }
    }
    const last = raw[raw.length - 1];
    if (!last || last.src !== bestSrc || last.idx !== bestIdx) raw.push({src: bestSrc, idx: bestIdx});
  }
  return raw;
}

// Build the full decode sequence from snap waypoints.
// Pre-roll (K_pre frames from same source) is added:
//   • before the very first waypoint
//   • at every source transition or backward jump
// Within-source forward runs fill naturally (A[i]→A[i+1]→…).
// For 48k a post-roll is appended after the last waypoint.
// Auto-duration snap: fixed K_pre per context window, deduplicates, natural length.
function buildSnapSequence(waypoints, K_pre, K_post, ctxSwap) {
  const T_A = currentEmbeds.embQuantDimsA[2];
  const T_B = currentEmbeds.embQuantDimsB[2];
  const getT = src => src === 'A' ? T_A : T_B;
  const seq  = [];

  const addPreroll = (src, idx, K) => {
    const frames = walkBackward(src, idx, K, ctxSwap);
    for (const f of frames) seq.push(f);
    seq.push({src, idx});
  };

  addPreroll(waypoints[0].src, waypoints[0].idx, K_pre);

  for (let w = 1; w < waypoints.length; w++) {
    const {src, idx} = waypoints[w];
    const prev = waypoints[w - 1];
    if (prev.src === src && idx > prev.idx && (idx - prev.idx) <= K_pre) {
      // Close forward same-source run — LSTM stays warm, fill naturally
      for (let i = prev.idx + 1; i <= idx; i++) seq.push({src, idx: i});
    } else {
      addPreroll(src, idx, K_pre);
    }
  }

  if (K_post > 0) {
    const {src: sL, idx: iL} = waypoints[waypoints.length - 1];
    const T = getT(sL);
    for (let i = iL + 1; i <= Math.min(T - 1, iL + K_post); i++) seq.push({src: sL, idx: i});
  }

  if (!seq.length) return [];
  const out = [seq[0]];
  for (let i = 1; i < seq.length; i++) {
    const p = out[out.length - 1];
    if (seq[i].src !== p.src || seq[i].idx !== p.idx) out.push(seq[i]);
  }
  return out;
}

// Fixed-duration snap: distributes frame budget evenly across waypoints so that
// total = exactly N_target frames (+ K_post for 48k post-roll).
// All waypoints are always visited; context window size is adjusted to hit the target.
function buildSnapSequenceFixed(waypoints, N_target, K_post, ctxSwap) {
  const N_wp     = waypoints.length;
  const N_budget = Math.max(0, N_target - N_wp);  // frames for context windows
  const K_base   = Math.floor(N_budget / N_wp);
  const N_extra  = N_budget % N_wp;               // first N_extra waypoints get +1

  const seq = [];

  for (let w = 0; w < N_wp; w++) {
    const {src, idx} = waypoints[w];
    const K_this = K_base + (w < N_extra ? 1 : 0);

    if (K_this > 0) {
      const frames = walkBackward(src, idx, K_this, ctxSwap);
      // Pad to K_this if walkBackward ran out (near source start)
      const fallback = frames[0] || {src, idx};
      while (frames.length < K_this) frames.unshift({...fallback});
      for (const f of frames) seq.push(f);
    }
    seq.push({src, idx});
  }

  // Hard trim/extend to exactly N_target before post-roll
  if (seq.length > N_target) {
    seq.length = N_target;
  } else {
    while (seq.length < N_target) seq.push({...seq[seq.length - 1]});
  }

  // Post-roll (48k)
  if (K_post > 0) {
    const {src: sL, idx: iL} = waypoints[N_wp - 1];
    const T_L = sL === 'A' ? currentEmbeds.embQuantDimsA[2] : currentEmbeds.embQuantDimsB[2];
    for (let i = iL + 1; i <= Math.min(T_L - 1, iL + K_post); i++) seq.push({src: sL, idx: i});
  }

  return seq;
}

function autoRegenerate() {
  // Always update snap waypoint viz when drawing in snap mode
  if (pathMode === 'snap' && coordsA && coordsB) {
    snapFrames = computeSnapWaypoints();
    renderScatter();
  }
  if (userTrajectory.length < 2 || !currentEmbeds || !coordsA || !coordsB) {
    if (userTrajectory.length >= 2) setStatus('Path drawn. Encode sources and run UMAP to play.');
    return;
  }
  trajPlayStartTime = null;
  playTrajectory();
}

async function playTrajectory() {
  if (!userTrajectory || userTrajectory.length < 2) { setStatus('Draw a trajectory first.', true); return; }
  if (!currentEmbeds)                                { setStatus('Encode both sources first.', true); return; }
  if (!coordsA || !coordsB)                          { setStatus('Run UMAP first.', true); return; }

  const [, D, T_A] = currentEmbeds.embQuantDimsA;
  const [, , T_B]  = currentEmbeds.embQuantDimsB;

  // ── Code-path mode ────────────────────────────────────────────────────────
  if (pathMode === 'code') {
    const path = findCodePath();
    if (!path || path.length === 0) { setStatus('No path found between endpoints.', true); return; }
    codePathFrames = path;
    renderScatter();

    const N = path.length;
    const blended = new Float32Array(D * N);
    for (let i = 0; i < N; i++) {
      const {src, idx} = path[i];
      const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
      const T   = src === 'A' ? T_A : T_B;
      for (let d = 0; d < D; d++) blended[d * N + i] = emb[d * T + idx];
    }
    if (!audioCtx) audioCtx = new AudioContext();
    playJobId = ++jobSeq;
    setStatus(`Decoding code path (${N} frames)…`);
    const codeScales = makeFrameScales(path);
    const codeXfers  = [blended.buffer];
    if (codeScales) codeXfers.push(codeScales.buffer);
    worker.postMessage({
      type: 'decode_trajectory_exp6', jobId: playJobId,
      embQuant: blended, dims: [1, D, N],
      frameScales: codeScales || undefined,
      modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
    }, codeXfers);
    return;
  }

  // ── Snap mode ─────────────────────────────────────────────────────────────
  if (pathMode === 'snap') {
    const waypoints = computeSnapWaypoints();
    if (!waypoints.length) { setStatus('Draw a path first.', true); return; }
    snapFrames = waypoints;

    const is48k  = mp.getModelHz() === '48k';
    const fps    = coordsA.length / srcWidget.getDuration();
    const K_post = is48k ? Math.max(2, Math.round(fps * 0.03)) : 0;

    let seq;
    if (snapDurMode === 'fixed') {
      const N_target = Math.max(waypoints.length,
                         Math.round((parseFloat(trajDurationEl.value) || 4) * fps));
      seq = buildSnapSequenceFixed(waypoints, N_target, K_post, ctxSwapRange);
    } else {
      const K_pre = Math.max(4, Math.round(fps * 0.05));
      seq = buildSnapSequence(waypoints, K_pre, K_post, ctxSwapRange);
    }

    snapPlayFrames = seq;
    renderScatter();

    const N = seq.length;
    const blended = new Float32Array(D * N);
    for (let i = 0; i < N; i++) {
      const {src, idx} = seq[i];
      const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
      const T   = src === 'A' ? T_A : T_B;
      for (let d = 0; d < D; d++) blended[d * N + i] = emb[d * T + idx];
    }
    if (!audioCtx) audioCtx = new AudioContext();
    playJobId = ++jobSeq;
    const snapLabel = snapDurMode === 'fixed' ? 'snap fixed' : 'snap auto';
    setStatus(`Decoding ${snapLabel} (${N} frames, ${(N / fps).toFixed(1)} s)…`);
    const snapScales  = makeFrameScales(seq);
    const snapXfers   = [blended.buffer];
    if (snapScales) snapXfers.push(snapScales.buffer);
    worker.postMessage({
      type: 'decode_trajectory_exp6', jobId: playJobId,
      embQuant: blended, dims: [1, D, N],
      frameScales: snapScales || undefined,
      modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
    }, snapXfers);
    return;
  }

  // ── Draw-path mode ────────────────────────────────────────────────────────
  const duration     = parseFloat(trajDurationEl.value) || 4;
  const framesPerSec = coordsA.length / srcWidget.getDuration();
  const N            = Math.max(2, Math.round(duration * framesPerSec));

  const getFrame = (src, idx) => {
    const emb = src === 'A' ? currentEmbeds.embQuantA : currentEmbeds.embQuantB;
    const T   = src === 'A' ? T_A : T_B;
    const f   = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = emb[d * T + idx];
    return f;
  };

  const blended     = new Float32Array(D * N);
  const hasScales   = !!(currentEmbeds.scalesA || currentEmbeds.scalesB);
  const drawScales  = hasScales ? new Float32Array(N) : null;

  for (let i = 0; i < N; i++) {
    const frac = i / (N - 1);
    const ti   = frac * (userTrajectory.length - 1);
    const lo   = Math.floor(ti), hi = Math.min(lo + 1, userTrajectory.length - 1);
    const t    = ti - lo;
    const px   = userTrajectory[lo][0] + t * (userTrajectory[hi][0] - userTrajectory[lo][0]);
    const py   = userTrajectory[lo][1] + t * (userTrajectory[hi][1] - userTrajectory[lo][1]);

    let d1 = Infinity, d2 = Infinity;
    let src1 = null, idx1 = -1, src2 = null, idx2 = -1;
    for (let j = 0; j < coordsA.length; j++) {
      const d = (coordsA[j][0] - px) ** 2 + (coordsA[j][1] - py) ** 2;
      if (d < d1) { d2=d1; src2=src1; idx2=idx1; d1=d; src1='A'; idx1=j; }
      else if (d < d2) { d2=d; src2='A'; idx2=j; }
    }
    for (let j = 0; j < coordsB.length; j++) {
      const d = (coordsB[j][0] - px) ** 2 + (coordsB[j][1] - py) ** 2;
      if (d < d1) { d2=d1; src2=src1; idx2=idx1; d1=d; src1='B'; idx1=j; }
      else if (d < d2) { d2=d; src2='B'; idx2=j; }
    }

    const f1  = getFrame(src1, idx1);
    const f2  = idx2 >= 0 ? getFrame(src2, idx2) : f1;
    const sd1 = Math.sqrt(d1), sd2 = idx2 >= 0 ? Math.sqrt(d2) : 0;
    const sum = sd1 + sd2;
    const w1  = sum > 1e-12 ? sd2 / sum : 1;
    const w2  = 1 - w1;
    for (let d = 0; d < D; d++) blended[d * N + i] = w1 * f1[d] + w2 * f2[d];
    if (drawScales) {
      const getScale = (src, idx) => {
        const arr = src === 'A' ? currentEmbeds.scalesA : currentEmbeds.scalesB;
        return arr ? (arr[idx] || 1.0) : 1.0;
      };
      drawScales[i] = w1 * getScale(src1, idx1)
                    + w2 * (idx2 >= 0 ? getScale(src2, idx2) : getScale(src1, idx1));
    }
  }

  if (!audioCtx) audioCtx = new AudioContext();
  playJobId = ++jobSeq;
  setStatus(`Decoding ${N} frames (${duration} s)…`);

  const drawXfers = [blended.buffer];
  if (drawScales) drawXfers.push(drawScales.buffer);
  worker.postMessage({
    type: 'decode_trajectory_exp6', jobId: playJobId,
    embQuant: blended, dims: [1, D, N],
    frameScales: drawScales || undefined,
    modelHz: mp.getModelHz(), bwKbps: mp.getBwKbps(),
  }, drawXfers);
}
</script>
