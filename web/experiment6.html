<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exp 6 — Codebook UMAP</title>
<link rel="stylesheet" href="encodec.css">
<style>
/* Experiment-6-only overrides — kept here to avoid polluting shared encodec.css */
#levelDropdown { position: relative; }
#levelMenu {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: #1c1c1c; border: 1px solid var(--border2); border-radius: 4px;
  padding: 4px 0; z-index: 200; min-width: 90px;
}
#levelMenu.open { display: block; }
#levelMenu label {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; color: var(--text);
}
#levelMenu label:hover { background: #2a2a2a; }
#levelMenu input[type=checkbox] { accent-color: var(--accent); cursor: pointer; margin: 0; }
#frame { grid-template-columns: 210px 1fr; }
:root  { --lbl-w: 5.5em; }
/* Reset shared rules that don't apply in this layout */
#statusBar  { flex: none; white-space: normal; overflow: visible; text-overflow: clip; min-width: auto; }
#progressWrap { width: auto; overflow: visible; }
#seqInfo    { font-family: monospace; font-size: 0.78em; color: #aaa; margin-left: 0.6em;
              flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; }
/* UMAP slot switcher */
#slotWrap   { display: none; align-items: center; gap: 2px; margin-right: 4px; }
#slotWrap.visible { display: flex; }
#slotPrev, #slotNext { padding: 1px 5px; min-width: 20px; font-size: 12px; line-height: 1; }
#slotDots   { display: flex; gap: 3px; align-items: center; padding: 0 2px; }
.umap-dot   { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #555;
              background: transparent; cursor: pointer; padding: 0; flex-shrink: 0;
              transition: background 0.15s, border-color 0.15s; }
.umap-dot.ready  { background: #666; border-color: #888; }
.umap-dot.active { background: var(--accent) !important; border-color: var(--accent) !important; }
/* ── Bookmark library ── */
#libList { display: flex; flex-direction: column; gap: 3px; margin-top: 5px;
           max-height: 220px; overflow-y: auto; }
.lib-item { display: flex; align-items: center; gap: 3px; }
.lib-name { flex: 1; min-width: 0; background: #1c1c1c; border: 1px solid var(--border2);
            color: var(--text); font-size: 10px; padding: 2px 4px; border-radius: 2px; }
.lib-name:focus { outline: none; border-color: var(--accent); }
.lib-btn  { flex: none; background: none; border: 1px solid var(--border2); color: var(--muted);
            font-size: 11px; padding: 1px 5px; border-radius: 2px; cursor: pointer; line-height: 1.5; }
.lib-btn:hover { color: var(--text); border-color: #555; }
.lib-btn.lib-del:hover { color: #e06060; border-color: #c04040; }
#libEmpty { font-size: 11px; color: var(--muted); padding: 3px 0; }
/* ── Floating trajectory panel ── */
#trajPanel {
  position: absolute; top: 8px; left: 8px; z-index: 20;
  width: 174px;
  background: rgba(18,18,18,0.93);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 7px 9px 8px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.55);
  backdrop-filter: blur(3px);
  --lbl-w: 4.9em;
  font-size: 12px;
}
#trajPanel .section-title {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.45em; cursor: pointer; user-select: none;
}
#trajPanelCollapseBtn {
  background: none; border: none; color: var(--muted); font-size: 11px;
  cursor: pointer; padding: 0; line-height: 1;
}
#trajPanel.collapsed #trajPanelBody { display: none; }
#trajPanel.collapsed { padding-bottom: 7px; }
/* Draw-segment context menu */
#segCtxMenu {
  display: none; position: fixed; z-index: 900;
  background: #1e1e1e; border: 1px solid #444; border-radius: 5px;
  padding: 3px 0; min-width: 110px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  font-size: 12px;
}
#segCtxMenu .seg-ctx-item {
  padding: 6px 14px; cursor: pointer; color: #ddd; white-space: nowrap;
}
#segCtxMenu .seg-ctx-item:hover { background: #2c2c2c; }
#segCtxMenu .seg-ctx-item.danger { color: #e06060; }
#segCtxMenu .seg-ctx-sep { height: 1px; background: #333; margin: 3px 0; }

/* ── Cache manager modal ── */
#cacheModal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
}
#cacheModal.hidden { display: none; }
#cacheModalBox {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 16px 18px;
  width: 520px; max-width: 95vw; max-height: 75vh;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#cacheModalTitle {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; justify-content: space-between;
}
#cacheModalList {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
  min-height: 40px;
}
.cache-entry {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 8px; font-size: 11px;
}
.cache-entry-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.cache-entry-meta { color: var(--muted); white-space: nowrap; }
.cache-entry-del {
  background: none; border: 1px solid var(--border2); color: var(--muted);
  border-radius: 3px; width: 18px; height: 18px; cursor: pointer;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cache-entry-del:hover { border-color: var(--red); color: var(--red); }
#cacheModalFooter { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
#cacheModalEmpty { font-size: 11px; color: var(--muted); text-align: center; padding: 10px 0; }
</style>
</head>
<body>
<div id="frame">
  <div id="controls"></div>

  <div id="vizArea">
    <div id="modeBar">
      <button class="tog"        id="togPreVQMode">Pre-VQ</button>
      <button class="tog active" id="togVQMode">VQ</button>

            <span style="font-size:10px;color:var(--muted)">in</span>
            <input type="number" id="fadeOutMs" value="10" min="0" max="2000" step="5"

          </div>

      </div>
    </div>

    <div id="legendBar">
      <span>
        <svg width="14" height="14" style="vertical-align:middle;margin-right:3px">
          <circle cx="7" cy="7" r="4.5" fill="none" stroke="#c87800" stroke-width="1.5"/>
        </svg>Source A</span>
      <span>
        <svg width="14" height="14" style="vertical-align:middle;margin-right:3px">
          <polygon points="7,1.5 12.5,11.5 1.5,11.5" fill="none" stroke="#2090c0" stroke-width="1.5"/>
        </svg>Source B</span>

  </div>
</div>

<!-- Draw-segment right-click context menu -->
<div id="segCtxMenu">
  <div class="seg-ctx-item" id="segCtxSolo">Solo</div>
  <div class="seg-ctx-sep"></div>
  <div class="seg-ctx-item" id="segCtxToggle">Disable</div>
  <div class="seg-ctx-sep"></div>
  <div class="seg-ctx-item danger" id="segCtxDelete">Delete</div>
</div>

<div id="cacheModal" class="hidden">
  <div id="cacheModalBox">
    <div id="cacheModalTitle">
      <span>💾 Cached analyses</span>
      <button class="tog" id="cacheModalClose" style="font-size:9px;padding:2px 8px">✕ Close</button>

    <div id="cacheModalFooter">

      <button class="tog danger" id="cacheModalClearAll" style="font-size:10px;padding:3px 10px;color:var(--red)">Clear all</button>

<script type="module">
'use strict';

import { createDoubleSourceWidget } from './lib/double-source-widget.js';
import { createModelPanel }         from './lib/model-panel.js';
import { makeWavePlayer }           from './lib/wave-player.js';
import { renderScatter as _renderScatter } from './lib/scatter-renderer.js';
import {
  findNearestUmapPoint,
  findCodePath,
  computeSnapWaypoints,
  getContextKs,
  buildSnapSequence,
  buildSnapSequenceFixed,
  makeFrameScales,
} from './lib/trajectory-utils.js';
import {
  openEncodecDB,
  crc32FromFile,
  makeCacheKey,
  cacheGet,
  cachePut,
  cacheList,
  cacheDelete,
  cacheClear,
} from './lib/encodec-cache.js';

const MODELS_BASE = new URL('../serialization/encodec_onnx_exports', location.href).href;

// ── Controls ──────────────────────────────────────────────────────────────────

const controls = document.getElementById('controls');

const srcWidget = createDoubleSourceWidget({
  defaultDur:   4,

  onChange: delay => scheduleEncode(delay),
});
controls.appendChild(srcWidget.element);
const { panelA, panelB } = srcWidget;

const mp = createModelPanel({
  defaultModel: '48k',
  defaultBw:    24,
  onChange: () => { currentEmbeds = null; scheduleEncode(0); },
});
controls.appendChild(mp.modelSection);
controls.appendChild(mp.modeSection);

const umapSection = document.createElement('div');
umapSection.className = 'section';
umapSection.innerHTML = `
  <div class="section-title">Projection</div>
  <div class="row" style="gap:3px">
    <button class="tog active" id="togUMAPMode" style="flex:1">UMAP</button>
    <button class="tog"        id="togPCAMode"  style="flex:1">PCA</button>
  </div>
  <div class="row">
    <span class="lbl">Features</span>
    <div style="display:flex;gap:3px">
      <button class="tog active" id="togEmbOnly">Emb</button>
      <button class="tog"        id="togEmbDelta">Emb+Δ</button>
      <button class="tog"        id="togDeltaOnly">Δ</button>
    </div>
  </div>
  <div class="row">
    <span class="lbl">History</span>
    <input type="number" id="umapWindow" value="1" min="1" max="16" step="1">
    <span style="font-size:11px;color:var(--muted);margin-left:2px">frames</span>
  </div>
  <div class="row" id="neighborRow">
    <span class="lbl">Neighbors</span>
    <input type="number" id="nNeighbors" value="15" min="3" max="100" step="1">
  </div>
  <div class="row" id="minDistRow">
    <span class="lbl">Min dist</span>
    <input type="number" id="minDist" value="0.1" min="0.0" max="0.99" step="0.05">
  </div>
`.trim();
controls.appendChild(umapSection);

const trajSection = document.createElement('div');
trajSection.id = 'trajPanel';
trajSection.innerHTML = `
  <div class="section-title" id="trajPanelTitle">
    Trajectory
    <button id="trajPanelCollapseBtn" title="Collapse">▾</button>
  </div>
  <div id="trajPanelBody">
    <div class="row" style="gap:3px">
      <button class="tog active" id="togDrawMode" style="flex:1">Draw</button>
      <button class="tog"        id="togCodeMode" style="flex:1">Code</button>
      <button class="tog"        id="togSnapMode" style="flex:1">Snap</button>
    </div>
    <div class="row" style="gap:3px">
      <button class="tog active" id="togDirFwd"  style="flex:1">→ Fwd</button>
      <button class="tog"        id="togDirBwd"  style="flex:1">← Bwd</button>
      <button class="tog"        id="togDirPing" style="flex:1">↔ Ping</button>
    </div>
    <div class="row" id="durRow">
      <span class="lbl">Duration</span>
      <input type="number" id="trajDuration" value="4" min="0.5" max="30" step="0.5">
      <span style="font-size:11px;color:var(--muted);margin-left:2px">s</span>
    </div>
    <div id="codeBlock" style="display:none">
      <div class="row" style="gap:3px">
        <button class="tog active" id="togCodeK"   style="flex:1">K frames</button>
        <button class="tog"        id="togCodeSec" style="flex:1">Seconds</button>
      </div>
      <div class="row">
        <span class="lbl" id="codeParamLbl">K</span>

    <div id="snapBlock" style="display:none">

      </div>
      <div class="row" style="gap:3px">
        <button class="tog active" id="togSnapK"    style="flex:1">K frames</button>
        <button class="tog"        id="togSnapEq"   style="flex:1">Equal</button>
        <button class="tog"        id="togSnapProp" style="flex:1">Prop.</button>
      </div>
      <div class="row">
        <span class="lbl" id="snapParamLbl">K</span>
        <input type="number" id="snapParamInput" value="8" min="1" max="128" step="1">
        <span id="snapParamUnit" style="font-size:11px;color:var(--muted)">frames</span>
      </div>
      <div class="row" id="ctxSwapRow">

      <button class="tog" id="clearTraj" style="flex:1">Clear</button>

// Append to umapWrap so it overlays the canvas
document.getElementById('umapWrap').appendChild(trajSection);

document.getElementById('trajPanelTitle').addEventListener('click', () => {

postProcSection.innerHTML = `

  <div class="row">
    <span class="lbl">Notch</span>
    <button class="tog active" id="togNotch" style="flex:1">On</button>
  </div>
  <div class="row">
    <span class="lbl">Freq</span>
    <input type="number" id="notchFreqInput" value="1200" min="50" max="4000" step="50">
    <span style="font-size:11px;color:var(--muted)">Hz</span>
  </div>
  <div class="row">
    <span class="lbl">Q</span>
    <input type="number" id="notchQInput" value="30" min="1" max="200" step="1">
  </div>
`.trim();
controls.appendChild(postProcSection);

const librarySection = document.createElement('div');
librarySection.className = 'section';
librarySection.id = 'librarySection';
librarySection.innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.45em">
    <span class="section-title" style="margin-bottom:0">Library <span id="libCount" style="font-weight:400">(0)</span></span>
    <button id="libDownloadAll" class="tog" style="flex:none;padding:1px 7px;font-size:10px" disabled>↓ All</button>
  </div>
  <div id="libList"></div>
  <div id="libEmpty" style="font-size:11px;color:var(--muted);padding:2px 0">No bookmarks yet.</div>
`.trim();
controls.appendChild(librarySection);

// ── Analysis cache prompt ─────────────────────────────────────────────────────
// Shown once; preference persisted in localStorage.
const CACHE_PREF_KEY = 'encodec_cache_enabled';

const cacheSection = document.createElement('div');
cacheSection.className = 'section';
cacheSection.id = 'cacheSection';

function renderCacheSection() {
  const pref = localStorage.getItem(CACHE_PREF_KEY);
  if (pref === null) {
    // First visit — show prompt
    cacheSection.innerHTML = `
      <div class="section-title" style="color:var(--accent)">Analysis Cache</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.5">
        Save analysis to browser storage?<br>Avoids re-encoding the same files.
      </div>
      <div style="display:flex;gap:4px">
        <button class="tog" id="cacheYesBtn" style="flex:1">Enable</button>
        <button class="tog" id="cacheNoBtn"  style="flex:1">Skip</button>
      </div>
    `.trim();
    cacheSection.querySelector('#cacheYesBtn').addEventListener('click', () => {
      localStorage.setItem(CACHE_PREF_KEY, '1');
      initCache();
      renderCacheSection();
    });
    cacheSection.querySelector('#cacheNoBtn').addEventListener('click', () => {
      localStorage.setItem(CACHE_PREF_KEY, '0');
      renderCacheSection();
    });
  } else {
    const on = pref === '1';
    cacheSection.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
        <span style="font-size:11px;color:var(--muted)">
          💾 Cache: <strong style="color:${on ? 'var(--accent)' : 'var(--muted)'}">${on ? 'on' : 'off'}</strong>
        </span>
        <div style="display:flex;gap:3px">
          ${on ? '<button class="tog" id="cacheManageBtn" style="font-size:9px;padding:2px 6px">Manage</button>' : ''}
          <button class="tog" id="cacheToggleBtn" style="font-size:9px;padding:2px 6px">
            ${on ? 'Disable' : 'Enable'}
          </button>
        </div>
      </div>
    `.trim();
    cacheSection.querySelector('#cacheToggleBtn').addEventListener('click', () => {
      const newVal = on ? '0' : '1';
      localStorage.setItem(CACHE_PREF_KEY, newVal);
      if (newVal === '1') initCache(); else { cachingEnabled = false; }
      renderCacheSection();
    });
    cacheSection.querySelector('#cacheManageBtn')?.addEventListener('click', openCacheModal);
  }
}

async function initCache() {
  try {
    encCache       = await openEncodecDB();
    cachingEnabled = true;
  } catch (e) {
    console.warn('Could not open encodec cache DB:', e);
    cachingEnabled = false;
  }
}

// ── Cache manager modal ───────────────────────────────────────────────────────

function fmtBytes(n) {
  if (n < 1024)        return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function openCacheModal() {
  if (!encCache) return;
  const modal   = document.getElementById('cacheModal');
  const list    = document.getElementById('cacheModalList');
  const stats   = document.getElementById('cacheModalStats');
  const clearBtn = document.getElementById('cacheModalClearAll');

  modal.classList.remove('hidden');

  async function refresh() {
    list.innerHTML = '';
    const entries = await cacheList(encCache);
    if (entries.length === 0) {
      list.innerHTML = '<div id="cacheModalEmpty">No cached analyses.</div>';
      stats.textContent = '';
      clearBtn.disabled = true;
      return;
    }
    clearBtn.disabled = false;
    const totalBytes = entries.reduce((s, e) => s + e.approxBytes, 0);
    stats.textContent = `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'} · ~${fmtBytes(totalBytes)}`;

    // Group by filename for readability
    const byFile = {};
    for (const e of entries) {
      (byFile[e.filename] ??= []).push(e);
    }
    for (const [fname, group] of Object.entries(byFile)) {
      for (const e of group) {
        const durS = ((e.segEnd - e.segStart) / e.sampleRate).toFixed(1);
        const row  = document.createElement('div');
        row.className = 'cache-entry';
        row.innerHTML = `
          <span class="cache-entry-name" title="${fname}">${fname}</span>
          <span class="cache-entry-meta">${e.modelHz} · ${e.bwKbps}k · ${durS}s · ${fmtBytes(e.approxBytes)}</span>
          <span class="cache-entry-meta" style="min-width:90px;text-align:right">${fmtDate(e.timestamp)}</span>
          <button class="cache-entry-del" title="Delete">✕</button>
        `.trim();
        row.querySelector('.cache-entry-del').addEventListener('click', async () => {
          await cacheDelete(encCache, e.id);
          refresh();
        });
        list.appendChild(row);
      }
    }
  }

  clearBtn.onclick = async () => {
    if (!confirm('Delete all cached analyses?')) return;
    await cacheClear(encCache);
    refresh();
  };

  document.getElementById('cacheModalClose').onclick = () => modal.classList.add('hidden');
  modal.onclick = e => { if (e.target === modal) modal.classList.add('hidden'); };

  refresh();
}

function pinCoords() {
  if (!coordsA || !coordsB) return [];
  return pinPoints.map(p => (p.src === 'A' ? coordsA : coordsB)[p.idx]);

function setStatus(msg, isError = false) {

// Snap mode: fit as many waypoints as possible into the available width,
// shrinking toward start → … → end as needed.
function setSeqInfo(seq) {
  const wps = (seq || []).filter((f, i) => i === 0 || f.src !== seq[i-1].src || f.idx !== seq[i-1].idx);
  if (!wps.length) { seqInfo.textContent = ''; return; }
  const fmt  = f  => `${f.src}${f.idx}`;
  const build = arr => '[ ' + arr.map(f => f === null ? '…' : fmt(f)).join(' → ') + ' ]';
  if (wps.length === 1) { seqInfo.textContent = build(wps); return; }

  for (let vis = wps.length; vis >= 2; vis--) {
    if (vis === wps.length) {
      seqInfo.textContent = build(wps);
    } else {
      const front = Math.ceil(vis / 2);
      const back  = vis - front;
      seqInfo.textContent = build([...wps.slice(0, front), null, ...wps.slice(wps.length - back)]);
    }
    if (seqInfo.scrollWidth <= seqInfo.clientWidth + 1) return;
  }
  seqInfo.textContent = build([wps[0], null, wps[wps.length - 1]]);
}

// n evenly-spaced indices from lo..hi inclusive
function spanIdx(lo, hi, n) {
  if (n <= 1) return [lo];
  return Array.from({ length: n }, (_, i) => lo + Math.round(i * (hi - lo) / (n - 1)));
}

// Detect pingpong turnaround index (first consecutive identical pair) in a waypoint array.
// Returns -1 if not a pingpong sequence.
function findTurnaround(wps) {
  for (let i = 1; i < wps.length; i++) {
    if (wps[i].src === wps[i-1].src && wps[i].idx === wps[i-1].idx) return i - 1;
  }
  return -1;
}

// Pick indices for display: 3-per-half mirrored for pingpong, or n evenly spaced for linear.
function pickDisplayIndices(len, taIdx, n) {
  if (taIdx >= 0) {
    const L = spanIdx(0, taIdx, 3);
    const R = [...L].reverse().map(i => taIdx + 1 + (taIdx - i));
    return [...L, ...R];
  }
  return spanIdx(0, len - 1, n);
}

// Code mode: at most 5 waypoints (6 for pingpong), with xK multiplier suffix.
function setCodeSeqInfo(seq, kRepeat) {
  const wps = seq || [];
  if (!wps.length) { seqInfo.textContent = ''; return; }
  const k   = kRepeat > 1 ? 'x' + kRepeat : '';
  const fmt = f => `${f.src}${f.idx}${k}`;

  if (wps.length <= 6) {
    seqInfo.textContent = '[ ' + wps.map(fmt).join(' → ') + ' ]';
    return;
  }

  const taIdx  = findTurnaround(wps);
  const picked = pickDisplayIndices(wps.length, taIdx, 5);

  let text = fmt(wps[picked[0]]);
  for (let i = 1; i < picked.length; i++) {
    const gap = picked[i] - picked[i - 1];
    text += gap === 1 ? ' → ' + fmt(wps[picked[i]]) : ' → … → ' + fmt(wps[picked[i]]);
  }
  seqInfo.textContent = '[ ' + text + ' ]';
}

// Snap mode: show each waypoint as its actual frame range (preroll_start:waypoint_end).
// Groups snapPlayFrames by _wp transitions to find the real context span per waypoint.
function setSnapSeqInfo(snapFrames, snapPlayFrames) {
  if (!snapFrames?.length || !snapPlayFrames?.length) { seqInfo.textContent = ''; return; }

  // Group snapPlayFrames into per-waypoint segments by _wp change.
  // Track the true min index within the waypoint's source (pingPongExtend bounces, so the
  // first frame in the sequence is NOT necessarily the lowest index actually reached).
  const segs = [];
  let s = 0;
  for (let i = 1; i <= snapPlayFrames.length; i++) {
    if (i === snapPlayFrames.length || snapPlayFrames[i]._wp !== snapPlayFrames[i - 1]._wp) {
      // Use the actual snap waypoint (from snapFrames) as the segment endpoint,
      // not the last frame in the group — which may be a K_post frame (idx > waypoint idx)
      // for the last segment on 48k models.
      const end    = snapFrames[segs.length] ?? snapPlayFrames[i - 1];
      let   minIdx = end.idx;
      for (let j = s; j < i; j++) {
        if (snapPlayFrames[j].src === end.src && snapPlayFrames[j].idx < minIdx)
          minIdx = snapPlayFrames[j].idx;
      }
      segs.push({ minIdx, end });
      s = i;
    }
  }

  // Format one segment: "B0:B6" (true min → waypoint), or just "B6" if no pre-roll
  const fmtSeg = ({ minIdx, end }) =>
    minIdx === end.idx
      ? `${end.src}${end.idx}`
      : `${end.src}${minIdx}:${end.src}${end.idx}`;

  const MAX = 7;

  if (segs.length <= MAX) {
    seqInfo.textContent = '[' + segs.map(fmtSeg).join(', ') + ']';
    return;
  }

  const taIdx  = findTurnaround(snapFrames);
  const picked = pickDisplayIndices(segs.length, taIdx, MAX);

  const parts = [fmtSeg(segs[picked[0]])];
  for (let i = 1; i < picked.length; i++) {
    if (picked[i] !== picked[i - 1] + 1) parts.push('…');
    parts.push(fmtSeg(segs[picked[i]]));
  }
  seqInfo.textContent = '[' + parts.join(', ') + ']';
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

// Build userTrajectory for draw mode: resample each segment independently
// then concatenate.  Segments are never joined — there is no connecting path
// between the end of one stroke and the start of the next, so audio jumps
// directly from one segment's endpoint to the next segment's start point
// (a hard cut at the boundary, not a smooth traversal of the gap).
// Each segment gets frames proportional to its own arc length.
function buildDrawUserTrajectory() {
  // Only enabled completed segments + in-progress stroke
  const activePts = rawDrawSegments
    .filter(s => s.enabled && s.pts.length >= 2)
    .map(s => s.pts);
  const segs = rawDrawPoints.length >= 2
    ? [...activePts, rawDrawPoints]
    : activePts;
  if (segs.length === 0) return [];

  // Compute arc length of each segment.
  const segLens = segs.map(seg => {
    let len = 0;
    for (let i = 1; i < seg.length; i++) {
      const dx = seg[i][0] - seg[i-1][0], dy = seg[i][1] - seg[i-1][1];
      len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
  });
  const totalLen = segLens.reduce((a, b) => a + b, 0);
  if (totalLen < 1e-12) return [];

  // Resample each segment to a frame count proportional to its length,
  // then concatenate — no connector between segments.
  // Record the starting index of each non-first segment so playTrajectory
  // can skip the cross-boundary lerp.
  const N_TOTAL = 300;
  const out = [];
  drawSegmentBoundaries = [];
  for (let i = 0; i < segs.length; i++) {
    if (i > 0) drawSegmentBoundaries.push(out.length);
    const n = Math.max(2, Math.round(segLens[i] / totalLen * N_TOTAL));
    out.push(...resamplePath(segs[i], n));
  }
  return out;
}

function renderScatter() {
  const fps = coordsA ? coordsA.length / srcDuration('A') : 1;
  // Build the visual segments array: completed segments + live stroke if any.
  const drawSegments = canvasMode === 'draw'
    ? (rawDrawPoints.length >= 1
        ? [...rawDrawSegments, { pts: rawDrawPoints, enabled: true }]
        : rawDrawSegments)
    : [];
  const result = _renderScatter(umapCanvas, dpr, {
    coordsA, coordsB,
    viewZoom, viewPanX, viewPanY,
    pinPoints: pinCoords(),
    highlightedPinIdx: waveHighlight
      ? pinPoints.findIndex(p => p.src === waveHighlight.src && p.idx === waveHighlight.idx)
      : -1,
    selectedPoint, waveHighlight, userTrajectory, drawSegments,
    pathMode, snapFrames, snapSegBoundaries, codePathFrames, trajAnchorPos,
    snapPlayFrames, trajDir, showTrail: chkTrail.checked, canvasMode,
    ctxSwap: { prob: ctxSwapProb, range: ctxSwapDist },
    snapMode, snapKVal, snapDurVal, framesPerSec: fps,
    srcAEnabled, srcBEnabled,
  });
  if (result !== null) lastTransform = result;
}

// ── Dirty flags & effect scheduler ───────────────────────────────────────────

const dirty = { COORDS: false, WAYPOINTS: false, AUDIO: false, RENDER: false };
let renderPending = false;

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => { renderPending = false; renderScatter(); });
}

function markDirty(...flags) {
  for (const f of flags) dirty[f] = true;
  runEffects();
}

// True when there is enough source material to compute waypoints for the current mode.
// Draw mode needs a drawn path; snap/code mode can use pins (≥1) or a drawn path (≥2 pts).
function hasWaypointSource() {
  if (pathMode === 'draw') return userTrajectory.length >= 2;
  return (canvasMode === 'pins' && pinPoints.length >= 1) || userTrajectory.length >= 2;
}

let audioDebounceTimer = null;

function runEffects() {
  if (dirty.COORDS && currentEmbeds) {
    dirty.COORDS = false;
    triggerProjection();
  }
  if (dirty.WAYPOINTS && coordsA && coordsB && hasWaypointSource()) {
    dirty.WAYPOINTS = false;
    computeWaypoints();
    dirty.AUDIO  = true;
    dirty.RENDER = true;
  }
  if (dirty.AUDIO && currentEmbeds && coordsA && coordsB
      && hasWaypointSource()
      && (genPlaySeq !== null || pathMode === 'draw')) {
    dirty.AUDIO = false;
    // Immediately stale any in-flight decode so its response is discarded.
    playJobId = ++jobSeq;
    // Debounce the actual dispatch — only fires after 200 ms of quiet.
    clearTimeout(audioDebounceTimer);
    audioDebounceTimer = setTimeout(playTrajectory, 200);
  }
  if (dirty.RENDER) {
    dirty.RENDER = false;
    scheduleRender();
  }
}

function initSlotDots() {
  slotDots.innerHTML = '';
  for (let i = 0; i < UMAP_N_SLOTS; i++) {
    const btn = document.createElement('button');
    btn.className = 'umap-dot';
    btn.title = `Layout ${i + 1}`;
    btn.addEventListener('click', () => setUMAPSlotIdx(i));
    slotDots.appendChild(btn);
  }
}

function updateSlotDots() {
  [...slotDots.children].forEach((btn, i) => {
    btn.className = 'umap-dot'
      + (umapSlots[i] ? ' ready' : '')
      + (i === umapSlotIdx ? ' active' : '');
  });
  slotPrevBtn.disabled = umapSlotIdx <= 0;
  slotNextBtn.disabled = umapSlotIdx >= UMAP_N_SLOTS - 1;
}

// Switch to a pre-computed slot (or mark as pending if not yet ready).
function setUMAPSlotIdx(idx) {
  if (idx < 0 || idx >= UMAP_N_SLOTS) return;
  umapSlotIdx = idx;
  const slot = umapSlots[idx];
  if (slot) {
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    setStatus(`Layout ${idx + 1} / ${UMAP_N_SLOTS}`);
    updateSlotDots();
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
  } else {
    // Not yet computed — update desired slot; onUMAPWorkerMsg will display it when ready.
    updateSlotDots();
    setStatus(`Waiting for layout ${idx + 1}…`);
  }
}

// ── Projection worker message handler ─────────────────────────────────────────

function onUMAPWorkerMsg({ data: msg }) {
  if (msg.jobId !== activeUMAPJobId) return;

  // ── PCA result ─────────────────────────────────────────────────────────────
  if (msg.type === 'pca_result') {
    const { result, T_A, T_B } = msg;
    const slot = { coordsA: [], coordsB: [] };
    for (let i = 0; i < T_A; i++) slot.coordsA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < T_B; i++) slot.coordsB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    pcaCoords = slot;

    viewZoom = 1; viewPanX = 0; viewPanY = 0;
    const hadDrawTraj = rawDrawSegments.some(s => s.pts.length >= 2) || rawDrawPoints.length >= 2;
    rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = []; clearSoloState();
    userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
    coordsA = slot.coordsA;
    coordsB = slot.coordsB;
    progWrap.style.display = 'none';
    if (hadDrawTraj && pinPoints.length < 2) {
      setStatus('PCA updated — draw trajectory cleared. Redraw to regenerate.');
    } else {
      setStatus(`PCA — ${T_A} frames (A) · ${T_B} frames (B)`);
    }
    markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    return;

  } else if (msg.type === 'pca_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
    return;
  }

  // ── UMAP progress / result / error ─────────────────────────────────────────
  if (msg.type === 'umap_progress') {
    const pct   = Math.round(msg.epoch / msg.nEpochs * 100);
    const label = `Layout ${(msg.slotIdx ?? 0) + 1}/${UMAP_N_SLOTS}`;
    progBar.style.width = pct + '%';
    setStatus(`UMAP ${label} — epoch ${msg.epoch} / ${msg.nEpochs}`);

  } else if (msg.type === 'umap_result') {
    const { slotIdx, result, T_A, T_B } = msg;

    // Decode and store this slot.
    const slot = { coordsA: [], coordsB: [] };
    for (let i = 0; i < T_A; i++) slot.coordsA.push([result[i * 2], result[i * 2 + 1]]);
    for (let i = 0; i < T_B; i++) slot.coordsB.push([result[(T_A + i) * 2], result[(T_A + i) * 2 + 1]]);
    umapSlots[slotIdx] = slot;
    updateSlotDots();

    // Slot 0 (the very first result for this session):
    //   - reset viewport and clear draw trajectory (now defined in stale UMAP coords)
    //   - pin trajectories are {src,idx} based and auto-remap — no reset needed
    if (slotIdx === 0) {
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      const hadDrawTraj = rawDrawSegments.some(s => s.pts.length >= 2) || rawDrawPoints.length >= 2;
      rawDrawSegments = []; rawDrawPoints = []; drawSegmentBoundaries = []; clearSoloState();
      userTrajectory = pinPoints.length >= 2 ? resamplePath(pinCoords(), 300) : [];
      if (hadDrawTraj && pinPoints.length < 2) {
        setStatus('UMAP updated — draw trajectory cleared. Redraw to regenerate.');
      } else {
        setStatus(`Done — ${T_A} frames (A) · ${T_B} frames (B). Computing more layouts…`);
      }
    }

    // If this is the currently-desired slot, display it now.
    if (slotIdx === umapSlotIdx && projectionMode === 'umap') {
      coordsA = slot.coordsA;
      coordsB = slot.coordsB;
      if (slotIdx !== 0) setStatus(`Layout ${slotIdx + 1} / ${UMAP_N_SLOTS}`);
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    }

    // Chain the next slot — but only when UMAP is the active mode.
    const next = slotIdx + 1;
    if (next < UMAP_N_SLOTS && umapFeatureData && projectionMode === 'umap') {
      launchUMAPSlot(next);
    } else {
      progWrap.style.display = 'none';
      if (projectionMode === 'umap' && slotIdx === UMAP_N_SLOTS - 1)
        setStatus(`All ${UMAP_N_SLOTS} layouts ready.`);
    }

  } else if (msg.type === 'umap_error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── PCA launch ─────────────────────────────────────────────────────────────────

function launchPCA() {
  if (!umapFeatureData) return;
  const { flat, T_A, T_B, D } = umapFeatureData;

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '30%';
  setStatus(`PCA — computing… (${T_A + T_B} frames, ${D} dims)`);

  umapWorker.postMessage({ type: 'compute_pca', jobId: activeUMAPJobId, flat, T_A, T_B, D });
}

// ── Projection mode toggle ─────────────────────────────────────────────────────

function setProjectionMode(mode) {
  projectionMode = mode;
  document.getElementById('togUMAPMode').classList.toggle('active', mode === 'umap');
  document.getElementById('togPCAMode') .classList.toggle('active', mode === 'pca');
  document.getElementById('neighborRow').style.display = mode === 'umap' ? '' : 'none';
  document.getElementById('minDistRow') .style.display = mode === 'umap' ? '' : 'none';
  slotWrap.classList.toggle('visible', mode === 'umap' && umapSlots.some(s => s));

  if (!umapFeatureData) return; // nothing computed yet — triggerProjection() will dispatch when ready

  if (mode === 'pca') {
    if (pcaCoords) {
      // Already have a cached PCA result for current features — switch instantly.
      coordsA = pcaCoords.coordsA;
      coordsB = pcaCoords.coordsB;
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus('PCA');
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      launchPCA(); // cancels any in-progress UMAP slot
    }
  } else { // umap
    slotWrap.classList.add('visible');
    updateSlotDots();
    if (umapSlots[umapSlotIdx]) {
      // Desired slot already computed — display immediately.
      coordsA = umapSlots[umapSlotIdx].coordsA;
      coordsB = umapSlots[umapSlotIdx].coordsB;
      viewZoom = 1; viewPanX = 0; viewPanY = 0;
      setStatus(`Layout ${umapSlotIdx + 1} / ${UMAP_N_SLOTS}`);
      markDirty('WAYPOINTS', 'AUDIO', 'RENDER');
    } else {
      // Find first computed slot and display it; resume background computation.
      const firstReady = umapSlots.findIndex(s => s);
      if (firstReady >= 0) {
        setUMAPSlotIdx(firstReady);
      } else {
        umapSlots = Array(UMAP_N_SLOTS).fill(null);
        umapSlotIdx = 0;
        updateSlotDots();
      }
    }
    // Resume slot computation from the first uncomputed slot.
    const nextMissing = umapSlots.findIndex(s => !s);
    if (nextMissing >= 0) launchUMAPSlot(nextMissing);
  }
}

function applyFade(pcm, sr, fadeInMs, fadeOutMs) {
  const out     = pcm.slice();
  const fadeIn  = Math.round(fadeInMs  / 1000 * sr);
  const fadeOut = Math.round(fadeOutMs / 1000 * sr);
  for (let i = 0; i < Math.min(fadeIn,  out.length); i++) out[i]                  *= i / fadeIn;
  for (let i = 0; i < Math.min(fadeOut, out.length); i++) out[out.length - 1 - i] *= i / fadeOut;
  return out;
}

function applyGenFade(pcm, sr) {
  const fadeIn  = parseFloat(document.getElementById('fadeInMs').value)  || 0;
  const fadeOut = parseFloat(document.getElementById('fadeOutMs').value) || 0;
  return (fadeIn > 0 || fadeOut > 0) ? applyFade(pcm, sr, fadeIn, fadeOut) : pcm;
}

// Minimal ZIP builder — STORE method (no compression), no external dependencies.
function buildZip(files) {
  // files: [{ name: string, data: Uint8Array }]
  const enc = new TextEncoder();

  // CRC-32 lookup table
  const crcTab = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    crcTab[i] = c;
  }
  const crc32 = data => {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < data.length; i++) c = crcTab[(c ^ data[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  };

  const localParts = [];  // [{bytes, size}]  — local headers + data
  const cdParts    = [];  // central directory records
  let localOffset  = 0;

  for (const { name, data } of files) {
    const nb   = enc.encode(name);
    const crc  = crc32(data);
    const size = data.length;

    // Local file header (30 + nb.length bytes)
    const lh = new DataView(new ArrayBuffer(30 + nb.length));
    lh.setUint32( 0, 0x04034b50, true);   // local file sig
    lh.setUint16( 4, 20, true);            // version needed
    lh.setUint16( 6, 0,  true);            // flags
    lh.setUint16( 8, 0,  true);            // STORE
    lh.setUint16(10, 0,  true);            // mod time
    lh.setUint16(12, 0,  true);            // mod date
    lh.setUint32(14, crc,  true);          // CRC-32
    lh.setUint32(18, size, true);          // compressed size
    lh.setUint32(22, size, true);          // uncompressed size
    lh.setUint16(26, nb.length, true);     // filename len
    lh.setUint16(28, 0, true);             // extra len
    new Uint8Array(lh.buffer, 30).set(nb);

    // Central directory header (46 + nb.length bytes)
    const cd = new DataView(new ArrayBuffer(46 + nb.length));
    cd.setUint32( 0, 0x02014b50, true);   // central dir sig
    cd.setUint16( 4, 20, true);            // version made by
    cd.setUint16( 6, 20, true);            // version needed
    cd.setUint16( 8, 0,  true);            // flags
    cd.setUint16(10, 0,  true);            // STORE
    cd.setUint16(12, 0,  true);            // mod time
    cd.setUint16(14, 0,  true);            // mod date
    cd.setUint32(16, crc,  true);          // CRC-32
    cd.setUint32(20, size, true);          // compressed size
    cd.setUint32(24, size, true);          // uncompressed size
    cd.setUint16(28, nb.length, true);     // filename len
    cd.setUint16(30, 0, true);             // extra len
    cd.setUint16(32, 0, true);             // comment len
    cd.setUint16(34, 0, true);             // disk number start
    cd.setUint16(36, 0, true);             // internal attr
    cd.setUint32(38, 0, true);             // external attr
    cd.setUint32(42, localOffset, true);   // local header offset
    new Uint8Array(cd.buffer, 46).set(nb);

    const lhBytes = new Uint8Array(lh.buffer);
    localParts.push(lhBytes, data);
    cdParts.push(new Uint8Array(cd.buffer));
    localOffset += lhBytes.length + size;
  }

  const cdSize   = cdParts.reduce((s, p) => s + p.length, 0);
  const cdOffset = localOffset;

  // End of central directory (22 bytes)
  const eocd = new DataView(new ArrayBuffer(22));
  eocd.setUint32( 0, 0x06054b50, true);      // EOCD sig
  eocd.setUint16( 4, 0, true);               // disk number
  eocd.setUint16( 6, 0, true);               // disk with CD
  eocd.setUint16( 8, files.length, true);    // entries on this disk
  eocd.setUint16(10, files.length, true);    // total entries
  eocd.setUint32(12, cdSize,   true);        // central dir size
  eocd.setUint32(16, cdOffset, true);        // central dir offset
  eocd.setUint16(20, 0, true);               // comment len

  const all   = [...localParts, ...cdParts, new Uint8Array(eocd.buffer)];
  const total = all.reduce((s, p) => s + p.length, 0);
  const out   = new Uint8Array(total);
  let pos = 0;
  for (const p of all) { out.set(p, pos); pos += p.length; }
  return out;
}

// Encode Float32Array mono PCM → 16-bit WAV ArrayBuffer.
function encodeWav(f32, sr) {
  const N   = f32.length;
  const buf = new ArrayBuffer(44 + N * 2);
  const v   = new DataView(buf);
  const u32 = (o, n) => v.setUint32(o, n, true);
  const u16 = (o, n) => v.setUint16(o, n, true);
  const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); u32(4, 36 + N * 2); str(8, 'WAVE');
  str(12, 'fmt '); u32(16, 16); u16(20, 1); u16(22, 1);
  u32(24, sr); u32(28, sr * 2); u16(32, 2); u16(34, 16);
  str(36, 'data'); u32(40, N * 2);
  for (let i = 0; i < N; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return buf;
}

function downloadWav(pcm, sr, filename) {
  const blob = new Blob([encodeWav(pcm, sr)], { type: 'audio/wav' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename + '.wav'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// Build a descriptive base filename for the current generation state.
function makeBookmarkName() {
  const mode = pathMode === 'snap' ? 'snap' : pathMode === 'code' ? 'code' : 'draw';
  const dir  = trajDir === 'forward' ? 'fwd' : trajDir === 'backward' ? 'bwd' : 'ping';

  let wpTag = '';
  if (genPlaySeq && genPlaySeq.length > 0) {
    // Collect the first frame of each waypoint group (_wp transitions).
    const wps = [];
    let last = undefined;
    for (const f of genPlaySeq) {
      if (f._wp !== undefined && f._wp !== last) { last = f._wp; wps.push(f); }
    }
    if (wps.length > 0) {
      const parts = wps.slice(0, 4).map(f => `${f.src}${f.idx}`);
      if (wps.length > 4) parts.push('…');
      wpTag = '_' + parts.join('-');
    }
  }

  const now = new Date();
  const hh  = String(now.getHours()).padStart(2, '0');
  const mm  = String(now.getMinutes()).padStart(2, '0');
  const ss  = String(now.getSeconds()).padStart(2, '0');
  bookmarkSeq++;
  return `${mode}_${dir}${wpTag}_${String(bookmarkSeq).padStart(3, '0')}_${hh}${mm}${ss}`;
}

function renderBookmarkList() {
  const list    = document.getElementById('libList');

  count.textContent = `(${bookmarks.length})`;

    const row = document.createElement('div');
    row.className = 'lib-item';
    row.dataset.id = bm.id;

    const nameEl = document.createElement('input');
    nameEl.className = 'lib-name';
    nameEl.type  = 'text';
    nameEl.value = bm.name;
    nameEl.title = bm.name;
    nameEl.addEventListener('change', () => { bm.name = nameEl.value.trim() || bm.name; });

    const dlBtn = document.createElement('button');

    dlBtn.title = 'Download';

    list.appendChild(row);
  }
}

// Render PCM through the notch filter chain offline (mirrors the live audio graph).
// Returns a new Float32Array with the filter applied, or the original if disabled.
async function applyNotchOffline(pcm, sr) {
  if (!postProcEnabled) return pcm;
  const maxFreq = sr / 2 - 1;
  const freqs = [];
  for (let h = 1; h * notchFundamental <= maxFreq; h++) freqs.push(h * notchFundamental);
  if (freqs.length === 0) return pcm;

  const offCtx = new OfflineAudioContext(1, pcm.length, sr);
  const buf    = offCtx.createBuffer(1, pcm.length, sr);
  buf.copyToChannel(pcm, 0);
  const src = offCtx.createBufferSource();
  src.buffer = buf;

  let prev = src;
  for (const freq of freqs) {
    const f = offCtx.createBiquadFilter();
    f.type = 'notch';
    f.frequency.value = freq;
    f.Q.value = notchQ;
    prev.connect(f);
    prev = f;
  }
  prev.connect(offCtx.destination);
  src.start(0);

  const rendered = await offCtx.startRendering();
  return rendered.getChannelData(0);
}

async function addBookmark() {
  if (!lastRawPcm) return;
  // Disable button while rendering to prevent double-clicks
  const btn = document.getElementById('wbBookmark');
  btn.style.opacity = '0.5';
  btn.style.cursor  = 'default';

  let pcm = applyGenFade(lastRawPcm, lastRawPcmSr);
  pcm = await applyNotchOffline(pcm, lastRawPcmSr);

  const name = makeBookmarkName();
  bookmarks.push({ id: bookmarkSeq, name, pcm, sr: lastRawPcmSr });
  renderBookmarkList();
  // Brief visual flash on the button to confirm
  btn.style.color = 'var(--accent)';
  setTimeout(() => { btn.style.color = ''; updateBookmarkBtn(); }, 600);
}

function updateBookmarkBtn() {
  const btn = document.getElementById('wbBookmark');
  if (!btn) return;
  const has = !!lastRawPcm;
  btn.style.opacity = has ? '1' : '0.35';
  btn.style.cursor  = has ? 'pointer' : 'default';
}

function onWorkerMsg(e) {
  const msg = e.data;

  if (msg.type === 'frame_audio_exp6') {
    if (msg.jobId === playJobId && audioCtx) {
      const buf = audioCtx.createBuffer(1, msg.decoded.length, mp.getSampleRate());
      buf.copyToChannel(msg.decoded, 0);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(getMasterDest());
      src.start();
      setStatus(`Playing frame ${selectedPoint?.idx} (${selectedPoint?.src})…`);
    }
    return;
  }

  if (msg.type === 'trajectory_audio_exp6') {
    if (msg.jobId === playJobId) {
      const sr = mp.getSampleRate();
      lastRawPcm   = msg.decoded;
      lastRawPcmSr = sr;
      stopTrajPlayback();
      playerG.setAudio(applyGenFade(msg.decoded, sr), sr, makeGenColorFn());
      updateBookmarkBtn();
      setStatus('');
    }
    return;
  }

  if (msg.jobId !== undefined && msg.jobId !== activeJobId) return;

  if (msg.type === 'progress') {
    progBar.style.width = Math.round((msg.value ?? 0) * 100) + '%';
    if (msg.status) setStatus(msg.status);

  } else if (msg.type === 'result') {
    if (encodePhase === 'A') {
      startEncodeB();
    } else if (encodePhase === 'B') {
      encodePhase = null;
      progBar.style.width = '100%';
      setStatus('Fetching embeddings…');
      worker.postMessage({ type: 'get_embeddings_exp6', jobId: activeJobId });
    }

  } else if (msg.type === 'embeddings_exp6') {
    currentEmbeds = msg;
    populateLevelSelect(msg.codesDimsA[1]);
    progWrap.style.display = 'none';
    markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');

    // ── Save to cache if keys were prepared ────────────────────────────────────
    if (cachingEnabled && encCache && pendingCacheKeyA && pendingCacheKeyB) {
      const kA = pendingCacheKeyA, kB = pendingCacheKeyB;
      pendingCacheKeyA = pendingCacheKeyB = null;
      // Fire-and-forget; errors are non-fatal
      Promise.all([
        cachePut(encCache, kA, {
          embEnc: msg.embEncA, embEncDims: msg.embEncDimsA,
          embQuant: msg.embQuantA, embQuantDims: msg.embQuantDimsA,
          codes: msg.codesA, codesDims: msg.codesDimsA,
          scales: msg.scalesA ?? null,
        }),
        cachePut(encCache, kB, {
          embEnc: msg.embEncB, embEncDims: msg.embEncDimsB,
          embQuant: msg.embQuantB, embQuantDims: msg.embQuantDimsB,
          codes: msg.codesB, codesDims: msg.codesDimsB,
          scales: msg.scalesB ?? null,
        }),
      ]).then(() => setStatus('Analysis saved to cache ✓'))
        .catch(e => console.warn('Cache save failed:', e));
    }

  } else if (msg.type === 'error') {
    progWrap.style.display = 'none';
    setStatus(msg.message, true);
  }
}

// ── Encode ────────────────────────────────────────────────────────────────────

/** Returns the actual loaded duration (s) for the given source, or falls back to
 *  the duration-input value if that source hasn't been loaded yet. */
function srcDuration(src) {
  if (src === 'A') return durA ?? srcWidget.getDuration();
  return durB ?? srcWidget.getDuration();
}

function scheduleEncode(delay = 0) {
  clearTimeout(encodeTimer);
  encodeTimer = setTimeout(startEncode, delay);
}

/** Cancel any in-flight UMAP / PCA work.
 *  - Bumps umapSessionId so stale buildUMAPFeatureData() completions are ignored.
 *  - Clears umapFeatureData so the slot-chain can't re-launch on old data.
 *  - Terminates + recreates the projection worker so its CPU work stops immediately. */
function cancelProjection() {
  umapSessionId++;
  umapFeatureData = null;
  initUMAPWorker();
}

async function startEncode() {
  if (!worker) initWorker();

  // Kill any in-flight UMAP/PCA — the new encode will trigger a fresh projection.
  cancelProjection();

  const sr       = mp.getSampleRate();
  const modelHz  = mp.getModelHz();
  const bwKbps   = mp.getBwKbps();

  // ── Pre-compute CRCs for file sources (cheap: WeakMap-cached after first call)
  const fileA = panelA.getFile(), fileB = panelB.getFile();
  const crcA  = (cachingEnabled && encCache && fileA) ? await crc32FromFile(fileA) : null;
  const crcB  = (cachingEnabled && encCache && fileB) ? await crc32FromFile(fileB) : null;

  // ── Load audio ────────────────────────────────────────────────────────────────
  let audioA, audioB;
  try {
    setStatus('Loading A…');
    audioA = await srcWidget.buildAudioAuto(panelA, sr);
    setStatus('Loading B…');
    audioB = await srcWidget.buildAudioAuto(panelB, sr);
  } catch (err) { setStatus(err.message, true); return; }

  // Waveform display — always set regardless of cache path
  coordsA = coordsB = null;
  scheduleRender();
  rawAudioA = audioA; rawAudioB = audioB;
  durA = audioA.length / sr; durB = audioB.length / sr;
  playerA.setAudio(rawAudioA, sr);
  playerB.setAudio(rawAudioB, sr);

  // ── Cache lookup (only when both sources are files with valid CRCs) ───────────
  const modelOpts = { modelHz, bwKbps, sampleRate: sr };
  pendingCacheKeyA = null;
  pendingCacheKeyB = null;

  if (crcA && crcB) {
    const keyA = makeCacheKey(fileA, crcA, modelOpts, audioA.length);
    const keyB = makeCacheKey(fileB, crcB, modelOpts, audioB.length);

    setStatus('Checking cache…');
    const [hitA, hitB] = await Promise.all([
      cacheGet(encCache, keyA),
      cacheGet(encCache, keyB),
    ]);

    if (hitA && hitB) {
      // ── Full cache hit — inject directly, skip worker ─────────────────────
      currentEmbeds = {
        type:        'embeddings_exp6',
        embEncA:     hitA.embEnc,   embEncDimsA:  hitA.embEncDims,
        embQuantA:   hitA.embQuant, embQuantDimsA: hitA.embQuantDims,
        codesA:      hitA.codes,    codesDimsA:   hitA.codesDims,
        scalesA:     hitA.scales,
        embEncB:     hitB.embEnc,   embEncDimsB:  hitB.embEncDims,
        embQuantB:   hitB.embQuant, embQuantDimsB: hitB.embQuantDims,
        codesB:      hitB.codes,    codesDimsB:   hitB.codesDims,
        scalesB:     hitB.scales,
      };
      populateLevelSelect(currentEmbeds.codesDimsA[1]);
      progWrap.style.display = 'none';
      setStatus('Loaded from cache ✓');
      markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');
      return;
    }

    // Cache miss — store keys so we can save after encoding completes
    pendingCacheKeyA = keyA;
    pendingCacheKeyB = keyB;
  }

  // ── Encode via worker ─────────────────────────────────────────────────────────
  pendingAudioB = audioB;
  encodePhase   = 'A';
  activeJobId   = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width    = '0%';
  setStatus('Encoding A…');

  worker.postMessage({
    type: 'encode', source: 'A', jobId: activeJobId,
    audio:     audioA.slice(),
    modelHz,
    bwKbps,
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
}

function startEncodeB() {
  encodePhase = 'B';
  setStatus('Encoding B…');
  worker.postMessage({
    type: 'encode', source: 'B', jobId: activeJobId,
    audio:     pendingAudioB.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
  pendingAudioB = null;
}

// ── Level selector ────────────────────────────────────────────────────────────

function updateLevelMenuBtn() {
  const total = levelMenu.querySelectorAll('input[type=checkbox]').length;
  levelMenuBtn.textContent = umapLevels.length === total
    ? 'All ▾'
    : umapLevels.length === 0
      ? 'None ▾'
      : umapLevels.map(l => l + 1).join(', ') + ' ▾';
}

function populateLevelSelect(K) {
  levelMenu.innerHTML = '';
  umapLevels = [0, 1].filter(k => k < K);  // levels 1 & 2 by default
  for (let k = 0; k < K; k++) {
    const lbl = document.createElement('label');
    const cb  = document.createElement('input');
    cb.type    = 'checkbox';
    cb.checked = k < 2;
    cb.dataset.level = k;
    cb.addEventListener('change', () => {
      umapLevels = [...levelMenu.querySelectorAll('input[type=checkbox]')]
        .filter(c => c.checked)
        .map(c => parseInt(c.dataset.level));
      if (umapLevels.length === 0) {
        // re-check this box — don't allow empty selection
        cb.checked = true;
        umapLevels = [k];
      }
      updateLevelMenuBtn();
      markDirty('COORDS', 'WAYPOINTS', 'AUDIO', 'RENDER');

// ── Codebook loading ──────────────────────────────────────────────────────────

async function ensureCodebooks() {
  const modelHz = mp.getModelHz();
  if (codebooks && codebooksFor === modelHz) return codebooks;
  setStatus('Loading codebooks…');
  const base = `${MODELS_BASE}/${modelHz}`;
  const [binRes, jsonRes] = await Promise.all([
    fetch(`${base}/codebooks.bin`),
    fetch(`${base}/codebooks.json`),
  ]);
  if (!binRes.ok || !jsonRes.ok) throw new Error('Could not load codebooks for ' + modelHz);
  const meta = await jsonRes.json();
  const buf  = await binRes.arrayBuffer();
  codebooks    = { data: new Float32Array(buf), n_q: meta.n_q, vocab_size: meta.vocab_size, dim: meta.dim };
  codebooksFor = modelHz;
  return codebooks;
}

// ── Frame extraction ──────────────────────────────────────────────────────────

function applyWindowWithAnchor(rawFrames, featFrames, K) {
  if (K <= 1) return featFrames;
  const D_raw  = rawFrames[0].length;
  const D_feat = featFrames[0].length;
  return rawFrames.map((raw, t) => {
    const vec = new Float32Array(D_raw + K * D_feat);
    vec.set(raw, 0);
    for (let k = 0; k < K; k++) {
      const srcT = Math.max(0, t - (K - 1 - k));
      vec.set(featFrames[srcT], D_raw + k * D_feat);
    }
    return vec;
  });
}

function computeDeltas(frames) {
  const D = frames[0].length;
  return frames.map((f, t) => {
    if (t === 0) return new Float32Array(D);
    const delta = new Float32Array(D);
    const prev  = frames[t - 1];
    for (let d = 0; d < D; d++) delta[d] = f[d] - prev[d];
    return delta;
  });
}

function appendDeltas(frames) {
  const D   = frames[0].length;
  const out = [];
  for (let t = 0; t < frames.length; t++) {
    const f   = frames[t];
    const vec = new Float32Array(2 * D);
    vec.set(f, 0);
    if (t > 0) { const p = frames[t - 1]; for (let d = 0; d < D; d++) vec[D + d] = f[d] - p[d]; }
    out.push(vec);
  }
  return out;
}

// Per-dimension z-score normalisation across all frames from both sources.
// Computed jointly so A and B frames are in the same coordinate space.
// Why: in Emb+Δ mode the embedding dims (e.g. ±2–5) dwarf the delta dims
// (e.g. ±0.02–0.1) so UMAP distances are dominated by the emb half.
// Same issue with multi-level VQ concatenation or history window mixing.
// Normalising each dimension to zero mean / unit variance gives every
// feature equal influence on pairwise distances.
// Dimensions with zero variance (constant across all frames, e.g. a dead
// codebook entry) get std=1 so they contribute nothing — correct behaviour.
function zscoreFrames(framesA, framesB) {
  const D = framesA[0].length;
  const N = framesA.length + framesB.length;
  const mean = new Float64Array(D);
  const std  = new Float64Array(D);

  for (const frames of [framesA, framesB])
    for (const f of frames)
      for (let d = 0; d < D; d++) mean[d] += f[d];
  for (let d = 0; d < D; d++) mean[d] /= N;

  for (const frames of [framesA, framesB])
    for (const f of frames)
      for (let d = 0; d < D; d++) { const e = f[d] - mean[d]; std[d] += e * e; }
  for (let d = 0; d < D; d++) std[d] = Math.sqrt(std[d] / N) || 1;  // std=0 → no-op

  const apply = frames => frames.map(f => {
    const out = new Float32Array(D);
    for (let d = 0; d < D; d++) out[d] = (f[d] - mean[d]) / std[d];
    return out;
  });
  return [apply(framesA), apply(framesB)];
}

function embQuantToFrames(embQuant, dims) {
  const [, D, T] = dims;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const f = new Float32Array(D);
    for (let d = 0; d < D; d++) f[d] = embQuant[d * T + t];
    frames.push(f);
  }
  return frames;
}

// Concatenates codebook vectors for all selected levels per frame.
// With a single level selected this is identical to the old single-level lookup.
function codebookLookupFrames(cb, codes, dims, levels) {
  const [, , T] = dims;
  const { data, vocab_size, dim } = cb;
  const frames = [];
  for (let t = 0; t < T; t++) {
    const vec = new Float32Array(dim * levels.length);
    for (let li = 0; li < levels.length; li++) {
      const level = levels[li];
      const idx   = codes[level * T + t];
      const off   = level * vocab_size * dim + idx * dim;
      vec.set(data.subarray(off, off + dim), li * dim);
    }
    frames.push(vec);
  }
  return frames;
}

// ── UMAP ──────────────────────────────────────────────────────────────────────

// Kick off a full projection session (PCA or UMAP depending on projectionMode).
// Builds the shared feature matrix once, then dispatches to the appropriate method.
function triggerProjection() {
  if (!currentEmbeds) return;
  const sid = ++umapSessionId;
  umapSlots       = Array(UMAP_N_SLOTS).fill(null);
  umapSlotIdx     = 0;
  umapFeatureData = null;
  pcaCoords       = null;
  updateSlotDots();
  slotWrap.classList.toggle('visible', projectionMode === 'umap');

  buildUMAPFeatureData()
    .then(fd => {
      if (umapSessionId !== sid) return; // superseded by a newer call
      umapFeatureData = fd;
      if (projectionMode === 'pca') {
        launchPCA();
      } else {
        slotWrap.classList.add('visible');
        launchUMAPSlot(0);
      }
    })
    .catch(err => setStatus(err.message, true));
}

// Build the shared feature matrix (expensive; run once per session).
// Returns {flat, T_A, T_B, D, nNeighbors, minDist} — flat is NOT transferred
// so it can be reused across all slot sends.
async function buildUMAPFeatureData() {
  let framesA, framesB, rawA, rawB;

  if (umapMode === 'combined') {
    if (embSpace === 'pre_vq') {
      rawA = embQuantToFrames(currentEmbeds.embEncA,   currentEmbeds.embEncDimsA);
      rawB = embQuantToFrames(currentEmbeds.embEncB,   currentEmbeds.embEncDimsB);
    } else {
      rawA = embQuantToFrames(currentEmbeds.embQuantA, currentEmbeds.embQuantDimsA);
      rawB = embQuantToFrames(currentEmbeds.embQuantB, currentEmbeds.embQuantDimsB);
    }
    framesA = rawA; framesB = rawB;
    if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA);  framesB = appendDeltas(framesB); }
    else if (embMode === 'delta')     { framesA = computeDeltas(framesA); framesB = computeDeltas(framesB); }
  } else {
    const cb = await ensureCodebooks();
    const levels = umapLevels.length ? umapLevels : [0];
    rawA = codebookLookupFrames(cb, currentEmbeds.codesA, currentEmbeds.codesDimsA, levels);
    rawB = codebookLookupFrames(cb, currentEmbeds.codesB, currentEmbeds.codesDimsB, levels);
    framesA = rawA; framesB = rawB;
    if      (embMode === 'emb+delta') { framesA = appendDeltas(framesA);  framesB = appendDeltas(framesB); }
    else if (embMode === 'delta')     { framesA = computeDeltas(framesA); framesB = computeDeltas(framesB); }
  }

  const K = Math.max(1, parseInt(umapWindowEl.value) || 1);
  if (K > 1) {
    framesA = applyWindowWithAnchor(rawA, framesA, K);
    framesB = applyWindowWithAnchor(rawB, framesB, K);
  }

  // Normalise: every dimension contributes equally regardless of raw magnitude.
  [framesA, framesB] = zscoreFrames(framesA, framesB);

  const T_A = framesA.length;
  const T_B = framesB.length;
  const D   = framesA[0].length;

  // Allocate flat array — NOT transferred, shared across all slot sends via copy.
  const flat = new Float32Array((T_A + T_B) * D);
  framesA.forEach((f, i) => flat.set(f, i * D));
  framesB.forEach((f, i) => flat.set(f, (T_A + i) * D));

  const nNeighbors = Math.min(
    Math.max(2, parseInt(nNeighborsEl.value) || 15),
    Math.max(2, Math.floor((T_A + T_B) / 3))
  );
  const minDist = parseFloat(minDistEl.value) || 0.1;

  return { flat, T_A, T_B, D, nNeighbors, minDist };
}

// Send one slot job to the worker. Each slot gets a unique seed (slotIdx + 1)
// so layouts are reproducible across sessions but visually distinct.
// flat is sent as a copy (no transfer) so buildUMAPFeatureData only runs once.
function launchUMAPSlot(slotIdx) {
  if (slotIdx >= UMAP_N_SLOTS || !umapFeatureData) return;
  const { flat, T_A, T_B, D, nNeighbors, minDist } = umapFeatureData;

  initUMAPWorker();
  activeUMAPJobId = ++jobSeq;

  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  if (slotIdx === 0) setStatus(`UMAP — starting… (${T_A + T_B} frames, ${UMAP_N_SLOTS} layouts)`);

  // No transferable — flat stays alive for subsequent slot sends.
  umapWorker.postMessage({
    type: 'compute_umap',
    jobId: activeUMAPJobId,
    slotIdx,
    seed: slotIdx + 1,
    flat, T_A, T_B, D, nNeighbors, minDist,
  });
}

// ── Post-processing chain ─────────────────────────────────────────────────────

function buildPostProc() {
  if (!audioCtx) return;
  const maxFreq = audioCtx.sampleRate / 2 - 1;
  const mg = audioCtx.createGain();
  mg.gain.value = 1;
  notchFilters = [];
  let prev = mg;
  for (let h = 1; h * notchFundamental <= maxFreq; h++) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'notch';
    f.frequency.value = notchFundamental * h;
    f.Q.value = (postProcEnabled && h * notchFundamental <= maxFreq) ? notchQ : 10000;
    notchFilters.push(f);
    prev.connect(f);
    prev = f;
  }
  prev.connect(audioCtx.destination);
  masterDest = mg;
}

function getMasterDest() {
  if (!audioCtx) return null;
  if (!masterDest) buildPostProc();
  return masterDest;
}

function updateNotchFilters() {
  if (!audioCtx || !masterDest) return;
  const maxFreq = audioCtx.sampleRate / 2 - 1;
  notchFilters.forEach((f, i) => {
    const freq = notchFundamental * (i + 1);
    f.frequency.value = freq;
    f.Q.value = (postProcEnabled && freq <= maxFreq) ? notchQ : 10000;
  });
}
