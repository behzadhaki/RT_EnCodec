<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnCodec — Encode / Decode Explorer</title>
<link rel="stylesheet" href="encodec.css">
<style>
:root { --lbl-w: 5.2em; }
#frame { grid-template-columns: 210px 1fr; }
#runBtn {
  width: 100%; margin-top: 0.7em; padding: 5px;
  background: var(--accent-lo); border: 1px solid var(--accent);
  color: var(--text); border-radius: 3px; font-size: 13px;
  font-weight: 600; cursor: pointer;
}
#runBtn:hover { filter: brightness(1.2); }
#runBtn:disabled { opacity: 0.4; cursor: default; filter: none; }
</style>
</head>
<body>
<div id="frame">

  <!-- ─────────── LEFT CONTROLS (populated by JS) ─────────── -->
  <div id="controls"></div>

  <!-- ─────────── RIGHT PANEL ─────────── -->
  <div id="right">

    <div id="toolbar">
      <button id="playBtn" disabled>▶</button>
      <div class="tab-group">
        <button class="tab active" data-view="source">Source</button>
        <button class="tab"        data-view="decoded">Decoded</button>
        <button class="tab"        data-view="both">Both</button>
      </div>
      <span id="statusBar">No audio loaded.</span>
      <div id="progressWrap"><div id="progressBar"></div></div>
    </div>

    <div id="legend">
      <span id="lgSrc"><span class="ldot" style="background:#c87800"></span>Source (plasma)</span>
      <span id="lgDec" style="display:none"><span class="ldot" style="background:#ff4400"></span>Decoded (hot)</span>
    </div>

    <div id="specArea">
      <div id="stripWrap"><canvas id="stripCanvas"></canvas></div>
      <div id="specWrap">
        <canvas id="specCanvas"></canvas>
        <canvas id="playheadCanvas"></canvas>
        <div id="activationOverlay"><span>Click to enable audio</span></div>
      </div>
    </div>

    <div id="notePanel"></div>

  </div>
</div><!-- #frame -->

<script type="module">
'use strict';

import { createSourcePanel } from './lib/source-panel.js';
import { createModelPanel   } from './lib/model-panel.js';
import { generateSource, loadFile, normalizePeak, MAX_S } from './lib/audio-utils.js';
import { computeSTFT, stftToOffscreen, drawStrip, PLASMA, HOT } from './lib/stft.js';

// ═══════════════════════════════════════════════════════════════════════
// Config
// ═══════════════════════════════════════════════════════════════════════

const MODELS_BASE = new URL('../serialization/encodec_onnx_exports', location.href).href;

// ═══════════════════════════════════════════════════════════════════════
// Build left-panel controls
// ═══════════════════════════════════════════════════════════════════════

const controls = document.getElementById('controls');

// Source section
const srcPanel = createSourcePanel({ title: 'Source', defaultFreq: 440 });
controls.appendChild(srcPanel.element);

// Duration section (experiment-local: appears inside Source in original, now separate)
const durSection = document.createElement('div');
durSection.className = 'section';
durSection.innerHTML = `
  <div class="section-title">Duration</div>
  <div class="row">
    <span class="lbl">Duration</span>
    <input type="number" id="dur" value="2" min="0.1" max="10" step="0.1">
    <span class="unit">s</span>
  </div>
`.trim();
controls.appendChild(durSection);
const durInput = durSection.querySelector('#dur');

// Model + Mode sections
const mp = createModelPanel({ onChange: () => { updateNotePanel(); } });
controls.appendChild(mp.modelSection);
controls.appendChild(mp.modeSection);

// Run-button section
const runSection = document.createElement('div');
runSection.className = 'section';
runSection.innerHTML = `<button id="runBtn" disabled>Run EnCodec</button>`;
controls.appendChild(runSection);
const runBtn = runSection.querySelector('#runBtn');
runBtn.disabled = false;

// ═══════════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════════

let audioCtx     = null;
let sourceAudio  = null;
let decodedAudio = null;
let sourceSR     = 24000;
let stftSrc      = null;
let stftDec      = null;
let offSrc       = null;
let offDec       = null;
let currentView  = 'source';
let worker       = null;
let jobSeq       = 0;
let activeJobId  = -1;
let isPlaying    = false;
let playNode     = null;
let playStart    = 0;
let phRAF        = null;
const dpr = devicePixelRatio || 1;

// ═══════════════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

const playBtn   = $('playBtn');
const statusBar = $('statusBar');
const progWrap  = $('progressWrap');
const progBar   = $('progressBar');
const specCvs   = $('specCanvas');
const phCvs     = $('playheadCanvas');
const stripCvs  = $('stripCanvas');
const actOvl    = $('activationOverlay');
const notePanel = $('notePanel');
const lgSrc     = $('lgSrc');
const lgDec     = $('lgDec');

// ═══════════════════════════════════════════════════════════════════════
// Audio context (user-gesture gated)
// ═══════════════════════════════════════════════════════════════════════

function ensureAudioCtx() {
  if (!audioCtx) { audioCtx = new AudioContext(); actOvl.style.display = 'none'; }
}
actOvl.addEventListener('click', ensureAudioCtx);

// ═══════════════════════════════════════════════════════════════════════
// Note panel
// ═══════════════════════════════════════════════════════════════════════

const NOTES = {
  '24k-false': () =>
    '<strong>Non-streaming.</strong> The entire clip is encoded and decoded in one pass ' +
    'with zero LSTM state. Each run is independent — identical inputs always produce identical outputs.',
  '24k-true': () => {
    const f  = mp.getFrameSize();
    const ms = Math.round(f / 24000 * 1000);
    return `<strong>Streaming (${f} samples · ${ms} ms frames).</strong> Audio is split into ` +
      'overlapping segments; each segment extends ±27 ms (640 samples) beyond the frame boundary ' +
      'so the causal encoder always has valid cross-boundary context. A triangle-window crossfade ' +
      'blends the overlap region. LSTM state is carried across segments.';
  },
  '48k': () =>
    '<strong>Stateless segments.</strong> Audio is split into 1 s segments, each encoded and decoded ' +
    'independently with zero LSTM state. Segments are stitched with a 100 ms triangle-window ' +
    'overlap-add crossfade. This matches the original EnCodec 48 kHz behaviour.',
};

function updateNotePanel() {
  const key = mp.getModelHz() === '48k' ? '48k' : `24k-${mp.isStreaming()}`;
  notePanel.innerHTML = NOTES[key] ? NOTES[key]() : '';
}
updateNotePanel();

// frame-size change also rebuilds the note text (frame ms is embedded in it)
mp.modeSection.querySelector('.mp-frame').addEventListener('change', updateNotePanel);

// ═══════════════════════════════════════════════════════════════════════
// View tabs
// ═══════════════════════════════════════════════════════════════════════

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentView = tab.dataset.view;
  updateLegend();
  drawSpec();
}));

function updateLegend() {
  lgSrc.style.display = (currentView !== 'decoded') ? '' : 'none';
  lgDec.style.display = (currentView !== 'source')  ? '' : 'none';
}

// ═══════════════════════════════════════════════════════════════════════
// Worker
// ═══════════════════════════════════════════════════════════════════════

function initWorker() {
  if (worker) worker.terminate();
  worker = new Worker('encodec-worker.js');
  worker.postMessage({ type: 'init', modelsBaseUrl: MODELS_BASE });
  worker.onmessage = onWorkerMsg;
}

function onWorkerMsg(e) {
  const msg = e.data;
  if (msg.jobId !== activeJobId) return;

  if (msg.type === 'progress') {
    progBar.style.width = Math.round(msg.value * 100) + '%';
    setStatus(msg.status);

  } else if (msg.type === 'result') {
    progWrap.style.display = 'none';
    decodedAudio = msg.decoded;
    stftDec = computeSTFT(decodedAudio);
    offDec  = null;
    setStatus(`Done — ${(decodedAudio.length / sourceSR).toFixed(2)} s decoded`);
    runBtn.disabled = false;
    playBtn.disabled = false;
    drawSpec();

  } else if (msg.type === 'error') {
    progWrap.style.display = 'none';
    setStatus('Error: ' + msg.message, true);
    runBtn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// Run button
// ═══════════════════════════════════════════════════════════════════════

runBtn.addEventListener('click', async () => {
  ensureAudioCtx();
  stopPlayback();
  decodedAudio = null; stftDec = null; offDec = null;
  playBtn.disabled = true;

  sourceSR = mp.getSampleRate();
  const dur = Math.min(parseFloat(durInput.value) || 2, MAX_S);

  let audio;
  if (srcPanel.getType() === 'file') {
    if (!srcPanel.getFile()) { setStatus('No file selected.', true); return; }
    setStatus('Loading file…');
    try { audio = await loadFile(srcPanel.getFile(), sourceSR); }
    catch (err) { setStatus('Could not load file: ' + err.message, true); return; }
  } else {
    audio = generateSource(srcPanel.getType(), srcPanel.getFreq(), dur, sourceSR);
    audio = normalizePeak(audio, 0.8);
  }

  sourceAudio = audio;
  stftSrc     = computeSTFT(sourceAudio);
  offSrc      = null;
  drawSpec();

  if (!worker) initWorker();

  runBtn.disabled = true;
  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  setStatus('Queuing…');

  activeJobId = ++jobSeq;
  worker.postMessage({
    type:      'process',
    jobId:     activeJobId,
    audio:     audio.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
});

// ═══════════════════════════════════════════════════════════════════════
// Playback
// ═══════════════════════════════════════════════════════════════════════

playBtn.addEventListener('click', () => { isPlaying ? stopPlayback() : startPlayback(); });

function startPlayback() {
  if (!audioCtx) return;
  const pcm = (currentView === 'decoded' && decodedAudio) ? decodedAudio : sourceAudio;
  if (!pcm) return;
  const buf = audioCtx.createBuffer(1, pcm.length, sourceSR);
  buf.copyToChannel(pcm, 0);
  playNode = audioCtx.createBufferSource();
  playNode.buffer  = buf;
  playNode.connect(audioCtx.destination);
  playNode.onended = stopPlayback;
  playNode.start();
  playStart = audioCtx.currentTime;
  isPlaying = true;
  playBtn.textContent = '⏹';
  animatePlayhead();
}

function stopPlayback() {
  if (playNode) { try { playNode.stop(); } catch {} playNode = null; }
  isPlaying = false;
  playBtn.textContent = '▶';
  cancelAnimationFrame(phRAF);
  clearPlayhead();
}

function animatePlayhead() {
  function tick() {
    if (!isPlaying) return;
    const dur = sourceAudio ? sourceAudio.length / sourceSR : 1;
    drawPlayhead((audioCtx.currentTime - playStart) / dur);
    phRAF = requestAnimationFrame(tick);
  }
  tick();
}

// ═══════════════════════════════════════════════════════════════════════
// Spectrogram draw
// ═══════════════════════════════════════════════════════════════════════

function drawSpec() {
  const cW = Math.round(specCvs.clientWidth  * dpr);
  const cH = Math.round(specCvs.clientHeight * dpr);
  if (!cW || !cH) return;
  specCvs.width = cW; specCvs.height = cH;
  const ctx = specCvs.getContext('2d');
  ctx.clearRect(0, 0, cW, cH);

  if (stftSrc && !offSrc) offSrc = stftToOffscreen(stftSrc, PLASMA);
  if (stftDec && !offDec) offDec = stftToOffscreen(stftDec, HOT);

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  if (currentView === 'source' && offSrc) {
    ctx.drawImage(offSrc, 0, 0, cW, cH);
  } else if (currentView === 'decoded' && offDec) {
    ctx.drawImage(offDec, 0, 0, cW, cH);
  } else if (currentView === 'both') {
    if (offSrc) { ctx.globalAlpha = 1.0; ctx.drawImage(offSrc, 0, 0, cW, cH); }
    if (offDec) {
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.8;
      ctx.drawImage(offDec, 0, 0, cW, cH);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1.0;
    }
  }

  const stft  = (currentView === 'decoded' && stftDec) ? stftDec : stftSrc;
  const stops = (currentView === 'decoded' && stftDec) ? HOT : PLASMA;
  drawStrip(stripCvs, stft, stops, dpr);
}

// ═══════════════════════════════════════════════════════════════════════
// Playhead
// ═══════════════════════════════════════════════════════════════════════

function drawPlayhead(frac) {
  const cW = Math.round(phCvs.clientWidth  * dpr);
  const cH = Math.round(phCvs.clientHeight * dpr);
  phCvs.width = cW; phCvs.height = cH;
  if (frac < 0 || frac > 1.001) return;
  const ctx = phCvs.getContext('2d');
  const x   = Math.round(Math.min(frac, 1) * cW);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth   = dpr;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, cH); ctx.stroke();
}

function clearPlayhead() {
  phCvs.width  = phCvs.clientWidth  * dpr;
  phCvs.height = phCvs.clientHeight * dpr;
}

// ═══════════════════════════════════════════════════════════════════════
// Resize
// ═══════════════════════════════════════════════════════════════════════

new ResizeObserver(() => { offSrc = null; offDec = null; drawSpec(); }).observe($('specWrap'));

// ═══════════════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════════════

function setStatus(msg, isErr = false) {
  statusBar.textContent = msg;
  statusBar.style.color = isErr ? 'var(--red)' : 'var(--muted)';
}

// ═══════════════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════════════

initWorker();
updateLegend();
</script>
</body>
</html>
