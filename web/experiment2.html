<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnCodec — Latent Space Interpolation</title>
<link rel="stylesheet" href="encodec.css">
<style>
/* ── experiment2-specific overrides & additions ─────────────────────── */
:root { --lbl-w: 4.8em; }
#frame { grid-template-columns: 230px 1fr; }

#loopBtn {
  width: 28px; height: 28px; border-radius: 4px; cursor: pointer;
  background: var(--accent-lo); border: 1px solid var(--accent);
  color: var(--text); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
}
#loopBtn:hover { filter: brightness(1.2); }
#loopBtn:disabled { opacity: 0.4; cursor: default; filter: none; }
#loopBtn.active { background: var(--accent); color: #000; }

#levelMeter {
  width: 10px; height: 28px; flex-shrink: 0;
  border-radius: 2px; border: 1px solid var(--border2);
  background: #111; display: block;
}

/* ── Interpolation slider ────────────────────────────────────────────── */
.interp-slider-row {
  display: flex; align-items: center; gap: 0.5em; margin-bottom: 0.3em;
}
.interp-end { font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0; }
#interpSlider, #scaleSlider { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }
#interpSlider:disabled { opacity: 0.35; cursor: default; }
#alphaDisplay { text-align: center; font-size: 11px; color: var(--muted); }
#scaleSliderRow { position: absolute; gap: 6px; margin: 0; }

/* ── Interp-point labels ─────────────────────────────────────────────── */
#pipelineLabels {
  position: absolute; top: 4px; left: 0; right: 0;
  z-index: 1; pointer-events: none;
}
.ipt-label {
  position: absolute; top: 0; transform: translateX(-50%);
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  white-space: nowrap; cursor: pointer; user-select: none;
  pointer-events: auto; color: var(--muted); transition: color 0.15s;
}
.ipt-label.active { color: var(--accent); }
.ipt-label:not(.active):hover { color: var(--text); }

/* ── Pipeline panel ─────────────────────────────────────────────────── */
#pipelinePanel {
  flex-shrink: 0; position: relative;
  background: var(--surface2); border-bottom: 1px solid var(--border); overflow: hidden;
}
#pipelineCanvas { display: block; width: 100%; height: 75px; }
#pipelineCtrl { position: relative; height: 42px; border-top: 1px solid var(--border2); }

#mainSliderSection, #vqModeBar {
  position: absolute; top: 50%; transform: translateY(-50%);
}
#mainSliderSection { min-width: 180px; }
#mainSliderSection .interp-slider-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
#alphaDisplay { text-align: center; font-size: 11px; color: var(--muted); white-space: nowrap; }
#vqModeBar .toggle-row { gap: 3px; flex-wrap: nowrap; }

/* ── VQ hash toggle ──────────────────────────────────────────────────── */
#vqHashToggle {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--muted); cursor: pointer;
  user-select: none; background: rgba(0,0,0,0.35); border-radius: 3px; padding: 2px 5px;
  z-index: 2;
}
#vqHashToggle input { cursor: pointer; accent-color: var(--accent); margin: 0; }

/* ── Norm toggle ─────────────────────────────────────────────────────── */
#normToggle {
  position: absolute; top: 6px; right: 8px; z-index: 2;
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--muted); cursor: pointer;
  user-select: none; background: rgba(0,0,0,0.45); border-radius: 3px; padding: 2px 6px;
}
#normToggle input { cursor: pointer; accent-color: var(--accent); margin: 0; }

/* ── Level-alpha sliders panel ───────────────────────────────────────── */
#multisliderPanel {
  flex-shrink: 0; background: var(--surface2); border-bottom: 1px solid var(--border);
}
#scatterNav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1px 8px; border-bottom: 1px solid var(--border2);
  font-size: 10px; color: var(--muted);
}
#scatterNav button {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1.4;
}
#scatterNav button:hover:not(:disabled) { color: var(--text); }
#scatterNav button:disabled { opacity: 0.25; cursor: default; }
#scatterSliders { padding: 4px 8px 5px; }
@keyframes rowBlink {
  0%, 100% { background: transparent; }
  30%, 70%  { background: rgba(255, 210, 100, 0.18); }
}
.scatter-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; border-radius: 3px; }
.scatter-row:last-child { margin-bottom: 0; }
.scatter-row.blinking { animation: rowBlink 350ms ease-in-out 3; }
.scatter-lbl  { width: 2.2em; flex-shrink: 0; text-align: right; color: var(--muted); font-size: 11px; }
.scatter-slider { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }
.scatter-slider:disabled { opacity: 0.35; cursor: default; }
.scatter-val { width: 2.6em; flex-shrink: 0; text-align: right; color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div id="frame">

  <!-- ─────────── LEFT CONTROLS (populated by JS) ─────────── -->
  <div id="controls"></div>

  <!-- ─────────── RIGHT PANEL ─────────── -->
  <div id="right">

    <div id="toolbar">
      <button id="playBtn" disabled>▶</button>
      <button id="loopBtn" disabled title="Loop">↺</button>
      <canvas id="levelMeter" title="Output level"></canvas>
      <div class="tab-group">
        <button class="tab active" data-view="A">Source A</button>
        <button class="tab"        data-view="B">Source B</button>
        <button class="tab"        data-view="interp">A → B</button>
      </div>
      <span id="statusBar">Click to enable audio.</span>
      <div id="progressWrap"><div id="progressBar"></div></div>
    </div>

    <div id="legend">
      <span id="lgA"><span class="ldot" style="background:#c87800"></span>Source A (plasma)</span>
      <span id="lgB" style="display:none"><span class="ldot" style="background:#2090c0"></span>Source B (ocean)</span>
      <span id="lgI" style="display:none"><span class="ldot" style="background:#ff4400"></span>Interpolated (hot)</span>
    </div>

    <div id="pipelinePanel">
      <div id="pipelineLabels">
        <span class="ipt-label active" id="togEncLatents" data-point="encoder_latents"></span>
        <span class="ipt-label"        id="togVQCodes"    data-point="vq_codes">Interpolate Here</span>
        <span class="ipt-label"        id="togQuantEmb"   data-point="quantized_embeddings">Interpolate Here</span>
      </div>
      <canvas id="pipelineCanvas"></canvas>
      <div id="pipelineCtrl">
        <div id="mainSliderSection">
          <div class="interp-slider-row">
            <span class="interp-end">A</span>
            <input type="range" id="interpSlider" min="0" max="100" value="50" step="1" disabled>
            <span class="interp-end">B</span>
          </div>
          <div id="alphaDisplay">α = 0.50  (50 % A · 50 % B)</div>
        </div>
        <div id="scaleSliderRow" class="interp-slider-row" style="display:none">
          <span class="interp-end">A</span>
          <input type="range" id="scaleSlider" min="0" max="100" value="50" step="1">
          <span class="interp-end">B</span>
        </div>
        <div id="vqModeBar" style="display:none">
          <div class="toggle-row" id="vqModeRow">
            <button class="tog active" data-vqmode="flat_swap">Flat Swap</button>
            <button class="tog"        data-vqmode="frame_swap">Frame Swap</button>
            <button class="tog"        data-vqmode="level_swap">Level Swap</button>
            <button class="tog"        data-vqmode="int_lerp">Int. Lerp</button>
            <button class="tog"        data-vqmode="sim_interp">Sim. Interp.</button>
          </div>
        </div>
        <label id="vqHashToggle" style="display:none" title="Deterministic golden-ratio hash — same seed always gives same split">
          <input type="checkbox" id="deterministicChk" checked>
          <span>Det.</span>
        </label>
      </div>
    </div>

    <div id="multisliderPanel" style="display:none"></div>

    <div id="specArea">
      <div id="stripWrap"><canvas id="stripCanvas"></canvas></div>
      <div id="specWrap">
        <canvas id="specCanvas"></canvas>
        <canvas id="playheadCanvas"></canvas>
        <div id="activationOverlay"><span>Click to enable audio</span></div>
        <label id="normToggle" title="Shared scale: use same dB range for all spectrograms">
          <input type="checkbox" id="sharedScaleChk"> Shared scale
        </label>
      </div>
    </div>

    <div id="notePanel"></div>

  </div>
</div><!-- #frame -->

<script type="module">
'use strict';

import { createDoubleSourceWidget } from './lib/double-source-widget.js';
import { createModelPanel }     from './lib/model-panel.js';
import {
  MAX_S,
} from './lib/audio-utils.js';
import {
  computeSTFT, stftToOffscreen, drawStrip as _drawStrip, PLASMA, OCEAN, HOT,
} from './lib/stft.js';

// ═══════════════════════════════════════════════════════════════════════
// Config
// ═══════════════════════════════════════════════════════════════════════

const MODELS_BASE = new URL('../serialization/encodec_onnx_exports', location.href).href;

const VQ_MODE_NOTES = {
  flat_swap:
    '<strong>Flat Swap.</strong> Each scalar code position independently picks A\'s or B\'s ' +
    'index via a golden-ratio hash. Swaps freely across time frames <em>and</em> codebook levels ' +
    '— the RVQ hierarchy is broken within each frame.',
  frame_swap:
    '<strong>Frame Swap.</strong> All N<sub>q</sub> levels at a given time frame come from the ' +
    'same source (A or B). RVQ intra-frame coherence is preserved: coarse and fine detail always ' +
    'originate from the same signal at each moment.',
  level_swap:
    '<strong>Level Swap.</strong> Each RVQ level k has its own α slider. Within that level each ' +
    'time frame independently picks A or B. Levels are uncorrelated — a given frame may have ' +
    'level 0 from A and level 1 from B.',
  int_lerp:
    '<strong>Int. Lerp.</strong> Each RVQ level k has its own α<sub>k</sub> slider. The index ' +
    'at each position is <code>round((1−α<sub>k</sub>)·a + α<sub>k</sub>·b)</code>. Codebook ' +
    'entries are not acoustically ordered — this is a purely exploratory operation.',
  sim_interp:
    '<strong>Sim. Interp.</strong> Each RVQ level k has its own α<sub>k</sub> slider. Codebook ' +
    'entries are globally ranked once by centrality — distance from the codebook centroid — so ' +
    'rank 0 is the most peripheral (unusual) entry and rank 1023 is the most central (typical). ' +
    'α<sub>k</sub> walks from A\'s rank to B\'s rank: α=0 gives exactly code A, α=1 gives ' +
    'exactly code B, and the midpoint picks the entry whose typicality sits between them.',
};

const INTERP_NOTES = {
  encoder_latents: '<strong>Encoder Latents.</strong> Interpolation in the continuous latent space ' +
    'produced by the encoder, before the vector quantizer. The interpolated embedding is then ' +
    '<em>re-quantized</em> — snapped to the nearest codebook entries — before decoding. ' +
    'This keeps the audio decoder in-distribution while exploring the pre-VQ manifold.',
  vq_codes: '<strong>VQ Codes.</strong> Interpolation in the discrete codebook space. ' +
    'Codes are mixed element-wise: each position uses B\'s code with probability α, determined ' +
    'by a deterministic golden-ratio hash (reproducible per position). Mixed codes are then ' +
    're-embedded via <code>decode_codes</code> before audio decoding.',
  quantized_embeddings: '<strong>Quantized Embeddings.</strong> Interpolation on the continuous ' +
    'embeddings output by <code>decode_codes</code> — after VQ discretisation and re-embedding, ' +
    'before the audio LSTM decoder. Blends through the quantized representation space.',
};

// ═══════════════════════════════════════════════════════════════════════
// Build left-panel controls
// ═══════════════════════════════════════════════════════════════════════

const controls = document.getElementById('controls');

const srcWidget = createDoubleSourceWidget({
  defaultDur: 2, minDur: 0.1, maxDur: 10, stepDur: 0.1,
  onChange: delay => scheduleFullRecalc(delay),
});
controls.appendChild(srcWidget.element);
const { panelA, panelB } = srcWidget;

// Model + Mode sections
const mp = createModelPanel({
  onChange() {
    updateLevelSliders();
    updateScaleSliderVisibility();
    drawPipeline();
    scheduleFullRecalc(0);
  },
});
controls.appendChild(mp.modelSection);
controls.appendChild(mp.modeSection);

// ═══════════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════════

let audioCtx     = null;
let sourceSR     = 24000;

let rawAudioA    = null;
let rawAudioB    = null;
let decodedA     = null;
let decodedB     = null;
let interpAudio  = null;

let bufA = null, bufB = null, bufInterp = null;
let stftA = null, stftB = null, stftInterp = null;
let offA  = null, offB  = null, offInterp  = null;

let currentView  = 'A';
let interpPoint  = 'encoder_latents';
let vqMode       = 'flat_swap';
let analyserNode    = null;
let _levelCur       = 0;
let _levelPeak      = 0;
let _levelRAF       = null;

const MAX_NQ         = 32;
let levelAlphas      = new Array(MAX_NQ).fill(0);
let scaleAlpha       = 0.5;
let shiftHeld        = false;
let sharedScale      = false;
let deterministicHash = true;

let worker          = null;
let jobSeq          = 0;
let activeJobId     = -1;
let encodePhase     = null;
let fullRecalcTimer = null;
let interpTimer     = null;
let recalcToken     = 0;
let capturesDirty   = true;  // true until both A and B are encoded with current settings

let isPlaying       = false;
let looping         = true;
let playNode        = null;
let playGain        = null;
let fadeOutNode     = null;
let fadeOutGain     = null;
const CROSSFADE_S   = 1.5;
let playStart       = 0;
let playingDuration = 0;
let phRAF           = null;

let specFadeOldOff  = null;
let specFadeNewOff  = null;
let specFadeView    = null;
let specFadeStart   = 0;
let specFadeRAF     = null;

let seekOffset          = 0;
let isDraggingPlayhead  = false;
let currentScrubFrac    = 0;
let pipelineTimer       = null;

let _activeLevel   = null;
let _scatterOffset = 0;
let _scatterRAF    = null;
let _vqCircleGrid  = null;

const dpr = devicePixelRatio || 1;

// ═══════════════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

const playBtn      = $('playBtn');
const loopBtn      = $('loopBtn');
const statusBar    = $('statusBar');
const progWrap     = $('progressWrap');
const progBar      = $('progressBar');
const specCvs      = $('specCanvas');
const phCvs        = $('playheadCanvas');
const stripCvs     = $('stripCanvas');
const actOvl       = $('activationOverlay');
const notePanel    = $('notePanel');
const lgA = $('lgA'), lgB = $('lgB'), lgI = $('lgI');
const interpSlider   = $('interpSlider');
const alphaDisplay   = $('alphaDisplay');
const scaleSlider    = $('scaleSlider');
const scaleSliderRow = $('scaleSliderRow');
const sharedScaleChk = $('sharedScaleChk');

// ═══════════════════════════════════════════════════════════════════════
// Audio context (user-gesture gated)
// ═══════════════════════════════════════════════════════════════════════

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 512;
    analyserNode.smoothingTimeConstant = 0;
    analyserNode.connect(audioCtx.destination);
    actOvl.style.display = 'none';
    scheduleFullRecalc();
  }
}
actOvl.addEventListener('click', ensureAudioCtx);

// ═══════════════════════════════════════════════════════════════════════
// Interpolation point toggle
// ═══════════════════════════════════════════════════════════════════════

document.querySelectorAll('#pipelineLabels .ipt-label').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#pipelineLabels .ipt-label').forEach(b => {
      b.classList.remove('active');
      b.textContent = 'Interpolate Here';
    });
    btn.classList.add('active');
    btn.textContent = '';
    interpPoint = btn.dataset.point;
    updateNotePanel();
    updateVqSectionVisibility();
    drawPipeline();
    scheduleInterpRecalc();
  });
});

document.querySelectorAll('#vqModeRow .tog').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#vqModeRow .tog').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    vqMode = btn.dataset.vqmode;
    updateVqSectionVisibility();
    updateNotePanel();
    drawPipeline();
    scheduleInterpRecalc();
  });
});

$('deterministicChk').addEventListener('change', () => {
  deterministicHash = $('deterministicChk').checked;
  scheduleInterpRecalc();
});

// ═══════════════════════════════════════════════════════════════════════
// Interpolation slider
// ═══════════════════════════════════════════════════════════════════════

interpSlider.addEventListener('input', () => {
  const v = parseInt(interpSlider.value) / 100;
  if (shiftHeld) {
    scaleAlpha = v;
    scaleSlider.value = Math.round(v * 100);
    const nq = computeNq();
    for (let j = 0; j < nq; j++) levelAlphas[j] = v;
    drawMultislider();
  }
  updateAlphaDisplay();
  drawPipeline();
});
interpSlider.addEventListener('change', () => scheduleInterpRecalc());

scaleSlider.addEventListener('input', () => {
  const v = parseInt(scaleSlider.value) / 100;
  if (shiftHeld) {
    // Gang: set alpha and all level sliders to the same value
    scaleAlpha = v;
    interpSlider.value = Math.round(v * 100);
    const nq = computeNq();
    for (let j = 0; j < nq; j++) levelAlphas[j] = v;
    drawMultislider();
  } else {
    scaleAlpha = v;
  }
  updateAlphaDisplay();
  drawPipeline();
});
scaleSlider.addEventListener('change', () => scheduleInterpRecalc());

function updateAlphaDisplay() {
  const a = parseInt(interpSlider.value) / 100;
  if (mp.getModelHz() === '48k') {
    alphaDisplay.textContent = `α = ${a.toFixed(2)}  ·  sc = ${scaleAlpha.toFixed(2)}`;
  } else {
    alphaDisplay.textContent = `α = ${a.toFixed(2)}  (${Math.round((1-a)*100)} % A · ${Math.round(a*100)} % B)`;
  }
}

function updateScaleSliderVisibility() {
  const is48 = mp.getModelHz() === '48k';
  scaleSliderRow.style.display = is48 ? '' : 'none';
  updateAlphaDisplay();
  positionPipelineControls();
}

// ═══════════════════════════════════════════════════════════════════════
// View tabs
// ═══════════════════════════════════════════════════════════════════════

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  const newView = tab.dataset.view;
  if (newView === currentView) return;

  if (stftA && !offA) offA = makeOffscreen(stftA, PLASMA);
  if (stftB && !offB) offB = makeOffscreen(stftB, OCEAN);
  if (stftInterp && !offInterp) offInterp = makeOffscreen(stftInterp, HOT);
  const oldOff = currentView === 'A' ? offA : currentView === 'B' ? offB : offInterp;
  const newOff = newView    === 'A' ? offA : newView    === 'B' ? offB : offInterp;

  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === newView));
  currentView = newView;
  updateLegend();
  startSpecFade(oldOff, newOff, newView);

  if (isPlaying && audioCtx) {
    const elapsed = audioCtx.currentTime - playStart;
    const dur     = playingDuration || 1;
    const offset  = looping ? elapsed % dur : Math.min(elapsed, dur - 0.001);
    _crossfadeAudioTo(Math.max(0, offset));
  }
}));

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  updateLegend();
  drawSpec();
}

function updateLegend() {
  lgA.style.display = currentView === 'A'      ? '' : 'none';
  lgB.style.display = currentView === 'B'      ? '' : 'none';
  lgI.style.display = currentView === 'interp' ? '' : 'none';
}

// ═══════════════════════════════════════════════════════════════════════
// VQ sub-mode visibility + per-level sliders
// ═══════════════════════════════════════════════════════════════════════

function computeNq() {
  const framesPerSec = mp.getModelHz() === '24k' ? 75 : 150;
  return Math.round(mp.getBwKbps() * 1000 / (framesPerSec * 10));
}

function initLevelSliders() { levelAlphas.fill(0); }

function updateLevelSliders() { drawMultislider(); }

let _vqCircleGrid_local = null;

function _startScatterLoop() {
  if (_scatterRAF) return;
  function tick() {
    if (_activeLevel === null) { _scatterRAF = null; return; }
    drawPipeline();
    _scatterRAF = requestAnimationFrame(tick);
  }
  _scatterRAF = requestAnimationFrame(tick);
}

function _stopScatterLoop() {
  if (_scatterRAF) { cancelAnimationFrame(_scatterRAF); _scatterRAF = null; }
  _activeLevel = null;
  drawPipeline();
}

function drawMultislider() {
  const nq    = computeNq();
  const panel = $('multisliderPanel');
  if (!panel || !nq) return;

  _scatterOffset = Math.max(0, Math.min(_scatterOffset, Math.max(0, nq - 4)));
  panel.innerHTML = '';

  if (nq > 4) {
    const end = Math.min(_scatterOffset + 3, nq - 1);
    const nav = document.createElement('div');
    nav.id = 'scatterNav';

    const prev = document.createElement('button');
    prev.textContent = '‹'; prev.disabled = (_scatterOffset === 0);
    prev.addEventListener('click', () => { _scatterOffset = Math.max(0, _scatterOffset - 4); drawMultislider(); });

    const lbl = document.createElement('span');
    lbl.textContent = `L${_scatterOffset} – L${end}`;

    const next = document.createElement('button');
    next.textContent = '›'; next.disabled = (end >= nq - 1);
    next.addEventListener('click', () => { _scatterOffset = Math.min(nq - 4, _scatterOffset + 4); drawMultislider(); });

    nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
    panel.appendChild(nav);
  }

  const rows    = document.createElement('div');
  rows.id       = 'scatterSliders';
  const count   = Math.min(4, nq - _scatterOffset);
  const enabled = !!(decodedA && decodedB);

  for (let i = 0; i < count; i++) {
    const k     = _scatterOffset + i;
    const alpha = levelAlphas[k] ?? 0;

    const row = document.createElement('div');
    row.className = 'scatter-row';

    const lbl = document.createElement('span');
    lbl.className = 'scatter-lbl';
    lbl.textContent = `L${k}`;

    const slider = document.createElement('input');
    slider.type = 'range'; slider.min = 0; slider.max = 100; slider.step = 1;
    slider.value = Math.round(alpha * 100);
    slider.className = 'scatter-slider';
    slider.disabled = !enabled;

    const valEl = document.createElement('span');
    valEl.className = 'scatter-val';
    valEl.textContent = alpha.toFixed(2);

    const kk = k;
    slider.addEventListener('input', () => {
      const v   = slider.value / 100;
      const nq2 = computeNq();
      if (shiftHeld) {
        for (let j = 0; j < nq2; j++) levelAlphas[j] = v;
        rows.querySelectorAll('.scatter-slider').forEach(s  => { s.value = Math.round(v * 100); });
        rows.querySelectorAll('.scatter-val')   .forEach(vd => { vd.textContent = v.toFixed(2); });
        interpSlider.value = Math.round(v * 100);
        scaleAlpha = v; scaleSlider.value = Math.round(v * 100);
        updateAlphaDisplay();
      } else {
        levelAlphas[kk] = v;
        valEl.textContent = v.toFixed(2);
      }
      _activeLevel = kk;
      _startScatterLoop();
    });
    slider.addEventListener('change', () => {
      scheduleInterpRecalc();
      setTimeout(() => { if (_activeLevel === kk) _stopScatterLoop(); }, 500);
    });
    row.addEventListener('mouseenter', () => { _activeLevel = kk; _startScatterLoop(); });
    row.addEventListener('mouseleave', () => { if (_activeLevel === kk) _stopScatterLoop(); });

    row.appendChild(lbl); row.appendChild(slider); row.appendChild(valEl);
    rows.appendChild(row);
  }
  panel.appendChild(rows);
}

function updateVqSectionVisibility() {
  const isVQ       = interpPoint === 'vq_codes';
  const usesLevels = isVQ && (vqMode === 'level_swap' || vqMode === 'int_lerp' || vqMode === 'sim_interp');
  const usesHash   = isVQ && vqMode !== 'int_lerp' && vqMode !== 'sim_interp';
  $('vqModeBar').style.display         = isVQ       ? '' : 'none';
  $('vqHashToggle').style.display      = usesHash   ? '' : 'none';
  $('multisliderPanel').style.display  = usesLevels ? '' : 'none';
  $('mainSliderSection').style.display = usesLevels ? 'none' : '';
  if (usesLevels) drawMultislider();
  positionPipelineControls();
}

// ═══════════════════════════════════════════════════════════════════════
// Note panel
// ═══════════════════════════════════════════════════════════════════════

function updateNotePanel() {
  let html = INTERP_NOTES[interpPoint] || '';
  if (interpPoint === 'vq_codes' && VQ_MODE_NOTES[vqMode])
    html += '<br>' + VQ_MODE_NOTES[vqMode];
  notePanel.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// Audio generation helpers
// ═══════════════════════════════════════════════════════════════════════

async function buildBothAudios(token) {
  const sr        = mp.getSampleRate();
  const targetSec = srcWidget.getDuration();
  const finalLen  = Math.round(targetSec * sr);

  setStatus('Loading A…');
  let audioA;
  try { audioA = await srcWidget.buildAudio(panelA, finalLen, sr); }
  catch (err) { throw err; }
  if (recalcToken !== token) return null;

  setStatus('Loading B…');
  let audioB;
  try { audioB = await srcWidget.buildAudio(panelB, finalLen, sr); }
  catch (err) { throw err; }
  if (recalcToken !== token) return null;

  return { audioA, audioB };
}

// ═══════════════════════════════════════════════════════════════════════
// Worker
// ═══════════════════════════════════════════════════════════════════════

function initWorker() {
  if (worker) worker.terminate();
  worker = new Worker('encodec-worker.js');
  worker.postMessage({ type: 'init', modelsBaseUrl: MODELS_BASE });
  worker.onmessage = onWorkerMsg;
}

function onWorkerMsg(e) {
  const msg = e.data;
  if (msg.jobId !== activeJobId) return;

  if (msg.type === 'progress') {
    progBar.style.width = Math.round(msg.value * 100) + '%';
    setStatus(msg.status);

  } else if (msg.type === 'result') {
    progWrap.style.display = 'none';

    if (encodePhase === 'A') {
      const prevOff = offA;
      decodedA = msg.decoded;
      sourceSR = mp.getSampleRate();
      bufA = makeAudioBuf(decodedA);
      stftA = computeSTFT(decodedA);
      offA = makeOffscreen(stftA, PLASMA);
      crossfadeToNew('A');
      drawPipeline();
      setStatus('Source A encoded — encoding B…');
      if (currentView === 'A') startSpecFade(prevOff, offA, 'A');
      else drawSpec();
      startEncodeB();

    } else if (encodePhase === 'B') {
      const prevOff = offB;
      decodedB = msg.decoded;
      bufB = makeAudioBuf(decodedB);
      stftB = computeSTFT(decodedB);
      offB = makeOffscreen(stftB, OCEAN);
      if (sharedScale) offA = null; // invalidate A so it redraws with updated global range
      capturesDirty = false;   // both A and B encoded with current settings
      encodePhase = null;
      interpSlider.disabled = false;
      playBtn.disabled = false;
      loopBtn.disabled = false;
      updateLevelSliders();
      crossfadeToNew('B');
      drawPipeline();
      if (currentView === 'B') startSpecFade(prevOff, offB, 'B');
      else drawSpec();
      if (!isPlaying) setView('A');
      triggerInterpolation();

    } else if (encodePhase === 'interp') {
      const prevOff = offInterp;
      interpAudio = msg.decoded;
      bufInterp = makeAudioBuf(interpAudio);
      stftInterp = computeSTFT(interpAudio);
      offInterp = makeOffscreen(stftInterp, HOT);
      if (sharedScale) { offA = null; offB = null; } // invalidate A+B for updated global range
      const a = parseInt(interpSlider.value) / 100;
      const modeLabel = interpPoint === 'vq_codes' ? ` · ${vqMode.replace(/_/g,' ')}` : '';
      setStatus(`α = ${a.toFixed(2)}  ·  ${interpPoint.replace(/_/g,' ')}${modeLabel}`);
      encodePhase = null;
      playBtn.disabled = false;
      loopBtn.disabled = false;
      crossfadeToNew('interp');
      drawPipeline();
      if (currentView === 'interp' || !isPlaying) startSpecFade(prevOff, offInterp, 'interp');
      else drawSpec();
      if (!isPlaying) setView('interp');
    }

  } else if (msg.type === 'error') {
    progWrap.style.display = 'none';
    setStatus('Error: ' + msg.message, true);
    encodePhase = null;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// Recalculation scheduling
// ═══════════════════════════════════════════════════════════════════════

function cancelCurrentJob() {
  if (encodePhase !== null) {
    const phase = encodePhase;
    worker.postMessage({ type: 'cancel', jobId: activeJobId });
    activeJobId = ++jobSeq;
    encodePhase = null;
    if (phase === 'A' || phase === 'B') capturesDirty = true;
  }
}

function makeAudioBuf(pcm) {
  if (!audioCtx || !pcm) return null;
  const b = audioCtx.createBuffer(1, pcm.length, sourceSR);
  b.copyToChannel(pcm, 0);
  return b;
}

function clearVisualizers(interpOnly) {
  _cancelSpecFade();
  if (!interpOnly) { seekOffset = 0; currentScrubFrac = 0; bufA = null; bufB = null; }
  bufInterp = null;
  interpAudio = null;
  if (!interpOnly) {
    rawAudioA = rawAudioB = null;
    interpSlider.disabled = true;
    updateLevelSliders();
  }
  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  setStatus('Re-calculating…');
  drawSpec();
}

function scheduleFullRecalc(delay = 0) {
  capturesDirty = true;
  clearTimeout(fullRecalcTimer);
  clearTimeout(interpTimer);
  fullRecalcTimer = setTimeout(() => {
    if (!audioCtx) return;
    cancelCurrentJob();
    clearVisualizers(false);
    startFullPipeline();
  }, delay);
}

function scheduleInterpRecalc() {
  // If captures are dirty or missing, a full recalc is needed instead.
  if (capturesDirty || !rawAudioA || !rawAudioB) {
    scheduleFullRecalc(0);
    return;
  }
  clearTimeout(interpTimer);
  interpTimer = setTimeout(() => {
    if (capturesDirty || !rawAudioA || !rawAudioB) { scheduleFullRecalc(0); return; }
    cancelCurrentJob();
    clearVisualizers(true);
    triggerInterpolation();
  }, 0);
}

async function startFullPipeline() {
  const token = ++recalcToken;
  if (!worker) initWorker();

  let result;
  try { result = await buildBothAudios(token); }
  catch (err) {
    if (recalcToken === token) { setStatus(err.message, true); progWrap.style.display = 'none'; }
    return;
  }
  if (!result) return;

  rawAudioA = result.audioA;
  rawAudioB = result.audioB;
  sourceSR  = mp.getSampleRate();

  encodePhase = 'A';
  activeJobId = ++jobSeq;
  setStatus('Encoding A…');

  worker.postMessage({
    type:      'encode',
    source:    'A',
    jobId:     activeJobId,
    audio:     rawAudioA.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
}

function startEncodeB() {
  encodePhase = 'B';
  activeJobId = ++jobSeq;
  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  setStatus('Encoding B…');

  worker.postMessage({
    type:      'encode',
    source:    'B',
    jobId:     activeJobId,
    audio:     rawAudioB.slice(),
    modelHz:   mp.getModelHz(),
    bwKbps:    mp.getBwKbps(),
    streaming: mp.isStreaming(),
    frameSize: mp.getFrameSize(),
  });
}

// ═══════════════════════════════════════════════════════════════════════
// Interpolation trigger
// ═══════════════════════════════════════════════════════════════════════

function triggerInterpolation() {
  if (!rawAudioA || !rawAudioB) return;
  encodePhase = 'interp';
  activeJobId = ++jobSeq;
  progWrap.style.display = 'block';
  progBar.style.width = '0%';
  const alpha = parseInt(interpSlider.value) / 100;
  setStatus(`Interpolating at α = ${alpha.toFixed(2)}…`);

  const msg = {
    type:          'interpolate',
    jobId:         activeJobId,
    modelHz:       mp.getModelHz(),
    bwKbps:        mp.getBwKbps(),
    streaming:     mp.isStreaming(),
    frameSize:     mp.getFrameSize(),
    alpha,
    interpPoint,
    vqMode,
    scaleAlpha,
    deterministic: deterministicHash,
  };
  if (vqMode === 'level_swap' || vqMode === 'int_lerp' || vqMode === 'sim_interp') {
    const nq = computeNq();
    msg.levelAlphas = new Float32Array(levelAlphas.slice(0, nq));
  }
  worker.postMessage(msg);
}

// ═══════════════════════════════════════════════════════════════════════
// Playback
// ═══════════════════════════════════════════════════════════════════════

playBtn.addEventListener('click', () => { isPlaying ? stopPlayback() : startPlayback(seekOffset); });

loopBtn.addEventListener('click', () => {
  looping = !looping;
  loopBtn.classList.toggle('active', looping);
  if (playNode) playNode.loop = looping;
  if (playNode && !looping) playNode.onended = stopPlayback;
  if (playNode &&  looping) playNode.onended = null;
});

function currentAudio() {
  if (currentView === 'A')      return decodedA;
  if (currentView === 'B')      return decodedB;
  if (currentView === 'interp') return interpAudio;
  return null;
}

function _killFadeOut() {
  if (!fadeOutNode) return;
  fadeOutGain.gain.cancelScheduledValues(audioCtx.currentTime);
  fadeOutGain.gain.setValueAtTime(0, audioCtx.currentTime);
  fadeOutNode.onended = null;
  try { fadeOutNode.stop(); } catch {}
  try { fadeOutGain.disconnect(); } catch {}
  fadeOutNode = null; fadeOutGain = null;
}

function _cancelSpecFade() {
  if (specFadeRAF) { cancelAnimationFrame(specFadeRAF); specFadeRAF = null; }
  specFadeOldOff = null; specFadeNewOff = null; specFadeView = null;
}

function startPlayback(atOffset = 0) {
  if (!audioCtx) return;
  const pcm = currentAudio();
  if (!pcm) return;

  _killFadeOut();

  if (playNode) {
    playNode.onended = null;
    try { playNode.stop(); } catch {}
    playNode = null;
  }
  if (playGain) { try { playGain.disconnect(); } catch {} playGain = null; }
  cancelAnimationFrame(phRAF);

  const preBuf = currentView === 'A' ? bufA : currentView === 'B' ? bufB : bufInterp;
  const buf = preBuf || (() => {
    const b = audioCtx.createBuffer(1, pcm.length, sourceSR);
    b.copyToChannel(pcm, 0);
    return b;
  })();

  playGain = audioCtx.createGain();
  playGain.gain.value = 1;
  playGain.connect(analyserNode || audioCtx.destination);

  playNode = audioCtx.createBufferSource();
  playNode.buffer  = buf;
  playNode.loop    = looping;
  playNode.onended = looping ? null : stopPlayback;
  playNode.connect(playGain);

  const offset = Math.max(0, Math.min(atOffset, pcm.length / sourceSR - 0.001));
  playNode.start(0, offset);
  playStart       = audioCtx.currentTime - offset;
  playingDuration = pcm.length / sourceSR;
  isPlaying       = true;
  playBtn.textContent = '⏹';
  updateLegend();
  drawSpec();
  animatePlayhead();
  startPipelineTimer();
  startLevelMeter();
}

function _crossfadeAudioTo(offset) {
  if (!audioCtx) return;
  const pcm = currentAudio();
  if (!pcm) { stopPlayback(); return; }

  _killFadeOut();

  if (playNode) {
    fadeOutNode = playNode;
    fadeOutGain = playGain;
    fadeOutGain.gain.cancelScheduledValues(audioCtx.currentTime);
    fadeOutGain.gain.setValueAtTime(1, audioCtx.currentTime);
    fadeOutGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + CROSSFADE_S);
    const fn = fadeOutNode, fg = fadeOutGain;
    setTimeout(() => {
      fn.onended = null;
      try { fn.stop(); } catch {}
      try { fg.disconnect(); } catch {}
    }, (CROSSFADE_S + 0.15) * 1000);
    playNode = null; playGain = null;
  }

  const dur     = pcm.length / sourceSR;
  const safeOff = Math.max(0, Math.min(offset, dur - 0.001));
  const preBuf  = currentView === 'A' ? bufA : currentView === 'B' ? bufB : bufInterp;
  const buf     = preBuf || (() => {
    const b = audioCtx.createBuffer(1, pcm.length, sourceSR);
    b.copyToChannel(pcm, 0);
    return b;
  })();

  playGain = audioCtx.createGain();
  playGain.gain.setValueAtTime(0, audioCtx.currentTime);
  playGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + CROSSFADE_S);
  playGain.connect(analyserNode || audioCtx.destination);

  playNode = audioCtx.createBufferSource();
  playNode.buffer  = buf;
  playNode.loop    = looping;
  playNode.onended = looping ? null : stopPlayback;
  playNode.connect(playGain);
  playNode.start(0, safeOff);
  playStart       = audioCtx.currentTime - safeOff;
  playingDuration = dur;
}

function crossfadeToNew(view) {
  if (!isPlaying || currentView !== view) return;
  const elapsed = audioCtx.currentTime - playStart;
  const pcm = currentAudio();
  if (!pcm) return;
  const dur = pcm.length / sourceSR;
  _crossfadeAudioTo(looping ? elapsed % dur : Math.min(elapsed, dur - 0.001));
}

function stopPlayback() {
  _killFadeOut();
  if (playNode) { playNode.onended = null; try { playNode.stop(); } catch {} playNode = null; }
  if (playGain) { try { playGain.disconnect(); } catch {} playGain = null; }
  isPlaying = false;
  playBtn.textContent = '▶';
  cancelAnimationFrame(phRAF);
  drawPlayhead(currentScrubFrac);
  stopPipelineTimer();
  stopLevelMeter();
}

function animatePlayhead() {
  function tick() {
    if (!isPlaying) return;
    const dur     = playingDuration || 1;
    const elapsed = audioCtx.currentTime - playStart;
    const frac    = looping ? (elapsed % dur) / dur : elapsed / dur;
    drawPlayhead(frac);
    phRAF = requestAnimationFrame(tick);
  }
  tick();
}

// ═══════════════════════════════════════════════════════════════════════
// Spectrogram draw
// ═══════════════════════════════════════════════════════════════════════

sharedScaleChk.addEventListener('change', () => {
  sharedScale = sharedScaleChk.checked;
  offA = offB = offInterp = null;
  drawSpec();
});

function globalStftRange() {
  const stfts = [stftA, stftB, stftInterp].filter(Boolean);
  if (!stfts.length) return null;
  return {
    dBmin: Math.min(...stfts.map(s => s.dBmin)),
    dBmax: Math.max(...stfts.map(s => s.dBmax)),
  };
}

function makeOffscreen(stft, stops) {
  if (!stft) return null;
  if (!sharedScale) return stftToOffscreen(stft, stops);
  const range = globalStftRange();
  return range ? stftToOffscreen({ ...stft, dBmin: range.dBmin, dBmax: range.dBmax }, stops)
               : stftToOffscreen(stft, stops);
}

function drawSpec() {
  if (specFadeRAF && specFadeView === currentView) return;

  const cW = Math.round(specCvs.clientWidth  * dpr);
  const cH = Math.round(specCvs.clientHeight * dpr);
  if (!cW || !cH) return;
  specCvs.width = cW; specCvs.height = cH;
  const ctx = specCvs.getContext('2d');
  ctx.clearRect(0, 0, cW, cH);

  if (stftA && !offA) offA = makeOffscreen(stftA, PLASMA);
  if (stftB && !offB) offB = makeOffscreen(stftB, OCEAN);
  if (stftInterp && !offInterp) offInterp = makeOffscreen(stftInterp, HOT);

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  const off = currentView === 'A' ? offA : currentView === 'B' ? offB : offInterp;
  if (off) ctx.drawImage(off, 0, 0, cW, cH);

  drawStrip();
}

function drawStrip() {
  const stft  = currentView === 'A' ? stftA : currentView === 'B' ? stftB : stftInterp;
  const stops = currentView === 'A' ? PLASMA : currentView === 'B' ? OCEAN : HOT;
  _drawStrip(stripCvs, stft, stops, dpr);
}

function startSpecFade(oldOff, newOff, view) {
  _cancelSpecFade();
  if (!oldOff || !newOff || oldOff === newOff) { drawSpec(); return; }
  specFadeOldOff = oldOff;
  specFadeNewOff = newOff;
  specFadeView   = view;
  specFadeStart  = performance.now();

  function tick() {
    const t = Math.min((performance.now() - specFadeStart) / (CROSSFADE_S * 1000), 1);
    if (currentView === specFadeView) {
      const cW = Math.round(specCvs.clientWidth  * dpr);
      const cH = Math.round(specCvs.clientHeight * dpr);
      if (cW && cH) {
        specCvs.width = cW; specCvs.height = cH;
        const ctx = specCvs.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.globalAlpha = 1 - t; ctx.drawImage(specFadeOldOff, 0, 0, cW, cH);
        ctx.globalAlpha = t;     ctx.drawImage(specFadeNewOff, 0, 0, cW, cH);
        ctx.globalAlpha = 1;
      }
    }
    if (t < 1) {
      specFadeRAF = requestAnimationFrame(tick);
    } else {
      specFadeOldOff = null; specFadeNewOff = null; specFadeView = null; specFadeRAF = null;
      drawSpec();
    }
  }
  specFadeRAF = requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════════════════════
// Playhead
// ═══════════════════════════════════════════════════════════════════════

const HANDLE_R = 7;

function drawPlayhead(frac) {
  const cW = Math.round(phCvs.clientWidth  * dpr);
  const cH = Math.round(phCvs.clientHeight * dpr);
  phCvs.width = cW; phCvs.height = cH;
  if (frac < 0 || frac > 1.001) return;
  const ctx = phCvs.getContext('2d');
  const x   = Math.round(Math.min(frac, 1) * cW);
  const hr  = HANDLE_R * dpr;

  ctx.strokeStyle = 'rgba(255,255,255,0.80)';
  ctx.lineWidth   = dpr;
  ctx.beginPath(); ctx.moveTo(x, hr * 2); ctx.lineTo(x, cH); ctx.stroke();

  ctx.beginPath(); ctx.arc(x, hr, hr, 0, 2 * Math.PI);
  ctx.fillStyle   = 'rgba(255,255,255,0.90)'; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = dpr; ctx.stroke();
}

function clearPlayhead() {
  phCvs.width  = phCvs.clientWidth  * dpr;
  phCvs.height = phCvs.clientHeight * dpr;
}

// ═══════════════════════════════════════════════════════════════════════
// Resize
// ═══════════════════════════════════════════════════════════════════════

new ResizeObserver(() => { offA = offB = offInterp = null; drawSpec(); }).observe($('specWrap'));
new ResizeObserver(() => positionPipelineControls()).observe($('pipelinePanel'));

// ═══════════════════════════════════════════════════════════════════════
// Pipeline control positioning
// ═══════════════════════════════════════════════════════════════════════

function positionPipelineControls() {
  const panelW = $('pipelinePanel').clientWidth;
  if (!panelW) return;

  const pcts = [7, 2.5, 11, 2, 3, 2, 5, 2, 13, 2, 11, 2, 3, 2, 11, 2.5, 6];
  const tot  = pcts.reduce((a, b) => a + b, 0);
  const padX = 10;
  const usW  = panelW - 2 * padX;

  const secLeft  = i => padX + pcts.slice(0, i).reduce((a, b) => a + b, 0) / tot * usW;
  const secWidth = i => pcts[i] / tot * usW;
  const secCenter= i => secLeft(i) + secWidth(i) / 2;

  const isVQ       = interpPoint === 'vq_codes';
  const usesLevels = isVQ && (vqMode === 'level_swap' || vqMode === 'int_lerp' || vqMode === 'sim_interp');
  const stackedVQ  = isVQ && !usesLevels;

  const ctrl  = $('pipelineCtrl');
  const is48  = mp.getModelHz() === '48k';
  const baseH = stackedVQ ? 74 : 42;
  ctrl.style.height = (is48 ? baseH + 24 : baseH) + 'px';

  const sl = $('mainSliderSection');
  const vq = $('vqModeBar');

  const vqW    = Math.max(220, secWidth(8));
  const vqLeft = Math.max(0, secCenter(8) - vqW / 2);
  vq.style.left  = vqLeft + 'px';
  vq.style.width = vqW + 'px';

  // Compute slider left/width (used for both mainSliderSection and scaleSliderRow)
  let slLeft, slW;
  if (stackedVQ || usesLevels) {
    slLeft = vqLeft; slW = vqW;
  } else {
    slW    = Math.max(180, Math.min(260, secWidth(2) + secWidth(3) + secWidth(4) + secWidth(5) + secWidth(6)));
    const sliderSec = interpPoint === 'quantized_embeddings' ? 12 : 4;
    slLeft = Math.max(0, secCenter(sliderSec) - slW / 2);
  }

  const scRow = $('scaleSliderRow');
  scRow.style.left  = slLeft + 'px';
  scRow.style.width = slW + 'px';

  if (stackedVQ) {
    vq.style.top       = '4px';
    vq.style.transform = 'none';
    sl.style.left      = slLeft + 'px';
    sl.style.width     = slW + 'px';
    // With scale row: push main slider up so scale row fits below
    sl.style.top       = is48 ? '36px' : '40px';
    sl.style.transform = 'none';
    scRow.style.bottom    = '4px';
    scRow.style.top       = 'auto';
    scRow.style.transform = 'none';
  } else if (usesLevels) {
    vq.style.top       = '4px';
    vq.style.transform = 'none';
    scRow.style.top       = 'auto';
    scRow.style.bottom    = '4px';
    scRow.style.transform = 'none';
  } else {
    vq.style.top       = '50%';
    vq.style.transform = 'translateY(-50%)';
    sl.style.left      = slLeft + 'px';
    sl.style.width     = slW + 'px';
    // With scale row: anchor main slider at top, scale row at bottom
    sl.style.top       = is48 ? '4px'  : '50%';
    sl.style.transform = is48 ? 'none' : 'translateY(-50%)';
    scRow.style.bottom    = '4px';
    scRow.style.top       = 'auto';
    scRow.style.transform = 'none';
  }

  $('multisliderPanel').style.width      = vqW + 'px';
  $('multisliderPanel').style.marginLeft = vqLeft + 'px';

  $('togEncLatents').style.left = secCenter(4)  + 'px';
  $('togVQCodes').style.left    = secCenter(8)  + 'px';
  $('togQuantEmb').style.left   = secCenter(12) + 'px';
}

function setStatus(msg, isErr = false) {
  statusBar.textContent = msg;
  statusBar.style.color = isErr ? 'var(--red)' : 'var(--muted)';
}

// Shift key tracking
// ═══════════════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'Shift') shiftHeld = true;
  if (e.key === ' ' && !e.target.matches('input, select, button, textarea')) {
    e.preventDefault();
    if (isPlaying) stopPlayback(); else startPlayback(seekOffset);
  }
});

window.addEventListener('blur',     () => { shiftHeld = false; });

// ═══════════════════════════════════════════════════════════════════════
// Pipeline visualization
// ═══════════════════════════════════════════════════════════════════════

const COL_A_RGB = [204, 51,  51];
const COL_B_RGB = [ 51, 102, 204];

function blendRGB(t, ca, cb) {
  return [
    Math.round(ca[0] * (1-t) + cb[0] * t),
    Math.round(ca[1] * (1-t) + cb[1] * t),
    Math.round(ca[2] * (1-t) + cb[2] * t),
  ];
}

function computeNf() {
  if (!rawAudioA) return 1;
  const fps = mp.getModelHz() === '24k' ? 75 : 150;
  return Math.max(1, Math.round(rawAudioA.length / sourceSR * fps));
}

function getVQCircleColor(levelK, scrubFrac) {
  const alpha  = parseInt(interpSlider.value) / 100;
  const Nf     = computeNf();
  const frame  = Math.min(Math.floor(scrubFrac * Nf), Nf - 1);
  let t;

  switch (vqMode) {
    case 'flat_swap': {
      const idx  = levelK * Nf + frame;
      const frac = ((Math.imul(idx + 1, 0x9E3779B9) >>> 0) / 0xFFFFFFFF);
      t = frac < alpha ? 1 : 0;
      break;
    }
    case 'frame_swap': {
      const frac = ((Math.imul(frame + 1, 0x9E3779B9) >>> 0) / 0xFFFFFFFF);
      t = frac < alpha ? 1 : 0;
      break;
    }
    case 'level_swap': {
      const seed = (Math.imul(levelK + 1, 49999) + frame + 1) | 0;
      const frac = ((Math.imul(seed, 0x9E3779B9) >>> 0) / 0xFFFFFFFF);
      const ak   = levelAlphas[levelK] ?? 0.5;
      t = frac < ak ? 1 : 0;
      break;
    }
    case 'int_lerp':
    case 'sim_interp':
      t = levelAlphas[levelK] !== undefined ? levelAlphas[levelK] : alpha;
      break;
    default:
      t = 0.5;
  }
  const [r, g, b] = blendRGB(t, COL_A_RGB, COL_B_RGB);
  return `rgb(${r},${g},${b})`;
}

function pipeRR(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPipeline() {
  const cvs = $('pipelineCanvas');
  const W = cvs.clientWidth, H = cvs.clientHeight;
  if (!W || !H) return;
  cvs.width  = W * dpr; cvs.height = H * dpr;
  const ctx = cvs.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const alpha     = parseInt(interpSlider.value) / 100;
  const Nq        = computeNq();
  const ready     = !!(rawAudioA && rawAudioB);
  const encActive = interpPoint === 'encoder_latents';
  const vqActive  = interpPoint === 'vq_codes';
  const qeActive  = interpPoint === 'quantized_embeddings';

  const padX = 10, usW = W - 2 * padX;
  const cy = H / 2, bH = 30, bY = cy - bH / 2;
  const fs = Math.max(9, Math.min(11, W / 95));

  const pcts = [7, 2.5, 11, 2, 3, 2, 5, 2, 13, 2, 11, 2, 3, 2, 11, 2.5, 6];
  const tot  = pcts.reduce((a, b) => a + b, 0);
  const sw   = pcts.map(p => p / tot * usW);

  let x = padX;
  const nx = i => { const v = x; x += sw[i]; return v; };

  function drawBox(label, lx, lw, active) {
    ctx.fillStyle   = active ? '#3a2a0a' : '#252525';
    ctx.strokeStyle = active ? '#c8902a' : '#404040';
    ctx.lineWidth   = active ? 1.5 : 1;
    pipeRR(ctx, lx, bY, lw, bH, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle   = active ? '#ffb030' : '#909090';
    ctx.font        = `${fs}px system-ui`;
    ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, lx + lw / 2, cy);
  }

  function drawArrow(lx, lw) {
    const ex = lx + lw;
    ctx.strokeStyle = '#484848'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx, cy); ctx.lineTo(ex - 5, cy); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ex - 7, cy - 3); ctx.lineTo(ex, cy); ctx.lineTo(ex - 7, cy + 3);
    ctx.stroke();
  }

  function drawTensor(lx, lw, active) {
    const th = bH * 0.80, ty = cy - th / 2;
    if (active) {
      const [r, g, b] = blendRGB(alpha, COL_A_RGB, COL_B_RGB);
      ctx.fillStyle   = ready ? `rgb(${r},${g},${b})` : 'rgba(110,55,55,0.45)';
      ctx.strokeStyle = '#c8902a'; ctx.lineWidth = 1.5;
    } else {
      ctx.fillStyle   = '#363636'; ctx.strokeStyle = '#303030'; ctx.lineWidth = 1;
    }
    pipeRR(ctx, lx, ty, lw, th, 2); ctx.fill(); ctx.stroke();
    if (active) {
      ctx.fillStyle  = ready ? 'rgba(255,255,255,0.75)' : 'rgba(255,180,80,0.6)';
      ctx.font       = `bold ${fs + 1}px system-ui`;
      ctx.textAlign  = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('α', lx + lw / 2, cy);
    }
  }

  // ── 0: Source A / B labels ──
  {
    const lx = nx(0), lw = sw[0], sh = Math.floor(bH / 2) - 2;
    ctx.fillStyle = `rgb(${COL_A_RGB.join(',')})`;
    pipeRR(ctx, lx, cy - sh - 1, lw, sh, 3); ctx.fill();
    ctx.fillStyle = `rgb(${COL_B_RGB.join(',')})`;
    pipeRR(ctx, lx, cy + 1, lw, sh, 3); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.min(fs, 10)}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('A', lx + lw / 2, cy - sh / 2 - 1);
    ctx.fillText('B', lx + lw / 2, cy + sh / 2 + 1);
  }

  drawArrow(nx(1), sw[1]);
  drawBox('Encode Audio', nx(2), sw[2], false);
  drawArrow(nx(3), sw[3]);
  drawTensor(nx(4), sw[4], encActive);
  drawArrow(nx(5), sw[5]);
  drawBox('VQ', nx(6), sw[6], false);
  drawArrow(nx(7), sw[7]);

  // ── 8: VQ circles ──
  {
    const lx = nx(8), lw = sw[8];
    const cols   = Math.min(Nq, 8), rows = Math.ceil(Nq / cols);
    const padI   = 5, rowGap = 3, colGap = 3;
    const availH = H - 2 * 8;
    const circByH = Math.floor((availH - 2 * padI - (rows - 1) * rowGap) / rows);
    const circByW = Math.floor((lw    - 2 * padI - (cols - 1) * colGap) / cols);
    const circD   = Math.max(6, Math.min(12, circByH, circByW));
    const circR   = circD / 2;

    const gridW = cols * circD + (cols - 1) * colGap;
    const gridH = rows * circD + (rows - 1) * rowGap;
    const dbH   = gridH + 2 * padI;
    const dbX   = lx, dbW = lw, dbY = cy - dbH / 2;

    ctx.save();
    ctx.strokeStyle = vqActive ? '#c8902a' : '#444';
    ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    pipeRR(ctx, dbX, dbY, dbW, dbH, 4); ctx.stroke();
    ctx.restore();

    const gridX = dbX + (dbW - gridW) / 2;
    const gridY = dbY + padI;
    const _pipeNow = performance.now();

    for (let k = 0; k < Nq; k++) {
      const col  = k % cols, row = Math.floor(k / cols);
      const cx2  = gridX + col * (circD + colGap) + circR;
      const cy2  = gridY + row * (circD + rowGap) + circR;
      const isHL = k === _activeLevel;
      const pulse = isHL ? 0.5 + 0.5 * Math.sin(2 * Math.PI * _pipeNow / 400) : 0;
      ctx.fillStyle = (vqActive && ready) ? getVQCircleColor(k, currentScrubFrac) : '#484848';
      ctx.beginPath();
      ctx.arc(cx2, cy2, isHL ? circR * (1 + 0.35 * pulse) : circR, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = isHL ? `rgba(255,210,100,${0.5 + pulse * 0.5})` : '#1a1a1a';
      ctx.lineWidth   = isHL ? 1.5 : 0.5;
      ctx.stroke();
    }

    if (vqActive && ready) {
      const Nf    = computeNf();
      const frame = Math.min(Math.floor(currentScrubFrac * Nf), Nf - 1);
      ctx.fillStyle = '#666'; ctx.font = `${fs - 2}px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(`f ${frame + 1}/${Nf}`, lx + lw / 2, dbY + dbH + 2);
    }

    _vqCircleGrid = { gridX, gridY, circD, circR, colGap, rowGap, cols, Nq };
  }

  drawArrow(nx(9),  sw[9]);
  drawBox('Decode Codes', nx(10), sw[10], false);
  drawArrow(nx(11), sw[11]);
  drawTensor(nx(12), sw[12], qeActive);
  drawArrow(nx(13), sw[13]);
  drawBox('Decode Audio', nx(14), sw[14], false);
  drawArrow(nx(15), sw[15]);

  // ── 16: Out label ──
  {
    const lx = nx(16), lw = sw[16];
    ctx.fillStyle = '#777'; ctx.font = `${fs}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Out', lx + lw / 2, cy);
  }
}

function startPipelineTimer() {
  if (pipelineTimer) return;
  pipelineTimer = setInterval(() => {
    if (!isPlaying || !audioCtx) return;
    const dur     = playingDuration || 1;
    const elapsed = audioCtx.currentTime - playStart;
    currentScrubFrac = looping ? (elapsed % dur) / dur : Math.min(elapsed / dur, 1);
    drawPipeline();
  }, 100);
}

function stopPipelineTimer() {
  if (pipelineTimer) { clearInterval(pipelineTimer); pipelineTimer = null; }
  drawPipeline();
}

// ── Level meter ──────────────────────────────────────────────────────────

const _levelBuf = new Float32Array(512);

function _drawLevelMeter() {
  const cvs = $('levelMeter');
  if (!cvs) return;
  const dpr2 = window.devicePixelRatio || 1;
  const W = 10, H = 28;
  if (cvs.width !== Math.round(W * dpr2) || cvs.height !== Math.round(H * dpr2)) {
    cvs.width  = Math.round(W * dpr2);
    cvs.height = Math.round(H * dpr2);
  }
  const ctx = cvs.getContext('2d');
  ctx.setTransform(dpr2, 0, 0, dpr2, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);

  if (!analyserNode || !isPlaying) return;

  analyserNode.getFloatTimeDomainData(_levelBuf);
  let rms = 0;
  for (let i = 0; i < _levelBuf.length; i++) rms += _levelBuf[i] * _levelBuf[i];
  rms = Math.sqrt(rms / _levelBuf.length);

  if (rms > _levelCur) _levelCur = rms * 0.9 + _levelCur * 0.1;
  else                  _levelCur = _levelCur * 0.88;
  if (_levelCur > _levelPeak) _levelPeak = _levelCur;
  else                        _levelPeak = _levelPeak * 0.997;

  const level = Math.min(1, _levelCur), peak = Math.min(1, _levelPeak);
  const barH  = Math.round(level * H);
  const peakY = Math.max(0, Math.round((1 - peak) * H) - 1);

  ctx.fillStyle = level > 0.85 ? '#cc4444' : level > 0.65 ? '#c8b828' : '#5cb85c';
  ctx.fillRect(1, H - barH, W - 2, barH);
  if (_levelPeak > 0.01) {
    ctx.fillStyle = peak > 0.85 ? '#cc4444' : '#aaaaaa';
    ctx.fillRect(1, peakY, W - 2, 2);
  }
}

function startLevelMeter() {
  if (_levelRAF) return;
  function tick() {
    _drawLevelMeter();
    if (isPlaying) _levelRAF = requestAnimationFrame(tick);
    else { _levelRAF = null; _levelCur = 0; _levelPeak = 0; _drawLevelMeter(); }
  }
  _levelRAF = requestAnimationFrame(tick);
}

function stopLevelMeter() {
  if (_levelRAF) { cancelAnimationFrame(_levelRAF); _levelRAF = null; }
  _levelCur = 0; _levelPeak = 0; _drawLevelMeter();
}

// ── VQ circle click → navigate multislider ─────────────────────────────

$('pipelineCanvas').addEventListener('click', e => {
  if (interpPoint !== 'vq_codes') return;
  if (vqMode !== 'level_swap' && vqMode !== 'int_lerp' && vqMode !== 'sim_interp') return;
  if (!_vqCircleGrid) return;
  const { gridX, gridY, circD, circR, colGap, rowGap, cols, Nq } = _vqCircleGrid;
  const rect = e.currentTarget.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  for (let k = 0; k < Nq; k++) {
    const col = k % cols, row = Math.floor(k / cols);
    const cx2 = gridX + col * (circD + colGap) + circR;
    const cy2 = gridY + row * (circD + rowGap) + circR;
    const dx = mx - cx2, dy = my - cy2;
    if (dx * dx + dy * dy <= (circR + 3) * (circR + 3)) {
      _scatterOffset = Math.floor(k / 4) * 4;
      drawMultislider();
      const rowIdx    = k - _scatterOffset;
      const rows      = document.querySelectorAll('#scatterSliders .scatter-row');
      const targetRow = rows[rowIdx];
      if (targetRow) {
        targetRow.classList.remove('blinking');
        void targetRow.offsetWidth;
        targetRow.classList.add('blinking');
        targetRow.addEventListener('animationend', () => targetRow.classList.remove('blinking'), { once: true });
      }
      break;
    }
  }
});

// ── Seek / scrub ──────────────────────────────────────────────────────────

function isNearHandle(offsetX, offsetY) {
  const hw = $('specWrap').clientWidth;
  return Math.abs(offsetX - currentScrubFrac * hw) < HANDLE_R + 6 && offsetY < HANDLE_R * 2 + 8;
}

function applySeek(frac) {
  currentScrubFrac = Math.max(0, Math.min(1, frac));
  const pcm = currentAudio();
  if (pcm) seekOffset = currentScrubFrac * (pcm.length / sourceSR);
  if (isPlaying) startPlayback(seekOffset);
  else { drawPlayhead(currentScrubFrac); drawPipeline(); }
}

$('specWrap').style.cursor = 'crosshair';

$('specWrap').addEventListener('mousedown', e => {
  if (!audioCtx) return;
  if (isNearHandle(e.offsetX, e.offsetY)) { isDraggingPlayhead = true; e.preventDefault(); }
  else applySeek(e.offsetX / $('specWrap').clientWidth);
});

$('specWrap').addEventListener('mousemove', e => {
  $('specWrap').style.cursor =
    (isDraggingPlayhead || isNearHandle(e.offsetX, e.offsetY)) ? 'ew-resize' : 'crosshair';
  if (!isDraggingPlayhead) return;
  applySeek(e.offsetX / $('specWrap').clientWidth);
});

window.addEventListener('mouseup', () => { isDraggingPlayhead = false; });
new ResizeObserver(() => drawPipeline()).observe($('pipelinePanel'));

// ═══════════════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════════════

initWorker();
initLevelSliders();
updateLegend();
updateNotePanel();
updateVqSectionVisibility();
updateScaleSliderVisibility();
loopBtn.classList.add('active');
drawPipeline();
